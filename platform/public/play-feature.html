<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Image de présentation Play Store — Académie Compta FR</title>
<style>
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b0f24;color:#e6ecfa;text-align:center;padding:24px}
  h1{font-size:18px;color:#fff}
  .wrap{max-width:1024px;margin:0 auto}
  svg{width:100%;height:auto;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  button{margin-top:16px;background:linear-gradient(135deg,#7c6cff,#38e8ff);color:#06121f;border:none;border-radius:12px;padding:13px 22px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 10px 30px rgba(56,232,255,.4)}
  p.muted{color:#9aa7c4;font-size:13px}
</style></head>
<body><div class="wrap">
<h1>Image de présentation (1024 × 500) — Google Play</h1>
<svg id="fg" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b0f24"/><stop offset="0.55" stop-color="#141a3a"/><stop offset="1" stop-color="#1b1247"/></linearGradient>
    <radialGradient id="g1" cx="82%" cy="6%" r="62%"><stop offset="0" stop-color="#7c6cff" stop-opacity="0.40"/><stop offset="1" stop-color="#7c6cff" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="6%" cy="96%" r="55%"><stop offset="0" stop-color="#38e8ff" stop-opacity="0.22"/><stop offset="1" stop-color="#38e8ff" stop-opacity="0"/></radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38e8ff"/><stop offset="0.55" stop-color="#aab6ff"/><stop offset="1" stop-color="#E8A13A"/></linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#78aaff" stroke-opacity="0.07" stroke-width="1"/></pattern>
    <radialGradient id="rH" cx="40%" cy="26%" r="82%"><stop offset="0" stop-color="#ffffff"/><stop offset="0.68" stop-color="#eef7f9"/><stop offset="1" stop-color="#cde9ec"/></radialGradient>
    <linearGradient id="rT" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5ee3e9"/><stop offset="1" stop-color="#1fb4c0"/></linearGradient>
    <radialGradient id="rE" cx="50%" cy="38%" r="72%"><stop offset="0" stop-color="#1d3e62"/><stop offset="1" stop-color="#0a1f38"/></radialGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#grid)"/>
  <rect width="1024" height="500" fill="url(#g1)"/>
  <rect width="1024" height="500" fill="url(#g2)"/>

  <text x="64" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#bdecff" letter-spacing="1">FORMATION EN LIGNE · MADAGASCAR</text>
  <text x="60" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="70" font-weight="800" fill="url(#title)">Académie Compta FR</text>
  <text x="64" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#cdd8ee">Comptabilité française externalisée — devenez</text>
  <text x="64" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#cdd8ee">collaborateur pour des cabinets français.</text>

  <!-- pills -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
    <rect x="64" y="345" width="190" height="44" rx="22" fill="#38e8ff" fill-opacity="0.10" stroke="#38e8ff" stroke-opacity="0.4"/><text x="159" y="373" fill="#bdecff" text-anchor="middle">Outils métier</text>
    <rect x="266" y="345" width="160" height="44" rx="22" fill="#38e8ff" fill-opacity="0.10" stroke="#38e8ff" stroke-opacity="0.4"/><text x="346" y="373" fill="#bdecff" text-anchor="middle">TVA &amp; liasse</text>
    <rect x="438" y="345" width="150" height="44" rx="22" fill="#38e8ff" fill-opacity="0.10" stroke="#38e8ff" stroke-opacity="0.4"/><text x="513" y="373" fill="#bdecff" text-anchor="middle">Révision</text>
    <rect x="600" y="345" width="180" height="44" rx="22" fill="#38e8ff" fill-opacity="0.10" stroke="#38e8ff" stroke-opacity="0.4"/><text x="690" y="373" fill="#bdecff" text-anchor="middle">Attestation</text>
  </g>
  <rect x="64" y="408" width="226" height="48" rx="10" fill="#34d399"/><text x="177" y="440" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#04210f" text-anchor="middle">Module 1 GRATUIT</text>

  <!-- halo + robot -->
  <circle cx="838" cy="250" r="150" fill="#38e8ff" fill-opacity="0.10"/>
  <circle cx="838" cy="250" r="150" fill="none" stroke="#38e8ff" stroke-opacity="0.25" stroke-width="1.5"/>
  <g transform="translate(728,140) scale(3.45)">
    <line x1="22" y1="13" x2="19" y2="5" stroke="#9fdbe0" stroke-width="2.2" stroke-linecap="round"/><circle cx="18.5" cy="4" r="2.9" fill="url(#rT)"/>
    <line x1="42" y1="13" x2="45" y2="5" stroke="#9fdbe0" stroke-width="2.2" stroke-linecap="round"/><circle cx="45.5" cy="4" r="2.9" fill="url(#rT)"/>
    <rect x="6" y="26" width="7" height="14" rx="3.5" fill="url(#rT)"/><rect x="51" y="26" width="7" height="14" rx="3.5" fill="url(#rT)"/>
    <rect x="12" y="12" width="40" height="38" rx="15" fill="url(#rH)" stroke="#7fcfd6" stroke-width="1.6"/>
    <rect x="17" y="20" width="30" height="22" rx="11" fill="#0e2a4a"/>
    <circle cx="26" cy="29" r="5.2" fill="url(#rE)" stroke="#3ee6ee" stroke-width="1.6"/>
    <circle cx="38" cy="29" r="5.2" fill="url(#rE)" stroke="#3ee6ee" stroke-width="1.6"/>
    <circle cx="27.5" cy="27.3" r="1.5" fill="#eafdff"/><circle cx="39.5" cy="27.3" r="1.5" fill="#eafdff"/>
    <path d="M28 36.5 q4 3 8 0" stroke="#3ee6ee" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="20.5" cy="35" r="1.6" fill="#5ee3e9" opacity="0.7"/><circle cx="43.5" cy="35" r="1.6" fill="#5ee3e9" opacity="0.7"/>
    <ellipse cx="26" cy="18" rx="9" ry="3" fill="#ffffff" opacity="0.55"/>
  </g>
</svg>
<button onclick="dl()">⬇️ Télécharger l'image PNG (1024 × 500)</button>
<p class="muted">Téléverse ce PNG comme « Image de présentation » (feature graphic) dans Play Console.</p>
</div>
<script>
function dl(){
  var svg=document.getElementById('fg');
  var xml=new XMLSerializer().serializeToString(svg);
  var img=new Image();
  img.onload=function(){
    var c=document.createElement('canvas'); c.width=1024; c.height=500;
    var ctx=c.getContext('2d'); ctx.drawImage(img,0,0,1024,500);
    var a=document.createElement('a'); a.download='play-feature-1024x500.png'; a.href=c.toDataURL('image/png'); a.click();
  };
  img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(xml)));
}
</script>
</body></html>
