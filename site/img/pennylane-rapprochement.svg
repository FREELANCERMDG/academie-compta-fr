<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="470" fill="#f4f6f9"/>
  <text x="20" y="32" font-size="18" font-weight="700" fill="#1F4E78">Rapprochement bancaire sur Pennylane — le flux</text>
  <!-- Transaction de départ -->
  <rect x="300" y="52" width="300" height="58" rx="10" fill="#fff" stroke="#1F4E78" stroke-width="2"/>
  <text x="318" y="78" font-size="14" font-weight="700" fill="#27384a">12/03 · PRLV ORANGE · −90,00 €</text>
  <rect x="318" y="86" width="92" height="20" rx="10" fill="#fbe7e7"/><text x="364" y="100" font-size="11" fill="#c0392b" text-anchor="middle">À traiter</text>
  <text x="430" y="100" font-size="11" fill="#8a97a6">(transaction descendue de la banque)</text>
  <!-- Flèches -->
  <g stroke="#9db4cc" stroke-width="2" fill="none" marker-end="url(#a)">
    <defs><marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9db4cc"/></marker></defs>
    <path d="M380,110 L150,170"/>
    <path d="M450,110 L450,170"/>
    <path d="M520,110 L760,170"/>
  </g>
  <!-- Option A -->
  <rect x="20" y="172" width="250" height="150" rx="10" fill="#fff" stroke="#e2e6ec"/>
  <text x="36" y="198" font-size="14" font-weight="700" fill="#1F4E78">1 · Rapprocher avec la pièce</text>
  <text x="36" y="222" font-size="12" fill="#27384a">Associer la facture / justificatif</text>
  <text x="36" y="244" font-size="12" fill="#27384a">→ écriture générée</text>
  <text x="36" y="264" font-size="12" fill="#27384a">→ tiers lettré automatiquement</text>
  <rect x="36" y="282" width="80" height="24" rx="12" fill="#e4f6ea"/><text x="76" y="298" font-size="12" fill="#1f8a4c" text-anchor="middle">Traité ✓</text>
  <!-- Option B -->
  <rect x="325" y="172" width="250" height="150" rx="10" fill="#fff" stroke="#e2e6ec"/>
  <text x="341" y="198" font-size="14" font-weight="700" fill="#1F4E78">2 · Catégoriser (sans facture)</text>
  <text x="341" y="222" font-size="12" fill="#27384a">Compte de contrepartie : 6262</text>
  <text x="341" y="244" font-size="12" fill="#27384a">Taux de TVA : 20 %</text>
  <text x="341" y="264" font-size="12" fill="#27384a">(+ catégorie analytique)</text>
  <rect x="341" y="282" width="80" height="24" rx="12" fill="#e4f6ea"/><text x="381" y="298" font-size="12" fill="#1f8a4c" text-anchor="middle">Traité ✓</text>
  <!-- Option C -->
  <rect x="630" y="172" width="250" height="150" rx="10" fill="#fff" stroke="#e2e6ec"/>
  <text x="646" y="198" font-size="14" font-weight="700" fill="#1F4E78">3 · Pas de pièce nécessaire</text>
  <text x="646" y="222" font-size="12" fill="#27384a">Ex. frais bancaires → 627</text>
  <text x="646" y="244" font-size="12" fill="#27384a">Marquer « justifié »</text>
  <rect x="646" y="282" width="90" height="24" rx="12" fill="#eaf1f9"/><text x="691" y="298" font-size="12" fill="#2E6CA4" text-anchor="middle">Justifié</text>
  <!-- Pièce manquante -->
  <rect x="20" y="350" width="860" height="46" rx="10" fill="#fff5e6" stroke="#E8A13A"/>
  <text x="36" y="378" font-size="13" fill="#9a6a12">⚠️ Pièce manquante ? → laisser « À traiter » + note + relancer le client. Jamais de TVA déduite sans justificatif.</text>
  <text x="20" y="430" font-size="13" fill="#1F4E78" font-weight="700">Objectif mensuel : 0 transaction « À traiter ».</text>
  <text x="20" y="458" font-size="11" fill="#9db">Schéma pédagogique — MG CONSULTING IT&amp;ACT</text>
</svg>
