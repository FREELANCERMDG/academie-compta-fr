r le tableau en Excel</strong>, le corriger manuellement, puis le <strong>réimporter</strong> dans votre dossier de travail.</blockquote>\n<blockquote>🎥 <strong>Dans la vidéo ci‑dessus :</strong> les trois cadrages sont présentés, dont le <strong>cadrage annuel</strong> et ses spécificités pour une <strong>première année sur Pennylane</strong> — Guillaume vous guide jusqu'au bout du processus.</blockquote>\n<h2>À retenir (réflexes cabinet)</h2>\n<ul><li>Pas de validation de TVA <strong>sans cadrage</strong> : c'est le point de contrôle qui évite les redressements.</li><li>Un écart vient souvent d'une <strong>transaction non traitée</strong>, d'un <strong>mauvais taux</strong> ou d'un <strong>compte d'attente</strong> mal soldé.</li><li>Conserver le <strong>tableau de cadrage</strong> comme justificatif du dossier.</li></ul>", "m21i": "<h1>2.9 — Formulaire CA3 / CA12 sur Pennylane</h1>\n<blockquote>🎥 Démonstration — les <strong>nouveaux formulaires de TVA CA3 / CA12</strong> (mise à jour septembre 2025) dans Pennylane.</blockquote>\n<div style=\"margin:16px 0;border-radius:12px;overflow:hidden;background:#000\"><video controls preload=\"metadata\" style=\"width:100%;height:auto;display:block;border-radius:12px\" src=\"/formation/videos/ca3-ca12-pennylane.mp4\"></video></div>\n<h2>Ce que montre la vidéo</h2>\n<p>Comment <strong>remplir et générer</strong> la déclaration de TVA dans Pennylane avec les <strong>nouveaux formulaires</strong> :</p>\n<ul><li><strong>CA3</strong> : déclaration <strong>mensuelle ou trimestrielle</strong> (régime réel normal) ;</li><li><strong>CA12</strong> : déclaration <strong>annuelle</strong> (régime réel simplifié).</li></ul>\n<h2>Rappel : CA3 ou CA12 ?</h2>\n<div class=\"tbl\"><table><thead><tr><th>Formulaire</th><th>Régime</th><th>Périodicité</th></tr></thead><tbody><tr><td><strong>CA3</strong></td><td>Réel normal</td><td><strong>Mensuelle</strong> (ou trimestrielle si TVA &lt; 4 000 €/an)</td></tr><tr><td><strong>CA12</strong></td><td>Réel simplifié (RSI)</td><td><strong>Annuelle</strong> + 2 acomptes (juillet, décembre)</td></tr></tbody></table></div>\n<h2>Les étapes clés</h2>\n<ol><li>S'assurer que la saisie est <strong>complète</strong> et que le <strong>cadrage TVA</strong> est fait (cf. leçon 2.8).</li><li>Ouvrir <strong>Fiscalité → TVA</strong> : Pennylane <strong>pré‑remplit</strong> le formulaire (CA3 ou CA12) à partir des écritures.</li><li>Contrôler chaque <strong>cellule / cadre</strong> du formulaire (bases par taux, TVA collectée, TVA déductible).</li><li>Vérifier le <strong>solde</strong> (TVA à payer ou crédit de TVA) puis <strong>valider / télédéclarer</strong>.</li></ol>\n<h2>À retenir (réflexes cabinet)</h2>\n<ul><li>Le formulaire est <strong>pré‑rempli</strong> par l'outil, mais le <strong>contrôle reste indispensable</strong> (cadrage avant validation).</li><li><strong>CA3 = réel normal</strong> (mensuel/trimestriel) · <strong>CA12 = réel simplifié</strong> (annuel + acomptes).</li><li>Conserver le <strong>détail justificatif</strong> de chaque déclaration dans le dossier.</li></ul>", "m21j": "<h1>2.10 — Comment basculer sa comptabilité sur Pennylane (reprise d'un dossier)</h1>\n<blockquote>📌 <strong>Guide épinglé</strong> — document de référence à consulter et à garder sous la main pour toute <strong>reprise de dossier</strong> / migration vers Pennylane.</blockquote>\n<p><a href=\"/formation/docs/basculer-compta-pennylane.pdf\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:var(--grad,#7c6cff);color:#fff;font-weight:700;padding:12px 20px;border-radius:10px;text-decoration:none\">📄 Ouvrir / télécharger le guide (PDF)</a></p>\n<h2>De quoi parle ce guide ?</h2>\n<p>Un guide pas à pas pour <strong>migrer une comptabilité existante</strong> depuis un ancien logiciel vers Pennylane, en suivant les étapes <strong>dans l'ordre</strong> pour éviter les erreurs :</p>\n<ul><li><strong>Étape 1 — Paramétrage de base</strong> : créer les <strong>exercices comptables</strong>, choisir le <strong>régime fiscal</strong>, créer les <strong>profils utilisateurs</strong> et définir la <strong>date de reprise</strong> (le J+1 de la dernière écriture de l'ancien logiciel).</li><li><strong>Étape 2 — Import du FEC ou des écritures</strong> : récupérer toutes les données (FEC = écritures + plan comptable + lettrage ; import d'écritures CSV si l'on a besoin de l'<strong>analytique</strong>).</li><li><strong>Étapes suivantes</strong> : reprise des soldes / à‑nouveaux, contrôles et points de vigilance détaillés dans le document.</li></ul>\n<blockquote>💡 À lire <strong>en complément</strong> des leçons 2.3 (Import du FEC) et 2.4 (Reprise des immobilisations).</blockquote>\n<h2>Le guide complet (visualisation)</h2>\n<div style=\"position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#f1f3f6\"><iframe src=\"/formation/docs/basculer-compta-pennylane.pdf\" title=\"Guide : Basculer ma comptabilité sur Pennylane\" style=\"width:100%;height:80vh;border:0;display:block\"></iframe></div>\n<blockquote>ℹ️ Si l'aperçu ne s'affiche pas sur votre appareil (mobile, navigateur ancien), utilisez le bouton <strong>« Ouvrir / télécharger le guide (PDF) »</strong> ci‑dessus.</blockquote>", "m21k": "<h1>2.11 — Préparer la liasse fiscale sur Pennylane</h1>\n<p>La période fiscale se prépare <strong>en amont</strong>. La plupart des champs de la <strong>liasse fiscale</strong> sont repris automatiquement de votre dossier Pennylane : <strong>plus vous les complétez tôt, plus le remplissage de la liasse sera rapide</strong>. Voici, par emplacement dans l'interface, tout ce qu'il faut vérifier ou compléter — idéalement <strong>avant le 31 décembre</strong>.</p>\n<h2>✅ Checklist liasse fiscale (vue d'ensemble)</h2>\n<p><strong>1. Espace cabinet</strong> <em>(Entreprises → Saisie)</em></p>\n<ul><li>☐ Nombre d'employés <em>(onglet Général)</em></li><li>☐ Référence d'obligation fiscale – ROF <em>(onglet Fiscal)</em></li></ul>\n<p><strong>2. Dossier permanent</strong> <em>(Paramètres → Informations entreprise)</em></p>\n<ul><li>☐ SIREN · ☐ Activité de l'entreprise · ☐ Exercices comptables</li><li>☐ Catégorie fiscale · ☐ Régime fiscal · ☐ Organisme de gestion agréé (OGA)</li><li>☐ Répartition du capital <em>(attention aux dates : début et fin d'exercice)</em></li><li>☐ Filiales et participations · ☐ Immeubles <em>(si SCI à l'IR)</em></li></ul>\n<p><strong>3. Modules de révision</strong> <em>(Révision → module concerné)</em></p>\n<ul><li>☐ Immobilisations <em>(financières, amortissements, sorties, dépréciations…)</em></li><li>☐ Emprunts <em>(échéanciers, ventilation capital / intérêts / assurance)</em></li><li>☐ Crédits-bail <em>(échéanciers, plafond annuel de déductibilité)</em></li><li>☐ Écritures de régularisation – cut-off <em>(PCA, CCA, FAE, FNP)</em></li></ul>\n<hr>\n<h2>1) Espace cabinet</h2>\n<p>Accès : <strong>espace cabinet → Entreprises → Saisie</strong>, puis survolez l'entreprise et ouvrez la gestion du dossier (icône page) → onglets <strong>Général</strong> / <strong>Fiscal</strong>.</p>\n<ul><li><strong>Général → Nombre d'employés</strong> : la valeur saisie ici est <strong>reprise dans la liasse</strong>.</li><li><strong>Fiscal → Référence d'obligation fiscale (ROF)</strong> : identifiant fourni par l'administration fiscale (notamment la <strong>ROF liasse</strong>).</li></ul>\n<blockquote>⚠️ La ROF liasse prend <strong>automatiquement</strong> en compte votre régime fiscal (BIC, BNC, IS…) et l'ajoute en <strong>préfixe</strong>. Vous ne saisissez donc que <strong>l'identifiant final</strong> (ex. <code>2</code> → <code>IS2</code>, <code>3</code> → <code>BNC3</code>).</blockquote>\n<h2>2) Dossier permanent</h2>\n<p>Accès : <strong>dossier du client → Paramètres → Informations entreprise</strong>.</p>\n<h3>Onglet Général</h3>\n<ul><li><strong>SIREN</strong> (normalement déjà rempli) : une fois vérifié, cliquez sur <strong>« Mettre à jour les informations »</strong> pour actualiser automatiquement <strong>adresse, forme juridique et capital social</strong>.</li><li><strong>Activité de l'entreprise</strong> : ce champ est repris dans la liasse.</li></ul>\n<h3>Onglet Tenue comptable</h3>\n<ul><li><strong>Figer et valider la comptabilité</strong> (à la date de clôture).</li><li><strong>Exercices comptables</strong> : ces dates <strong>conditionnent tous les calculs</strong> de la liasse.</li></ul>\n<h3>Onglet Fiscal</h3>\n<ul><li><strong>Catégorie fiscale</strong>, <strong>Régime fiscal</strong>, <strong>Organisme de gestion agréé (OGA)</strong>.</li><li>Un bon paramétrage ici fait <strong>gagner du temps</strong> : les <strong>bons formulaires (CERFA)</strong> seront générés automatiquement dans les modules de fiscalité.</li></ul>\n<h3>Onglet Répartition du capital</h3>\n<ul><li>Vérifiez et complétez la <strong>composition du capital</strong> et les <strong>coordonnées des associés</strong>, <strong>en début ET en fin d'exercice</strong>.</li></ul>\n<blockquote>⚠️ Par défaut, seule la répartition <strong>en fin d'exercice en cours</strong> est affichée. Utilisez la flèche <strong>« précédent »</strong> pour contrôler les exercices antérieurs. Si la liasse concerne 2025, vérifiez bien les répartitions de <strong>début et de fin 2025</strong>.</blockquote>\n<blockquote>💡 Pour plus de précision : cliquez sur un propriétaire → <strong>Paramétrage avancé → Imposition</strong>.<br>→ Ces données remontent dans les CERFA <strong>« Composition du capital social »</strong> de la liasse (selon le régime).</blockquote>\n<h3>Onglet Filiales et participations</h3>\n<ul><li>Renseignez les <strong>filiales / participations détenues</strong> → remontent dans le CERFA <strong>« Filiales et participations »</strong>.</li></ul>\n<h3>Onglet Immeubles <em>(SCI à l'IR uniquement)</em></h3>\n<ul><li>Cet onglet apparaît si la <strong>catégorie fiscale = SCI à l'IR</strong> (Fiscal → Catégorie fiscale).</li><li>Créez les <strong>immeubles</strong> → remplissage automatique du <strong>formulaire 2072</strong>. Pensez à <strong>« Gérer les catégories »</strong> et à <strong>configurer l'analytique</strong> correspondante (obligatoire).</li></ul>\n<blockquote>✍️ La <strong>catégorisation analytique</strong> est requise : une écriture <strong>non catégorisée n'est pas prise en compte</strong> dans la liasse.</blockquote>\n<h2>3) Modules de révision</h2>\n<p>Accès : <strong>dossier permanent → menu Révision → module concerné</strong>. Si vos modules sont à jour, les remplissages issus de la comptabilité fonctionnent.</p>\n<div class=\"tbl\"><table><thead><tr><th>Module</th><th>À vérifier / compléter</th><th>Alimente (CERFA)</th></tr></thead><tbody><tr><td><strong>Immobilisations</strong></td><td>financières, fiches, <strong>dépréciations</strong>, <strong>sorties</strong>, <strong>dotations aux amortissements</strong></td><td>tableau immobilisations &amp; amortissements — <strong>2054/2055</strong> ou <strong>2033-C</strong></td></tr><tr><td><strong>Emprunts</strong></td><td>détail + <strong>échéanciers</strong>, ventilation <strong>capital / intérêts / assurance</strong></td><td><strong>État des échéances — 2057</strong></td></tr><tr><td><strong>Crédits-bail</strong></td><td>suivi, <strong>plafond annuel de déductibilité</strong>, échéanciers de paiement</td><td>facilite l'<strong>IS</strong> → <strong>Détermination du résultat fiscal (2058-A ou 2033-B)</strong></td></tr><tr><td><strong>Écritures de régularisation (cut-off)</strong></td><td><strong>PCA</strong>, <strong>CCA</strong>, <strong>FAE</strong>, <strong>FNP</strong></td><td>annexes <strong>CA17PROREC, CA18CHAPAY, CA19CHAREP, CA20CHAAVA, CA21PROAVA</strong></td></tr></tbody></table></div>\n<h2>À retenir (réflexes cabinet)</h2>\n<ul><li>La liasse se <strong>prépare en amont</strong> : remplir tôt les champs du dossier = liasse rapide en fin d'exercice.</li><li><strong>Tout part du paramétrage</strong> (régime fiscal, exercices, répartition du capital) : un mauvais réglage = mauvais formulaires.</li><li>Les <strong>modules de révision</strong> (immo, emprunts, crédits-bail, cut-off) <strong>alimentent directement les CERFA</strong> de la liasse.</li><li>Pensez à <strong>figer la comptabilité</strong> à la clôture (voir leçon suivante).</li></ul>", "m21l": "<h1>2.12 — Figer la comptabilité sur Pennylane</h1>\n<blockquote>🎥 Démonstration — comment <strong>figer (verrouiller) la comptabilité</strong> dans Pennylane.</blockquote>\n<div style=\"margin:16px 0;border-radius:12px;overflow:hidden;background:#000\"><video controls preload=\"metadata\" style=\"width:100%;height:auto;display:block;border-radius:12px\" src=\"/formation/videos/figer-comptabilite-pennylane.mp4\"></video></div>\n<h2>Ce que montre la vidéo</h2>\n<p>Comment <strong>figer la comptabilité</strong> à une date donnée : une fois figée, <strong>plus aucune écriture</strong> ne peut être ajoutée, modifiée ou supprimée <strong>avant cette date</strong>.</p>\n<h2>Pourquoi figer la comptabilité ?</h2>\n<ul><li><strong>Sécuriser</strong> une période déjà déclarée (TVA, clôture) : on évite toute modification accidentelle.</li><li><strong>Fiabiliser la liasse fiscale</strong> : les calculs reposent sur des écritures <strong>stables</strong>.</li><li><strong>Obligation légale</strong> : une comptabilité doit être <strong>intangible</strong> une fois la période close.</li></ul>\n<h2>Les étapes clés</h2>\n<ol><li>Ouvrir <strong>Paramètres → Informations entreprise → Tenue comptable</strong> (ou le menu dédié « Figer la comptabilité »).</li><li>Indiquer la <strong>date jusqu'à laquelle</strong> figer (souvent la <strong>date de clôture</strong> ou la fin d'une période de TVA).</li><li><strong>Valider</strong> : toutes les écritures antérieures à cette date sont <strong>verrouillées</strong>.</li><li>Pour corriger une période figée → passer une <strong>écriture sur une période ouverte</strong> (OD de correction), sans toucher au passé.</li></ol>\n<h2>À retenir (réflexes cabinet)</h2>\n<ul><li>On <strong>fige après chaque déclaration de TVA</strong> et <strong>à la clôture</strong> : c'est une bonne pratique de contrôle interne.</li><li>Figer <strong>avant</strong> de préparer la liasse fiscale garantit des <strong>chiffres stables</strong>.</li><li>Une période figée se corrige <strong>par une nouvelle écriture</strong> sur une période ouverte, jamais en modifiant l'historique.</li></ul>", "m05": "<h1>MODULE 5 — TVA française</h1>\n<p><strong>Niveau :</strong> Intermédiaire · <strong>Durée estimée :</strong> 12–14 h · <strong>Prérequis :</strong> Modules 2 et 4<br><strong>Chiffres à jour 2026</strong> (sources : impots.gouv.fr, economie.gouv.fr, bofip.impots.gouv.fr).</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Comprendre TVA collectée, déductible, à décaisser, crédit de TVA.</li><li>Distinguer TVA sur les débits / sur les encaissements.</li><li>Connaître les régimes (franchise, réel simplifié, réel normal) et les déclarations CA3 / CA12.</li><li>Préparer une déclaration de TVA contrôlée, prête à valider.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Calculer la TVA à payer / le crédit du mois.</li><li>Contrôler la cohérence TVA avant déclaration.</li><li>Identifier la TVA non déductible.</li></ul>\n<hr>\n<h2>1. Principe général</h2>\n<p>La TVA est un impôt sur la consommation, <strong>collecté pour l'État</strong>. L'entreprise :</p>\n<ul><li><strong>collecte</strong> la TVA sur ses ventes (44571),</li><li><strong>déduit</strong> la TVA sur ses achats (44566 / 44562),</li><li>reverse la différence : <strong>TVA à décaisser = TVA collectée − TVA déductible</strong> (44551), ou constate un <strong>crédit de TVA</strong> (44567) si déductible &gt; collectée.</li></ul>\n<hr>\n<h2>2. Les taux de TVA en vigueur (2026)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Taux</th><th>Application principale</th></tr></thead><tbody><tr><td><strong>20 %</strong></td><td>Taux normal (majorité des biens et services)</td></tr><tr><td><strong>10 %</strong></td><td>Restauration, hôtellerie, transport, travaux d'amélioration du logement, certains produits</td></tr><tr><td><strong>5,5 %</strong></td><td>Produits alimentaires de base, livres, énergie (abonnement gaz/électricité), équipements PMR, certains travaux d'amélioration énergétique</td></tr><tr><td><strong>2,1 %</strong></td><td>Médicaments remboursables, presse, certains spectacles</td></tr></tbody></table></div>\n<blockquote>Le collaborateur applique le taux porté <strong>sur la facture</strong> ; en cas de doute (ex. travaux 10 % vs 20 %), signaler au chef de mission.</blockquote>\n<hr>\n<h2>3. TVA sur les débits vs sur les encaissements</h2>\n<div class=\"tbl\"><table><thead><tr><th>Régime d'exigibilité</th><th>Quand la TVA est due</th><th>Concerne</th></tr></thead><tbody><tr><td><strong>Sur les débits</strong></td><td>À la <strong>facturation</strong></td><td>Livraisons de <strong>biens</strong> (par défaut) ; possible sur option pour les services</td></tr><tr><td><strong>Sur les encaissements</strong></td><td>À l'<strong>encaissement</strong> du règlement</td><td><strong>Prestations de services</strong> (par défaut)</td></tr></tbody></table></div>\n<p><strong>Conséquence pratique :</strong> pour une entreprise de services à l'encaissement, la TVA collectée du mois = TVA sur les <strong>factures payées</strong> ce mois-ci, pas sur les factures émises. → contrôle indispensable avant la CA3.</p>\n<hr>\n<h2>4. Les régimes de TVA et seuils 2026</h2>\n<div class=\"tbl\"><table><thead><tr><th>Régime</th><th>Seuils de CA (2026)</th><th>Déclaration</th></tr></thead><tbody><tr><td><strong>Franchise en base</strong></td><td>Ventes ≤ <strong>85 000 €</strong> (tolérance <strong>93 500 €</strong>) · Services ≤ <strong>37 500 €</strong> (tolérance <strong>41 250 €</strong>)</td><td>Pas de TVA, pas de déclaration ; mention « TVA non applicable, art. 293 B du CGI »</td></tr><tr><td><strong>Réel simplifié (RSI)</strong></td><td>Ventes ≤ <strong>840 000 €</strong> · Services ≤ <strong>254 000 €</strong></td><td><strong>CA12</strong> annuelle + 2 acomptes (juillet 55 %, décembre 40 %)</td></tr><tr><td><strong>Réel normal</strong></td><td>Au-delà des seuils du RSI, ou sur option</td><td><strong>CA3</strong> mensuelle (trimestrielle si TVA due annuelle &lt; 4 000 €)</td></tr></tbody></table></div>\n<blockquote>⚠️ La réforme du <strong>seuil unique de franchise à 25 000 €</strong> a été suspendue ; en 2026, <strong>les seuils ci-dessus restent applicables</strong>. Toujours vérifier le régime exact dans le dossier permanent.<br>ℹ️ Dès qu'une entreprise dépasse le seuil de <strong>tolérance</strong> en cours d'année, elle devient redevable de la TVA dès le 1er jour du mois de dépassement.</blockquote>\n<hr>\n<h2>5. Les déclarations (formulaires CERFA) — quelle case remplir ?</h2>\n<blockquote>En pratique on <strong>télédéclare</strong> (EDI via le logiciel, ou EFI sur impots.gouv) ; mais il faut connaître le <strong>CERFA</strong> et savoir <strong>quelle ligne = quoi</strong>, car les écrans de Pennylane/ACD reprennent <strong>exactement</strong> ces lignes.</blockquote>\n<h3>🧾 CA3 — formulaire <strong>3310‑CA3‑SD</strong> (CERFA n° 10963) — réel normal, mensuelle/trimestrielle</h3>\n<p>Deux cadres : <strong>Cadre A</strong> = montant des opérations (HT) · <strong>Cadre B</strong> = décompte de la TVA.</p>\n<div class=\"cerfa\" data-form=\"ca3\"></div>\n<p><strong>▸ CADRE A — Montant des opérations réalisées (en € HT)</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Ligne</th><th>Quoi y mettre</th><th>Où le trouver en compta</th></tr></thead><tbody><tr><td><strong>01</strong></td><td><strong>Ventes et prestations taxables</strong> (base <strong>HT</strong>)</td><td>crédit des comptes 70x</td></tr><tr><td>02</td><td>Autres opérations imposables (base HT)</td><td>cas particuliers</td></tr><tr><td>0A</td><td>Achats de <strong>prestations de services intracommunautaires</strong> (autoliquidation)</td><td>factures de services UE</td></tr><tr><td>03</td><td><strong>Acquisitions intracommunautaires</strong> de biens (base HT)</td><td>achats de biens UE</td></tr><tr><td>04</td><td><strong>Exportations</strong> hors UE (exonérées)</td><td>ventes hors UE</td></tr><tr><td>05</td><td>Autres opérations non imposables</td><td>—</td></tr><tr><td>06</td><td><strong>Livraisons intracommunautaires</strong> (exonérées)</td><td>ventes de biens vers l'UE</td></tr></tbody></table></div>\n<p><strong>▸ CADRE B — Décompte de la TVA à payer</strong><br><em>TVA brute (collectée), par taux :</em></p>\n<div class=\"tbl\"><table><thead><tr><th>Ligne</th><th>Quoi y mettre</th></tr></thead><tbody><tr><td><strong>08</strong></td><td>base HT <strong>× 20 %</strong> (taux normal) → colonne <strong>base</strong> + colonne <strong>taxe</strong></td></tr><tr><td><strong>09</strong></td><td>base HT <strong>× 10 %</strong></td></tr><tr><td><strong>9B</strong></td><td>base HT <strong>× 5,5 %</strong></td></tr><tr><td><strong>9C</strong></td><td>base HT <strong>× 2,1 %</strong></td></tr><tr><td><strong>17</strong></td><td><em>dont</em> <strong>TVA sur acquisitions intracommunautaires</strong> (déjà incluse au‑dessus)</td></tr><tr><td><strong>16</strong></td><td><strong>TOTAL TVA brute due</strong> = somme des lignes 08 à 15</td></tr></tbody></table></div>\n<p><em>TVA déductible :</em></p>\n<div class=\"tbl\"><table><thead><tr><th>Ligne</th><th>Quoi y mettre</th><th>Compte</th></tr></thead><tbody><tr><td><strong>19</strong></td><td>TVA déductible sur <strong>immobilisations</strong></td><td>44562</td></tr><tr><td><strong>20</strong></td><td>TVA déductible sur <strong>autres biens et services (ABS)</strong></td><td>44566</td></tr><tr><td><strong>21</strong></td><td>Autre TVA à déduire (régularisations, autoliquidation déductible)</td><td>—</td></tr><tr><td><strong>22</strong></td><td><strong>Report du crédit de TVA</strong> (= ligne 27 de la déclaration précédente)</td><td>44567</td></tr><tr><td><strong>23</strong></td><td><strong>TOTAL TVA déductible</strong> = lignes 19 à 22</td></tr></tbody></table></div>\n<p><em>Résultat (un seul des deux cas) :</em></p>\n<div class=\"tbl\"><table><thead><tr><th>Ligne</th><th>Quoi y mettre</th></tr></thead><tbody><tr><td><strong>28</strong></td><td><strong>TVA nette DUE</strong> = ligne 16 − ligne 23 <em>(si 16 &gt; 23 → vous payez)</em></td></tr><tr><td><strong>25</strong></td><td><strong>Crédit de TVA</strong> = ligne 23 − ligne 16 <em>(si 23 &gt; 16)</em></td></tr><tr><td><strong>26</strong></td><td>Remboursement de crédit demandé (optionnel)</td></tr><tr><td><strong>27</strong></td><td>Crédit <strong>à reporter</strong> sur la prochaine déclaration (→ ira en ligne 22 le mois suivant)</td></tr><tr><td><strong>29</strong></td><td>Taxes assimilées (via annexe 3310‑A)</td></tr><tr><td><strong>32</strong></td><td><strong>TOTAL À PAYER</strong> = ligne 28 (+ 29 − crédits)</td></tr></tbody></table></div>\n<blockquote>🧠 Mémo : <strong>16</strong> = TVA collectée totale · <strong>23</strong> = TVA déductible totale · <strong>28</strong> = à payer · <strong>25/27</strong> = crédit.</blockquote>\n<p><strong>▸ Exemple « où mettre quoi »</strong> (mois, réel normal) : ventes 50 000 HT à 20 % · achats+frais 34 000 HT déductibles · immobilisation 2 000 HT · crédit antérieur 300 €.<br>→ <strong>L.01</strong> 50 000 · <strong>L.08</strong> base 50 000 / taxe <strong>10 000</strong> · <strong>L.16</strong> 10 000 · <strong>L.20</strong> <strong>6 800</strong> · <strong>L.19</strong> <strong>400</strong> · <strong>L.22</strong> <strong>300</strong> · <strong>L.23</strong> 7 500 · <strong>L.28</strong> <strong>2 500</strong> · <strong>L.32</strong> <strong>2 500 à payer</strong>.</p>\n<h3>🧾 CA12 — formulaire <strong>3517‑S‑SD</strong> (CERFA n° 11417) — réel simplifié, annuelle</h3>\n<p>Récapitule <strong>toute l'année</strong> et <strong>régularise les 2 acomptes</strong> déjà versés (juillet 55 %, décembre 40 %). Lignes clés :</p>\n<div class=\"cerfa\" data-form=\"ca12\"></div>\n<ul><li><strong>Bases HT par taux</strong> (20 / 10 / 5,5 %) puis TVA brute correspondante.</li><li><strong>TVA déductible</strong> : sur <strong>immobilisations</strong> et sur <strong>autres biens et services</strong>.</li><li><strong>Acomptes déjà payés</strong> dans l'année → à <strong>déduire</strong>.</li><li><strong>Résultat</strong> : <strong>TVA due</strong> (à payer) <strong>ou crédit</strong> = solde annuel.</li></ul>\n<h3>🔗 Lien avec le logiciel</h3>\n<p>Dans <strong>Pennylane</strong> (Fiscalité → TVA) ou <strong>ACD</strong>, ces lignes sont <strong>pré‑remplies</strong> depuis la compta. Votre rôle : <strong>vérifier chaque ligne</strong> (08 = collectée 20 %, 20 = déductible ABS, 19 = immo, 22 = crédit reporté…) <strong>avant</strong> validation par le chef de mission.</p>\n<h3>📎 Formulaires officiels (impots.gouv.fr)</h3>\n<ul><li><strong>CA3</strong> : <a href=\"https://www.impots.gouv.fr/formulaire/3310-ca3-sd/tva-et-taxes-assimilees-regime-du-reel-normal-mini-reel\" target=\"_blank\" rel=\"noopener\">formulaire 3310‑CA3‑SD + notice</a></li><li><strong>CA12</strong> : 3517‑S‑SD (régime simplifié) — sur impots.gouv.fr</li></ul>\n<hr>\n<h2>6. Cas particuliers de TVA</h2>\n<ul><li><strong>Autoliquidation</strong> (sous-traitance BTP, achats à un fournisseur étranger) : l'acheteur <strong>collecte ET déduit</strong>. Neutre, mais à déclarer.</li><li><strong>TVA intracommunautaire</strong> (achat de biens UE) : autoliquidation (TVA due + TVA déductible). Vente intracom = exonérée (avec n° TVA client + DEB/état récapitulatif).</li><li><strong>Importation hors UE</strong> : TVA à l'import <strong>autoliquidée sur la CA3</strong> (réforme 2022) — plus de paiement en douane.</li><li><strong>TVA sur immobilisations</strong> : déductible (44562) si bien affecté à l'activité taxable ; <strong>non déductible</strong> sur les véhicules de tourisme.</li><li><strong>TVA non déductible</strong> :</li><li>Véhicules de tourisme (achat, entretien) ;</li><li>Carburant : <strong>gazole/essence déductibles à 80 %</strong> pour les VP, <strong>100 %</strong> pour les VU ;</li><li>Dépenses de logement des dirigeants/salariés ;</li><li>Cadeaux &gt; seuil unitaire (au-delà du plafond légal) ;</li><li>Dépenses sans facture conforme.</li></ul>\n<hr>\n<h2>7. Contrôles AVANT déclaration (procédure cabinet)</h2>\n<ol><li><strong>Lettrer / pointer</strong> la banque du mois (TVA encaissements = factures payées).</li><li>Vérifier que <strong>toutes les ventes</strong> du mois sont saisies (n° de factures continus).</li><li>Vérifier la <strong>cohérence collectée</strong> : CA HT × taux ≈ TVA collectée.</li><li>Vérifier la <strong>TVA déductible</strong> : pas de TVA sur assurance, sur VP, sur factures non conformes.</li><li>Contrôler les comptes <strong>44571 / 44566 / 44562</strong> au grand livre.</li><li>Vérifier les <strong>autoliquidations / intracom</strong> déclarées.</li><li>Rapprocher avec la <strong>CA3 du mois précédent</strong> (cohérence, crédit reporté).</li><li>Éditer un <strong>brouillon</strong> et le faire <strong>valider par le chef de mission</strong> avant télétransmission.</li></ol>\n<blockquote>🔑 Le collaborateur <strong>prépare</strong> la déclaration ; <strong>la validation et l'envoi</strong> relèvent du chef de mission / expert-comptable.</blockquote>\n<hr>\n<h2>8. Erreurs fréquentes à éviter</h2>\n<ul><li>Déduire la TVA sur une <strong>assurance</strong> (exonérée) ou sur un <strong>VP</strong>.</li><li>Oublier la TVA sur <strong>encaissements</strong> (déclarer sur factures émises au lieu d'encaissées).</li><li>Doublon de TVA (facture saisie 2 fois).</li><li>Mauvais taux (10 % vs 20 % sur travaux).</li><li>Oublier d'autoliquider un achat intracom / sous-traitance BTP.</li><li>Ne pas reporter le <strong>crédit de TVA</strong> du mois précédent.</li><li>Confondre <strong>HT / TTC</strong> (TVA recalculée à l'envers fausse).</li></ul>\n<hr>\n<h2>🧪 Cas pratique 5.1 — Préparer une CA3 mensuelle (réel normal, débits)</h2>\n<p>Données du mois (TVA 20 %) :</p>\n<ul><li>Ventes de marchandises : 50 000 € HT.</li><li>Achats de marchandises : 30 000 € HT.</li><li>Frais généraux déductibles : 4 000 € HT.</li><li>Achat d'un ordinateur (immo) : 2 000 € HT.</li><li>Crédit de TVA reporté du mois précédent : 300 €.</li></ul>\n<p><strong>Travail :</strong> calculez la TVA à payer.</p>\n<h3>✔️ Correction 5.1</h3>\n<ul><li>TVA collectée : 50 000 × 20 % = <strong>10 000 €</strong></li><li>TVA déductible ABS : (30 000 + 4 000) × 20 % = <strong>6 800 €</strong></li><li>TVA déductible immobilisations : 2 000 × 20 % = <strong>400 €</strong></li><li>Crédit antérieur : <strong>300 €</strong></li><li><strong>TVA à payer = 10 000 − 6 800 − 400 − 300 = 2 500 €</strong></li></ul>\n<p>Écriture de la déclaration (OD) :</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>44571 TVA collectée</td><td>10 000</td><td></td></tr><tr><td>44566 TVA déductible ABS</td><td></td><td>6 800</td></tr><tr><td>44562 TVA déductible immo</td><td></td><td>400</td></tr><tr><td>44567 Crédit de TVA reporté</td><td></td><td>300</td></tr><tr><td>44551 TVA à décaisser</td><td></td><td>2 500</td></tr></tbody></table></div>\n<p>Au paiement : 44551 D 2 500 / 512 C 2 500.</p>\n<hr>\n<h2>🧪 Cas pratique 5.2 — TVA sur encaissements</h2>\n<p>Une société de services (à l'encaissement) a émis 12 000 € HT de factures en mars, mais seulement 7 000 € HT ont été <strong>encaissés</strong> en mars. Quelle TVA collectée déclarer sur la CA3 de mars ?</p>\n<h3>✔️ Correction 5.2</h3>\n<p>TVA collectée mars = sur les <strong>encaissements</strong> = 7 000 × 20 % = <strong>1 400 €</strong> (et non 12 000 × 20 %). Le solde sera collecté au fur et à mesure des encaissements.</p>\n<hr>\n<h2>📝 Évaluation de fin de module 5</h2>\n<p><strong>A — QCM (5 pts)</strong></p>\n<ol><li>La TVA à décaisser = a) collectée + déductible b) <strong>collectée − déductible</strong></li><li>Les prestations de services sont par défaut taxables : a) sur les débits b) <strong>sur les encaissements</strong></li><li>Seuil franchise en base <strong>services</strong> 2026 : a) 85 000 € b) <strong>37 500 €</strong></li><li>La TVA sur un véhicule de tourisme est : a) déductible b) <strong>non déductible</strong></li><li>La déclaration du réel normal est la : a) CA12 b) <strong>CA3</strong></li></ol>\n<p><strong>B — Cas pratique</strong> : refaire un calcul de CA3 (type 5.1) + écriture.</p>\n<p><strong>Seuil : 14/20.</strong><br><strong>Corrigé A :</strong> 1b · 2b · 3b · 4b · 5b.</p>\n<hr>\n<h3>📌 Sources officielles 2026</h3>\n<ul><li>Régimes et seuils TVA — <a href=\"https://www.impots.gouv.fr/professionnel/les-regimes-dimposition-la-tva\" target=\"_blank\" rel=\"noopener\">impots.gouv.fr</a></li><li>Franchise en base — <a href=\"https://www.impots.gouv.fr/pro-30042026-tva-franchise-en-base\" target=\"_blank\" rel=\"noopener\">impots.gouv.fr</a></li><li>TVA (taux, déclarations) — <a href=\"https://www.impots.gouv.fr/professionnel/tva\" target=\"_blank\" rel=\"noopener\">impots.gouv.fr/professionnel/tva</a></li></ul>", "m06": "<h1>MODULE 6 — Rapprochement bancaire</h1>\n<p><strong>Niveau :</strong> Intermédiaire · <strong>Durée estimée :</strong> 8–10 h · <strong>Prérequis :</strong> Module 4</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Comprendre l'objet et la méthode du rapprochement bancaire.</li><li>Pointer banque / comptabilité et expliquer chaque écart.</li><li>Justifier le solde du compte 512.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Identifier écritures manquantes, doublons, frais oubliés.</li><li>Construire un état de rapprochement équilibré.</li></ul>\n<hr>\n<h2>1. Objectif du rapprochement bancaire</h2>\n<p>Vérifier que le <strong>solde comptable du 512</strong> correspond au <strong>solde du relevé bancaire</strong>, après prise en compte des opérations « en route » (non encore enregistrées d'un côté ou de l'autre). C'est <strong>le contrôle n°1 de fiabilité</strong> d'un dossier : si la banque est juste, une grande partie de la compta est juste.</p>\n<p><strong>Égalité visée :</strong><br><code>Solde comptable 512 (corrigé) = Solde relevé bancaire (corrigé)</code></p>\n<hr>\n<h2>2. La méthode de pointage</h2>\n<ol><li>Récupérer le <strong>relevé bancaire</strong> du mois et le <strong>grand livre 512</strong>.</li><li><strong>Pointer</strong> ligne à ligne ce qui figure des <strong>deux côtés</strong> (même date/montant).</li><li>Isoler ce qui n'est <strong>que dans la compta</strong> (chèque émis non débité, encaissement non crédité).</li><li>Isoler ce qui n'est <strong>que sur le relevé</strong> (frais bancaires, prélèvements, virements non saisis).</li><li><strong>Saisir</strong> ce qui manque en compta (frais, prélèvements, agios…).</li><li><strong>Justifier</strong> les écarts restants (opérations en cours) dans l'état de rapprochement.</li></ol>\n<hr>\n<h2>3. Les écarts typiques et leur traitement</h2>\n<div class=\"tbl\"><table><thead><tr><th>Écart</th><th>Côté</th><th>Traitement</th></tr></thead><tbody><tr><td><strong>Frais bancaires / agios</strong> oubliés</td><td>Sur relevé seulement</td><td>Saisir 627 / 661 → 512</td></tr><tr><td><strong>Prélèvements fournisseurs</strong> non saisis</td><td>Sur relevé seulement</td><td>Saisir l'achat + 512 (relancer la facture si manquante)</td></tr><tr><td><strong>Encaissements clients</strong> non saisis</td><td>Sur relevé seulement</td><td>Saisir 512 / 411 + lettrer</td></tr><tr><td><strong>Chèque émis non encore débité</strong></td><td>En compta seulement</td><td>Laisser ; figure en rapprochement (à débiter plus tard)</td></tr><tr><td><strong>CB différée</strong></td><td>Décalage</td><td>Débit bancaire postérieur ; rapprocher au mois du débit</td></tr><tr><td><strong>Virement interne</strong></td><td>2 comptes</td><td>Utiliser 580 (cf. §5)</td></tr><tr><td><strong>Doublon</strong></td><td>Compta</td><td>Supprimer l'écriture en double</td></tr></tbody></table></div>\n<hr>\n<h2>4. Méthodes de recherche d'un écart</h2>\n<ul><li><strong>Par montant</strong> : chercher le montant exact dans le grand livre / le relevé (rapide pour un écart unique).</li><li><strong>Par libellé</strong> : identifier le tiers (ex. « SARL DUPONT », « ORANGE », « URSSAF »).</li><li><strong>Par différence</strong> : si l'écart = un montant connu (ex. 18 € = frais bancaires habituels).</li><li><strong>Par cumul</strong> : si l'écart = somme de plusieurs petites lignes (pointer une à une).</li></ul>\n<hr>\n<h2>5. Virements internes (compte 580)</h2>\n<p>Quand l'argent passe d'un compte bancaire à un autre (ou banque ↔ caisse), on utilise le <strong>580</strong> pour éviter un double comptage.</p>\n<p><strong>Ex. — Virement 2 000 € du compte courant vers le livret</strong></p>\n<ul><li>Sortie compte courant : 580 D 2 000 / 512-courant C 2 000</li><li>Entrée livret : 512-livret D 2 000 / 580 C 2 000</li><li>Le <strong>580 se solde à 0</strong> une fois les deux côtés saisis (à vérifier en révision).</li></ul>\n<hr>\n<h2>6. Justification du solde 512</h2>\n<p>À la fin, on doit pouvoir prouver :<br><code>Solde 512 comptable + chèques non débités − encaissements non crédités … = solde relevé</code></p>\n<p>L'<strong>état de rapprochement</strong> (tableau) liste les opérations en suspens et démontre l'égalité.</p>\n<hr>\n<h2>✅ Checklist rapprochement bancaire</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Relevé du mois complet (toutes les pages)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Solde initial relevé = solde final mois précédent</label></li><li class=\"task\"><label><input type=\"checkbox\"> Toutes les lignes du relevé pointées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Frais bancaires / agios saisis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Prélèvements et virements saisis (pièces relancées si besoin)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Doublons supprimés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Virements internes soldés via 580</label></li><li class=\"task\"><label><input type=\"checkbox\"> État de rapprochement équilibré (écart = 0 ou justifié)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Commentaire sur chaque opération en suspens</label></li></ul>\n<hr>\n<h2>📊 Modèle d'état de rapprochement (Excel à créer)</h2>\n<div class=\"tbl\"><table><thead><tr><th></th><th>Côté COMPTA (512)</th><th>Côté BANQUE (relevé)</th></tr></thead><tbody><tr><td>Solde de départ</td><td>…</td><td>…</td></tr><tr><td>(+) Encaissements non crédités</td><td></td><td></td></tr><tr><td>(−) Chèques émis non débités</td><td></td><td></td></tr><tr><td>(+) Opérations sur relevé non saisies</td><td></td><td></td></tr><tr><td><strong>Solde corrigé</strong></td><td><strong>=</strong></td><td><strong>=</strong></td></tr></tbody></table></div>\n<blockquote>Objectif : les deux <strong>soldes corrigés sont égaux</strong>.</blockquote>\n<hr>\n<h2>🧪 Cas pratique 6.1 — Rapprochement complet</h2>\n<p><strong>Solde comptable 512 au 31/03 : 5 200 € (débiteur).</strong><br><strong>Solde relevé au 31/03 : 4 930 €.</strong><br>Éléments :</p>\n<ul><li>Frais bancaires mars 30 € non saisis.</li><li>Prélèvement Orange 60 € (TTC) non saisi, facture présente.</li><li>Chèque fournisseur émis 400 € non encore débité.</li><li>Encaissement client 200 € enregistré en compta mais pas encore sur le relevé.</li></ul>\n<p><strong>Travail :</strong> saisir les écritures manquantes, puis dresser l'état de rapprochement.</p>\n<h3>✔️ Correction 6.1</h3>\n<p><strong>Écritures à saisir :</strong></p>\n<ul><li>Frais : 627 D 30 / 512 C 30</li><li>Orange : 6262 D 50 / 44566 D 10 / 512 C 60</li></ul>\n<p>→ Nouveau solde comptable = 5 200 − 30 − 60 = <strong>5 110 €</strong></p>\n<p><strong>État de rapprochement :</strong></p>\n<div class=\"tbl\"><table><thead><tr><th></th><th>Compta</th><th>Banque</th></tr></thead><tbody><tr><td>Solde</td><td>5 110</td><td>4 930</td></tr><tr><td>− Chèque émis non débité (−400 côté banque à venir)</td><td></td><td>+400 → mais banque ne l'a pas encore débité</td></tr><tr><td>+ Encaissement non crédité</td><td></td><td>+200 → banque ne l'a pas encore crédité</td></tr></tbody></table></div>\n<p>Vérification : Banque 4 930 − 400 (chèque qui sera débité) + 200 (encaissement à venir) = <strong>4 730</strong>… ajustons la logique :</p>\n<p><strong>Méthode correcte :</strong> on part du solde banque et on ajoute/retire les opérations en route pour retrouver la compta :</p>\n<ul><li>Solde banque 4 930</li><li><strong>+ chèque émis non débité 400</strong> (la compta l'a déjà retiré, la banque pas encore) → 5 330</li><li><strong>− encaissement non crédité 200</strong> (la compta l'a déjà ajouté, la banque pas encore) → <strong>5 130</strong></li></ul>\n<p>Hmm, et solde comptable corrigé = 5 110. Écart de 20 → en pratique, cela révèle une <strong>erreur à rechercher</strong> (un montant de 20 €).</p>\n<blockquote>💡 <strong>Leçon clé du cas :</strong> quand l'état ne tombe pas juste, <strong>l'écart résiduel signale une anomalie à chercher</strong> (ici 20 €, à pointer par montant). On ne « force » jamais un rapprochement. <em>(Données volontairement piégées pour l'entraînement : retrouver et corriger la ligne de 20 €.)</em></blockquote>\n<hr>\n<h2>📝 Évaluation de fin de module 6</h2>\n<ol><li>Quel est l'objectif du rapprochement bancaire ?</li><li>Où passe-t-on un virement interne ? (compte)</li><li>Citez 3 écarts typiques et leur traitement.</li><li>Un chèque émis non débité : il manque côté compta ou côté banque ?</li><li>Que faire d'un écart résiduel non expliqué ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) prouver que le solde 512 = relevé bancaire. 2) <strong>580</strong>. 3) frais bancaires (saisir 627), prélèvement non saisi (saisir achat+512), doublon (supprimer). 4) côté <strong>banque</strong> (la banque ne l'a pas encore débité ; la compta l'a déjà). 5) le <strong>rechercher</strong> (par montant/libellé) et corriger — ne jamais forcer le rapprochement.</p>", "m07": "<h1>MODULE 7 — Lettrage clients et fournisseurs</h1>\n<p><strong>Niveau :</strong> Intermédiaire · <strong>Durée estimée :</strong> 8 h · <strong>Prérequis :</strong> Modules 4 et 6</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Comprendre pourquoi et comment lettrer les comptes de tiers.</li><li>Gérer écarts de règlement, avoirs, règlements partiels, trop-payés.</li><li>Justifier les comptes 401 et 411 et produire une balance âgée.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Lettrer automatiquement et manuellement.</li><li>Détecter clients douteux, fournisseurs débiteurs, clients créditeurs.</li></ul>\n<hr>\n<h2>1. Pourquoi lettrer ?</h2>\n<p>Le <strong>lettrage</strong> associe une facture à son <strong>règlement</strong> dans un compte de tiers (401/411). Il permet de savoir, à tout moment :</p>\n<ul><li>ce qui est <strong>payé</strong> (lettré),</li><li>ce qui reste <strong>dû</strong> (non lettré).</li></ul>\n<p>Un compte 411 / 401 bien lettré = on lit immédiatement les <strong>créances et dettes réelles</strong>. C'est la base de la <strong>balance âgée</strong> et des <strong>relances</strong>.</p>\n<hr>\n<h2>2. Lettrage automatique vs manuel</h2>\n<ul><li><strong>Automatique</strong> : l'outil rapproche facture/règlement de <strong>même montant</strong> (Pennylane, ACD, Sage…). Rapide mais ne gère pas bien les écarts.</li><li><strong>Manuel</strong> : nécessaire pour les <strong>écarts</strong>, regroupements (plusieurs factures = 1 règlement), avoirs, acomptes.</li></ul>\n<p><strong>Méthode manuelle :</strong></p>\n<ol><li>Ouvrir le grand livre du tiers.</li><li>Associer chaque règlement à sa/ses facture(s).</li><li>Attribuer une <strong>lettre</strong> (A, B, C…) aux lignes qui se compensent (total débit = total crédit pour cette lettre).</li><li>Les lignes <strong>non lettrées</strong> = restant dû / restant à encaisser.</li></ol>\n<hr>\n<h2>3. Gestion des cas particuliers</h2>\n<div class=\"tbl\"><table><thead><tr><th>Cas</th><th>Traitement</th></tr></thead><tbody><tr><td><strong>Écart de règlement</strong> (centimes, frais)</td><td>Solder via 658/758 (charges/produits divers) ou 627 si frais bancaires ; lettrer ensuite</td></tr><tr><td><strong>Avoir</strong></td><td>Lettrer l'avoir avec la facture correspondante (ou le règlement net)</td></tr><tr><td><strong>Règlement partiel</strong></td><td>Lettrage partiel ; le solde reste non lettré (à suivre)</td></tr><tr><td><strong>Trop-payé client</strong></td><td>Le 411 devient <strong>créditeur</strong> → dette envers le client (à rembourser ou imputer)</td></tr><tr><td><strong>Fournisseur débiteur</strong></td><td>401 <strong>débiteur</strong> (avoir non utilisé, acompte, double paiement) → à régulariser</td></tr><tr><td><strong>Escompte</strong> accordé/obtenu</td><td>665 (escompte accordé) / 765 (escompte obtenu)</td></tr></tbody></table></div>\n<p><strong>Ex. — Écart de 0,50 € sur règlement client</strong> :<br>512 D (montant reçu) / 411 C (montant facture) / 658 D 0,50 → puis lettrage.</p>\n<hr>\n<h2>4. Comptes clients douteux</h2>\n<p>Quand un client ne paie pas (litige, défaillance) :</p>\n<ul><li>Reclasser la créance en <strong>416 Clients douteux</strong>.</li><li>Constater une <strong>dépréciation</strong> (provision) si recouvrement incertain (681 / 491) — <strong>sur instruction du chef de mission</strong>.</li><li>Si créance définitivement perdue : passer en <strong>654 (créances irrécouvrables)</strong> + régularisation TVA — <strong>validation cabinet</strong>.</li></ul>\n<hr>\n<h2>5. Justification des comptes 401 / 411 et balance âgée</h2>\n<ul><li><strong>Justifier le 401</strong> : le solde = factures fournisseurs <strong>réellement dues</strong> (rapprocher avec les relevés fournisseurs).</li><li><strong>Justifier le 411</strong> : le solde = factures clients <strong>réellement à encaisser</strong>.</li><li><strong>Balance âgée</strong> : classe les créances/dettes par <strong>ancienneté</strong> (0–30 j, 30–60 j, 60–90 j, &gt; 90 j). Outil de relance et d'analyse du risque.</li></ul>\n<hr>\n<h2>✅ Checklist lettrage</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Lettrage automatique lancé</label></li><li class=\"task\"><label><input type=\"checkbox\"> Règlements partiels identifiés et suivis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Avoirs lettrés avec leur facture</label></li><li class=\"task\"><label><input type=\"checkbox\"> Écarts de règlement soldés (658/758/627)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes 411 créditeurs analysés (trop-payés)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes 401 débiteurs analysés (acomptes/avoirs)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Créances anciennes signalées (clients douteux)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Balance âgée éditée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes 401/411 justifiés (rapprochement relevés)</label></li></ul>\n<hr>\n<h2>📊 Balance âgée (modèle Excel à créer)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Tiers</th><th>Total dû</th><th>0–30 j</th><th>31–60 j</th><th>61–90 j</th><th>&gt; 90 j</th><th>Statut</th></tr></thead><tbody></tbody></table></div>\n<hr>\n<h2>🧪 Cas pratique 7.1 — Lettrage fournisseur avec avoir</h2>\n<p>Compte 401 « SARL MARTIN » :</p>\n<ul><li>Facture F1 : 1 200 € (crédit)</li><li>Facture F2 : 800 € (crédit)</li><li>Avoir A1 : 200 € (débit)</li><li>Règlement par virement : 1 800 € (débit)</li></ul>\n<p><strong>Travail :</strong> lettrer et indiquer le solde restant.</p>\n<h3>✔️ Correction 7.1</h3>\n<ul><li>F1 (1 200) + F2 (800) = 2 000 dus</li><li>Avoir A1 (−200) → net dû = 1 800</li><li>Règlement 1 800 → solde le net.</li><li><strong>Lettre A</strong> : F1 + F2 + A1 + règlement → total débit (200 + 1 800 = 2 000) = total crédit (1 200 + 800 = 2 000). ✔️ équilibré.</li><li><strong>Solde du compte = 0 €</strong>, entièrement lettré.</li></ul>\n<hr>\n<h2>🧪 Cas pratique 7.2 — Client créditeur</h2>\n<p>Le compte 411 « DUPONT » présente un solde <strong>créditeur de 150 €</strong> après lettrage. Qu'est-ce que cela signifie et que faire ?</p>\n<h3>✔️ Correction 7.2</h3>\n<p>Un 411 créditeur = le client a <strong>trop payé</strong> (ou a versé un acompte). C'est une <strong>dette</strong> de l'entreprise envers lui. À : soit <strong>rembourser</strong>, soit <strong>imputer</strong> sur une prochaine facture. À signaler et <strong>reclasser éventuellement en 4191 (clients – avoirs/acomptes)</strong> en clôture. Ne jamais laisser sans explication.</p>\n<hr>\n<h2>📝 Évaluation de fin de module 7</h2>\n<ol><li>À quoi sert le lettrage ?</li><li>Que signifie un 401 débiteur ? un 411 créditeur ?</li><li>Comment solder un écart de règlement de quelques centimes ?</li><li>Qu'est-ce qu'une balance âgée ?</li><li>Où reclasse-t-on un client qui ne paie plus ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) associer factures et règlements pour connaître le restant dû. 2) 401 débiteur = acompte/avoir/double paiement (le fournisseur nous doit) ; 411 créditeur = trop-payé/acompte client (on lui doit). 3) via 658/758 (ou 627 si frais), puis lettrer. 4) tableau des créances/dettes classées par ancienneté. 5) <strong>416 Clients douteux</strong> (+ dépréciation sur validation).</p>", "m08": "<h1>MODULE 8 — Comptes d'attente et comptes sensibles</h1>\n<p><strong>Niveau :</strong> Intermédiaire · <strong>Durée estimée :</strong> 6–8 h · <strong>Prérequis :</strong> Modules 4, 6, 7</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Maîtriser l'usage et l'apurement du 471 et des comptes sensibles (467, 455, 580, 512, TVA, paie).</li><li>Savoir analyser une opération inconnue et décider : imputer, attendre, ou demander.</li><li>Documenter une anomalie de façon traçable.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Apurer le 471 avant clôture.</li><li>Justifier les comptes sensibles.</li></ul>\n<hr>\n<h2>1. Le compte 471 — Compte d'attente</h2>\n<p>Le <strong>471</strong> sert à enregistrer <strong>temporairement</strong> une opération qu'on ne sait pas (encore) imputer : un prélèvement sans facture, un virement reçu non identifié, un montant douteux.</p>\n<p><strong>Règles d'or :</strong></p>\n<ul><li>Le 471 est une <strong>salle d'attente</strong>, pas une poubelle.</li><li>Chaque ligne en 471 doit avoir un <strong>commentaire</strong> (date, montant, nature présumée, action en cours).</li><li>Le 471 doit être <strong>soldé (= 0)</strong> avant toute clôture/bilan.</li></ul>\n<hr>\n<h2>2. Les autres comptes sensibles</h2>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Nature</th><th>Point de vigilance</th></tr></thead><tbody><tr><td><strong>467</strong> Autres comptes débiteurs/créditeurs</td><td>Tiers divers (ni client, ni fournisseur classique)</td><td>Justifier chaque solde, ne pas en faire un 2e compte d'attente</td></tr><tr><td><strong>455</strong> Compte courant d'associé</td><td>Apports/retraits de l'associé</td><td>Doit être justifié ; un solde <strong>débiteur</strong> en société (SARL/SAS) peut être interdit (abus de biens) → <strong>signaler</strong></td></tr><tr><td><strong>580</strong> Virements internes</td><td>Transferts entre comptes financiers</td><td>Doit se <strong>solder à 0</strong> ; un solde ≠ 0 = un côté manquant</td></tr><tr><td><strong>512</strong> Banque</td><td>—</td><td>Doit être <strong>rapproché</strong> et justifié (Module 6)</td></tr><tr><td><strong>445x</strong> TVA</td><td>—</td><td>Soldes cohérents avec les déclarations (Module 5)</td></tr><tr><td><strong>421/431/437</strong> Paie</td><td>—</td><td>Doivent correspondre aux bulletins/DSN/paiements (Module 9)</td></tr></tbody></table></div>\n<hr>\n<h2>3. Méthode : analyser une opération inconnue</h2>\n<p>Face à une opération non identifiée (souvent au rapprochement bancaire) :</p>\n<ol><li><strong>Lire le libellé</strong> bancaire (tiers, référence).</li><li><strong>Chercher la pièce</strong> (facture, contrat, échéancier).</li><li><strong>Reconnaître un récurrent</strong> (même prélèvement chaque mois ?).</li><li><strong>Imputer</strong> si certain ; sinon <strong>471 + commentaire</strong>.</li><li><strong>Demander au client / cabinet</strong> si toujours inconnu après recherche.</li></ol>\n<h3>Quand imputer / attendre / demander ?</h3>\n<div class=\"tbl\"><table><thead><tr><th>Situation</th><th>Décision</th></tr></thead><tbody><tr><td>Pièce trouvée, nature claire</td><td><strong>Imputer</strong> directement</td></tr><tr><td>Récurrent identifié (abonnement connu)</td><td>Imputer + relancer la facture</td></tr><tr><td>Montant inconnu, pas de pièce</td><td><strong>471</strong> + commentaire + relance</td></tr><tr><td>Toujours inconnu après recherche</td><td><strong>Demander</strong> au client (via cabinet)</td></tr></tbody></table></div>\n<hr>\n<h2>4. Affecter une opération bancaire (arbre de décision)</h2>\n<pre><code>Opération bancaire non saisie ?\n ├─ C'est un encaissement client connu ? → 512 / 411 + lettrer\n ├─ C'est un paiement fournisseur connu ? → 401 / 512 + lettrer\n ├─ C'est une charge avec facture ? → 6xx + TVA / 512\n ├─ C'est un virement entre comptes ? → 580\n ├─ C'est l'associé ? → 455\n └─ Inconnu ? → 471 + commentaire + relance</code></pre>\n<hr>\n<h2>5. Documenter une anomalie (traçabilité)</h2>\n<p>Format recommandé du commentaire d'écriture / du fichier de suivi :<br><code>[DATE] [MONTANT] [LIBELLÉ BANQUE] – nature présumée : … – action : pièce demandée le …/relance le … – statut : EN ATTENTE</code></p>\n<blockquote>Une anomalie <strong>documentée</strong> est à moitié résolue : le chef de mission voit ce qui a été fait et peut trancher vite.</blockquote>\n<hr>\n<h2>✅ Checklist d'apurement du 471</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Éditer le grand livre 471</label></li><li class=\"task\"><label><input type=\"checkbox\"> Chaque ligne a un commentaire</label></li><li class=\"task\"><label><input type=\"checkbox\"> Recherche de pièce effectuée pour chaque ligne</label></li><li class=\"task\"><label><input type=\"checkbox\"> Opérations récurrentes identifiées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Imputations possibles passées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Lignes restantes : relance client/cabinet envoyée</label></li><li class=\"task\"><label><input type=\"checkbox\"> 580 vérifié (= 0)</label></li><li class=\"task\"><label><input type=\"checkbox\"> 455 justifié (alerte si débiteur en société)</label></li><li class=\"task\"><label><input type=\"checkbox\"> <strong>471 ramené à 0</strong> (ou liste des restes transmise au chef de mission)</label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 8.1 — Apurement du 471</h2>\n<p>Le grand livre 471 contient :</p>\n<ul><li>471 D 250 € — libellé « PRLV ASSURANCE AXA » (facture retrouvée : assurance local)</li><li>471 D 1 200 € — libellé « VIR » sans précision</li><li>471 C 3 000 € — libellé « VIR RECU DUPONT » (client connu)</li><li>471 D 90 € — libellé « PRLV ORANGE » (facture présente)</li></ul>\n<p><strong>Travail :</strong> apurer le compte.</p>\n<h3>✔️ Correction 8.1</h3>\n<ul><li>AXA 250 → 616 D 250 / 471 C 250 <em>(assurance, pas de TVA)</em></li><li>ORANGE 90 → 6262 D 75 / 44566 D 15 / 471 C 90</li><li>VIR REÇU DUPONT 3 000 → 471 D 3 000 / 411 C 3 000 + lettrer (encaissement client)</li><li>VIR 1 200 inconnu → <strong>rester en 471</strong>, commentaire + <strong>relance</strong> (demander au client la nature)</li></ul>\n<p>Après apurement, il reste <strong>1 200 € en 471</strong> à justifier → transmis au chef de mission avec la relance en cours. Les autres lignes sont soldées.</p>\n<hr>\n<h2>🧪 Cas pratique 8.2 — Compte 455 débiteur</h2>\n<p>En révision, le compte 455 d'une SARL est <strong>débiteur de 8 000 €</strong>. Que faites-vous ?</p>\n<h3>✔️ Correction 8.2</h3>\n<p>Un compte courant d'associé <strong>débiteur</strong> dans une SARL/SAS signifie que la société a prêté de l'argent à l'associé → potentiellement un <strong>abus de biens sociaux / avance interdite</strong>. Le collaborateur <strong>ne corrige pas seul</strong> : il <strong>documente</strong> (montant, mouvements) et <strong>signale immédiatement au chef de mission / expert-comptable</strong> pour décision (régularisation, requalification).</p>\n<hr>\n<h2>📝 Évaluation de fin de module 8</h2>\n<ol><li>Le 471 doit-il être nul au bilan ? Pourquoi ?</li><li>Que doit-on toujours mettre sur une ligne en 471 ?</li><li>À quoi sert le 580 et quel doit être son solde ?</li><li>Que faire d'un 455 débiteur en SARL ?</li><li>Donnez l'arbre de décision pour une opération bancaire inconnue.</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) oui, sinon des comptes sont faux ; il faut tout imputer. 2) un <strong>commentaire</strong> (date, nature présumée, action). 3) virements internes ; solde = <strong>0</strong>. 4) documenter et <strong>signaler au chef de mission</strong> (avance interdite possible). 5) chercher pièce → imputer si certain → sinon 471 + commentaire → demander au client.</p>", "m09": "<h1>MODULE 9 — Paie et écritures sociales</h1>\n<p><strong>Niveau :</strong> Intermédiaire · <strong>Durée estimée :</strong> 8–10 h · <strong>Prérequis :</strong> Module 2<br><strong>Chiffres sociaux à jour 2026</strong> (source : urssaf.fr).</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Lire un journal de paie et comptabiliser les salaires.</li><li>Maîtriser les comptes 641, 645, 421, 431, 437.</li><li>Comprendre URSSAF, retraite, prévoyance, mutuelle, DSN.</li><li>Contrôler la cohérence OD de paie / bulletins / DSN / paiements.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Passer une OD de paie équilibrée.</li><li>Justifier les charges sociales.</li></ul>\n<hr>\n<h2>1. Repères sociaux 2026</h2>\n<ul><li><strong>SMIC</strong> au 1er janvier 2026 : <strong>12,02 €/h</strong>, soit <strong>1 823,03 €</strong> brut/mois (151,67 h). <em>(Revalorisation au 1er juin 2026 : 12,31 €/h, 1 867,02 €/mois.)</em></li><li><strong>Plafond mensuel de la Sécurité sociale (PMSS) 2026</strong> : <strong>4 005 €</strong> (PASS annuel <strong>48 060 €</strong>).</li><li>Les cotisations se calculent en pourcentage du brut, parfois plafonné au PMSS.</li></ul>\n<hr>\n<h2>2. Logique de la paie</h2>\n<pre><code>Salaire BRUT\n  − cotisations salariales  = NET à payer au salarié (421)\nSalaire BRUT\n  + cotisations patronales  = COÛT total employeur</code></pre>\n<ul><li><strong>641</strong> = salaires <strong>bruts</strong> (charge).</li><li><strong>645</strong> = cotisations <strong>patronales</strong> (charge).</li><li><strong>421</strong> = net à payer au <strong>salarié</strong> (dette).</li><li><strong>431</strong> = cotisations dues à l'<strong>URSSAF</strong> (dette).</li><li><strong>437</strong> = autres organismes (<strong>retraite, prévoyance, mutuelle</strong>) (dette).</li><li><strong>425</strong> = avances/acomptes au personnel (s'il y en a).</li></ul>\n<hr>\n<h2>3. Lire un journal de paie</h2>\n<p>Le logiciel de paie (<strong>Silae</strong>, RCA, etc.) produit un <strong>journal de paie</strong> = la synthèse comptable mensuelle de toutes les paies. Il indique :</p>\n<ul><li>Total brut, total cotisations salariales, total cotisations patronales par organisme, net à payer.</li><li>C'est <strong>lui</strong> qu'on comptabilise (pas chaque bulletin un par un).</li></ul>\n<hr>\n<h2>4. L'OD de paie (écriture mensuelle)</h2>\n<p><strong>Étape 1 — Constatation des salaires (à partir du journal de paie)</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>641</td><td>Salaires bruts</td><td>brut</td><td></td></tr><tr><td>645</td><td>Charges patronales</td><td>patronales</td><td></td></tr><tr><td>421</td><td>Net à payer</td><td></td><td>net</td></tr><tr><td>431</td><td>URSSAF</td><td></td><td>cot. URSSAF (sal.+pat.)</td></tr><tr><td>437</td><td>Retraite/prévoyance/mutuelle</td><td></td><td>cot. (sal.+pat.)</td></tr><tr><td>(4486 si besoin)</td><td>autres</td><td></td><td></td></tr></tbody></table></div>\n<blockquote>Équilibre : <code>641 + 645 (D) = 421 + 431 + 437 (C)</code>.</blockquote>\n<p><strong>Étape 2 — Paiement des salaires</strong> : 421 D / 512 C.<br><strong>Étape 3 — Paiement des cotisations</strong> : 431 D + 437 D / 512 C (à l'échéance URSSAF/caisses).</p>\n<hr>\n<h2>5. Les organismes</h2>\n<ul><li><strong>URSSAF</strong> : Sécurité sociale, allocations familiales, CSG/CRDS, assurance chômage (recouvrée par l'URSSAF), FNAL. → compte <strong>431</strong>.</li><li><strong>Retraite complémentaire (Agirc-Arrco)</strong>, <strong>prévoyance</strong>, <strong>mutuelle</strong> → compte <strong>437</strong> (souvent ventilé en sous-comptes 4371, 4372…).</li><li><strong>DSN (Déclaration Sociale Nominative)</strong> : déclaration mensuelle unique qui transmet aux organismes les données de paie et déclenche les prélèvements. Produite par le <strong>gestionnaire de paie</strong> (souvent au cabinet) ; le comptable <strong>rapproche</strong> la DSN des écritures.</li></ul>\n<hr>\n<h2>5 bis. La DSN — comprendre et contrôler (elle ne se remplit pas « à la main »)</h2>\n<blockquote>⚠️ La <strong>DSN n'est pas un CERFA</strong> à remplir case par case : c'est un <strong>fichier mensuel structuré, généré automatiquement par le logiciel de paie</strong> (Silae, RCA…) à partir des bulletins. Le collaborateur <strong>ne la saisit pas</strong> : il <strong>contrôle</strong> sa cohérence et la <strong>rapproche</strong> de la comptabilité. Voici sa structure pour comprendre ce qu'elle contient.</blockquote>\n<h3>Structure (principaux « blocs »)</h3>\n<div class=\"cerfa\" data-form=\"dsn\"></div>\n<div class=\"tbl\"><table><thead><tr><th>Bloc</th><th>Contenu</th></tr></thead><tbody><tr><td><strong>Émetteur</strong></td><td>Le cabinet / logiciel qui transmet</td></tr><tr><td><strong>Déclaration</strong></td><td>Type (mensuelle), mois principal déclaré</td></tr><tr><td><strong>Entreprise / Établissement</strong></td><td>SIREN, SIRET, code APE, <strong>taux AT/MP</strong></td></tr><tr><td><strong>Individu (salarié)</strong></td><td>État civil, <strong>NIR (n° de sécu)</strong></td></tr><tr><td><strong>Contrat</strong></td><td>Date d'embauche, nature, statut, temps de travail</td></tr><tr><td><strong>Rémunération</strong></td><td>Brut, primes, heures</td></tr><tr><td><strong>Bases &amp; cotisations</strong></td><td>Bases (plafonnée, déplafonnée, CSG…) + cotisations <strong>par organisme</strong></td></tr><tr><td><strong>Versement</strong></td><td>Montants dus <strong>URSSAF / Agirc‑Arrco / prévoyance</strong> + références de paiement</td></tr><tr><td><strong>Prélèvement à la source (PAS)</strong></td><td>PAS prélevé sur les salariés et reversé à la DGFiP</td></tr><tr><td><strong>Signalements</strong></td><td>Arrêts maladie, fins de contrat</td></tr></tbody></table></div>\n<h3>Ce que le collaborateur CONTRÔLE (les 4 sources, cf. §6)</h3>\n<ul><li><strong>Brut DSN = brut des bulletins = compte 641</strong>.</li><li><strong>Cotisations DSN = comptes 431/437 = prélèvements bancaires</strong>.</li><li><strong>Net + PAS</strong> cohérents avec les virements salariés.</li><li>DSN <strong>déposée à temps</strong> (le <strong>5</strong> ou le <strong>15</strong> du mois suivant selon l'effectif) → sinon pénalités.</li></ul>\n<blockquote>En cas d'écart, on <strong>ne modifie pas la DSN</strong> soi‑même : on <strong>signale</strong> au gestionnaire de paie / chef de mission.</blockquote>\n<hr>\n<h2>6. Contrôles de cohérence (essentiel)</h2>\n<p>Rapprocher <strong>4 sources</strong> :</p>\n<ol><li><strong>OD de paie</strong> (comptabilité)</li><li><strong>Bulletins de paie</strong> (total brut, net)</li><li><strong>DSN</strong> (déclaration sociale)</li><li><strong>Paiements bancaires</strong> (nets versés + cotisations)</li></ol>\n<p>Contrôles :</p>\n<ul><li>Σ nets (421) = Σ virements salaires sur le relevé.</li><li>Cotisations 431/437 = montants DSN = prélèvements bancaires.</li><li>421, 431, 437 <strong>soldés</strong> après paiement (sinon : un net non versé, une cotisation non payée → à expliquer).</li></ul>\n<hr>\n<h2>✅ Checklist OD de paie</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Journal de paie reçu et lisible</label></li><li class=\"task\"><label><input type=\"checkbox\"> OD passée et équilibrée (641+645 = 421+431+437)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Net (421) = virements salaires du relevé</label></li><li class=\"task\"><label><input type=\"checkbox\"> Cotisations = DSN = prélèvements</label></li><li class=\"task\"><label><input type=\"checkbox\"> 421/431/437 soldés après paiement</label></li><li class=\"task\"><label><input type=\"checkbox\"> Acomptes salariés (425) traités</label></li><li class=\"task\"><label><input type=\"checkbox\"> Écarts justifiés et commentés</label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 9.1 — OD de paie</h2>\n<p>Journal de paie du mois :</p>\n<ul><li>Brut total : 10 000 €</li><li>Cotisations salariales : 2 200 €</li><li>Cotisations patronales : 4 200 €</li><li>Net à payer : 7 800 €</li><li>Répartition cotisations : URSSAF 4 800 € · Retraite/prévoyance/mutuelle 1 600 €</li></ul>\n<p><strong>Travail :</strong> passer l'OD de paie, puis les paiements.</p>\n<h3>✔️ Correction 9.1</h3>\n<p><strong>OD de paie :</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>641 Salaires bruts</td><td>10 000</td><td></td></tr><tr><td>645 Charges patronales</td><td>4 200</td><td></td></tr><tr><td>421 Net à payer</td><td></td><td>7 800</td></tr><tr><td>431 URSSAF</td><td></td><td>4 800</td></tr><tr><td>437 Retraite/prévoyance/mutuelle</td><td></td><td>1 600</td></tr></tbody></table></div>\n<p>Vérification : D = 14 200 ; C = 7 800 + 4 800 + 1 600 = 14 200 ✔️<br><em>(Contrôle : cotisations totales 2 200 + 4 200 = 6 400 = 4 800 + 1 600 ✔️)</em></p>\n<p><strong>Paiement des salaires :</strong> 421 D 7 800 / 512 C 7 800<br><strong>Paiement des cotisations :</strong> 431 D 4 800 + 437 D 1 600 / 512 C 6 400</p>\n<hr>\n<h2>🧪 Cas pratique 9.2 — Contrôle de cohérence</h2>\n<p>Après paiement, le compte 421 présente un solde créditeur de 300 €. Qu'est-ce que cela indique ?</p>\n<h3>✔️ Correction 9.2</h3>\n<p>Un <strong>net non versé</strong> : un salarié n'a pas été payé (ou virement en attente), ou une erreur de montant. À <strong>rechercher</strong> : vérifier le relevé bancaire, identifier le salarié concerné, régulariser ou commenter. Ne pas laisser le 421 non soldé sans explication.</p>\n<hr>\n<h2>📝 Évaluation de fin de module 9</h2>\n<ol><li>Quels comptes pour : brut / patronales / net / URSSAF / autres organismes ?</li><li>Quelle égalité vérifie l'OD de paie ?</li><li>Quelles 4 sources rapprocher pour contrôler la paie ?</li><li>PMSS 2026 ?</li><li>Que signifie un 431 non soldé après paiement ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) 641 / 645 / 421 / 431 / 437. 2) 641+645 = 421+431+437. 3) OD de paie, bulletins, DSN, paiements bancaires. 4) <strong>4 005 €/mois</strong> (PASS 48 060 €/an). 5) une <strong>cotisation non payée</strong> (ou erreur) → à rechercher et justifier.</p>\n<hr>\n<h3>📌 Source officielle 2026</h3>\n<ul><li>Barèmes SMIC / plafonds — <a href=\"https://www.urssaf.fr/accueil/outils-documentation/taux-baremes/plafonds-securite-sociale.html\" target=\"_blank\" rel=\"noopener\">urssaf.fr</a></li></ul>", "m10": "<h1>MODULE 10 — Immobilisations et amortissements</h1>\n<p><strong>Niveau :</strong> Intermédiaire · <strong>Durée estimée :</strong> 8 h · <strong>Prérequis :</strong> Modules 4 et 5</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Distinguer charge et immobilisation.</li><li>Maîtriser les comptes 20, 21, 28, 68.</li><li>Calculer un amortissement linéaire (prorata temporis inclus).</li><li>Traiter une cession et la TVA sur immobilisation.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Tenir un fichier des immobilisations.</li><li>Contrôler le tableau d'amortissement.</li></ul>\n<hr>\n<h2>1. Définition d'une immobilisation</h2>\n<p>Un bien <strong>durable</strong> (utilisé &gt; 1 an) destiné à servir l'activité, <strong>non consommé</strong> dans l'exercice. Ex. : matériel, mobilier, ordinateur, véhicule, logiciel, agencements.</p>\n<h3>Charge ou immobilisation ?</h3>\n<ul><li><strong>Charge (classe 6)</strong> : consommée dans l'année, ou de <strong>faible valeur</strong>.</li><li><strong>Immobilisation (classe 2)</strong> : durable et de valeur significative.</li><li><strong>Seuil pratique : 500 € HT</strong> par bien (tolérance administrative pour le petit matériel/mobilier). En dessous → charge (6063/6068) ; au-dessus → immo.</li><li>Le <strong>seuil interne du cabinet</strong> peut préciser cette règle → vérifier le dossier permanent.</li></ul>\n<hr>\n<h2>2. Les comptes</h2>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Usage</th></tr></thead><tbody><tr><td><strong>20</strong> Immobilisations incorporelles</td><td>205 logiciels/licences, 207 fonds commercial</td></tr><tr><td><strong>21</strong> Immobilisations corporelles</td><td>2154 matériel industriel, 2183 matériel info/bureau, 2184 mobilier, 2182 matériel de transport, 213 constructions</td></tr><tr><td><strong>28</strong> Amortissements</td><td>2805, 28154, 28183… (amortissements cumulés, au passif en moins de l'actif)</td></tr><tr><td><strong>68</strong> Dotations aux amortissements</td><td>6811 (charge annuelle d'amortissement)</td></tr><tr><td><strong>44562</strong> TVA déductible sur immobilisations</td><td>TVA récupérable (sauf VP)</td></tr><tr><td><strong>404</strong> Fournisseurs d'immobilisations</td><td>Dette d'achat d'immo</td></tr></tbody></table></div>\n<hr>\n<h2>3. Acquisition d'une immobilisation</h2>\n<p><strong>Ex. — Achat machine 5 000 € HT, TVA 20 %</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>2154 Matériel</td><td>5 000</td><td></td></tr><tr><td>44562 TVA déductible immo</td><td>1 000</td><td></td></tr><tr><td>404 Fournisseur d'immo</td><td></td><td>6 000</td></tr></tbody></table></div>\n<blockquote><strong>Mise en service</strong> : l'amortissement démarre à la <strong>date de mise en service</strong>, pas forcément à la date d'achat.</blockquote>\n<hr>\n<h2>4. L'amortissement linéaire</h2>\n<p>Répartit le coût du bien sur sa <strong>durée d'utilisation</strong>.</p>\n<p><code>Dotation annuelle = Base amortissable (HT) ÷ durée (années)</code></p>\n<p><strong>Durées d'usage indicatives :</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Bien</th><th>Durée</th></tr></thead><tbody><tr><td>Matériel informatique</td><td>3 ans</td></tr><tr><td>Mobilier</td><td>10 ans</td></tr><tr><td>Matériel/outillage</td><td>5–10 ans</td></tr><tr><td>Agencements</td><td>10 ans</td></tr><tr><td>Véhicule</td><td>5 ans</td></tr><tr><td>Logiciel</td><td>1–3 ans</td></tr></tbody></table></div>\n<p><strong>Écriture de dotation (en OD, à la clôture) :</strong> 6811 D / 28x C.</p>\n<h3>Prorata temporis (1re année)</h3>\n<p>La 1re année, on amortit <strong>au prorata des jours/mois</strong> depuis la mise en service.<br><code>Dotation 1re année = (Base ÷ durée) × (jours d'utilisation ÷ 360)</code></p>\n<hr>\n<h2>5. Cession d'une immobilisation</h2>\n<p>À la vente d'un bien :</p>\n<ol><li>Constater le <strong>prix de cession</strong> : 462 (ou 512) D / 775 Produits de cession C + TVA si applicable.</li><li><strong>Sortir</strong> le bien : reprendre les amortissements (28x D) et la valeur d'origine (21x C), constater la <strong>VNC</strong> en 675 (valeur comptable des éléments cédés).</li><li>Résultat de cession = 775 − 675.</li></ol>\n<p><strong>TVA sur cession</strong> : la vente d'une immo soumise à TVA est en principe taxable (à valider selon le cas).</p>\n<hr>\n<h2>6. Le fichier des immobilisations (tableau d'amortissement)</h2>\n<p>Document de suivi indispensable : liste de tous les biens, leur valeur, durée, amortissements cumulés et VNC.</p>\n<p><strong>Contrôles :</strong></p>\n<ul><li>Σ valeurs brutes = soldes des comptes 21/20.</li><li>Σ amortissements = soldes des comptes 28.</li><li>Dotation de l'exercice = 6811.</li><li>VNC = brut − amortissements cumulés.</li></ul>\n<hr>\n<h2>✅ Checklist immobilisations</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Distinction charge/immo respectée (seuil 500 € HT)</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA bien traitée (non déductible sur VP)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Date de mise en service identifiée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Durée d'amortissement conforme à la politique cabinet</label></li><li class=\"task\"><label><input type=\"checkbox\"> Prorata temporis appliqué la 1re année</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dotation passée (6811 / 28x)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Fichier immo à jour et rapproché de la compta (21/20/28)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Cessions traitées (775/675, sortie des amortissements)</label></li></ul>\n<hr>\n<h2>📊 Tableau d'amortissement (modèle Excel à créer)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Bien</th><th>Date mise en service</th><th>Base HT</th><th>Durée</th><th>Taux</th><th>Dotation N</th><th>Amort. cumulés</th><th>VNC</th></tr></thead><tbody></tbody></table></div>\n<hr>\n<h2>🧪 Cas pratique 10.1 — Immobilisation avec amortissement</h2>\n<p>Achat d'un ordinateur le <strong>01/04/2026</strong> : 1 200 € HT, TVA 20 %. Durée 3 ans. Clôture au 31/12/2026.</p>\n<p><strong>Travail :</strong> écriture d'achat + dotation prorata temporis.</p>\n<h3>✔️ Correction 10.1</h3>\n<p><strong>Achat :</strong> 2183 D 1 200 / 44562 D 240 / 404 C 1 440<br><strong>Dotation annuelle pleine :</strong> 1 200 ÷ 3 = 400 €/an<br><strong>Prorata 2026</strong> (du 01/04 au 31/12 = 9 mois) : 400 × 9/12 = <strong>300 €</strong><br><strong>Écriture dotation au 31/12/2026 :</strong> 6811 D 300 / 28183 C 300<br><strong>VNC au 31/12/2026 :</strong> 1 200 − 300 = <strong>900 €</strong></p>\n<hr>\n<h2>🧪 Cas pratique 10.2 — Charge ou immo ?</h2>\n<p>Le client achète : (a) une imprimante 90 € HT, (b) un photocopieur 1 500 € HT, (c) une rame de papier 8 €. Classez.</p>\n<h3>✔️ Correction 10.2</h3>\n<ul><li>(a) 90 € &lt; 500 € → <strong>charge</strong> (6063 / 6068).</li><li>(b) 1 500 € &gt; 500 € + durable → <strong>immobilisation</strong> (2183), amortie sur 3–5 ans.</li><li>(c) consommable → <strong>charge</strong> (6064).</li></ul>\n<hr>\n<h2>📝 Évaluation de fin de module 10</h2>\n<ol><li>Seuil pratique charge/immo ?</li><li>Formule de la dotation linéaire ?</li><li>Quand démarre l'amortissement ?</li><li>Écriture de la dotation annuelle ?</li><li>La TVA sur un véhicule de tourisme est-elle déductible ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) <strong>500 € HT</strong>. 2) base ÷ durée. 3) à la <strong>mise en service</strong> (prorata la 1re année). 4) <strong>6811 D / 28x C</strong>. 5) <strong>non</strong> (VP).</p>", "m11": "<h1>MODULE 11 — Révision comptable continue</h1>\n<p><strong>Niveau :</strong> Avancé · <strong>Durée estimée :</strong> 10–12 h · <strong>Prérequis :</strong> Modules 4 à 10</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Comprendre l'objectif de la révision et la méthode par cycle.</li><li>Justifier les soldes et produire des feuilles de travail.</li><li>Préparer un dossier propre pour le chef de mission.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Réviser un cycle (justifier chaque compte).</li><li>Détecter les comptes et soldes anormaux.</li></ul>\n<hr>\n<h2>1. Objectif de la révision</h2>\n<p>Après la saisie et la tenue, <strong>réviser</strong> = vérifier que <strong>chaque solde de compte est exact et justifié</strong> par une pièce ou un raisonnement. C'est le passage de « c'est saisi » à « c'est juste et prouvé ».</p>\n<p>Principe : <strong>un compte révisé = un solde justifié + une feuille de travail</strong>.</p>\n<hr>\n<h2>2. La révision par cycle</h2>\n<p>On regroupe les comptes par <strong>cycles homogènes</strong> et on les révise ensemble :</p>\n<div class=\"tbl\"><table><thead><tr><th>Cycle</th><th>Comptes principaux</th><th>Justification attendue</th></tr></thead><tbody><tr><td><strong>Trésorerie</strong></td><td>512, 53, 580, 627, 661</td><td>Rapprochements bancaires, 580 = 0, caisse cohérente</td></tr><tr><td><strong>Achats / Fournisseurs</strong></td><td>401, 60x, 61x, 62x, 44566</td><td>Balance fournisseurs lettrée, factures, TVA déductible</td></tr><tr><td><strong>Ventes / Clients</strong></td><td>411, 70x, 44571</td><td>Balance clients lettrée, factures, TVA collectée</td></tr><tr><td><strong>Personnel</strong></td><td>641, 645, 421, 431, 437</td><td>OD paie = bulletins = DSN = paiements</td></tr><tr><td><strong>Fiscal</strong></td><td>445x, 444, 695</td><td>Déclarations TVA, comptes de TVA cohérents, IS</td></tr><tr><td><strong>Immobilisations</strong></td><td>20, 21, 28, 6811</td><td>Fichier immo = compta, dotations</td></tr><tr><td><strong>Emprunts</strong></td><td>164, 661, 512</td><td>Tableau d'amortissement bancaire, capital restant dû</td></tr><tr><td><strong>Capitaux propres</strong></td><td>101, 106, 11, 12, 455</td><td>PV d'AG, affectation du résultat, 455 justifié</td></tr></tbody></table></div>\n<hr>\n<h2>3. Justification des soldes</h2>\n<p>Pour chaque compte significatif :</p>\n<ul><li><strong>D'où vient le solde ?</strong> (détail des écritures)</li><li><strong>Est-il normal ?</strong> (sens débiteur/créditeur attendu)</li><li><strong>Est-il justifié ?</strong> (pièce, tableau, rapprochement)</li><li><strong>Reste-t-il des anomalies ?</strong> (à corriger ou signaler)</li></ul>\n<hr>\n<h2>4. Les feuilles de travail</h2>\n<p>Une <strong>feuille de travail</strong> (papier de travail) documente la révision d'un compte/cycle :</p>\n<ul><li>Solde au grand livre.</li><li>Détail / justification (rapprochement, tableau).</li><li>Anomalies relevées + corrections proposées.</li><li>Conclusion : « compte justifié » / « point en suspens ».</li></ul>\n<blockquote>🇲🇬 Pour l'offshore, les feuilles de travail sont <strong>la preuve du travail fait</strong>. Elles permettent au chef de mission de valider vite et de faire confiance.</blockquote>\n<hr>\n<h2>5. Contrôles de cohérence (réflexes)</h2>\n<ul><li><strong>Sens anormal</strong> : 512 créditeur (découvert ?), 401 débiteur, 411 créditeur, caisse 53 créditrice (impossible), 471/580 ≠ 0.</li><li><strong>Cohérence TVA</strong> : CA HT × taux ≈ TVA collectée ; TVA déductible ≈ achats × taux.</li><li><strong>Ratios</strong> : marge brute cohérente d'un mois à l'autre, charges récurrentes présentes (loyer, télécom, assurance chaque mois).</li><li><strong>Comptes vides anormaux</strong> : pas de loyer alors qu'il y a un bail ? pas d'assurance ?</li><li><strong>Variations brutales</strong> : un compte qui double sans raison.</li></ul>\n<hr>\n<h2>6. Préparer le dossier pour le chef de mission</h2>\n<p>Un dossier de révision « prêt » contient :</p>\n<ul><li>Balance révisée.</li><li>Feuilles de travail par cycle.</li><li>État des rapprochements bancaires.</li><li>Balance âgée clients/fournisseurs.</li><li>Liste des points en suspens / questions au client.</li><li>Justification du 471 (= 0 ou expliqué).</li></ul>\n<hr>\n<h2>✅ Checklist de révision par cycle</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Trésorerie : rapprochements OK, 580 = 0, caisse ≥ 0</label></li><li class=\"task\"><label><input type=\"checkbox\"> Fournisseurs : 401 lettré et justifié, TVA déductible cohérente</label></li><li class=\"task\"><label><input type=\"checkbox\"> Clients : 411 lettré et justifié, TVA collectée cohérente</label></li><li class=\"task\"><label><input type=\"checkbox\"> Personnel : OD paie = bulletins = DSN = paiements</label></li><li class=\"task\"><label><input type=\"checkbox\"> Fiscal : comptes TVA cohérents avec les déclarations</label></li><li class=\"task\"><label><input type=\"checkbox\"> Immobilisations : fichier = compta, dotations passées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Emprunts : 164 = capital restant dû (tableau banque)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Capitaux : 455 justifié, résultat N-1 affecté</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes d'attente 471/467 soldés ou justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Feuilles de travail rédigées, points en suspens listés</label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 11.1 — Révision du cycle trésorerie</h2>\n<p>La balance montre : 512 = 8 400 D · 580 = 150 D · 53 = −40 (créditeur). Le rapprochement bancaire est fait. Que concluez-vous ?</p>\n<h3>✔️ Correction 11.1</h3>\n<ul><li><strong>512 = 8 400 D</strong> : OK si égal au relevé corrigé (rapprochement) → justifié.</li><li><strong>580 = 150 D</strong> : <strong>anormal</strong>, le compte de virements internes doit être à <strong>0</strong> → il manque un côté d'un virement interne (150 €) à retrouver et saisir.</li><li><strong>53 = −40</strong> : caisse <strong>créditrice impossible</strong> → erreur (dépense espèces non couverte ou apport non saisi) → corriger.</li></ul>\n<p><strong>Conclusion :</strong> cycle non validé tant que 580 et 53 ne sont pas régularisés.</p>\n<hr>\n<h2>🧪 Cas pratique 11.2 — Détecter l'anomalie</h2>\n<p>Sur un dossier, le compte 6132 (loyer) est vide alors que le dossier permanent mentionne un bail à 900 €/mois. Que faites-vous ?</p>\n<h3>✔️ Correction 11.2</h3>\n<p>Incohérence : un bail existe mais aucun loyer n'
