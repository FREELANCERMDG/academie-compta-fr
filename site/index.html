est comptabilisé → <strong>pièces manquantes</strong> (factures/quittances de loyer) ou prélèvements non saisis. Action : rechercher les prélèvements bancaires « loyer », saisir, et <strong>relancer</strong> les quittances manquantes. Documenter dans la feuille de travail.</p>\n<hr>\n<h2>📝 Évaluation de fin de module 11</h2>\n<ol><li>Que signifie « réviser » un compte ?</li><li>Citez 4 cycles de révision et 1 compte de chacun.</li><li>Citez 4 soldes « anormaux » à repérer.</li><li>Que contient une feuille de travail ?</li><li>Que doit contenir un dossier prêt pour le chef de mission ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé synthétique :</strong> 1) justifier l'exactitude du solde par une pièce/raisonnement. 2) trésorerie (512), achats (401), ventes (411), personnel (641)… 3) 512 créditeur, 401 débiteur, 411 créditeur, 53 créditrice, 471/580 ≠ 0. 4) solde, justification, anomalies, conclusion. 5) balance révisée, feuilles de travail, rapprochements, balance âgée, points en suspens, 471 justifié.</p>", "m28": "<h1>MODULE — Révision « par défilement » : classes 1 à 7</h1>\n<p><strong>Niveau :</strong> Avancé · <strong>Durée :</strong> 10–12 h · <strong>Prérequis :</strong> Module 11 (révision comptable)</p>\n<blockquote>La révision <strong>par défilement</strong> = dérouler la <strong>balance</strong> du <strong>compte 1 au compte 7</strong>, et pour <strong>chaque solde</strong> se poser 3 questions : <strong>est‑il juste ? est‑il justifié (pièce/tableau) ? est‑il normal ?</strong></blockquote>\n<p><strong>Le dossier permanent (à avoir avant de commencer) :</strong> <strong>KBIS</strong> (récent), <strong>STATUTS</strong> (à jour), <strong>dernière liasse</strong> + <strong>PVAGO</strong> d'affectation, <strong>contrats d'emprunt + tableaux d'amortissement</strong>, <strong>baux</strong>, <strong>conventions de comptes courants</strong>, <strong>fichier des immobilisations</strong>.</p>\n<p><strong>Principe d'or :</strong> un compte révisé = un compte <strong>lettré/pointé</strong>, <strong>justifié par une pièce</strong>, <strong>commenté</strong> si anomalie, et marqué <strong>« révisé »</strong>.</p>\n<hr>\n<h2>🟫 CLASSE 1 — Capitaux propres, provisions &amp; emprunts</h2>\n<p><strong>Comptes standard :</strong> 101 Capital · 1011/1012/1013 (souscrit/appelé/versé) · 106 Réserves (<strong>1061 réserve légale</strong>, 1063 statutaires, 1068 autres) · 110 Report à nouveau (créditeur) · 119 RAN (débiteur) · <strong>120 Résultat (bénéfice)</strong> / 129 (perte) · 108 Compte de l'exploitant · 145 amort. dérogatoires · 15 provisions · <strong>164 Emprunts</strong> · 1688 intérêts courus.</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>À vérifier</th><th>Document</th></tr></thead><tbody><tr><td><strong>101 Capital</strong></td><td>montant = statuts ; capital libéré ou non (1013)</td><td><strong>KBIS, STATUTS</strong></td></tr><tr><td><strong>1061 Réserve légale</strong></td><td>dotation 5 % faite jusqu'à 10 % du capital</td><td><strong>PVAGO</strong></td></tr><tr><td><strong>120 / 129</strong></td><td>le <strong>résultat N‑1 a été affecté</strong> (120 N‑1 soldé)</td><td><strong>PVAGO</strong> d'affectation</td></tr><tr><td><strong>110 / 119</strong></td><td>report cohérent avec l'affectation</td><td>PVAGO</td></tr><tr><td><strong>108</strong></td><td>mouvements de l'exploitant (EI)</td><td>relevés</td></tr><tr><td><strong>164 Emprunts</strong></td><td>solde = <strong>capital restant dû</strong> du tableau</td><td><strong>contrat + tableau d'amortissement</strong></td></tr><tr><td><strong>1688</strong></td><td>intérêts courus à la clôture</td><td>tableau d'amortissement</td></tr></tbody></table></div>\n<p><strong>Anomalies typiques :</strong> 120 N‑1 non soldé (affectation oubliée) ; réserve légale non dotée ; 164 ≠ tableau (échéances mal ventilées) ; capitaux propres &lt; la moitié du capital (→ <strong>procédure de perte de la moitié du capital</strong>, art. L.223‑42 / L.225‑248).</p>\n<p>➡️ Approfondissements : <strong>PVAGO</strong>, <strong>réserve légale</strong>, <strong>emprunts</strong> → en bas de leçon.</p>\n<hr>\n<h2>🟫 CLASSE 2 — Immobilisations</h2>\n<p><strong>Comptes standard :</strong> 201 frais d'établissement · 205 logiciels/brevets · 206/207 fonds commercial · 211 terrains · 213 constructions · 2154 matériel · 2182 matériel de transport · 2183 informatique · 2184 mobilier · 23 immo en cours · 261 titres de participation · 275 dépôts &amp; cautionnements versés · <strong>28 amortissements</strong> · 29 dépréciations.</p>\n<p><strong>À vérifier :</strong> le <strong>fichier des immobilisations = comptes 21</strong> (rapprochement) ; <strong>entrées</strong> (factures) bien immobilisées (voir conditions ci‑dessous) ; <strong>dotations</strong> 6811 → 28 cohérentes (plan) ; <strong>sorties/cessions</strong> (675 VNC / 775 prix de vente / +‑value) ; <strong>TVA</strong> récupérée (44562) sauf <strong>VP</strong> ; 23 soldé en 21 à la mise en service.<br><strong>Documents :</strong> factures d'achat, <strong>fichier des immos + plans d'amortissement</strong>, actes notariés (terrains/constructions), tableau des cessions.<br><strong>Anomalies :</strong> charge passée à tort en immo (ou l'inverse) ; immo cédée non sortie ; TVA déduite sur VP ; terrain amorti (interdit).</p>\n<p>➡️ <strong>Conditions pour immobiliser en France</strong> → en bas de leçon.</p>\n<hr>\n<h2>🟫 CLASSE 3 — Stocks &amp; en‑cours</h2>\n<p><strong>Comptes standard :</strong> 31 matières premières · 32 autres approvisionnements · 33/34 en‑cours · 35 produits finis · <strong>37 marchandises</strong> · 603/<strong>6037</strong> variation · 39 dépréciation.</p>\n<p><strong>À vérifier :</strong> <strong>état d'inventaire physique</strong> daté et signé (quantités × valeur) ; <strong>valorisation</strong> au coût d'achat/production (PMP ou FIFO, <strong>jamais</strong> au prix de vente) ; écriture de <strong>variation de stock</strong> (annulation du stock initial, constatation du stock final) ; <strong>dépréciation</strong> des invendus/périmés ; <strong>cut‑off</strong> (marchandises reçues non facturées).<br><strong>Document :</strong> <strong>état d'inventaire</strong> valorisé.<br><strong>Anomalies :</strong> stock non inventorié ; marge incohérente (vol/erreur) ; variation non passée.</p>\n<hr>\n<h2>🟫 CLASSE 4 — Comptes de tiers</h2>\n<p><strong>Comptes standard :</strong> <strong>401</strong> fournisseurs (408 FNP, 4096 avoirs à recevoir, 4091 acomptes) · <strong>411</strong> clients (418 FAE, <strong>416 douteux</strong>, 491 dépréciation, 4191 acomptes reçus) · 421 rémunérations dues · 425 acomptes · 427 oppositions · <strong>431 URSSAF</strong> · 437 autres organismes · <strong>44551</strong> TVA à décaisser · 44562/44566 TVA déductible · <strong>44571</strong> TVA collectée · 44567 crédit de TVA · 444 IS · <strong>455 comptes courants d'associés</strong> · 457 dividendes à payer · 467 divers · <strong>471 comptes d'attente</strong> · <strong>486 CCA</strong> / <strong>487 PCA</strong>.</p>\n<p><strong>À vérifier :</strong> <strong>lettrage</strong> 401/411 (balance âgée) ; <strong>soldes anormaux</strong> (401 débiteur, 411 créditeur → analyser) ; <strong>rapprochement TVA</strong> (44571/44566 ↔ déclarations) ; cohérence <strong>421/431/437 ↔ paie/DSN</strong> ; <strong>455</strong> = convention + sens (455 débiteur = avance à surveiller) ; <strong>471 = 0</strong> avant clôture ; CCA/PCA justifiées (prorata).<br><strong>Documents :</strong> <strong>balances auxiliaires</strong>, relevés fournisseurs, <strong>DSN</strong>, déclarations de TVA, conventions de compte courant.<br><strong>Anomalies :</strong> comptes non lettrés qui gonflent ; TVA non soldée après paiement ; 471 résiduel ; doublons fournisseurs.</p>\n<hr>\n<h2>🟫 CLASSE 5 — Comptes financiers</h2>\n<p><strong>Comptes standard :</strong> 50 VMP · <strong>512 banque</strong> · 511 effets à l'encaissement · 514 chèques postaux · 519 concours bancaires courants · <strong>53 caisse</strong> · <strong>58 virements internes</strong>.</p>\n<p><strong>À vérifier :</strong> <strong>état de rapprochement bancaire</strong> pour <strong>chaque</strong> compte 512 (solde comptable ↔ relevé) ; <strong>caisse 53 jamais créditrice</strong> (impossible physiquement) et justifiée par un brouillard ; <strong>58 = 0</strong> (tout virement interne soldé) ; VMP valorisées.<br><strong>Documents :</strong> <strong>relevés bancaires</strong>, <strong>états de rapprochement</strong>, brouillard de caisse.<br><strong>Anomalies :</strong> 512 non rapproché ; <strong>caisse négative</strong> (à corriger absolument) ; 58 non soldé.</p>\n<hr>\n<h2>🟫 CLASSE 6 — Charges</h2>\n<p><strong>Comptes standard :</strong> 601/<strong>607</strong> achats · 6037 variation · 611 sous‑traitance · <strong>613 loyers</strong> · <strong>616 assurances</strong> · 6226 honoraires · 6257 réceptions · <strong>63</strong> impôts &amp; taxes (CFE/CVAE/taxe sur salaires) · <strong>641 salaires</strong> · <strong>645 cotisations</strong> · 654 créances irrécouvrables · <strong>661 intérêts</strong> · 671 pénalités · 675 VNC · <strong>6811/6817 dotations</strong> · 695 IS.</p>\n<p><strong>À vérifier :</strong> <strong>revue analytique</strong> (comparaison N/N‑1, explication des écarts) ; <strong>TVA déductible</strong> correcte ; <strong>charges non déductibles</strong> à réintégrer (amendes/pénalités 671, <strong>TVS/taxe véhicules</strong>, amort. VP au‑delà du plafond, cadeaux/réceptions excessifs) ; <strong>rattachement</strong> (cut‑off : <strong>FNP, CCA</strong>) ; <strong>pièce justificative</strong> pour chaque charge significative.<br><strong>Documents :</strong> grand livre des charges, factures, contrats (bail, assurance, leasing).<br><strong>Anomalies :</strong> charge sans facture ; charge perso du dirigeant ; TVA déduite à tort (VP, restaurant ?).</p>\n<hr>\n<h2>🟫 CLASSE 7 — Produits</h2>\n<p><strong>Comptes standard :</strong> 701 ventes de produits · <strong>706 prestations</strong> · <strong>707 marchandises</strong> · 7083 locations · 71 production stockée · 72 production immobilisée · 74 subventions · 751 redevances · <strong>76 produits financiers</strong> · 775 produits de cession · <strong>781 reprises</strong> · 791 transferts de charges.</p>\n<p><strong>À vérifier :</strong> <strong>rapprochement du CA</strong> : <code>CA déclaré en TVA ≈ comptes 70x</code> ; <strong>exhaustivité</strong> (aucune vente oubliée) ; <strong>cut‑off</strong> (<strong>FAE, PCA</strong>) ; cohérence <strong>marge</strong> ; produits exceptionnels (775) justifiés par les cessions d'immo.<br><strong>Documents :</strong> journal des ventes, déclarations de TVA, tableau de rapprochement CA, contrats.<br><strong>Anomalies :</strong> CA compta ≠ CA TVA non justifié ; PCA oubliée (produit de N+1 comptabilisé en N).</p>\n<hr>\n<h1>🔎 Approfondissements</h1>\n<h2>A) Rédiger un PVAGO (Procès‑Verbal d'Assemblée Générale Ordinaire d'approbation des comptes)</h2>\n<p>L'AGO d'approbation se tient <strong>dans les 6 mois de la clôture</strong>. Elle <strong>approuve les comptes</strong>, <strong>affecte le résultat</strong>, donne <strong>quitus</strong> au gérant.</p>\n<pre><code>PROCÈS-VERBAL DE L'ASSEMBLÉE GÉNÉRALE ORDINAIRE ANNUELLE\n[Dénomination] — [Forme] au capital de [montant] €\nSiège : [adresse] — RCS [ville] n° [SIREN]\n\nLe [date], à [heure], à [lieu], les associés se sont réunis en AGO.\nPrésents : [Nom — nombre de parts] … Total parts représentées : [x/x].\nLe quorum est atteint. [Gérant] préside la séance.\n\nORDRE DU JOUR\n1. Approbation des comptes de l'exercice clos le [date]\n2. Affectation du résultat\n3. Quitus au gérant\n4. Pouvoirs pour les formalités\n\nRÉSOLUTIONS\n1re — Les comptes (bilan, compte de résultat, annexe) faisant ressortir\nun [bénéfice/perte] de [montant] € sont approuvés. ADOPTÉE.\n2e — Affectation du résultat (bénéfice de [montant] €) :\n   - Réserve légale (5 %) ............... [montant] €\n   - Autres réserves / Report à nouveau . [montant] €\n   - Dividendes ......................... [montant] €\n   ADOPTÉE.\n3e — Quitus entier et sans réserve donné au gérant. ADOPTÉE.\n4e — Tous pouvoirs au porteur d'un original pour les formalités. ADOPTÉE.\n\nL'ordre du jour étant épuisé, la séance est levée à [heure].\nSignatures : [Le Président] — [Les associés]</code></pre>\n<blockquote>À déposer/archiver ; si distribution de dividendes → enregistrement et déclaration. <strong>Pas de dividende</strong> tant que la <strong>réserve légale</strong> n'est pas dotée et que les capitaux propres ne le permettent pas.</blockquote>\n<h2>B) La réserve légale (la loi)</h2>\n<p><strong>Art. L.232‑10 du Code de commerce</strong> : il est obligatoire d'affecter <strong>5 % du bénéfice</strong> de l'exercice (<strong>diminué des pertes antérieures</strong>) à la <strong>réserve légale</strong>, <strong>jusqu'à ce qu'elle atteigne 10 % du capital social</strong>. Au‑delà, la dotation devient facultative.<br><strong>Écriture d'affectation (bénéfice) :</strong> <code>120 D</code> ➜ <code>1061 (réserve légale 5 %) C</code> + <code>1068/110 C</code> + <code>457 (dividendes) C</code>.<br><strong>Perte :</strong> <code>110/119 (RAN débiteur) D</code> ➜ <code>129 C</code> (ou imputation sur réserves).</p>\n<blockquote><strong>Exemple :</strong> capital 10 000 € → réserve légale plafond = <strong>1 000 €</strong>. Bénéfice 8 000 € → dotation légale = 8 000 × 5 % = <strong>400 €</strong> (tant que la réserve &lt; 1 000 €).</blockquote>\n<h2>C) Conditions pour immobiliser en France (charge ou immo ?)</h2>\n<p>On <strong>immobilise</strong> (classe 2) un bien qui réunit :</p>\n<ol><li><strong>élément identifiable et contrôlé</strong> par l'entreprise (facture à son nom) ;</li><li><strong>avantages économiques futurs</strong> (sert l'activité durablement) ;</li><li><strong>durée d'utilisation &gt; 12 mois</strong> (ne se consomme pas) ;</li><li><strong>valeur unitaire significative</strong> : <strong>&gt; 500 € HT</strong> (en dessous, <strong>tolérance</strong> = passage en <strong>charge</strong> pour le petit matériel/mobilier).</li></ol>\n<ul><li><strong>Décomposition par composants</strong> pour les biens lourds (ex. immeuble : structure / toiture / agencements à durées différentes).</li><li><strong>Mise en service</strong> = point de départ de l'amortissement (<strong>prorata temporis</strong> la 1re année).</li><li><strong>Terrain non amortissable</strong> ; <strong>TVA non récupérable sur VP</strong>.</li></ul>\n<blockquote>Ex. perceuse 120 € HT → <strong>charge</strong> (606). Ordinateur 1 500 € HT → <strong>immo</strong> (2183), amorti sur 3 ans.</blockquote>\n<h2>D) Traitement des emprunts + tableau d'amortissement</h2>\n<p><strong>Mise en place :</strong> <code>512 D / 164 C</code> (capital emprunté).<br><strong>Chaque échéance</strong> (la mensualité se décompose) :<br><code>164 D</code> (capital remboursé) + <code>661 D</code> (intérêts) + <code>616 D</code> (assurance) <strong>/</strong> <code>512 C</code> (mensualité totale).<br><strong>À la clôture :</strong> <strong>164 = capital restant dû</strong> du tableau ; <strong>intérêts courus</strong> non échus → <code>661 D / 1688 C</code> (extournés à l'ouverture).<br><strong>Le tableau d'amortissement (échéancier) à exiger de la banque :</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Échéance</th><th>CRD début</th><th>Mensualité</th><th>Intérêts</th><th>Capital amorti</th><th>Assurance</th><th>CRD fin</th></tr></thead><tbody><tr><td>01</td><td>20 000,00</td><td>360,00</td><td>50,00</td><td>300,00</td><td>10,00</td><td>19 700,00</td></tr><tr><td>02</td><td>19 700,00</td><td>360,00</td><td>49,25</td><td>300,75</td><td>10,00</td><td>19 399,25</td></tr><tr><td>…</td><td>…</td><td>…</td><td>…</td><td>…</td><td>…</td><td>…</td></tr></tbody></table></div>\n<p><strong>Contrôle de révision :</strong> <code>Σ capital amorti de l'année</code> = baisse du compte <strong>164</strong> ; <code>Σ intérêts</code> = compte <strong>661</strong> ; le <strong>CRD fin</strong> au 31/12 = <strong>solde 164</strong> au bilan. Part à <strong>moins d'1 an</strong> (164 courant) vs <strong>plus d'1 an</strong> pour l'annexe.</p>\n<blockquote>⚠️ Ne <strong>jamais</strong> passer toute la mensualité en charge (66) : seule la <strong>part intérêts + assurance</strong> est une charge ; le <strong>capital</strong> rembourse la dette (164).</blockquote>\n<hr>\n<h2>✅ Checklist « défilement de la balance »</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> <strong>Cl.1</strong> : capital = statuts/KBIS · résultat N‑1 affecté (PVAGO) · 164 = tableau</label></li><li class=\"task\"><label><input type=\"checkbox\"> <strong>Cl.2</strong> : fichier immo = 21 · dotations · TVA (pas sur VP)</label></li><li class=\"task\"><label><input type=\"checkbox\"> <strong>Cl.3</strong> : inventaire valorisé · variation de stock · dépréciation</label></li><li class=\"task\"><label><input type=\"checkbox\"> <strong>Cl.4</strong> : lettrage · TVA rapprochée · 471 = 0 · 455 conventionné</label></li><li class=\"task\"><label><input type=\"checkbox\"> <strong>Cl.5</strong> : 512 rapproché · caisse ≥ 0 · 58 = 0</label></li><li class=\"task\"><label><input type=\"checkbox\"> <strong>Cl.6</strong> : revue analytique · non‑déductibles repérés · cut‑off</label></li><li class=\"task\"><label><input type=\"checkbox\"> <strong>Cl.7</strong> : CA compta = CA TVA · cut‑off (FAE/PCA)</label></li></ul>\n<h2>📝 Évaluation</h2>\n<ol><li>Quels documents justifient le compte <strong>101</strong> et le compte <strong>120</strong> ?</li><li>Règle légale de dotation de la <strong>réserve légale</strong> ?</li><li>À partir de quel montant immobilise‑t‑on (en principe) ?</li><li>Décompose l'écriture d'une <strong>échéance d'emprunt</strong>.</li><li>Que doit valoir le compte <strong>471</strong> avant la clôture ? Et la <strong>caisse</strong> peut‑elle être créditrice ?</li></ol>\n<p><strong>Seuil : 7/10.</strong> <strong>Corrigé :</strong> 1) 101 → <strong>KBIS + statuts</strong> ; 120 → <strong>PVAGO</strong> (résultat N‑1 affecté). 2) <strong>5 % du bénéfice</strong> (net des pertes antérieures) <strong>jusqu'à 10 % du capital</strong>. 3) <strong>&gt; 500 € HT</strong> (durée &gt; 1 an). 4) <code>164 (capital) + 661 (intérêts) + 616 (assurance) / 512 (mensualité)</code>. 5) <strong>471 = 0</strong> ; la <strong>caisse ne peut jamais être créditrice</strong> (négative).</p>", "m12": "<h1>MODULE 12 — Fiscalité des entreprises françaises</h1>\n<p><strong>Niveau :</strong> Avancé · <strong>Durée estimée :</strong> 10–12 h · <strong>Prérequis :</strong> Modules 5 et 11<br><strong>Chiffres à jour 2026</strong> (sources : impots.gouv.fr, bofip.impots.gouv.fr, economie.gouv.fr).</p>\n<blockquote>⚠️ <strong>Posture offshore (rappel essentiel) :</strong> le collaborateur <strong>prépare et rassemble</strong> les éléments fiscaux. Le <strong>calcul définitif, la validation et la signature</strong> des déclarations relèvent de l'expert-comptable. On ne « décide » jamais un traitement fiscal seul.</blockquote>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Distinguer IR / IS, BIC / BNC / BA, micro / réel.</li><li>Connaître les déclarations (2031, 2035, 2065) et la liasse fiscale.</li><li>Comprendre acomptes/solde IS, CFE, CVAE, taxe sur les salaires, taxe sur les véhicules.</li><li>Connaître les principales échéances.</li></ul>\n<hr>\n<h2>1. Qui paie quoi : IR ou IS ?</h2>\n<div class=\"tbl\"><table><thead><tr><th></th><th><strong>Impôt sur le revenu (IR)</strong></th><th><strong>Impôt sur les sociétés (IS)</strong></th></tr></thead><tbody><tr><td>Qui</td><td>Entreprises individuelles, EURL (par défaut), certaines sociétés sur option</td><td>SARL, SAS, SA, EURL sur option…</td></tr><tr><td>Imposition</td><td>Le bénéfice est imposé au nom de l'<strong>exploitant/associé</strong> (barème IR)</td><td>La <strong>société</strong> paie l'impôt sur son bénéfice</td></tr><tr><td>Déclaration de résultat</td><td><strong>2031</strong> (BIC) / <strong>2035</strong> (BNC)</td><td><strong>2065</strong></td></tr></tbody></table></div>\n<hr>\n<h2>2. Les catégories de revenus professionnels</h2>\n<div class=\"tbl\"><table><thead><tr><th>Catégorie</th><th>Activité</th><th>Régimes</th></tr></thead><tbody><tr><td><strong>BIC</strong> (Bénéfices industriels et commerciaux)</td><td>Commerce, artisanat, industrie</td><td>Micro-BIC, réel simplifié, réel normal</td></tr><tr><td><strong>BNC</strong> (Bénéfices non commerciaux)</td><td>Professions libérales, prestations intellectuelles</td><td>Micro-BNC, déclaration contrôlée (réel)</td></tr><tr><td><strong>BA</strong> (Bénéfices agricoles)</td><td>Agriculture</td><td>Micro-BA, réel</td></tr></tbody></table></div>\n<hr>\n<h2>3. Les régimes d'imposition du bénéfice (seuils 2026)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Régime</th><th>Seuils de CA (2026)</th><th>Abattement / obligations</th></tr></thead><tbody><tr><td><strong>Micro-BIC vente</strong></td><td>≤ <strong>203 100 €</strong></td><td>Abattement <strong>71 %</strong> ; pas de bilan</td></tr><tr><td><strong>Micro-BIC services</strong></td><td>≤ <strong>83 600 €</strong></td><td>Abattement <strong>50 %</strong></td></tr><tr><td><strong>Micro-BNC</strong></td><td>≤ <strong>83 600 €</strong></td><td>Abattement <strong>34 %</strong> (déclaration 2042-C-PRO)</td></tr><tr><td><strong>Réel simplifié (BIC)</strong></td><td>jusqu'aux seuils du réel normal</td><td>Liasse 2033 (tableaux simplifiés)</td></tr><tr><td><strong>Réel normal (BIC)</strong></td><td>au-delà / sur option</td><td>Liasse 2050 et suivants</td></tr><tr><td><strong>Déclaration contrôlée (BNC)</strong></td><td>sur option / au-delà du micro</td><td><strong>2035</strong></td></tr></tbody></table></div>\n<hr>\n<h2>4. L'impôt sur les sociétés (IS) — taux 2026</h2>\n<ul><li><strong>Taux normal : 25 %</strong>.</li><li><strong>Taux réduit : 15 %</strong> sur les <strong>premiers 42 500 € de bénéfice</strong>, pour les PME dont :</li><li>le <strong>CA HT &lt; 10 M€</strong>,</li><li>le <strong>capital entièrement libéré</strong>,</li><li><strong>détenu à ≥ 75 % par des personnes physiques</strong> (ou sociétés répondant elles-mêmes aux conditions).</li><li>Au-delà de 42 500 € : taux normal de 25 %.</li></ul>\n<p><strong>Ex. — Bénéfice 60 000 € (PME éligible) :</strong></p>\n<ul><li>42 500 × 15 % = 6 375 €</li><li>(60 000 − 42 500) × 25 % = 17 500 × 25 % = 4 375 €</li><li><strong>IS = 10 750 €</strong></li></ul>\n<h3>Acomptes et solde IS</h3>\n<ul><li><strong>4 acomptes</strong> (formulaire <strong>2571</strong>) : <strong>15/03, 15/06, 15/09, 15/12</strong>. Chaque acompte = <strong>25 % de l'IS de référence</strong> (IS du dernier exercice clos).</li><li><strong>Solde</strong> (formulaire <strong>2572</strong>) : <strong>15/05/N</strong> pour un exercice clos le 31/12/N‑1 (sinon le 15 du 4e mois suivant la clôture).</li></ul>\n<p><strong>⭐ Régularisation au 2e acompte (point clé)</strong><br>Au <strong>1er acompte (15/03)</strong>, le résultat <strong>N‑1 n'est pas encore connu</strong> (la liasse n'est déposée qu'en mai) → on le calcule sur l'<strong>avant‑dernier exercice (N‑2)</strong>.<br>Au <strong>2e acompte (15/06)</strong>, le résultat <strong>N‑1 est connu</strong> → on <strong>régularise</strong> : le 2e acompte « rattrape » le 1er pour que <strong>le cumul des 2 premiers acomptes = la moitié (2/4) de l'IS N‑1</strong>.</p>\n<blockquote><strong>Formule :</strong> <strong>2e acompte = (IS N‑1 × 2/4) − 1er acompte déjà versé.</strong></blockquote>\n<p>Les <strong>3e et 4e acomptes</strong> = <strong>25 % de l'IS N‑1</strong> chacun. Le <strong>solde</strong> (15/05/N+1) régularise le tout selon l'<strong>IS réel de N</strong>.</p>\n<p><strong>Exemple :</strong> IS N‑2 = 8 000 € ; IS N‑1 (connu en mai) = 12 000 €.</p>\n<ul><li>1er acompte (15/03) = 8 000 × 25 % = <strong>2 000 €</strong> (calculé sur N‑2).</li><li><strong>2e acompte (15/06) régularisé</strong> = (12 000 × 2/4) − 2 000 = 6 000 − 2 000 = <strong>4 000 €</strong>.</li><li>3e (15/09) = 12 000 × 25 % = <strong>3 000 €</strong> · 4e (15/12) = <strong>3 000 €</strong>.</li><li>Total acomptes N = 12 000 € ; <strong>solde</strong> = IS réel N − 12 000 €.</li></ul>\n<blockquote>💡 Le collaborateur <strong>prépare</strong> le calcul (2571) ; l'<strong>expert‑comptable valide</strong>. Un acompte peut être <strong>modulé/réduit</strong> si le résultat baisse (sous conditions, décision de l'EC). Pas d'acompte la <strong>1re année</strong> d'existence, ni si l'IS de référence &lt; 3 000 €.</blockquote>\n<hr>\n<h2>5. La liasse fiscale</h2>\n<p>La <strong>liasse fiscale</strong> = ensemble des tableaux (bilan, compte de résultat, annexes fiscales) transmis à l'administration avec la déclaration de résultat. Selon le régime : <strong>2031/2033</strong> (BIC RSI), <strong>2050-2059</strong> (BIC réel normal), <strong>2035</strong> (BNC), <strong>2065</strong> (IS).</p>\n<ul><li><strong>Date limite de dépôt</strong> : généralement <strong>début mai</strong> (2e jour ouvré suivant le 1er mai) pour un exercice clos au 31/12, avec la <strong>télétransmission EDI-TDFC</strong> (délai supplémentaire de 15 jours en pratique).</li></ul>\n<blockquote>Rôle du collaborateur : <strong>préparer les tableaux, justifier les comptes, rassembler les éléments</strong> ; l'expert-comptable <strong>finalise et télétransmet</strong>.</blockquote>\n<hr>\n<h2>5 bis. Les formulaires fiscaux (CERFA) — case par case</h2>\n<blockquote>⚠️ En pratique, la <strong>liasse est générée par le logiciel</strong> (RCA, ACD, Cegid…) à partir de la compta révisée : le collaborateur <strong>prépare et contrôle</strong>, l'<strong>expert-comptable valide et télétransmet</strong> (EDI-TDFC). Voici, pour comprendre <strong>où va quoi</strong>, les cadres et lignes <strong>clés</strong> de chaque formulaire.</blockquote>\n<h3>🧾 2065‑SD — Impôt sur les sociétés (IS)</h3>\n<p>Formulaire court : le <strong>résultat</strong> vient des <strong>tableaux de la liasse</strong>, et le <strong>calcul de l'IS</strong> se fait sur d'autres imprimés.</p>\n<div class=\"cerfa\" data-form=\"2065\"></div>\n<div class=\"tbl\"><table><thead><tr><th>Cadre / ligne</th><th>Quoi y mettre</th></tr></thead><tbody><tr><td>En‑tête</td><td>Identité, <strong>SIRET</strong>, exercice, régime (réel normal / simplifié)</td></tr><tr><td><strong>A — Récapitulation</strong></td><td>Report du <strong>résultat fiscal</strong> issu du tableau <strong>2058‑A</strong> (réel normal) ou <strong>2033‑B</strong> (réel simplifié)</td></tr><tr><td><strong>C‑1 — Résultat fiscal</strong></td><td><strong>Bénéfice imposable</strong> (ou <strong>déficit</strong>) de l'exercice</td></tr><tr><td>Plus/moins‑values</td><td>À long terme (taux réduit) le cas échéant</td></tr><tr><td><strong>2065 bis</strong></td><td>Répartition du bénéfice, <strong>rémunérations des dirigeants</strong>, divers</td></tr></tbody></table></div>\n<blockquote>Le <strong>montant de l'IS</strong> (15 %/25 %) n'est PAS sur la 2065 : il se calcule sur le <strong>2571</strong> (acomptes) et le <strong>2572</strong> (solde).</blockquote>\n<h3>🧾 2031‑SD — BIC à l'IR (entreprise individuelle, EURL à l'IR…)</h3>\n<p>Même logique, mais pour une entreprise <strong>à l'IR</strong> :</p>\n<div class=\"cerfa\" data-form=\"2031\"></div>\n<div class=\"tbl\"><table><thead><tr><th>Cadre</th><th>Quoi y mettre</th></tr></thead><tbody><tr><td>En‑tête</td><td>Identité, SIRET, régime</td></tr><tr><td>Résultat</td><td><strong>Bénéfice (ou déficit) BIC</strong> issu de <strong>2050‑2059</strong> (réel normal) ou <strong>2033</strong> (réel simplifié)</td></tr><tr><td>Répartition</td><td>Quote‑part des associés (sociétés de personnes)</td></tr></tbody></table></div>\n<blockquote>Le résultat est ensuite <strong>reporté sur la déclaration de revenus</strong> du dirigeant (<strong>2042‑C‑PRO</strong>).</blockquote>\n<h3>🧾 2035‑SD — BNC (déclaration contrôlée) — comptabilité de <strong>caisse</strong></h3>\n<p>Le plus « manuel » des trois : <strong>2035‑A</strong> (résultat) + <strong>2035‑B</strong> (résultat fiscal).<br><strong>2035‑A — Recettes &amp; dépenses :</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Poste</th><th>Quoi y mettre</th></tr></thead><tbody><tr><td><strong>Recettes</strong></td><td><strong>Recettes encaissées</strong> (honoraires…) — pas les factures impayées</td></tr><tr><td>Débours / rétrocessions</td><td>Sommes reversées à des confrères</td></tr><tr><td><strong>Dépenses</strong></td><td><strong>payées</strong> dans l'année : achats, <strong>loyer (6132)</strong>, <strong>véhicule/déplacements</strong>, fournitures, <strong>honoraires</strong>, <strong>cotisations sociales TNS</strong>, télécom, assurances…</td></tr><tr><td>Amortissements</td><td>Dotations (tableau des immobilisations)</td></tr></tbody></table></div>\n<p><strong>2035‑B — Résultat :</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Ligne</th><th>Quoi y mettre</th></tr></thead><tbody><tr><td>Excédent / Insuffisance</td><td><strong>Bénéfice ou déficit BNC</strong></td></tr><tr><td>CSG déductible, divers</td><td>Régularisations</td></tr><tr><td>Plus‑values</td><td>Le cas échéant</td></tr></tbody></table></div>\n<blockquote>BNC = <strong>recettes encaissées</strong> et <strong>dépenses payées</strong>. Résultat reporté sur <strong>2042‑C‑PRO</strong>.</blockquote>\n<h3>🧾 CFE — 1447‑C‑SD (création) / 1447‑M‑SD (modification)</h3>\n<p>La CFE est <strong>calculée par l'administration</strong> (avis reçu en ligne, paiement le <strong>15/12</strong>). On ne <strong>dépose une déclaration</strong> que dans 2 cas :</p>\n<div class=\"cerfa\" data-form=\"cfe\"></div>\n<div class=\"tbl\"><table><thead><tr><th>Formulaire</th><th>Quand</th><th>Cases clés</th></tr></thead><tbody><tr><td><strong>1447‑C‑SD</strong></td><td>l'<strong>année de création</strong> (avant le 1er janvier suivant)</td><td>identité, <strong>adresse des locaux</strong>, <strong>surfaces / valeur locative</strong>, effectif, exonérations</td></tr><tr><td><strong>1447‑M‑SD</strong></td><td>en cas de <strong>changement</strong> (surface, activité, demande d'exonération)</td><td>uniquement les éléments modifiés</td></tr></tbody></table></div>\n<blockquote>1re année : <strong>exonération de CFE</strong>. Ensuite : avis en ligne, paiement 15/12 (acompte en juin si CFE N‑1 ≥ 3 000 €).</blockquote>\n<h3>📎 Formulaires officiels</h3>\n<p>2065‑SD · 2031‑SD · 2035‑SD (+ 2035‑A/B) · 1447‑C‑SD / 1447‑M‑SD — tous sur <strong>impots.gouv.fr</strong> (« Recherche de formulaires »). Tableaux de liasse : <strong>2050‑2059</strong> (réel normal), <strong>2033‑A à 2033‑G</strong> (réel simplifié).</p>\n<hr>\n<h2>6. Autres impôts et taxes</h2>\n<h3>CFE — Cotisation foncière des entreprises</h3>\n<p>Due par toute entreprise (sauf 1re année / exonérations) ; basée sur la valeur locative des locaux. <strong>Échéance : 15 décembre</strong> (acompte en juin si CFE N-1 ≥ 3 000 €).</p>\n<h3>CVAE — Cotisation sur la valeur ajoutée des entreprises (2026)</h3>\n<ul><li>Due si <strong>CA &gt; 500 000 €</strong>.</li><li><strong>Suppression progressive maintenue jusqu'en 2030</strong> (report).</li><li><strong>Taux maximal : 0,28 % pour 2026</strong> (et 2027), puis 0,19 % en 2028, 0,09 % en 2029, suppression en 2030.</li></ul>\n<h3>Taxe sur les salaires</h3>\n<p>Due par les employeurs <strong>non assujettis à la TVA</strong> (ou assujettis à moins de 90 %) : associations, certaines activités exonérées, secteur médical/financier… Barème progressif par tranches sur les rémunérations. → Vérifier l'assujettissement du dossier.</p>\n<h3>Taxes sur l'affectation des véhicules (ex-TVS)</h3>\n<p>Pour les sociétés utilisant des véhicules de tourisme : <strong>taxe annuelle sur les émissions de CO₂</strong> + <strong>taxe sur les polluants atmosphériques</strong> (ancien système malus/ancienneté). Déclarées annuellement.</p>\n<hr>\n<h2>7. Échéances fiscales importantes (mémo)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Échéance</th><th>Quand</th></tr></thead><tbody><tr><td>TVA CA3 (réel normal)</td><td>Mensuelle (selon planning, souvent autour du 15-24)</td></tr><tr><td>Acomptes TVA RSI</td><td>Juillet et décembre</td></tr><tr><td>CA12 (RSI)</td><td>2e jour ouvré après le 1er mai</td></tr><tr><td>Acomptes IS</td><td>15/03, 15/06, 15/09, 15/12</td></tr><tr><td>Solde IS</td><td>15/05 (clôture 31/12)</td></tr><tr><td>Liasse fiscale</td><td>Début mai (clôture 31/12)</td></tr><tr><td>CFE</td><td>15 décembre</td></tr><tr><td>CVAE (si due)</td><td>Déclaration et solde en mai ; acompte(s) en cours d'année</td></tr></tbody></table></div>\n<hr>\n<h2>✅ Checklist « préparation des éléments fiscaux » (offshore)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Régime fiscal du dossier identifié (IR/IS, BIC/BNC, micro/réel)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes révisés et justifiés (Module 11)</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA de l'exercice bouclée et cohérente</label></li><li class=\"task\"><label><input type=\"checkbox\"> Immobilisations et amortissements à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Provisions / dépréciations recensées (à valider)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes courants d'associés justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Éléments de réintégration/déduction signalés (amendes, TVS, etc.) <strong>pour décision EC</strong></label></li><li class=\"task\"><label><input type=\"checkbox\"> Tableaux de liasse pré-remplis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dossier transmis au chef de mission <strong>sans valider fiscalement à sa place</strong></label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 12.1 — Calcul d'IS</h2>\n<p>Une SAS (PME éligible au taux réduit) réalise un bénéfice fiscal de <strong>90 000 €</strong>. Calculez l'IS.</p>\n<h3>✔️ Correction 12.1</h3>\n<ul><li>42 500 × 15 % = 6 375 €</li><li>(90 000 − 42 500) × 25 % = 47 500 × 25 % = 11 875 €</li><li><strong>IS = 18 250 €</strong></li></ul>\n<hr>\n<h2>🧪 Cas pratique 12.2 — Régime applicable</h2>\n<p>Un consultant indépendant réalise 70 000 € de recettes (prestations intellectuelles). Quel régime fiscal possible ?</p>\n<h3>✔️ Correction 12.2</h3>\n<p>Activité <strong>BNC</strong>. 70 000 € &lt; <strong>83 600 €</strong> → éligible au <strong>micro-BNC</strong> (abattement 34 %) ou option pour la <strong>déclaration contrôlée (2035)</strong> si charges réelles élevées. <strong>Le choix se décide avec l'expert-comptable</strong> (le collaborateur ne tranche pas seul).</p>\n<hr>\n<h2>📝 Évaluation de fin de module 12</h2>\n<ol><li>Différence IR / IS ?</li><li>Déclarations : 2031, 2035, 2065 correspondent à quoi ?</li><li>Taux d'IS 2026 (normal et réduit + condition) ?</li><li>Dates des acomptes IS ?</li><li>La CVAE est-elle encore due en 2026 ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) IR = bénéfice imposé chez l'exploitant ; IS = la société paie l'impôt. 2) 2031 = BIC, 2035 = BNC, 2065 = IS. 3) 25 % normal ; <strong>15 % sur les 42 500 premiers €</strong> si CA &lt; 10 M€, capital libéré détenu ≥ 75 % par des personnes physiques. 4) 15/03, 15/06, 15/09, 15/12. 5) <strong>oui</strong>, suppression repoussée à 2030 (taux max 0,28 % en 2026).</p>\n<hr>\n<h3>📌 Sources officielles 2026</h3>\n<ul><li>IS, taux et acomptes — <a href=\"https://www.impots.gouv.fr/professionnel/imposition-des-resultats\" target=\"_blank\" rel=\"noopener\">impots.gouv.fr</a></li><li>Régimes micro / réel — <a href=\"https://www.economie.gouv.fr/entreprises/gerer-sa-micro-entreprise/micro-entreprise-regime-reel-et-regime-de-la-declaration-controlee-les-3-regimes-dimposition-des-entreprises\" target=\"_blank\" rel=\"noopener\">economie.gouv.fr</a></li><li>CVAE / CFE — <a href=\"https://bofip.impots.gouv.fr/bofip/839-PGP.html/identifiant=BOI-CVAE-LIQ-10-20251119\" target=\"_blank\" rel=\"noopener\">bofip.impots.gouv.fr</a></li><li>Loi de finances 2026 — <a href=\"https://www.economie.gouv.fr/entreprises/gerer-sa-fiscalite-et-ses-impots/loi-de-finances-2026-ce-qui-change-pour-les-entreprises\" target=\"_blank\" rel=\"noopener\">economie.gouv.fr</a></li></ul>", "m13": "<h1>MODULE 13 — Bilan et clôture</h1>\n<p><strong>Niveau :</strong> Avancé · <strong>Durée estimée :</strong> 12 h · <strong>Prérequis :</strong> Modules 10, 11, 12</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Réaliser les travaux de clôture : FNP, CCA, FAE, PCA, stocks, amortissements, provisions, cut-off.</li><li>Justifier tous les comptes et contrôler les cycles clés.</li><li>Préparer le dossier de bilan pour le réviseur / chef de mission.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Appliquer le principe de cut-off.</li><li>Passer les écritures d'inventaire courantes.</li></ul>\n<hr>\n<h2>1. Les travaux de clôture : objectif</h2>\n<p>À la fin de l'exercice, on ajuste la comptabilité pour qu'elle reflète la <strong>réalité économique</strong> de l'exercice (et non la seule date des factures/paiements). C'est le principe d'<strong>indépendance des exercices</strong> et de <strong>cut-off</strong>.</p>\n<hr>\n<h2>2. Le cut-off (séparation des exercices)</h2>\n<p>Chaque charge/produit doit être rattaché à <strong>l'exercice qui le concerne</strong>, quelle que soit la date de facturation/paiement.</p>\n<div class=\"tbl\"><table><thead><tr><th>Situation</th><th>Écriture de régularisation</th></tr></thead><tbody><tr><td><strong>Charge de N, facture reçue en N+1</strong></td><td><strong>FNP</strong> – Facture Non Parvenue</td></tr><tr><td><strong>Produit de N, facture émise en N+1</strong></td><td><strong>FAE</strong> – Facture À Établir</td></tr><tr><td><strong>Charge payée en N concernant N+1</strong></td><td><strong>CCA</strong> – Charge Constatée d'Avance</td></tr><tr><td><strong>Produit encaissé en N concernant N+1</strong></td><td><strong>PCA</strong> – Produit Constaté d'Avance</td></tr></tbody></table></div>\n<hr>\n<h2>3. Les écritures d'inventaire</h2>\n<h3>FNP — Facture non parvenue (charge de N non encore facturée)</h3>\n<p><strong>Ex.</strong> Marchandises reçues en décembre, facture 1 000 € HT attendue.</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>607 Achats</td><td>1 000</td><td></td></tr><tr><td>44586 TVA sur FNP</td><td>200</td><td></td></tr><tr><td>408 Fournisseurs – factures non parvenues</td><td></td><td>1 200</td></tr></tbody></table></div>\n<p><em>(Contrepassée à l'ouverture de N+1.)</em></p>\n<h3>FAE — Facture à établir (produit de N non encore facturé)</h3>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>418 Clients – factures à établir</td><td>1 200</td><td></td></tr><tr><td>70x Ventes</td><td></td><td>1 000</td></tr><tr><td>44587 TVA sur FAE</td><td></td><td>200</td></tr></tbody></table></div>\n<h3>CCA — Charge constatée d'avance</h3>\n<p><strong>Ex.</strong> Assurance 1 200 € payée en N pour la période janv–déc N+1.</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>486 Charges constatées d'avance</td><td>1 200</td><td></td></tr><tr><td>616 Assurances</td><td></td><td>1 200</td></tr></tbody></table></div>\n<h3>PCA — Produit constaté d'avance</h3>\n<p><strong>Ex.</strong> Abonnement encaissé en N pour des prestations N+1.</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>70x Ventes</td><td>montant</td><td></td></tr><tr><td>487 Produits constatés d'avance</td><td></td><td>montant</td></tr></tbody></table></div>\n<hr>\n<h2>4. Stocks</h2>\n<p>À l'inventaire, on constate la <strong>variation de stock</strong> :</p>\n<ul><li>Stock initial : 6037 D / 37 C (annulation du stock d'ouverture).</li><li>Stock final : 37 D / 6037 C (constatation du stock de clôture).</li><li>(Pour matières premières : comptes 31 / 6031.)</li></ul>\n<hr>\n<h2>5. Amortissements et provisions</h2>\n<ul><li><strong>Amortissements</strong> : dotation de l'exercice (6811 / 28x) — cf. Module 10.</li><li><strong>Dépréciations</strong> : stocks (39), créances douteuses (491), titres… (681x / 49x) — <strong>sur validation EC</strong>.</li><li><strong>Provisions pour risques et charges</strong> (15x / 681x) : litiges, garanties… — <strong>décision EC</strong>.</li></ul>\n<hr>\n<h2>6. Contrôles de clôture (par cycle)</h2>\n<ul><li><strong>TVA</strong> : comptes 445x cohérents avec les déclarations ; TVA sur FNP/FAE (44586/44587) bien passée.</li><li><strong>Banque</strong> : rapprochements faits, 512 justifié.</li><li><strong>Emprunts</strong> : 164 = capital restant dû (tableau bancaire) ; intérêts courus (1688) si besoin.</li><li><strong>Paie</strong> : 421/431/437 soldés ou justifiés ; congés payés à provisionner (428/438) selon politique.</li><li><strong>Capitaux propres</strong> : résultat N-1 affecté (PV d'AG), 455 justifié.</li><li><strong>Comptes d'attente</strong> : 471/580 = 0.</li></ul>\n<hr>\n<h2>7. Préparation du dossier bilan</h2>\n<p>Documents à réunir :</p>\n<ul><li>Balance définitive + grand livre.</li><li>Feuilles de travail par cycle (Module 11).</li><li>Rapprochements bancaires de clôture.</li><li>Fichier des immobilisations + dotations.</li><li>Détail des FNP/FAE/CCA/PCA + justificatifs.</li><li>Tableau des emprunts (capital restant dû).</li><li>Détail des provisions/dépréciations proposées.</li><li>Liste des questions/éléments à valider par l'EC.</li></ul>\n<h2>8. Documents à demander au client (clôture)</h2>\n<ul><li>Inventaire physique des <strong>stocks</strong> au dernier jour.</li><li>Relevés bancaires de <strong>décembre</strong> + relevé au 31/12.</li><li>Factures de fin d'année non encore transmises.</li><li><strong>Échéanciers d'emprunts</strong>, contrats de crédit-bail.</li><li>Justificatifs des <strong>provisions</strong> (litiges en cours).</li><li>Relevés fournisseurs / clients pour justifier 401/411.</li><li>Détail des <strong>en-cours</strong> (FAE) et acomptes.</li></ul>\n<hr>\n<h2>✅ Checklist de clôture / bilan</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Cut-off réalisé : FNP, FAE, CCA, PCA passées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Stocks constatés (variation)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Amortissements de l'exercice passés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Provisions/dépréciations proposées (validation EC)</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA de clôture contrôlée (FNP/FAE incluses)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Rapprochements bancaires de clôture OK</label></li><li class=\"task\"><label><input type=\"checkbox\"> Emprunts justifiés (164 = capital restant dû)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Paie justifiée (421/431/437)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Capitaux propres : résultat N-1 affecté</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471/580 = 0</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dossier bilan complet pour le chef de mission</label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 13.1 — Cut-off</h2>\n<p>Au 31/12/N :</p>\n<ol><li>Facture d'électricité de décembre reçue le 10/01/N+1 : 300 € HT.</li><li>Assurance 2 400 € payée le 01/10/N pour 12 mois (oct N → sept N+1).</li><li>Prestation réalisée en décembre N, facturée en janvier : 5 000 € HT.</li></ol>\n<p><strong>Travail :</strong> passer les écritures de régularisation.</p>\n<h3>✔️ Correction 13.1</h3>\n<ol><li><strong>FNP</strong> : 60612 D 300 / 44586 D 60 / 408 C 360</li><li><strong>CCA</strong> : la part N+1 = 9 mois (janv→sept) sur 12 = 2 400 × 9/12 = 1 800 → 486 D 1 800 / 616 C 1 800</li><li><strong>FAE</strong> : 418 D 6 000 / 706 C 5 000 / 44587 C 1 000</li></ol>\n<hr>\n<h2>🧪 Cas pratique 13.2 — Variation de stock</h2>\n<p>Stock initial 12 000 €, stock final 15 000 € (marchandises). Passez les écritures et indiquez l'effet sur le résultat.</p>\n<h3>✔️ Correction 13.2</h3>\n<ul><li>Annulation stock initial : 6037 D 12 000 / 37 C 12 000</li><li>Constatation stock final : 37 D 15 000 / 6037 C 15 000</li><li><strong>Variation = +3 000 €</strong> (stock en hausse) → <strong>diminue les charges</strong> (compte 6037 créditeur net de 3 000) → <strong>augmente le résultat</strong> de 3 000 €.</li></ul>\n<hr>\n<h2>📝 Évaluation de fin de module 13</h2>\n<ol><li>Que signifient FNP, FAE, CCA, PCA ?</li><li>Quel principe justifie le cut-off ?</li><li>Écriture d'une CCA ?</li><li>Quels comptes pour la variation de stock marchandises ?</li><li>Citez 4 documents à demander au client pour la clôture.</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) Facture Non Parvenue / Facture À Établir / Charge Constatée d'Avance / Produit Constaté d'Avance. 2) indépendance des exercices. 3) 486 D / 6xx C. 4) 37 et 6037. 5) inventaire stocks, relevés bancaires 12/N, échéanciers d'emprunts, justificatifs de provisions (+ relevés fournisseurs/clients).</p>", "m26": "<h1>MODULE — Spécificités &amp; cas particuliers du cabinet</h1>\n<p><strong>Niveau :</strong> Avancé · <strong>Durée :</strong> 8–10 h · <strong>Prérequis :</strong> Modules 1 à 4</p>\n<blockquote>Sujets « experts » fréquents en cabinet français, souvent sources de redressement. <em>(Aligné sur les documents internes du cabinet.)</em></blockquote>\n<hr>\n<h2>1) 🚗 Fiscalité automobile — VP vs VU</h2>\n<p><strong>La carte grise décide</strong> (case <strong>J.1</strong>) — on ne devine pas, on demande le <strong>certificat d'immatriculation</strong>.</p>\n<div class=\"tbl\"><table><thead><tr><th></th><th><strong>VP</strong> (tourisme — mention <strong>VP</strong>)</th><th><strong>VU</strong> (utilitaire — mention <strong>CTTE</strong>)</th></tr></thead><tbody><tr><td>TVA sur <strong>achat</strong></td><td>❌ <strong>non récupérable</strong></td><td>✅ <strong>100 % récupérable</strong></td></tr><tr><td>TVA <strong>entretien/pneus</strong></td><td>❌ non récupérable</td><td>✅ récupérable</td></tr><tr><td><strong>Amortissement</strong></td><td><strong>plafonné</strong> (limite de déductibilité)</td><td><strong>100 % déductible</strong> (pas de plafond)</td></tr></tbody></table></div>\n<p><strong>Astuce :</strong> banquette arrière ➔ <strong>VP</strong> (pas de TVA) ; camionnette / 2 places société ➔ <strong>VU</strong> (TVA OK).<br><strong>Carburant (TVA déductible) :</strong> gazole <strong>80 % VP / 100 % VU</strong> ; essence alignée sur le gazole. Électricité (recharge) : 100 %.</p>\n<blockquote>Plafonds d'amortissement VP selon le taux de CO₂ (de 9 900 € à 30 000 € — à vérifier chaque année). Voir aussi les <strong>taxes sur l'affectation des véhicules</strong> (ex‑TVS).</blockquote>\n<hr>\n<h2>2) 🧾 La DAS2 (déclaration des honoraires)</h2>\n<p><strong>Déclaration d'information</strong> (pas de paiement) : si la société verse des <strong>honoraires/commissions/courtages</strong> à un tiers (avocat, expert, consultant…), elle doit le déclarer.</p>\n<ul><li>🆕 <strong>Seuil : 2 400 € par an et par bénéficiaire</strong> — <strong>relevé</strong> de 1 200 € à <strong>2 400 €</strong> pour les sommes <strong>versées à partir de 2024</strong> (déclarées en 2025), CGI art. <strong>240/241</strong>. On ne déclare <strong>que ce qui dépasse 2 400 €</strong>.</li><li><strong>Pratique cabinet (révision) :</strong> éditer le <strong>grand livre des comptes 6226 (honoraires)</strong> et <strong>6222 (commissions)</strong> → lister les bénéficiaires <strong>&gt; 2 400 €/an</strong> → vérifier <strong>Nom, SIRET, adresse, montant</strong> → déclarer.</li><li><strong>Quand &amp; comment :</strong> en principe en <strong>mai</strong>, <strong>avec la déclaration de résultats</strong> (la DAS2 y est largement intégrée). <strong>Télédéclaration obligatoire</strong> (EDI/EFI) depuis 2018.</li><li>⚠️ <strong>Sanction (CGI art. 1736)</strong> : amende possible, mais <strong>tolérance</strong> en cas de <strong>1re infraction / bonne foi</strong> si l'omission est <strong>régularisée</strong> (et si le bénéficiaire a bien déclaré les sommes). → rester rigoureux malgré tout.</li></ul>\n<blockquote>Source : <a href=\"https://bofip.impots.gouv.fr/bofip/14327-PGP.html/ACTU-2024-00154\" target=\"_blank\" rel=\"noopener\">BOFIP — relèvement du seuil à 2 400 €</a> · <a href=\"https://entreprendre.service-public.fr/actualites/A18083\" target=\"_blank\" rel=\"noopener\">service‑public — déclaration d'honoraires</a>.</blockquote>\n<div class=\"cerfa\" data-form=\"das2\"></div>\n<hr>\n<h2>3) ☀️ TVA en période de congés payés (acompte)</h2>\n<p>Entreprise fermée un mois l'été → possibilité de <strong>télédéclarer un acompte</strong> au lieu de la déclaration détaillée.</p>\n<ul><li>L'acompte doit être <strong>≥ 80 %</strong> de la somme acquittée le mois précédent <strong>ou</strong> de la somme réellement exigible.</li><li>En cas de <strong>crédit de TVA</strong> le mois précédent : il suffit de <strong>reporter le crédit</strong>.</li><li><strong>Régularisation</strong> au retour des congés (déclaration suivante).</li></ul>\n<hr>\n<h2>4) 💶 Intérêts courus (ICNE) — écriture d'inventaire</h2>\n<p>À la clôture, des <strong>intérêts d'emprunt</strong> courent entre le dernier règlement et la date de clôture mais ne sont pas encore comptabilisés.</p>\n<ul><li><strong>À la clôture :</strong> <strong>661</strong> (charges d'intérêts) <strong>D</strong> / <strong>1688</strong> (intérêts courus) <strong>C</strong>.</li><li><strong>À l'ouverture N+1 :</strong> <strong>extourne</strong> (contrepassation) de l'écriture.</li></ul>\n<blockquote>Même logique pour les <strong>intérêts courus à recevoir</strong> sur placements (au crédit du 76 / débit du 5088).</blockquote>\n<hr>\n<h2>5) 🔻 Créances douteuses &amp; irrécouvrables</h2>\n<ol><li><strong>Client qui ne paie plus</strong> → reclasser <strong>411 → 416</strong> (clients douteux).</li><li><strong>Dépréciation</strong> (sur le <strong>HT</strong>, si recouvrement incertain) : <strong>6817 D / 491 C</strong> <em>(validation EC)</em>.</li><li><strong>Créance définitivement perdue (irrécouvrable)</strong> :</li></ol>\n<ul><li><strong>654</strong> (pertes sur créances) <strong>D</strong> (HT) + <strong>44571</strong> (récupération de la <strong>TVA collectée</strong>) <strong>D</strong> / <strong>416</strong> (ou 411) <strong>C</strong> (TTC) ;</li><li><strong>reprise de la dépréciation</strong> : <strong>491 D / 7817 C</strong>.</li></ul>\n<blockquote>Il faut un <strong>justificatif</strong> (PV de carence, liquidation…) pour récupérer la TVA. Décision <strong>EC</strong>.</blockquote>\n<hr>\n<h2>6) ↔️ Frais &amp; débours (compte 461)</h2>\n<p>La société <strong>avance des frais pour le compte de son client</strong> (ex. frais de greffe) puis les <strong>refacture au centime près</strong>.</p>\n<ul><li>Ce <strong>n'est pas une charge</strong> (pas de TVA déductible) ni du <strong>chiffre d'affaires</strong> (pas de TVA collectée).</li><li><strong>Paiement pour le client :</strong> <strong>461 D / 512 C</strong> (montant <strong>TTC</strong>).</li><li><strong>Refacturation au client :</strong> <strong>411 D / 461 C</strong> (même montant).</li><li>Seule la <strong>prestation réalisée</strong> est du <strong>CA avec TVA</strong> (706 / 44571).</li></ul>\n<hr>\n<h2>7) 🎓 CIFD — Crédit d'Impôt Formation du Dirigeant</h2>\n<ul><li><strong>Calcul :</strong> <strong>nombre d'heures de formation (max 40 h/an) × taux horaire du SMIC</strong> de l'année.</li><li><strong>Condition :</strong> organisme avec <strong>agrément formation</strong> (mention sur la facture).</li><li><strong>Société à l'IS :</strong> écriture <strong>695xx D / 444 C</strong> ; le crédit est <strong>réintégré fiscalement</strong>.</li><li><strong>Société à l'IR :</strong> <strong>pas d'écriture</strong> ; on <strong>indique le montant dans le rapport</strong> (les associés l'imputent sur leur déclaration personnelle).</li></ul>\n<hr>\n<h2>8) 🏭 Comptabilité par secteur (les réflexes)</h2>\n<p><strong>Négoce / commerce de détail :</strong> achats <strong>607</strong>, ventes <strong>707</strong>, <strong>variation de stock 6037</strong> ; saisir le <strong>« Z » de caisse</strong> (récapitulatif journalier) ; surveiller la <strong>marge</strong> et le <strong>taux de TVA</strong> (20 %, 5,5 % alimentaire).<br><strong>Prestations de services :</strong> achats sous‑traitance <strong>604</strong>, ventes <strong>706</strong> ; point critique = <strong>cut‑off / travaux en cours</strong> ; TVA souvent sur <strong>encaissements</strong>.<br><strong>BTP (bâtiment) :</strong> voir §9 (autoliquidation, retenue de garantie, caisse de congés).</p>\n<hr>\n<h2>9) 🏗️ BTP — autoliquidation de la sous‑traitance (point n°1 de redressement)</h2>\n<p>Depuis 2014, <strong>pas de TVA facturée entre le sous‑traitant et le donneur d'ordre</strong> : c'est le <strong>donneur d'ordre qui autoliquide</strong> (CGI <strong>art. 283‑2 nonies</strong>).</p>\n<ul><li><strong>Sous‑traitant (fait le travail)</strong> : facture <strong>HT</strong>, <strong>mention « Autoliquidation de la TVA due par le preneur »</strong> ; compta <strong>704 (travaux)</strong> ; sur la <strong>CA3</strong>, le CA va en <strong>ligne 05</strong> (autres opérations non imposables).</li><li><strong>Donneur d'ordre (entreprise principale)</strong> : reçoit une facture <strong>HT</strong> → <strong>danger</strong> : il ne faut pas « ne rien faire ».</li><li><strong>Écriture :</strong> charge <strong>604/605 D</strong> ; <strong>collecter la TVA 4457 C</strong> <strong>et</strong> la <strong>déduire 44566 D</strong> simultanément.</li><li><em>Ex. sous‑traitant 1 000 € HT :</em> 604 = 1 000 D / 401 = 1 000 C ; 44566 = 200 D / 4457 = 200 C (neutre, mais <strong>obligatoire</strong> sur la CA3).</li><li><strong>Retenue de garantie</strong> (souvent 5 %) : retenue par le client sur les situations de travaux → compte <strong>4117</strong> (clients – retenues de garantie), libérée à la levée des réserves.</li><li><strong>Caisse de congés payés du BTP</strong> : les congés sont gérés par une caisse → cotisations spécifiques (pas de provision congés classique).</li></ul>\n<hr>\n<h2>10) 🩺 BNC (professions libérales) — logique de trésorerie</h2>\n<ul><li><strong>Règle d'or :</strong> « si ce n'est pas sur le relevé bancaire, ça n'existe pas » (<strong>recettes encaissées / dépenses payées</strong>). <em>(Exception : chèque reçu le 28/12 = imposable en N.)</em></li><li><strong>Micro‑BNC</strong> : CA ≤ <strong>83 600 €</strong> (2026) → abattement <strong>34 %</strong>, pas de liasse.</li><li><strong>Déclaration contrôlée (réel)</strong> : liasse <strong>2035</strong> (2035‑A / 2035‑B).</li><li><strong>Plan comptable spécifique</strong> : <strong>compte de l'exploitant 108</strong> (pas de « salaire » du praticien : ses prélèvements passent en 108).</li></ul>\n<hr>\n<h2>✅ Checklist « réflexes cas particuliers »</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Véhicule : carte grise vérifiée (VP→pas de TVA / VU→TVA) ; carburant au bon %</label></li><li class=\"task\"><label><input type=\"checkbox\"> Honoraires &gt; 2 400 €/an/bénéficiaire recensés pour la <strong>DAS2</strong></label></li><li class=\"task\"><label><input type=\"checkbox\"> BTP : <strong>autoliquidation</strong> sous‑traitance déclarée (donneur d'ordre)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Clôture : <strong>intérêts courus</strong> (661/1688) passés et extournés à l'ouverture</label></li><li class=\"task\"><label><input type=\"checkbox\"> Créances : douteux (416) + dépréciation, irrécouvrables (654 + TVA) avec justificatif</label></li><li class=\"task\"><label><input type=\"checkbox\"> Débours refacturés en <strong>461</strong> (ni charge, ni CA)</label></li><li class=\"task\"><label><input type=\"checkbox\"> <strong>CIFD</strong> calculé si formation dirigeant (max 40 h × SMIC)</label></li></ul>\n<hr>\n<h2>📝 Évaluation</h2>\n<ol><li>Comment savoir si un véhicule est VP ou VU ? TVA sur l'achat d'un VP ?</li><li>Seuil et comptes de la DAS2 ?</li><li>Écriture des intérêts courus à la clôture ?</li><li>Écriture d'une créance irrécouvrable ?</li><li>BTP : que fait le <strong>donneur d'ordre</strong> en recevant une facture de sous‑traitant ?</li></ol>\n<p><strong>Seuil : 7/10.</strong> <strong>Corrigé :</strong> 1) <strong>carte grise case J.1</strong> (VP/CTTE) ; VP = TVA <strong>non récupérable</strong>. 2) <strong>2 400 €/an/bénéficiaire</strong> (depuis 2024) ; comptes <strong>6226/6222</strong>. 3) <strong>661 D / 1688 C</strong> (extourné à l'ouverture). 4) <strong>654 (HT) + 44571 (TVA) D / 411‑416 (TTC) C</strong> + reprise dépréciation. 5) charge <strong>604/605</strong> + <strong>collecter (4457) ET déduire (44566)</strong> la TVA (autoliquidation).</p>", "m27": "<h1>MODULE — Spécificités comptables &amp; fiscales <strong>par activité</strong></h1>\n<p><strong>Niveau :</strong> Avancé · <strong>Durée :</strong> 8–10 h · <strong>Prérequis :</strong> Modules 1 à 4</p>\n<blockquote>Chaque <strong>activité / forme juridique</strong> a ses réflexes. <strong>Avant de saisir</strong>, on identifie : forme (Kbis/statuts), <strong>régime fiscal</strong> (IR/IS), <strong>régime TVA</strong>, et secteur. <em>(Paramètres chiffrés : voir la page « Paramètres fiscaux » — référence à jour.)</em></blockquote>\n<p><strong>Réflexe n°1 :</strong> demander <strong>statuts + Kbis + dernière liasse</strong> → on connaît la forme, l'objet, le régime fiscal et TVA.</p>\n<hr>\n<h2>1) 🩺 BNC — professions libérales (déjà vu, rappel express)</h2>\n<ul><li><strong>Logique de trésorerie</strong> : recettes <strong>encaissées</strong> / dépenses <strong>payées</strong> <em>(exception : chèque reçu au 31/12 = imposable en N)</em>.</li><li><strong>Régimes :</strong> Micro‑BNC (abattement <strong>34 %</strong>) <strong>ou</strong> Déclaration contrôlée → liasse <strong>2035</strong> (2035‑A/B).</li><li><strong>Comptes :</strong> compte de l'exploitant <strong>108</strong> (pas de « salaire » du praticien).</li><li>Détails complets dans la leçon <strong>« Spécificités &amp; cas particuliers » §10</strong>.</li></ul>\n<hr>\n<h2>2) 🛋️ LMNP — Loueur en Meublé Non Professionnel</h2>\n<p><strong>Logique :</strong> louer un logement <strong>meublé</strong> = activité <strong>commerciale</strong> → <strong>BIC</strong> (et <strong>non</strong> revenus fonciers).<br><strong>Non professionnel si</strong> : recettes annuelles <strong>≤ 23 000 €</strong> <strong>OU</strong> ≤ aux autres revenus d'activité du foyer.</p>\n<div class=\"tbl\"><table><thead><tr><th>Régime</th><th>Quand</th><th>Effet</th></tr></thead><tbody><tr><td><strong>Micro‑BIC</strong></td><td>sous les seuils</td><td>abattement forfaitaire (meublé classique <strong>50 %</strong>, tourisme non classé réduit)</td></tr><tr><td><strong>Réel</strong></td><td>au‑delà / sur option</td><td><strong>amortissement du bien</strong> déductible → résultat souvent ≈ 0</td></tr></tbody></table></div>\n<p><strong>Le gros avantage du réel = l'amortissement</strong> (par <strong>composants</strong>, hors <strong>terrain</strong> non amortissable) <strong>+ mobilier</strong> (5–10 ans) → réduit fortement le résultat. ⚠️ L'amortissement <strong>ne peut pas créer de déficit</strong> : l'excédent est <strong>reporté</strong> (amortissements réputés différés, sans limite de durée).<br><strong>TVA :</strong> location meublée d'habitation <strong>exonérée</strong> (art. 261 D CGI) → pas de TVA, <strong>sauf para‑hôtellerie</strong> (≥ 3 services type hôtel).<br><strong>Écriture type :</strong> loyer 700 € encaissé → <strong>512 D / 706 (ou 7083) C</strong> ; dotation : <strong>6811 D / 2813‑2815 C</strong>.</p>\n<blockquote>⚠️ <strong>Nouveauté (LF 2025) :</strong> pour le LMNP au réel, les <strong>amortissements déduits sont réintégrés</strong> dans le calcul de la <strong>plus‑value</strong> à la revente → vigilance sur la sortie.</blockquote>\n<hr>\n<h2>3) 🏨 LMP — Loueur en Meublé Professionnel</h2>\n<p><strong>Professionnel si</strong> : recettes <strong>&gt; 23 000 €</strong> <strong>ET</strong> &gt; aux autres revenus d'activité du foyer.</p>\n<ul><li><strong>Déficits imputables sur le revenu global</strong> (sans limite) → avantage majeur.</li><li><strong>Plus‑values professionnelles</strong> (court/long terme), <strong>exonération art. 151 septies</strong> possible (activité ≥ 5 ans, recettes sous seuils).</li><li><strong>Cotisations sociales</strong> (SSI) au lieu des prélèvements sociaux.</li><li><strong>IFI :</strong> biens <strong>exonérés</strong> (considérés professionnels) si conditions réunies.</li></ul>\n<blockquote>Le <strong>basculement LMNP↔LMP</strong> se vérifie <strong>chaque année</strong> (les seuils se comparent au foyer fiscal).</blockquote>\n<hr>\n<h2>4) 🏛️ SCI — Société Civile Immobilière</h2>\n<p><strong>Objet civil</strong> (gérer/louer de l'immobilier). <strong>Deux fiscalités très différentes :</strong></p>\n<div class=\"cerfa\" data-form=\"2072\"></div>\n<p><strong>A. SCI à l'IR (par défaut — « semi‑transparente »)</strong></p>\n<ul><li>Le résultat est imposé <strong>chez les associés</strong> (location nue = <strong>revenus fonciers</strong>).</li><li><strong>Déclarations :</strong> la SCI dépose la <strong>2072</strong>, chaque associé reporte sa quote‑part sur sa <strong>2044</strong>.</li><li><strong>Pas d'amortissement</strong> de l'immeuble.</li><li><strong>Comptes :</strong> loyers <strong>752/706</strong>, charges <strong>614</strong>, intérêts d'emprunt <strong>661</strong>, <strong>comptes courants d'associés 455</strong>.</li></ul>\n<p><strong>B. SCI à l'IS (sur option, irrévocable)</strong></p>\n<ul><li><strong>Amortissement de l'immeuble déductible</strong> (6811/2813) → résultat fiscal réduit.</li><li>⚠️ Mais à la revente : <strong>plus‑value professionnelle</strong> (réintégration des amortissements) → addition salée.</li></ul>\n<p><strong>TVA :</strong> location <strong>nue d'habitation exonérée</strong> ; <strong>locaux professionnels</strong> → <strong>option TVA</strong> possible (récupération de la TVA sur travaux).<br><strong>Écriture (IR) :</strong> loyer nu 1 000 € → <strong>512 D / 752 C</strong> ; intérêts d'emprunt <strong>661</strong> ; <strong>pas</strong> de dotation.</p>\n<hr>\n<h2>5) 🤝 SNC — Société en Nom Collectif</h2>\n<ul><li><strong>Société de personnes commerciale</strong> : les associés ont la <strong>qualité de commerçant</strong> et sont <strong>responsables indéfiniment et solidairement</strong> des dettes.</li><li><strong>IR par défaut</strong> : chaque associé est imposé sur sa <strong>quote‑part de bénéfice</strong> (catégorie <strong>BIC</strong>) <strong>même si rien n'est distribué</strong>. <strong>Option IS</strong> possible (irrévocable).</li><li><strong>Rémunération des associés</strong> : <strong>non déductible</strong> si la SNC est à l'IR (réintégrée — imposée comme du bénéfice).</li><li><strong>Comptes :</strong> comptabilité commerciale classique + <strong>comptes courants d'associés 455</strong>.</li></ul>\n<hr>\n<h2>6) 🧹 SAP — Services À la Personne</h2>\n<p><strong>Activités :</strong> ménage, garde d'enfants, soutien scolaire, aide aux personnes âgées/handicapées, jardinage, petit bricolage…</p>\n<ul><li><strong>Déclaration/agrément SAP</strong> (DREETS) → permet au <strong>client particulier</strong> un <strong>crédit d'impôt de 50 %</strong>.</li><li><strong>Obligation :</strong> délivrer chaque année une <strong>attestation fiscale</strong> au client (pour son crédit d'impôt).</li><li><strong>TVA (taux selon prestation) :</strong> <strong>5,5 %</strong> (aide aux personnes âgées/handicapées, garde d'enfants), <strong>10 %</strong> (jardinage, cours, petits travaux), sinon <strong>20 %</strong> ; certaines structures <strong>exonérées</strong>.</li><li><strong>Comptes :</strong> ventes <strong>706</strong>, à <strong>ventiler par taux de TVA</strong> (44571 par taux).</li></ul>\n<p><strong>Exemple :</strong> ménage <strong>100 € TTC</strong> (TVA 5,5 %) → après <strong>crédit d'impôt 50 %</strong>, coût réel client ≈ <strong>50 €</strong> ➜ argument commercial fort.</p>\n<hr>\n<h2>7) 🚬 TABAC — débitant (buraliste)</h2>\n<p>Le buraliste est <strong>préposé de l'administration</strong> pour la vente de tabac (monopole).</p>\n<ul><li><strong>Ventes de tabac : EXONÉRÉES de TVA</strong> — le débitant <strong>n'est pas redevable</strong> de la TVA sur les tabacs. Il est rémunéré par une <strong>remise (commission)</strong> sur le prix de vente : <strong>cette remise n'est pas soumise à TVA</strong>.</li><li>La <strong>remise tabac</strong> (et le CA tabac) <strong>n'entre pas</strong> dans le <strong>coefficient de déduction</strong> de TVA.</li><li><strong>Timbres fiscaux, timbres‑poste, amendes, jeux (FDJ/PMU) :</strong> la <strong>valeur faciale n'est pas un produit</strong> → <strong>compte de tiers</strong> (l'argent est reversé) ; seule la <strong>commission</strong> perçue est un <strong>produit</strong>.</li><li><strong>Activités annexes (bar, presse, loto, etc.) :</strong> <strong>TVA normale</strong> → il faut <strong>sectoriser</strong> (activités <strong>exonérées</strong> tabac + activités <strong>taxables</strong> bar/presse) et appliquer un <strong>prorata / coefficient de déduction</strong> sur la TVA déductible commune.</li><li><strong>Crédit d'impôt débitants de tabac</strong> : aide à la modernisation/transformation du commerce.</li></ul>\n<p><strong>Réflexe compta cabinet :</strong> journal de caisse séparant <strong>tabac (exonéré)</strong> / <strong>bar‑presse (taxable)</strong> ; produit tabac = <strong>remise nette</strong> ; valeurs (timbres, jeux) en <strong>comptes de tiers</strong>.</p>\n<blockquote>Sources officielles : <a href=\"https://bofip.impots.gouv.fr/bofip/10304-PGP.html/identifiant=BOI-TVA-BASE-10-20-70-20151104\" target=\"_blank\" rel=\"noopener\">BOFIP — tabacs manufacturés</a> · <a href=\"https://bofip.impots.gouv.fr/bofip/4584-PGP.html/identifiant=BOI-BIC-RICI-10-80-20120912\" target=\"_blank\" rel=\"noopener\">BOFIP — crédit d'impôt débitants de tabac</a> · <a href=\"https://www.impots.gouv.fr/sites/default/files/formulaires/2840-sd/2021/2840-sd_3397.pdf\" target=\"_blank\" rel=\"noopener\">Notice débitants — timbres fiscaux (impots.gouv)</a>.</blockquote>\n<hr>\n<h2>8) 🧑‍💻 Auto‑entrepreneur / micro‑entreprise</h2>\n<p><strong>Logique :</strong> régime <strong>ultra‑simplifié</strong>. Pas de bilan, pas de liasse → <strong>livre des recettes</strong> (+ registre des achats si vente).</p>\n<ul><li><strong>Fiscal :</strong> micro‑BIC ou micro‑BNC (abattements <strong>71 / 50 / 34 %</strong>). <strong>Versement libératoire</strong> de l'IR possible (sur option, sous condition de revenu).</li><li><strong>TVA :</strong> <strong>franchise en base</strong> tant que sous les seuils (<strong>85 000 / 37 500 €</strong>) → facture <strong>« TVA non applicable, art. 293 B du CGI »</strong>. Au‑delà → TVA puis bascule au réel.</li><li><strong>Social :</strong> cotisations URSSAF = <strong>% du CA encaissé</strong> (déclaration mensuelle/trimestrielle).</li><li><strong>Rôle cabinet :</strong> accompagnement léger, <strong>surveiller les seuils</strong> (micro <strong>203 100 / 83 600 €</strong>) et le <strong>franchissement TVA</strong>, conseiller le passage en société quand ça grossit.</li></ul>\n<blockquote>⚠️ Pas de charges déductibles au réel : si le micro a <strong>beaucoup de frais</strong>, le réel/société est souvent plus avantageux → <strong>alerter le client</strong>.</blockquote>\n<hr>\n<h2>9) 🤝 Association loi 1901 (but non lucratif)</h2>\n<ul><li><strong>Principe :</strong> <strong>gestion désintéressée</strong> → en principe <strong>exonérée</strong> d'IS, de TVA et de CET, <strong>sauf activités lucratives</strong> (règle des <strong>« 4 P »</strong> : Produit, Public, Prix, Publicité ; <strong>franchise</strong> des activités lucratives accessoires <strong>~ 80 000 €</strong>).</li><li>Si lucratif → <strong>sectorisation</strong> (ou filialisation) et imposition de ce secteur ; <strong>IS à taux réduits</strong> (24/15/10 %) sur les <strong>revenus patrimoniaux</strong>.</li><li><strong>Plan comptable associatif (règlement ANC 2018‑06) :</strong> <strong>102 fonds propres</strong> sans droit de reprise · <strong>106 réserves</strong> · <strong>120/129</strong> résultat · <strong>subventions 74</strong> · <strong>fonds dédiés 19/689‑789</strong> (ressources affectées non utilisées) · <strong>contributions volontaires en nature (classes 86/87)</strong> : bénévolat, dons en nature.</li><li><strong>Documents :</strong> statuts + <strong>récépissé de préfecture</strong>, <strong>PV d'AG</strong>, <strong>conventions de subvention</strong>.</li><li><strong>Obligations :</strong> subventions publiques <strong>&gt; 153 000 €</strong> → <strong>commissaire aux comptes</strong> + publication des comptes.</li></ul>\n<blockquote><strong>Réflexe :</strong> distinguer <strong>subvention de fonctionnement</strong> (74, produit) et <strong>subvention d'investissement</strong> (131, reprise au rythme de l'amortissement) ; gérer les <strong>fonds dédiés</strong> (report des sommes non consommées).</blockquote>\n<hr>\n<h2>10) 🌾 Exploitant agricole (BA — Bénéfices Agricoles)</h2>\n<ul><li><strong>Catégorie : BA.</strong> Régimes : <strong>micro‑BA</strong> (abattement <strong>87 %</strong>, bénéfice = moyenne <strong>triennale</strong> des recettes) <strong>ou réel</strong> (simplifié / normal).</li></ul>\n<div class=\"cerfa\" data-form=\"2139\"></div>\n<ul><li><strong>Spécificités :</strong> <strong>stocks vivants</strong> (animaux, récoltes) avec <strong>valorisation particulière</strong> ; <strong>aides PAC</strong> = <strong>subventions d'exploitation (74)</strong> ; <strong>DPI/DPA</strong> (déductions pour investissement / pour aléas) ; <strong>étalement</strong> des revenus exceptionnels ; <strong>moyenne triennale</strong> possible.</li><li><strong>TVA agricole :</strong> <strong>remboursement forfaitaire</strong> (non assujettis) <strong>ou</strong> régime simplifié agricole (<strong>RSA</strong>) → déclaration annuelle <strong>CA12A</strong> (acomptes trimestriels).</li><li><strong>Social :</strong> <strong>MSA</strong> (Mutualité Sociale Agricole), pas l'URSSAF.</li><li><strong>Comptes :</strong> achats d'approvisionnements (semences, aliments) ; immobilisations <strong>vivantes</strong> (animaux reproducteurs) ; matériel agricole.</li></ul>\n<blockquote><strong>Réflexe :</strong> ne pas oublier l'<strong>inventaire des stocks vivants</strong> et le <strong>rattachement des aides PAC</strong> au bon exercice.</blockquote>\n<hr>\n<h2>11) 💊 Pharmacie d'officine</h2>\n<ul><li><strong>Commerce de détail réglementé</strong> → <strong>multi‑taux de TVA</strong>, point n°1 :</li><li><strong>2,1 %</strong> médicaments <strong>remboursables</strong> · <strong>10 %</strong> médicaments <strong>non remboursables</strong> · <strong>20 %</strong> parapharmacie/cosmétique. <strong>La ventilation par taux est cruciale</strong> (logiciel métier LGPI/Winpharma → export en compta).</li><li><strong>Tiers payant :</strong> créances sur <strong>CPAM / mutuelles</strong> (comptes <strong>411 dédiés</strong> ou <strong>467</strong>) ; <strong>rapprocher les télétransmissions (FSE/Noémie)</strong> avec les virements reçus → suivre les <strong>rejets</strong>.</li><li><strong>Marge réglementée</strong> (MDL) sur les médicaments ; <strong>stocks importants</strong> (inventaire et péremptions).</li><li><strong>Structure :</strong> souvent en <strong>SEL</strong> (société d'exercice libéral) ou SNC de pharmaciens ; vigilance sur l'<strong>acquisition du fonds/officine</strong> (emprunt + amortissement).</li></ul>\n<blockquote><strong>Réflexe :</strong> contrôler le <strong>cadrage TVA par taux</strong> (2,1 / 10 / 20) et le <strong>lettrage des organismes</strong> (tiers payant).</blockquote>\n<p><em>(Professions médicales — médecins, infirmiers, kinés… → relèvent des <strong>BNC</strong> : voir §1 et la leçon « Spécificités &amp; cas particuliers ».)</em></p>\n<hr>\n<h2>📊 Tableau récapitulatif</h2>\n<div class=\"tbl\"><table><thead><tr><th>Activité</th><th>Catégorie</th><th>TVA</th><th>Réflexe clé</th></tr></thead><tbody><tr><td><strong>BNC</strong></td><td>BNC (2035)</td><td>selon seuils</td><td>trésorerie · compte 108</td></tr><tr><td><strong>LMNP</strong></td><td>BIC</td><td>exonérée</td><td>amortir au réel (résultat ≈ 0)</td></tr><tr><td><strong>LMP</strong></td><td>BIC pro</td><td>exonérée</td><td>déficit imputable · social SSI</td></tr><tr><td><strong>SCI IR</strong></td><td>revenus fonciers</td><td>exonérée (nu)</td><td>2072 → 2044 · pas d'amort.</td></tr><tr><td><strong>SCI IS</strong></td><td>IS</td><td>option locaux pro</td><td>amort. mais PV pro à la revente</td></tr><tr><td><strong>SNC</strong></td><td>BIC (IR défaut)</td><td>normale</td><td>associés = commerçants · rémunération non déductible (IR)</td></tr><tr><td><strong>SAP</strong></td><td>BIC/services</td><td>5,5 / 10 / 20 %</td><td>attestation fiscale · crédit d'impôt 50 % client</td></tr><tr><td><strong>TABAC</strong></td><td>BIC</td><td>tabac <strong>exonéré</strong></td><td>remise nette · sectoriser · prorata TVA</td></tr><tr><td><strong>Auto‑entrepreneur</strong></td><td>micro BIC/BNC</td><td>franchise (293 B)</td><td>livre de recettes · surveiller seuils</td></tr><tr><td><strong>Association 1901</strong></td><td>non lucratif</td><td>exonérée (sauf lucratif)</td><td>gestion désintéressée · fonds dédiés · ANC 2018‑06</td></tr><tr><td><strong>Agricole (BA)</strong></td><td>BA</td><td>RSA / forfait · CA12A</td><td>stocks vivants · aides PAC · MSA</td></tr><tr><td><strong>Pharmacie</strong></td><td>BIC</td><td><strong>2,1 / 10 / 20 %</strong></td><td>ventilation taux · tiers payant (CPAM/mutuelles)</td></tr></tbody></table></div>\n<hr>\n<h2>✅ Checklist « nouveau dossier — quelle activité ? »</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Forme &amp; objet (statuts/Kbis) · régime <strong>IR/IS</strong> · régime <strong>TVA</strong></label></li><li class=\"task\"><label><input type=\"checkbox\"> Location meublée → <strong>LMNP/LMP</strong> (seuil 23 000 € + comparaison foyer)</label></li><li class=\"task\"><label><input type=\"checkbox\"> SCI → <strong>IR ou IS ?</strong> (impact amortissement / plus‑value)</label></li><li class=\"task\"><label><input type=\"checkbox\"> SNC → associés <strong>commerçants</strong>, rémunération <strong>réintégrée</strong> (IR)</label></li><li class=\"task\"><label><input type=\"checkbox\"> SAP → <strong>taux de TVA</strong> correct + <strong>attestation</strong> annuelle</label></li><li class=\"task\"><label><input type=\"checkbox\"> Tabac → <strong>sectorisation</strong> exonéré/taxable + <strong>prorata</strong></label></li></ul>\n<hr>\n<h2>📝 Évaluation</h2>\n<ol><li>LMNP au réel : quel est le principal avantage fiscal ?</li><li>À partir de quels critères passe‑t‑on de LMNP à LMP ?</li><li>SCI à l'IR : quelle déclaration dépose la société, et où les associés reportent‑ils ?</li><li>Tabac : la vente de tabac est‑elle soumise à TVA ? Comment le débitant est‑il rémunéré ?</li><li>SAP : quel document faut‑il remettre au client chaque année et pourquoi ?</li></ol>\n<p><strong>Seuil : 7/10.</strong> <strong>Corrigé :</strong> 1) <strong>amortissement</strong> du bien (résultat ≈ 0). 2) recettes <strong>&gt; 23 000 € ET &gt;</strong> autres revenus d'activité du foyer. 3) la SCI dépose <strong>2072</strong> ; associés reportent sur <strong>2044</strong> (revenus fonciers). 4) <strong>non</strong> (exonérée) ; via une <strong>remise/commission</strong> non soumise à TVA. 5) une <strong>attestation fiscale</strong> → pour son <strong>crédit d'impôt de 50 %</strong>.</p>", "m29": "<h1>MODULE — Dossier BÂTIMENT (BTP) : fiscal, comptable &amp; saisie des factures</h1>\n<p><strong>Niveau :</strong> Avancé · <strong>Durée :</strong> 8–10 h · <strong>Prérequis :</strong> Modules 1 à 4 + leçon « Spécificités &amp; cas particuliers »</p>\n<blockquote>Le BTP est le <strong>secteur n°1 de redressement</strong> : TVA à taux multiples, <strong>autoliquidation</strong>, <strong>retenue de garantie</strong>, <strong>situations de travaux</strong>. Cette leçon couvre <strong>tout</strong> : aspects fiscaux, traitement comptable et <strong>saisie des factures pas à pas</strong>.</blockquote>\n<p><strong>Dossier permanent BTP à réunir :</strong> contrats de <strong>sous‑traitance</strong> (+ DC4), <strong>cautions</strong> (retenue de garantie), <strong>attestation d'assurance décennale</strong>, devis (avec mention TVA), <strong>situations</strong>, <strong>DGD</strong> (décompte général définitif), <strong>PV de réception</strong>.</p>\n<hr>\n<h2>1) 🧱 Les comptes du BTP (à connaître par cœur)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Usage</th></tr></thead><tbody><tr><td><strong>604</strong></td><td>Sous‑traitance (achats d'études et de travaux)</td></tr><tr><td>605 / 6063</td><td>Achats de matériel &amp; équipements / fournitures de chantier</td></tr><tr><td>6135</td><td>Locations (échafaudage, engins)</td></tr><tr><td><strong>704</strong></td><td>Travaux (ventes du BTP)</td></tr><tr><td><strong>4117</strong></td><td>Clients — <strong>retenues de garantie</strong> (à recevoir)</td></tr><tr><td><strong>4047</strong></td><td>Fournisseurs — retenues de garantie (sur sous‑traitants)</td></tr><tr><td>4181</td><td>Clients — factures à établir (situations non émises)</td></tr><tr><td><strong>4191</strong></td><td>Clients — acomptes / avances reçus</td></tr><tr><td>33/34 · 7133</td><td>Travaux en cours · variation</td></tr><tr><td>44571 / 44566</td><td>TVA collectée / déductible (par taux 20·10·5,5)</td></tr><tr><td><strong>4452 / 4457</strong></td><td>TVA due intracom / <strong>autoliquidation</strong> sous‑traitance</td></tr></tbody></table></div>\n<hr>\n<h2>2) 💶 La TVA dans le BTP (le cœur)</h2>\n<h3>a) Le bon taux selon le chantier</h3>\n<div class=\"tbl\"><table><thead><tr><th>Taux</th><th>Travaux concernés</th></tr></thead><tbody><tr><td><strong>20 %</strong></td><td>Construction <strong>neuve</strong> / reconstruction · locaux <strong>professionnels</strong> · gros équipements</td></tr><tr><td><strong>10 %</strong></td><td><strong>Amélioration, transformation, aménagement, entretien</strong> de <strong>logements achevés depuis + de 2 ans</strong></td></tr><tr><td><strong>5,5 %</strong></td><td><strong>Rénovation énergétique</strong> (isolation, chauffage performant…) de logements de + de 2 ans</td></tr></tbody></table></div>\n<blockquote>🆕 <strong>Depuis le 1er mars 2025</strong> : plus d'attestation 1300‑SD/1301‑SD. Une <strong>simple mention</strong> sur le <strong>devis ou la facture</strong>, par laquelle le client <strong>certifie</strong> que les conditions du taux réduit sont remplies, suffit. (Conserver les justificatifs.)<br>Sources : <a href=\"https://www.impots.gouv.fr/professionnel/questions/quel-taux-de-tva-appliquer-pour-les-travaux-realises-dans-les-logements\" target=\"_blank\" rel=\"noopener\">impots.gouv — taux TVA travaux</a> · <a href=\"https://www.service-public.fr/particuliers/actualites/A18088\" target=\"_blank\" rel=\"noopener\">service‑public — la mention remplace l'attestation (2025)</a>.</blockquote>\n<h3>b) Autoliquidation de la sous‑traitance (CGI art. 283‑2 nonies)</h3>\n<p><strong>Entre sous‑traitant et donneur d'ordre, PAS de TVA sur la facture.</strong> C'est le <strong>donneur d'ordre</strong> qui autoliquide.</p>\n<ul><li><strong>Sous‑traitant</strong> : facture <strong>HT</strong>, mention <em>« Autoliquidation de la TVA due par le preneur »</em> ; compte <strong>704</strong>.</li><li><strong>Donneur d'ordre</strong> : charge <s
