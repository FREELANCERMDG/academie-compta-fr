tr><tr><td>645 Charges patronales</td><td>3 400</td><td></td></tr><tr><td>421 Net à payer</td><td></td><td>6 200</td></tr><tr><td>431 URSSAF</td><td></td><td>3 800</td></tr><tr><td>437 Autres organismes</td><td></td><td>1 400</td></tr></tbody></table></div>\n<p>Contrôle : D 11 400 = C 11 400 ✔️ ; cotisations 1 800 + 3 400 = 5 200 = 3 800 + 1 400 ✔️.<br>Paiements : 421 D 6 200 / 512 C 6 200 ; 431 D 3 800 + 437 D 1 400 / 512 C 5 200.</p>\n<hr>\n<h2>CAS 9 — Immobilisation avec amortissement</h2>\n<p><strong>Énoncé :</strong> Achat machine le <strong>01/07/2026</strong> : 6 000 € HT, TVA 20 %, durée 5 ans, clôture 31/12/2026.</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<ul><li>Achat : 2154 D 6 000 / 44562 D 1 200 / 404 C 7 200</li><li>Dotation annuelle pleine : 6 000 / 5 = 1 200 €/an</li><li>Prorata 2026 (6 mois) : 1 200 × 6/12 = <strong>600 €</strong></li><li>Dotation 31/12/2026 : 6811 D 600 / 28154 C 600</li><li>VNC au 31/12/2026 = 6 000 − 600 = <strong>5 400 €</strong></li></ul>\n<hr>\n<h2>CAS 10 — Préparation d'un dossier bilan simple</h2>\n<p><strong>Énoncé :</strong> Au 31/12/2026, à régulariser : (a) facture EDF de décembre non reçue, 500 € HT ; (b) assurance 1 200 € payée le 01/07/2026 pour 12 mois ; (c) prestation de décembre facturée en janvier, 4 000 € HT ; (d) dotation amortissement annuelle 600 € (cas 9) ; (e) 471 = 0, banque rapprochée.</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<ul><li>(a) <strong>FNP</strong> : 60612 D 500 / 44586 D 100 / 408 C 600</li><li>(b) <strong>CCA</strong> : part 2027 = 6 mois = 1 200 × 6/12 = 600 → 486 D 600 / 616 C 600</li><li>(c) <strong>FAE</strong> : 418 D 4 800 / 706 C 4 000 / 44587 C 800</li><li>(d) Amortissement : 6811 D 600 / 28154 C 600</li><li>(e) Contrôles finaux : 471 = 0 ✔️, 512 justifié ✔️, lettrage fait, comptes anormaux vérifiés.</li></ul>\n<p><strong>Dossier bilan à transmettre :</strong> balance révisée + feuilles de travail + rapprochements + fichier immo + détail FNP/FAE/CCA + points en suspens → <strong>validation chef de mission / expert-comptable</strong>.</p>\n<hr>\n<h2>🎓 Bonus — Cas transversal « dossier mensuel complet »</h2>\n<p><strong>Énoncé :</strong> Boucler le mois de mars d'un dossier TPE (services, réel normal, à l'encaissement). Pièces : 15 factures d'achats, 8 factures de ventes, relevé bancaire, 1 prélèvement sans facture.</p>\n<p><strong>Démarche attendue (procédure cabinet) :</strong></p>\n<ol><li>Vérifier régime (services, encaissements) dans le dossier permanent.</li><li>Saisir achats (bon compte + TVA), ventes.</li><li>Saisir/rapprocher la banque ; prélèvement sans facture → 471 + relance.</li><li>Lettrer 401/411.</li><li>Apurer 471 (ce qui peut l'être).</li><li>Préparer la <strong>CA3</strong> sur les <strong>encaissements</strong> (TVA collectée = factures payées).</li><li>Passer la checklist qualité (Module 17).</li><li>Livrer avec mail « dossier terminé » + brouillon CA3 à valider (Module 15).</li></ol>", "eval": "<h1>MODULE 19 — Évaluation finale certifiante</h1>\n<p><strong>Durée conseillée :</strong> 3 h · <strong>Total : 100 points</strong> · <strong>Niveau opérationnel requis : voir grille en fin de document.</strong></p>\n<blockquote>À réaliser sans aide. Chaque partie reproduit une tâche réelle de cabinet.</blockquote>\n<hr>\n<h2>PARTIE 1 — QCM (20 points · 1 pt/question)</h2>\n<ol><li>La TVA à décaisser = a) collectée + déductible b) <strong>collectée − déductible</strong> c) déductible − collectée</li><li>Le compte 401 enregistre : a) les clients b) <strong>les fournisseurs</strong> c) la banque</li><li>Une caisse 53 peut-elle être créditrice ? a) oui b) <strong>non</strong></li><li>Le seuil de franchise en base <strong>services</strong> 2026 : a) 85 000 € b) <strong>37 500 €</strong> c) 25 000 €</li><li>La TVA sur une assurance est : a) 20 % b) 10 % c) <strong>non déductible</strong></li><li>Les prestations de services sont taxables par défaut : a) sur les débits b) <strong>sur les encaissements</strong></li><li>Le compte de virements internes est le : a) 471 b) <strong>580</strong> c) 467</li><li>Taux normal d'IS 2026 : a) 15 % b) 28 % c) <strong>25 %</strong></li><li>Le taux réduit d'IS de 15 % s'applique sur les premiers : a) 38 120 € b) <strong>42 500 €</strong> c) 50 000 €</li><li>La dotation aux amortissements se passe au débit du : a) 28 b) <strong>6811</strong> c) 215</li><li>Une FNP concerne : a) un produit d'avance b) <strong>une charge de N facturée en N+1</strong> c) une charge d'avance</li><li>Le 471 au bilan doit être : a) débiteur b) créditeur c) <strong>nul</strong></li><li>Le lettrage sert à : a) calculer la TVA b) <strong>rapprocher factures et règlements</strong> c) amortir</li><li>Acomptes IS : a) 15/01-04-07-10 b) <strong>15/03-06-09-12</strong> c) 15/02-05-08-11</li><li>Un 411 créditeur signifie : a) le client doit b) <strong>le client a trop payé</strong> c) erreur impossible</li><li>PMSS 2026 : a) 3 864 € b) <strong>4 005 €</strong> c) 3 666 €</li><li>La TVA sur achat de véhicule de tourisme : a) déductible b) <strong>non déductible</strong></li><li>La CA12 concerne le régime : a) réel normal b) <strong>réel simplifié</strong></li><li>L'autoliquidation est : a) une exonération b) <strong>neutre mais à déclarer (collecte + déduction)</strong></li><li>Qui signe la liasse fiscale ? a) le collaborateur b) le chef de mission c) <strong>l'expert-comptable</strong></li></ol>\n<hr>\n<h2>PARTIE 2 — Écritures comptables (20 points · 4 pts/écriture)</h2>\n<p>Passez les écritures (TVA 20 % sauf mention) :</p>\n<ol><li>Facture d'achat marchandises 3 600 € TTC.</li><li>Facture de vente prestation 6 000 € HT.</li><li>Achat d'un ordinateur (immo) 1 500 € HT.</li><li>Échéance d'emprunt 1 200 € (capital 1 000, intérêts 200).</li><li>Frais bancaires 35 € (sans TVA).</li></ol>\n<hr>\n<h2>PARTIE 3 — Préparation TVA (15 points)</h2>\n<p>Mois (réel normal, débits) : ventes 120 000 € HT ; achats 70 000 € HT ; frais généraux 8 000 € HT ; immo 5 000 € HT ; crédit TVA antérieur 1 000 €.<br><strong>a)</strong> Calculez la TVA à payer. <strong>b)</strong> Passez l'écriture de la déclaration.</p>\n<hr>\n<h2>PARTIE 4 — Rapprochement bancaire (15 points)</h2>\n<p>Solde comptable 512 = 9 000 D. Solde relevé = 9 280.<br>Éléments : frais bancaires 80 € non saisis ; chèque émis 600 € non débité ; encaissement client 400 € non encore crédité.<br><strong>a)</strong> Saisissez ce qui manque. <strong>b)</strong> Dressez l'état de rapprochement et concluez.</p>\n<hr>\n<h2>PARTIE 5 — Lettrage (10 points)</h2>\n<p>Compte 401 BERNARD : F1 2 000 (C), F2 900 (C), Avoir 200 (D), règlement 2 700 (D).<br><strong>a)</strong> Lettrez. <strong>b)</strong> Indiquez le solde restant.</p>\n<hr>\n<h2>PARTIE 6 — Analyse d'anomalies (10 points)</h2>\n<p>Sur un dossier livré, vous observez : 471 = 2 100 D ; TVA déduite sur une facture d'assurance ; 53 = −60 ; 455 débiteur de 5 000 € (SARL) ; un 411 créditeur de 350 € non commenté.<br>Listez chaque anomalie et l'action corrective.</p>\n<hr>\n<h2>PARTIE 7 — Mini-dossier bilan (10 points)</h2>\n<p>Au 31/12/2026 : (a) facture EDF de décembre non reçue 400 € HT ; (b) assurance 1 800 € payée le 01/10/2026 pour 12 mois ; (c) prestation de décembre facturée en janvier 3 000 € HT.<br>Passez les écritures de cut-off.</p>\n<hr>\n<hr>\n<h1>✔️ CORRECTION DÉTAILLÉE</h1>\n<h2>Partie 1 — QCM</h2>\n<p>1b · 2b · 3b · 4b · 5c · 6b · 7b · 8c · 9b · 10b · 11b · 12c · 13b · 14b · 15b · 16b · 17b · 18b · 19b · 20c.</p>\n<h2>Partie 2 — Écritures</h2>\n<ol><li>607 D 3 000 / 44566 D 600 / 401 C 3 600</li><li>411 D 7 200 / 706 C 6 000 / 44571 C 1 200</li><li>2183 D 1 500 / 44562 D 300 / 404 C 1 800</li><li>164 D 1 000 / 661 D 200 / 512 C 1 200</li><li>627 D 35 / 512 C 35</li></ol>\n<h2>Partie 3 — TVA</h2>\n<ul><li>Collectée : 120 000 × 20 % = 24 000</li><li>Déductible ABS : (70 000 + 8 000) × 20 % = 15 600</li><li>Déductible immo : 5 000 × 20 % = 1 000</li><li>Crédit antérieur : 1 000</li><li><strong>TVA à payer = 24 000 − 15 600 − 1 000 − 1 000 = 6 400 €</strong></li><li>Écriture : 44571 D 24 000 / 44566 C 15 600 / 44562 C 1 000 / 44567 C 1 000 / 44551 C 6 400</li></ul>\n<h2>Partie 4 — Rapprochement</h2>\n<p>a) Frais : 627 D 80 / 512 C 80 → solde comptable corrigé = <strong>8 920</strong>.<br>b) Relevé 9 280 <strong>+ chèque non débité 600</strong> = 9 880 <strong>− encaissement non crédité 400</strong> = <strong>9 480</strong>…<br>→ Comparaison : 8 920 (compta) ≠ 9 480 → <strong>écart de 560 à rechercher</strong> ⇒ <em>(volontairement piégé)</em>. Si l'énoncé est « propre » : avec relevé 9 280, chèque 600 (+), encaissement 400 (−) → 9 480 ; le solde comptable corrigé devrait être 9 480. <strong>La bonne réponse pédagogique : ne jamais forcer ; chercher et corriger l'écart résiduel.</strong><br><em>(Barème : points accordés pour la saisie des frais + la méthode d'état de rapprochement + la mention « rechercher l'écart, ne pas forcer ».)</em></p>\n<h2>Partie 5 — Lettrage</h2>\n<ul><li>Dû net = 2 000 + 900 − 200 = 2 700 ; règlement 2 700 → tout soldé.</li><li>Lettre A : D = 200 + 2 700 = 2 900 ; C = 2 000 + 900 = 2 900 ✔️.</li><li><strong>Solde 401 = 0</strong>.</li></ul>\n<h2>Partie 6 — Anomalies</h2>\n<ol><li><strong>471 = 2 100</strong> → apurer (imputer/relancer) avant validation.</li><li><strong>TVA sur assurance</strong> → annuler (exonéré).</li><li><strong>53 = −60</strong> → corriger (caisse négative impossible).</li><li><strong>455 débiteur 5 000 (SARL)</strong> → <strong>signaler au chef de mission</strong> (avance interdite possible), documenter.</li><li><strong>411 créditeur 350</strong> → analyser (trop-payé) + commenter / reclasser.</li></ol>\n<h2>Partie 7 — Cut-off</h2>\n<ul><li>(a) FNP : 60612 D 400 / 44586 D 80 / 408 C 480</li><li>(b) CCA : part 2027 = 9 mois = 1 800 × 9/12 = <strong>1 350</strong> → 486 D 1 350 / 616 C 1 350</li><li>(c) FAE : 418 D 3 600 / 706 C 3 000 / 44587 C 600</li></ul>\n<hr>\n<h1>🏅 Barème et niveau délivré</h1>\n<div class=\"tbl\"><table><thead><tr><th>Score /100</th><th>Niveau délivré</th><th>Opérationnel pour</th></tr></thead><tbody><tr><td><strong>85–100</strong></td><td><strong>Avancé – Collaborateur autonome</strong></td><td>Tenir un portefeuille, préparer bilans/liasses (validation finale EC)</td></tr><tr><td><strong>70–84</strong></td><td><strong>Intermédiaire confirmé</strong></td><td>Saisie + TVA + lettrage + rapprochement en autonomie, révision supervisée</td></tr><tr><td><strong>55–69</strong></td><td><strong>Débutant validé</strong></td><td>Saisie et organisation de dossier en autonomie, reste supervisé</td></tr><tr><td><strong>&lt; 55</strong></td><td><strong>Non validé</strong></td><td>Reprise des modules faibles + nouvelle évaluation</td></tr></tbody></table></div>\n<p><strong>Niveau attendu pour être opérationnel en cabinet français : ≥ 70/100</strong>, avec obligatoirement :</p>\n<ul><li>Partie 2 (écritures) ≥ 16/20,</li><li>Partie 3 (TVA) ≥ 11/15,</li><li>Partie 6 (anomalies) ≥ 7/10 (la détection d'anomalies et la posture « signaler à l'EC » sont éliminatoires si non acquises).</li></ul>", "m25": "<h1>MODULE — Simulations d'entretien d'embauche (offshore Madagascar → cabinets français)</h1>\n<p><strong>Mis à jour 2026</strong> · aligné sur le programme : <strong>Pennylane, CERFA interactifs, liasse par régime, BTP, spécificités par activité, révision par défilement</strong>.<br><strong>Objectif :</strong> s'entraîner aux <strong>entretiens</strong> pour 4 postes : <strong>Collaborateur externalisé</strong>, <strong>Réviseur</strong>, <strong>Chef de mission</strong>, <strong>Superviseur</strong> — avec questions réelles, <strong>réponses modèles</strong>, mises en situation, et un <strong>test technique express</strong>.</p>\n<blockquote>Méthode : lisez la question, répondez <strong>à voix haute</strong> (chrono 1–2 min), puis comparez. Entraînez‑vous <strong>en binôme</strong> et <strong>filmez‑vous</strong> une fois.</blockquote>\n<hr>\n<h2>1) COLLABORATEUR COMPTABLE EXTERNALISÉ</h2>\n<p><em>Profil : saisie, TVA, rapprochement, lettrage, sous supervision.</em></p>\n<h3>A. Présentation &amp; motivation</h3>\n<p><strong>Q1. Présentez‑vous en 1 minute.</strong></p>\n<blockquote>« Comptable formé aux <strong>normes françaises</strong> (PCG, TVA, rapprochement, lettrage, révision). Je pratique <strong>Pennylane</strong> et un outil cabinet. Rigueur, respect des échéances, confidentialité — et je sais <strong>signaler ce qui doit être validé par l'expert‑comptable</strong>. »</blockquote>\n<p><strong>Q2. Pourquoi la compta française externalisée depuis Madagascar ?</strong></p>\n<blockquote>« Marché en forte croissance : les cabinets externalisent saisie et révision. Je maîtrise le <strong>français</strong> et les normes ; le <strong>décalage horaire</strong> est un atout (je livre le matin pour la France). »</blockquote>\n<p><strong>Q3. Confidentialité (RGPD / secret professionnel) ?</strong></p>\n<blockquote>« Poste dédié verrouillé, accès <strong>uniquement</strong> via les outils du cabinet, aucune donnée client en local, mots de passe forts + <strong>2FA</strong>. Non négociable. »</blockquote>\n<h3>B. Questions techniques (mises à jour)</h3>\n<p><strong>Q4. Saisissez une facture d'achat 1 200 € TTC, TVA 20 %.</strong></p>\n<blockquote>607 = 1 000 (D) · 44566 = 200 (D) · 401 = 1 200 (C).</blockquote>\n<p><strong>Q5. TVA sur une assurance ? sur un véhicule de tourisme (VP) ?</strong></p>\n<blockquote>Assurance = <strong>exonérée</strong>. <strong>VP</strong> = TVA <strong>non déductible</strong> (à l'achat comme à l'entretien) ; carburant gazole/essence <strong>80 %</strong>.</blockquote>\n<p><strong>Q6. La CA3 : à quoi servent les lignes 08, 20 et 28 ?</strong></p>\n<blockquote>« Ligne <strong>08</strong> = base à 20 % (TVA collectée) ; <strong>20</strong> = TVA déductible sur biens et services ; <strong>28</strong> = <strong>TVA nette due</strong> (collectée − déductible). »</blockquote>\n<p><strong>Q7. Un sous‑traitant du BTP vous facture 5 000 € HT, sans TVA. Que faites‑vous (donneur d'ordre) ?</strong></p>\n<blockquote>« <strong>Autoliquidation</strong> (art. 283‑2 nonies) : 604 = 5 000 (D) / 401 = 5 000 (C), puis <strong>44566 = 1 000 (D) / 4457 = 1 000 (C)</strong>. À déclarer sur la CA3. »</blockquote>\n<p><strong>Q8. Achat à 5 000 € HT en Allemagne (intracom) ?</strong></p>\n<blockquote>« Acquisition intracommunautaire : <strong>autoliquidation</strong> — je collecte (4452) <strong>et</strong> déduis (44566) la TVA ; impact net 0, mais obligatoire (CA3 lignes 03/17/20). »</blockquote>\n<p><strong>Q9. Achat d'un ordinateur 1 500 € HT : charge ou immobilisation ?</strong></p>\n<blockquote>« <strong>Immobilisation</strong> (&gt; <strong>500 € HT</strong>, durée &gt; 1 an) : 2183 + 44562 / 404, puis <strong>amortissement</strong> sur 3 ans (6811/28183), prorata temporis. »</blockquote>\n<p><strong>Q10. Rapprochement bancaire sur Pennylane ?</strong></p>\n<blockquote>« Je rapproche chaque transaction à sa pièce (ou je catégorise), je traite les écarts (chèques non débités, frais), objectif <strong>0 transaction \"à traiter\"</strong> ; l'état de rapprochement justifie le solde 512. »</blockquote>\n<p><strong>Q11. TVA sur les débits ou sur les encaissements ?</strong></p>\n<blockquote>« Biens = <strong>débits</strong> (à la facturation). Services = <strong>encaissements</strong> (au paiement). »</blockquote>\n<h3>C. Mises en situation</h3>\n<p><strong>Q12. Échéance TVA demain, une facture importante manque.</strong></p>\n<blockquote>« J'avance tout le reste, je <strong>relance</strong> par mail clair (impact chiffré), je préviens le chef de mission, et je propose de déclarer sans la pièce (régularisation ensuite). »</blockquote>\n<p><strong>Q13. Le dirigeant a payé une dépense perso avec le compte société.</strong></p>\n<blockquote>« Pas de charge : <strong>compte courant d'associé 455</strong>, et je <strong>signale</strong>. »</blockquote>\n<hr>\n<h2>2) RÉVISEUR</h2>\n<p><em>Profil : justifier les comptes, réviser par cycle/par défilement, préparer le bilan.</em></p>\n<p><strong>Q1. Saisie vs révision ?</strong></p>\n<blockquote>« Saisir = enregistrer ; réviser = <strong>prouver que chaque solde est juste et justifié</strong> (pièce / rapprochement / feuille de travail). »</blockquote>\n<p><strong>Q2. Vous révisez \"par défilement\" : comment ?</strong></p>\n<blockquote>« Je déroule la <strong>balance de la classe 1 à 7</strong>, et pour chaque solde : <em>est‑il juste, justifié, normal ?</em> Cl.1 capital = statuts/KBIS et <strong>120 affecté (PVAGO)</strong> ; Cl.4 lettrage + <strong>471 = 0</strong> ; Cl.5 banque rapprochée, <strong>caisse jamais créditrice</strong>. »</blockquote>\n<p><strong>Q3. Cycle emprunts : que contrôlez‑vous ?</strong></p>\n<blockquote>« Le solde <strong>164 = capital restant dû</strong> du tableau d'amortissement ; la mensualité se ventile <strong>164 (capital) + 661 (intérêts) + 616 (assurance)</strong> ; <strong>intérêts courus</strong> (661/1688) à la clôture. »</blockquote>\n<p><strong>Q4. Une créance définitivement perdue ?</strong></p>\n<blockquote>« <strong>654 (HT) + 44571 (récup. TVA)</strong> au débit / <strong>416 (TTC)</strong> au crédit, avec justificatif ; reprise de la dépréciation. »</blockquote>\n<p><strong>Q5. Soldes anormaux à repérer ?</strong></p>\n<blockquote>512 créditeur, 53 négatif (impossible), 401 débiteur, 411 créditeur, 471/580 ≠ 0, <strong>455 débiteur</strong> en SARL.</blockquote>\n<p><strong>Q6. FNP, CCA, FAE, PCA ?</strong></p>\n<blockquote>« Le <strong>cut‑off</strong> : rattacher charges/produits au bon exercice (indépendance des exercices). »</blockquote>\n<p><strong>Q7. Du résultat comptable au résultat fiscal (2058‑A) ?</strong></p>\n<blockquote>« <strong>Résultat fiscal = comptable + réintégrations − déductions</strong> : je réintègre amendes, <strong>TVS</strong>, amortissement <strong>VP</strong> excédentaire… et je déduis les <strong>+V long terme</strong>, le régime <strong>mère‑fille</strong>. »</blockquote>\n<p><strong>Mise en situation : 455 débiteur de 8 000 € en SARL.</strong></p>\n<blockquote>« Avance potentiellement interdite : je <strong>documente et signale</strong> au chef de mission ; je ne corrige pas seul. »</blockquote>\n<hr>\n<h2>3) CHEF DE MISSION</h2>\n<p><em>Profil : pilote un portefeuille, encadre, valide, relation client.</em></p>\n<p><strong>Q1. Gérer un portefeuille multi‑clients et les échéances ?</strong></p>\n<blockquote>« Planning mensuel par client, <strong>priorité TVA</strong>, lissage de charge, tableau de bord. »</blockquote>\n<p><strong>Q2. Piloter une équipe offshore ?</strong></p>\n<blockquote>« Objectifs clairs, reporting quotidien (fait/en cours/bloqué), contrôle qualité par sondage, <strong>KPI : taux de retour, délais, anomalies</strong>, points hebdo + carnet d'erreurs. »</blockquote>\n<p><strong>Q3. Quel régime/liasse pour quel client ?</strong></p>\n<blockquote>« SARL/SAS à l'<strong>IS</strong> → <strong>2065 + 2050‑2059</strong> (ou 2033 si simplifié) ; EI/SNC à l'<strong>IR</strong> → <strong>2031</strong> ; profession libérale → <strong>2035 (BNC)</strong> ; agricole → <strong>2139/2143</strong> ; <strong>SCI à l'IR</strong> → <strong>2072</strong> (associés sur 2044). »</blockquote>\n<p><strong>Q4. Un client a un véhicule, des honoraires d'avocat, et fait du meublé. Vos réflexes ?</strong></p>\n<blockquote>« Véhicule : <strong>VP/VU</strong> (carte grise, TVA) ; honoraires &gt; <strong>2 400 €</strong> → <strong>DAS2</strong> ; meublé → <strong>LMNP/LMP</strong> (seuil 23 000 €, amortissement au réel). »</blockquote>\n<p><strong>Q5. Qu'est‑ce qui remonte à l'expert‑comptable ?</strong></p>\n<blockquote>« Validation/signature <strong>TVA, liasse</strong>, décisions fiscales/juridiques, provisions, options. Je prépare et propose ; l'EC décide. »</blockquote>\n<p><strong>Q6. Un collaborateur a un taux de retour élevé ?</strong></p>\n<blockquote>« J'analyse les erreurs récurrentes, je forme en ciblé (checklists), je rapproche la supervision, je re‑mesure. »</blockquote>\n<p><strong>Mise en situation : un client conteste sa TVA à payer.</strong></p>\n<blockquote>« Je reprends le <strong>cadrage</strong> (collectée/déductible/encaissements), j'explique avec les chiffres, je corrige si erreur. »</blockquote>\n<hr>\n<h2>4) SUPERVISEUR</h2>\n<p><em>Profil : qualité globale, procédures, montée en compétence, production.</em></p>\n<p><strong>Q1. Rôle du superviseur en équipe offshore ?</strong></p>\n<blockquote>« Garantir la <strong>qualité à l'échelle</strong> : standardiser, contrôler de façon croisée, faire monter l'équipe, suivre les indicateurs. »</blockquote>\n<p><strong>Q2. Mettre en place la qualité ?</strong></p>\n<blockquote>« Checklists obligatoires à chaque livraison, double contrôle des dossiers sensibles, revue mensuelle des KPI, carnet d'erreurs partagé. »</blockquote>\n<p><strong>Q3. Standardiser le travail ?</strong></p>\n<blockquote>« Procédures écrites par tâche, nommage des pièces, modèles de mails, modèle de dossier de révision, mêmes checklists pour tous. »</blockquote>\n<p><strong>Q4. Gérer un pic (campagne fiscale de mai) ?</strong></p>\n<blockquote>« Planning anticipé, priorisation (TVA puis liasses par échéance), renfort/réaffectation, suivi quotidien, communication clients. »</blockquote>\n<p><strong>Q5. Indicateurs suivis ?</strong></p>\n<blockquote>« Taux de retour (&lt; 5 %), délais (100 % TVA à l'heure), volume traité, anomalies, temps par dossier. »</blockquote>\n<p><strong>Mise en situation : 2 juniors arrivent.</strong></p>\n<blockquote>« Parcours d'intégration (cette formation), dossiers simples sous double contrôle, montée progressive, mesure du taux de retour avant autonomie. »</blockquote>\n<hr>\n<h2>5) QUESTIONS TRANSVERSES &amp; RH (tous postes)</h2>\n<h3>A. Comportementales — méthode <strong>STAR</strong> (Situation, Tâche, Action, Résultat)</h3>\n<p><strong>Q. Parlez‑moi d'une erreur que vous avez commise.</strong></p>\n<blockquote>« <em>Situation</em> : j'avais déduit une TVA sur une note de restaurant. <em>Tâche</em> : corriger et fiabiliser. <em>Action</em> : j'ai régularisé, créé une checklist \"TVA non déductible\". <em>Résultat</em> : plus aucune erreur de ce type, taux de retour en baisse. »</blockquote>\n<p><strong>Q. Comment gérez‑vous la pression des échéances ?</strong> → priorisation (TVA d'abord), anticipation, communication précoce.<br><strong>Q. Travail en autonomie ou en équipe ?</strong> → les deux : autonome sur la production, mais je <strong>fais valider</strong> ce qui doit l'être.</p>\n<h3>B. Spécial <strong>télétravail / offshore</strong></h3>\n<ul><li><strong>Connexion/outils</strong> : « Bonne connexion, poste dédié, je sais utiliser les outils à distance (Pennylane, partage sécurisé, visio). »</li><li><strong>Communication asynchrone</strong> : « Reporting écrit quotidien clair (fait/en cours/bloqué), je documente pour la France. »</li><li><strong>Décalage horaire</strong> : « Je l'utilise comme un avantage : livraison le matin pour le cabinet. »</li><li><strong>Sécurité</strong> : « 2FA, VPN/outils du cabinet, rien en local, écran verrouillé. »</li></ul>\n<h3>C. Salaire (à préparer)</h3>\n<blockquote>« Je reste ouvert ; mon objectif est d'apporter de la <strong>valeur</strong> (productivité, faible taux de retour). Quelle est la <strong>fourchette</strong> prévue pour ce poste et ce niveau ? »</blockquote>\n<ul><li><strong>Renseignez‑vous</strong> sur le marché offshore (Antananarivo) <strong>avant</strong> l'entretien ; négociez sur l'<strong>expérience</strong>, la <strong>polyvalence</strong> (TVA + révision + liasse) et les <strong>outils</strong> maîtrisés. Évitez d'annoncer un chiffre en premier si possible.</li></ul>\n<h3>D. <strong>Questions à POSER au recruteur</strong> (montre votre intérêt)</h3>\n<ol><li>Comment est organisée l'équipe (collaborateurs / réviseurs / chef de mission) ?</li><li>Quels <strong>outils</strong> (Pennylane, ACD, Cegid…) et quel <strong>volume de dossiers</strong> ?</li><li>Comment se passe le <strong>contrôle qualité</strong> et la montée en compétence ?</li><li>Quelles <strong>perspectives</strong> d'évolution (réviseur → chef de mission) ?</li></ol>\n<h3>E. Top <strong>erreurs à éviter</strong> en entretien</h3>\n<ul><li>❌ Prétendre tout savoir → dites <strong>« je fais valider par l'EC »</strong>.</li><li>❌ Rester vague → donnez des <strong>chiffres</strong> (volumes, taux de retour &lt; 5 %).</li><li>❌ Bâcler la <strong>confidentialité</strong> → c'est rédhibitoire.</li><li>❌ Ne poser <strong>aucune question</strong> à la fin.</li></ul>\n<hr>\n<h2>6) ⚡ Test technique express (l'examinateur enchaîne — répondez vite)</h2>\n<ol><li><strong>Écriture d'une vente 1 000 € HT, TVA 20 % ?</strong> → 411 = 1 200 / 707 = 1 000 / 44571 = 200.</li><li><strong>Seuil pour immobiliser ?</strong> → <strong>500 € HT</strong> (durée &gt; 1 an).</li><li><strong>Seuil DAS2 (2026) ?</strong> → <strong>2 400 €</strong> / an / bénéficiaire.</li><li><strong>Taux d'IS PME 2026 ?</strong> → <strong>15 %</strong> jusqu'à 42 500 €, puis <strong>25 %</strong>.</li><li><strong>Compte des intérêts courus à la clôture ?</strong> → 661 (D) / 1688 (C), extourné à l'ouverture.</li><li><strong>La caisse peut‑elle être créditrice ?</strong> → <strong>Non</strong>, jamais.</li><li><strong>Quelle liasse pour un BNC ?</strong> → <strong>2035</strong> (déclaration contrôlée).</li></ol>\n<hr>\n<h2>🎯 Grille d'auto‑évaluation</h2>\n<div class=\"tbl\"><table><thead><tr><th>Critère</th><th>Faible</th><th>OK</th><th>Fort</th></tr></thead><tbody><tr><td>Présentation claire (1 min)</td><td></td><td></td><td></td></tr><tr><td>Technique (écritures, TVA/CA3, immo)</td><td></td><td></td><td></td></tr><tr><td>Liasse &amp; révision (par défilement / régime)</td><td></td><td></td><td></td></tr><tr><td>Posture (rigueur, « je fais valider »)</td><td></td><td></td><td></td></tr><tr><td>Confidentialité / RGPD</td><td></td><td></td><td></td></tr><tr><td>Spécifique offshore (outils, async, sécurité)</td><td></td><td></td><td></td></tr><tr><td>Questions posées au recruteur</td><td></td><td></td><td></td></tr></tbody></table></div>\n<blockquote><strong>Conseil final :</strong> préparez <strong>3 exemples concrets</strong> (méthode STAR), connaissez vos <strong>chiffres</strong>, révisez le <strong>test express</strong>, et terminez <strong>toujours</strong> par une question au recruteur.</blockquote>\n<h2>📝 Évaluation</h2>\n<ol><li>Que répondez‑vous à « présentez‑vous » (structure) ?</li><li>Écriture d'une facture <strong>sous‑traitant BTP</strong> reçue (donneur d'ordre) ?</li><li>Quelle <strong>liasse</strong> pour une SARL à l'IS au réel normal ?</li><li>Donnez 2 <strong>réintégrations</strong> fiscales classiques.</li><li>Citez 1 <strong>question</strong> à poser au recruteur.</li></ol>\n<p><strong>Seuil : 7/10.</strong> <strong>Corrigé :</strong> 1) parcours + normes FR + outils + posture « je fais valider ». 2) 604 / 401 puis <strong>autoliquidation</strong> 44566 / 4457. 3) <strong>2065 + tableaux 2050‑2059</strong>. 4) amendes, TVS, amort. VP excédentaire (au choix). 5) organisation de l'équipe / outils / perspectives.</p>", "a_check": "<h1>ANNEXE A — Checklists opérationnelles (regroupées)</h1>\n<blockquote>À imprimer / copier dans l'outil de suivi. Cocher avant chaque livraison.</blockquote>\n<hr>\n<h2>A1. Confidentialité (poste offshore)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Poste dédié, antivirus actif, OS à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Session verrouillée en cas d'absence</label></li><li class=\"task\"><label><input type=\"checkbox\"> Écran non visible des tiers</label></li><li class=\"task\"><label><input type=\"checkbox\"> Aucun fichier client sur messagerie/stockage personnel</label></li><li class=\"task\"><label><input type=\"checkbox\"> Accès via les seuls outils du cabinet</label></li><li class=\"task\"><label><input type=\"checkbox\"> Mots de passe forts + 2FA</label></li><li class=\"task\"><label><input type=\"checkbox\"> Wifi sécurisé</label></li></ul>\n<h2>A2. Ouverture / tenue de dossier mensuel</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Relevés bancaires complets reçus</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces achats/ventes du mois reçues</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces nommées selon la convention</label></li><li class=\"task\"><label><input type=\"checkbox\"> Doublons contrôlés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Factures non conformes signalées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces manquantes listées et relancées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Régime TVA + régime fiscal vérifiés (dossier permanent)</label></li></ul>\n<h2>A3. Saisie (par pièce)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Pièce conforme et lisible</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon journal (AC/VT/BQ/CA/OD)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon tiers (401/411)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon compte de charge/produit</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon taux + bon compte de TVA</label></li><li class=\"task\"><label><input type=\"checkbox\"> HT + TVA = TTC (recalcul)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pas de doublon</label></li><li class=\"task\"><label><input type=\"checkbox\"> Commentaire si opération inhabituelle</label></li></ul>\n<h2>A4. Rapprochement bancaire</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Relevé complet, solde initial = solde final M-1</label></li><li class=\"task\"><label><input type=\"checkbox\"> Toutes les lignes pointées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Frais/agios saisis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Prélèvements/virements saisis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Doublons supprimés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Virements internes via 580 (= 0)</label></li><li class=\"task\"><label><input type=\"checkbox\"> État de rapprochement équilibré (écart 0 ou justifié)</label></li></ul>\n<h2>A5. Lettrage</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Lettrage automatique lancé</label></li><li class=\"task\"><label><input type=\"checkbox\"> Règlements partiels suivis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Avoirs lettrés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Écarts soldés (658/758/627)</label></li><li class=\"task\"><label><input type=\"checkbox\"> 411 créditeurs / 401 débiteurs analysés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Créances anciennes signalées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Balance âgée éditée</label></li><li class=\"task\"><label><input type=\"checkbox\"> 401/411 justifiés</label></li></ul>\n<h2>A6. Apurement du 471</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Grand livre 471 édité</label></li><li class=\"task\"><label><input type=\"checkbox\"> Chaque ligne commentée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces recherchées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Imputations possibles passées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Relances envoyées pour le reste</label></li><li class=\"task\"><label><input type=\"checkbox\"> 580 = 0, 455 justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471 ramené à 0 (ou restes transmis)</label></li></ul>\n<h2>A7. OD de paie</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Journal de paie reçu</label></li><li class=\"task\"><label><input type=\"checkbox\"> OD équilibrée (641+645 = 421+431+437)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Net (421) = virements salaires</label></li><li class=\"task\"><label><input type=\"checkbox\"> Cotisations = DSN = prélèvements</label></li><li class=\"task\"><label><input type=\"checkbox\"> 421/431/437 soldés après paiement</label></li><li class=\"task\"><label><input type=\"checkbox\"> Écarts justifiés</label></li></ul>\n<h2>A8. Immobilisations</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Distinction charge/immo (seuil 500 € HT)</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA correcte (non déductible sur VP)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Date de mise en service identifiée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Durée conforme à la politique cabinet</label></li><li class=\"task\"><label><input type=\"checkbox\"> Prorata temporis 1re année</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dotation passée (6811/28x)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Fichier immo = compta (21/20/28)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Cessions traitées (775/675)</label></li></ul>\n<h2>A9. Révision par cycle</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Trésorerie : rapprochements OK, 580 = 0, caisse ≥ 0</label></li><li class=\"task\"><label><input type=\"checkbox\"> Fournisseurs : 401 lettré/justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> Clients : 411 lettré/justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> Personnel : OD = bulletins = DSN = paiements</label></li><li class=\"task\"><label><input type=\"checkbox\"> Fiscal : comptes TVA cohérents</label></li><li class=\"task\"><label><input type=\"checkbox\"> Immobilisations : fichier = compta</label></li><li class=\"task\"><label><input type=\"checkbox\"> Emprunts : 164 = capital restant dû</label></li><li class=\"task\"><label><input type=\"checkbox\"> Capitaux : 455 justifié, résultat N-1 affecté</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471/467 soldés ou justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Feuilles de travail rédigées</label></li></ul>\n<h2>A10. Préparation des éléments fiscaux</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Régime fiscal identifié (IR/IS, BIC/BNC, micro/réel)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes révisés et justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA de l'exercice bouclée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Immobilisations à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Provisions/dépréciations recensées (validation EC)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes courants d'associés justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Réintégrations/déductions signalées (pour décision EC)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Tableaux de liasse pré-remplis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dossier transmis sans valider à la place de l'EC</label></li></ul>\n<h2>A11. Clôture / bilan</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Cut-off : FNP, FAE, CCA, PCA passées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Stocks constatés (variation)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Amortissements passés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Provisions proposées (validation EC)</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA de clôture contrôlée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Rapprochements de clôture OK</label></li><li class=\"task\"><label><input type=\"checkbox\"> Emprunts justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Paie justifiée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Capitaux : résultat N-1 affecté</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471/580 = 0</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dossier bilan complet</label></li></ul>\n<h2>A12. ✅ QUALITÉ avant validation (à joindre à chaque livraison)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Rapprochement bancaire bouclé, 512 justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA contrôlée (taux, assurance/VP exclus, encaissements)</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471 et 580 soldés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Lettrage 401/411 réalisé, écarts soldés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Aucun doublon</label></li><li class=\"task\"><label><input type=\"checkbox\"> Caisse 53 ≥ 0, 455 justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> Soldes anormaux expliqués</label></li><li class=\"task\"><label><input type=\"checkbox\"> Anomalies documentées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces présentes / non-conformités signalées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Points en suspens listés pour le chef de mission</label></li></ul>\n<h2>A13. Organisation quotidienne (offshore)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> To-do priorisée du jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Échéances TVA de la semaine repérées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Blocages remontés immédiatement</label></li><li class=\"task\"><label><input type=\"checkbox\"> Reporting de fin de journée envoyé</label></li><li class=\"task\"><label><input type=\"checkbox\"> Tableau de bord mis à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Créneau de recouvrement FR respecté</label></li></ul>\n<h2>A14. Avant d'envoyer un mail</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Objet clair avec [CLIENT]</label></li><li class=\"task\"><label><input type=\"checkbox\"> Demande précise + action attendue + délai</label></li><li class=\"task\"><label><input type=\"checkbox\"> Contexte / solution fournis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces jointes nommées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pas de fautes, ton professionnel</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pas d'info confidentielle en canal non sécurisé</label></li></ul>", "a_mails": "<h1>ANNEXE B — Modèles de mails professionnels (prêts à l'emploi)</h1>\n<blockquote>Remplacer les [CROCHETS]. Objet toujours préfixé par <code>[CLIENT]</code>. Ton : vouvoiement, courtois, factuel.</blockquote>\n<hr>\n<h2>B1. Demande de pièce manquante</h2>\n<p><strong>Objet :</strong> [CLIENT] – Pièce manquante – [nature] [mois]</p>\n<blockquote>Bonjour,<br>En traitant [le rapprochement bancaire de [mois] / la saisie], j'ai relevé [opération : montant, tiers, date] sans justificatif associé.<br>Pourriez-vous me transmettre [la facture / le document] via [Dext/Pennylane/Drive] ?<br>En attente, je laisse l'opération en compte d'attente (471) avec commentaire.<br>Merci par avance. Cordialement, [Nom].</blockquote>\n<h2>B2. Relance pièces (liste)</h2>\n<p><strong>Objet :</strong> [CLIENT] – Relance – Pièces manquantes ([n] éléments)</p>\n<blockquote>Bonjour,<br>Pour boucler [la TVA de [mois] / le dossier] (échéance le [date]), il me manque :<br>1. [élément 1]<br>2. [élément 2]<br>3. [élément 3]<br>Merci de me les transmettre <strong>avant le [date]</strong> pour tenir l'échéance.<br>Cordialement, [Nom].</blockquote>\n<h2>B3. Signalement d'anomalie</h2>\n<p><strong>Objet :</strong> [CLIENT] – Anomalie – [sujet]</p>\n<blockquote>Bonjour,<br>En [révision / lettrage], j'ai constaté : [description factuelle + montant].<br>Impact : [ex. compte 455 débiteur / double paiement / TVA à régulariser].<br>Je propose [action proposée]. Souhaitez-vous que je procède ainsi ou attendez-vous une instruction ?<br>Détail en pièce jointe. Cordialement, [Nom].</blockquote>\n<h2>B4. Réponse au chef de mission (compte rendu)</h2>\n<p><strong>Objet :</strong> RE: [CLIENT] – [sujet]</p>\n<blockquote>Bonjour,<br>C'est fait. Synthèse :<br>- [point 1 : chiffre clé]<br>- [point 2]<br>- Point en suspens : [le cas échéant, + impact].<br>Dossier prêt à valider. Cordialement, [Nom].</blockquote>\n<h2>B5. Présentation d'un travail terminé</h2>\n<p><strong>Objet :</strong> [CLIENT] – Dossier [mois] TERMINÉ</p>\n<blockquote>Bonjour,<br>Le dossier de [mois] est finalisé et contrôlé :<br>- Saisie achats/ventes/banque : OK<br>- Rapprochement bancaire : OK (solde justifié)<br>- Lettrage 401/411 : OK · 471 : soldé<br>- TVA : préparée, à valider<br>Checklist qualité jointe. Dossier disponible dans [outil].<br>Cordialement, [Nom].</blockquote>\n<h2>B6. Remontée de blocage</h2>\n<p><strong>Objet :</strong> [CLIENT] – BLOCAGE – [cause]</p>\n<blockquote>Bonjour,<br>Je ne peux pas terminer [tâche] : [cause précise + depuis quand].<br>De mon côté : [ce qui a été fait en attendant].<br>Action attendue : [ce qu'il faut faire] — sans cela, [impact échéance].<br>Cordialement, [Nom].</blockquote>\n<h2>B7. Trop-payé / double paiement</h2>\n<p><strong>Objet :</strong> [CLIENT] – Anomalie – Double paiement [fournisseur] ([montant])</p>\n<blockquote>Bonjour,<br>En lettrant le compte 401 [fournisseur], j'ai constaté que la facture de [montant] a été <strong>payée deux fois</strong> (le [date1] et le [date2]). Le compte ressort <strong>débiteur de [montant]</strong>.<br>Je propose de signaler le trop-payé au [fournisseur/client] pour remboursement ou avoir. Souhaitez-vous que je le contacte ?<br>Cordialement, [Nom].</blockquote>\n<h2>B8. Question sur une imputation</h2>\n<p><strong>Objet :</strong> [CLIENT] – Question – Imputation [opération]</p>\n<blockquote>Bonjour,<br>Concernant [opération : montant, tiers, date], deux traitements possibles :<br>1. [option 1 + conséquence]<br>2. [option 2 + conséquence]<br>Quelle option retenez-vous ? Par défaut, je laisse en 471 avec commentaire.<br>Cordialement, [Nom].</blockquote>\n<h2>B9. Transmission TVA à valider</h2>\n<p><strong>Objet :</strong> [CLIENT] – TVA [mois] – à valider (échéance [date])</p>\n<blockquote>Bonjour,<br>Brouillon de la CA3 de [mois] en pièce jointe :<br>- TVA collectée : [montant]<br>- TVA déductible : [montant]<br>- <strong>TVA à payer : [montant]</strong><br>Banque rapprochée, 471 soldé. Merci de valider avant le [date] pour télétransmission.<br>Cordialement, [Nom].</blockquote>\n<h2>B10. Reporting journalier</h2>\n<p><strong>Objet :</strong> Reporting [date] – [Nom]</p>\n<blockquote>✅ Fait : [clients/tâches]<br>🔄 En cours : [client + %]<br>⛔ Bloqué : [client + cause + action demandée]<br>📅 Demain : [priorités]</blockquote>\n<h2>B11. Prospection cabinet (freelance)</h2>\n<p><strong>Objet :</strong> Production comptable externalisée – fiabiliser vos dossiers en période fiscale</p>\n<blockquote>Bonjour [Nom],<br>Je suis collaborateur comptable spécialisé en production externalisée pour cabinets français (saisie, TVA, rapprochement, lettrage, révision) sur [Pennylane/ACD/Sage].<br>Je propose une production fiable avec <strong>checklist qualité à chaque livraison</strong> et un <strong>taux de retour &lt; 5 %</strong>, dans le respect total de la confidentialité.<br>Seriez-vous disponible 15 min pour un échange, ou un dossier test ?<br>Cordialement, [Nom] – [contact].</blockquote>", "a_tab": "<h1>ANNEXE C — Tableaux de suivi &amp; modèles Excel à créer</h1>\n<blockquote>Recréer ces tableaux dans Excel / Google Sheets. Colonnes données ci-dessous. 💡 Astuce : 1 onglet par tableau, en-têtes figés, mise en forme conditionnelle sur les statuts/retards.</blockquote>\n<hr>\n<h2>C1. Suivi de dossier mensuel</h2>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Mois</th><th>Pièces reçues (O/N)</th><th>Relevés complets (O/N)</th><th>Saisie achats</th><th>Saisie ventes</th><th>Banque</th><th>Rapprochement</th><th>Lettrage</th><th>TVA préparée</th><th>TVA validée</th><th>Pièces manquantes</th><th>Anomalies</th><th>Statut</th><th>Date livraison</th></tr></thead><tbody></tbody></table></div>\n<p>Statuts : <code>À FAIRE / EN COURS / BLOQUÉ / À VALIDER / TERMINÉ</code>.<br>Mise en forme : rouge si BLOQUÉ, orange si échéance &lt; 3 jours, vert si TERMINÉ.</p>\n<hr>\n<h2>C2. Tableau de bord de production (KPI)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Échéance TVA</th><th>Pièces reçues le</th><th>Saisie</th><th>Banque</th><th>TVA</th><th>Livré le</th><th>Validé</th><th>Retour (O/N)</th><th>Anomalies</th><th>Temps passé</th></tr></thead><tbody></tbody></table></div>\n<p>KPI à calculer (synthèse en bas) :</p>\n<ul><li><strong>Dossiers traités</strong> : <code>NB.SI(Statut;\"TERMINÉ\")</code></li><li><strong>% TVA à l'heure</strong> : livraisons avant échéance / total</li><li><strong>Taux de retour</strong> : <code>NB.SI(Retour;\"O\") / total dossiers</code> → <strong>cible &lt; 5 %</strong></li></ul>\n<hr>\n<h2>C3. État de rapprochement bancaire</h2>\n<div class=\"tbl\"><table><thead><tr><th></th><th>Côté COMPTA (512)</th><th>Côté BANQUE (relevé)</th></tr></thead><tbody><tr><td>Solde de départ</td><td></td><td></td></tr><tr><td>(+) Encaissements non crédités</td><td></td><td></td></tr><tr><td>(−) Chèques émis non débités</td><td></td><td></td></tr><tr><td>(+) Opérations sur relevé non saisies</td><td></td><td></td></tr><tr><td><strong>Solde corrigé</strong></td><td><code>=</code></td><td><code>=</code></td></tr></tbody></table></div>\n<p>Contrôle (cellule) : <code>=SI(SoldeComptaCorrigé=SoldeBanqueCorrigé;\"OK\";\"ÉCART À CHERCHER\")</code>.</p>\n<hr>\n<h2>C4. Balance âgée (clients / fournisseurs)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Tiers</th><th>Total dû</th><th>0–30 j</th><th>31–60 j</th><th>61–90 j</th><th>&gt; 90 j</th><th>Statut</th></tr></thead><tbody></tbody></table></div>\n<p>Mise en forme : rouge sur la colonne &gt; 90 j ; statut <code>À RELANCER</code> si &gt; 60 j.</p>\n<hr>\n<h2>C5. Suivi des pièces manquantes</h2>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Date détection</th><th>Opération (montant/tiers/date)</th><th>Type de pièce</th><th>Demandé le</th><th>Relancé le</th><th>Reçu (O/N)</th><th>Statut</th></tr></thead><tbody></tbody></table></div>\n<hr>\n<h2>C6. Fichier des immobilisations</h2>\n<div class=\"tbl\"><table><thead><tr><th>Bien</th><th>Date mise en service</th><th>Base HT</th><th>Durée</th><th>Taux</th><th>Dotation N</th><th>Amort. cumulés</th><th>VNC</th></tr></thead><tbody></tbody></table></div>\n<p>Contrôles (bas de tableau) :</p>\n<ul><li><code>Σ Base HT</code> = soldes comptes 21/20</li><li><code>Σ Amort. cumulés</code> = soldes comptes 28</li><li><code>Σ Dotation N</code> = compte 6811</li></ul>\n<hr>\n<h2>C7. Suivi des comptes d'attente (471)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Date</th><th>Montant</th><th>Sens (D/C)</th><th>Libellé banque</th><th>Nature présumée</th><th>Action</th><th>Relancé le</th><th>Statut</th></tr></thead><tbody></tbody></table></div>\n<p>Statut : <code>EN ATTENTE / IMPUTÉ / À VALIDER</code>. Objectif : tout passer à IMPUTÉ avant clôture.</p>\n<hr>\n<h2>C8. Contrôle paie (rapprochement 4 sources)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Mois</th><th>Brut (OD)</th><th>Brut (bulletins)</th><th>Brut (DSN)</th><th>Net (OD)</th><th>Net versé (banque)</th><th>Cotisations (OD)</th><th>Cotisations (DSN)</th><th>Cotisations payées</th><th>Écart</th><th>OK ?</th></tr></thead><tbody></tbody></table></div>\n<hr>\n<h2>C9. Carnet d'erreurs personnel (progression)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Date</th><th>Dossier</th><th>Erreur</th><th>Cause</th><th>Correction</th><th>Action préventive</th></tr></thead><tbody></tbody></table></div>\n<blockquote>Outil n°1 de montée en compétence : on n'y inscrit chaque retour du cabinet qu'une seule fois.</blockquote>\n<hr>\n<h2>C10. Planning mensuel multi-clients</h2>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Régime TVA</th><th>Échéance</th><th>Date réception pièces cible</th><th>Date livraison cible</th><th>Charge estimée (h)</th><th>Semaine</th></tr></thead><tbody></tbody></table></div>\n<p>But : lisser la charge sur le mois, éviter l'embouteillage de fin de période.</p>", "a_attest": "<h1>Attestation de fin de formation</h1>\n<blockquote>Attestation officielle <strong>MG CONSULTING IT&amp;ACT</strong> — <strong>générée automatiquement</strong> par la plateforme (nom, <strong>date d'inscription</strong> et <strong>résultat de l'évaluation</strong> de l'apprenant remplis tout seuls). Logo intégré.</blockquote>\n<hr>\n<div align=\"center\">\n<img src=\"/public/logo.jpg\" alt=\"MG Consulting IT & ACT\" width=\"280\">\n<p><strong>MG CONSULTING IT&amp;ACT</strong></p>\n<h1>ATTESTATION DE FIN DE FORMATION</h1>\n<p><strong>Formation complète en comptabilité française externalisée depuis Madagascar</strong></p>\n<p><em>Délivrée par MG CONSULTING IT&amp;ACT (MG Consulting IT &amp; ACT) — SARL au capital de 2 400 000 Ar — RCS Antananarivo 2024 B 00906</em></p>\n</div>\n<hr>\n<p>Je soussigné(e) <strong>M. RANDRIAMANANTSOA Heriniaina Anthony</strong>, formateur, agissant pour la société <strong>MG CONSULTING IT&amp;ACT</strong>, atteste que :</p>\n<p><strong>[Prénom NOM du participant]</strong></p>\n<p>a suivi l'intégralité de la formation « <strong>Comptabilité française externalisée depuis Madagascar</strong> » (4 modules · 24 leçons, ~120–150 h), couvrant :</p>\n<ul><li>l'environnement comptable français et la posture offshore ;</li><li>les bases du PCG et la saisie (achats, ventes, banque, caisse, OD) ;</li><li>la TVA (CA3/CA12), le rapprochement bancaire, le lettrage, les comptes d'attente ;</li><li>la paie, les immobilisations, la révision par cycle ;</li><li>la fiscalité des entreprises, la clôture et le bilan ;</li><li>les outils cabinet, la co n rapprochement."}]}, "m07": {"title": "Module 7 — Lettrage clients / fournisseurs", "questions": [{"q": "Le lettrage sert à :", "options": ["Calculer l'amortissement", "Rapprocher factures et règlements", "Établir la liasse"], "answer": 1, "explain": "On connaît ainsi le restant dû."}, {"q": "Un compte 411 créditeur signifie :", "options": ["Le client doit de l'argent", "Le client a trop payé (ou acompte)"], "answer": 1, "explain": "C'est une dette envers le client."}, {"q": "Un compte 401 débiteur signifie :", "options": ["On doit au fournisseur", "Le fournisseur nous doit (avoir/acompte/double paiement)"], "answer": 1, "explain": "À régulariser."}, {"q": "Un écart de règlement de quelques centimes se solde via :", "options": ["471", "658 / 758 (ou 627)"], "answer": 1, "explain": "Charges/produits divers, puis lettrage."}, {"q": "La balance âgée classe les créances par :", "options": ["Montant", "Ancienneté"], "answer": 1, "explain": "0-30 j, 30-60 j, etc. → relances."}]}, "m08": {"title": "Module 8 — Comptes d'attente et sensibles", "questions": [{"q": "Le compte 471 au bilan doit être :", "options": ["Débiteur", "Créditeur", "Nul"], "answer": 2, "explain": "Tout doit être imputé avant la clôture."}, {"q": "Sur chaque ligne en 471, il faut toujours :", "options": ["Un commentaire (date, nature, action)", "Rien", "Un montant arrondi"], "answer": 0, "explain": "Traçabilité indispensable."}, {"q": "Le compte 580 doit avoir un solde :", "options": ["Débiteur", "Égal à 0", "Créditeur"], "answer": 1, "explain": "Sinon un côté de virement manque."}, {"q": "Un compte 455 débiteur dans une SARL :", "options": ["Est normal", "Se signale au chef de mission (avance possiblement interdite)"], "answer": 1, "explain": "Risque d'abus de biens sociaux."}, {"q": "Une opération bancaire inconnue après recherche :", "options": ["S'invente", "Reste en 471 + relance client", "Se supprime"], "answer": 1, "explain": "Demander la nature au client."}]}, "m09": {"title": "Module 9 — Paie e l", "Le chef de mission / l'expert-comptable"], "answer": 1, "explain": "Le collaborateur prépare."}]}, "m22": {"title": "Module 22 — Tiime", "questions": [{"q": "La pré-catégorisation Tiime est :", "options": ["Fiable à 100 %", "Une suggestion à contrôler"], "answer": 1, "explain": "Toujours vérifier."}, {"q": "Une dépense personnelle payée par le compte pro va en :", "options": ["Charge (classe 6)", "Compte courant d'associé (455)"], "answer": 1, "explain": "Pas en charge société."}, {"q": "Pour un prestataire de services, la TVA est exigible :", "options": ["Sur les débits", "Sur les encaissements"], "answer": 1, "explain": "Encaissements par défaut."}, {"q": "Une transaction sans justificatif :", "options": ["Se valide quand même", "Reste en attente + relance"], "answer": 1, "explain": "Pas de pièce, pas de validation."}]}, "m23": {"title": "Module 23 — Quadra (Cegid)", "questions": [{"q": "Avant de saisir dans Quadra, on vérifie :", "options": ["Dossier + exercice + période", "Rien"], "answer": 0, "explain": "Le bon contexte."}, {"q": "Un guide d'écriture sert à saisir vite mais :", "options": ["Le compte/TVA peuvent être inadaptés (à contrôler)", "Est toujours juste"], "answer": 0, "explain": "Vérifier le rendu du guide."}, {"q": "Les virements internes se soldent via :", "options": ["471", "580"], "answer": 1, "explain": "580 = 0."}, {"q": "En fin de saisie, les brouillards doivent être :", "options": ["Validés", "Laissés en attente"], "answer": 0, "explain": "Sinon écritures oubliées."}]}, "m24": {"title": "Module 24 — Isacompta (ISAGRI)", "questions": [{"q": "Isacompta est très présent dans les dossiers :", "options": ["Uniquement industriels", "Agricoles (BA) et aussi BIC/BNC/IS"], "answer": 1, "explain": "Édité par ISAGRI."}, {"q": "Pourquoi vérifier le régime fiscal avant de produire ?", "options": ["Il conditionne la liasse et certains traitements", "Sans importance"], "answer": 0, "explain": "BA ≠ BIC."}, {"q": "Avant une édition finale, on apure :", " const KEY="fce_progress_v1";
let prog=JSON.parse(localStorage.getItem(KEY)||'{"done":{},"quiz":{}}');
function save(){localStorage.setItem(KEY,JSON.stringify(prog));}
function titleOf(id){for(const g of NAV)for(const it of g.items)if(it.id===id)return it.title;return id;}
function quizOf(id){for(const g of NAV)for(const it of g.items)if(it.id===id)return it.quiz;return null;}
function renderNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  for(const g of NAV){
    const h=document.createElement('div');h.className='grp';h.textContent=g.group;nav.appendChild(h);
    for(const it of g.items){
      const a=document.createElement('a');a.className='item'+(prog.done[it.id]?' done':'');a.href='#'+it.id;a.dataset.id=it.id;
      a.innerHTML='<span class="dot">'+(prog.done[it.id]?'&#10003;':'')+'</span><span class="t">'+it.title+'</span>';
      nav.appendChild(a);
    }
  }
  updateProgress();
}
function updateProgress(){
  const total=ORDER.length;let d=0;for(const id of ORDER)if(prog.done[id])d++;
  const pct=Math.round(d/total*100);
  document.getElementById('progi').style.width=pct+'%';
  document.getElementById('progt').textContent=pct+'%';
}
function show(id){
  if(!CONTENT[id])id=ORDER[0];
  document.getElementById('content').innerHTML=CONTENT[id];
  document.getElementById('crumbs').textContent=titleOf(id);
  document.querySelectorAll('.sidebar a.item').forEach(a=>a.classList.toggle('active',a.dataset.id===id));
  // boutons prev/next
  const idx=ORDER.indexOf(id);
  document.getElementById('prevb').onclick=()=>{if(idx>0)location.hash=ORDER[idx-1];};
  document.getElementById('nextb').onclick=()=>{if(idx<ORDER.length-1)location.hash=ORDER[idx+1];};
  const db=document.getElementById('doneb');
  function refreshDone(){db.textContent=prog.done[id]?'✓ Termine':'Marquer comme termine';db.classList.toggle('sec',!!prog.done[id]);}
  db.onclick=()=>{prog.done[id]=!prog.done[id];save();renderNav();refreshDone();};
  refreshDone();
  // quiz
  const qk=quizOf(id);const qm=document.getElementById('quizmount');qm.innerHTML='';
  if(qk&&QUIZ[qk])qm.appendChild(buildQuiz(qk));
  window.scrollTo(0,0);
  document.querySelector('.sidebar').classList.remove('open');
}
function buildQuiz(qk){
  const data=QUIZ[qk];const wrap=document.createElement('div');wrap.className='quiz';
  const prev=prog.quiz[qk];
  let head='<h3>&#128221; Quiz - '+data.title+'</h3>';
  if(prev)head+='<p>Dernier score : <span class="badge '+(prev.score/prev.total>=0.7?'ok':'ko')+'">'+prev.score+'/'+prev.total+'</span></p>';
  wrap.innerHTML=head;
  const form=document.createElement('div');
  data.questions.forEach((q,qi)=>{
    const qd=document.createElement('div');qd.className='q';qd.dataset.a=q.answer;
    qd.innerHTML='<b>'+(qi+1)+'. '+q.q+'</b>';
    q.options.forEach((o,oi)=>{
      const lab=document.createElement('label');lab.className='opt';
      lab.innerHTML='<input type="radio" name="q'+qi+'" value="'+oi+'"> '+o;
      qd.appendChild(lab);
    });
    if(q.explain){const e=document.createElement('div');e.className='exp';e.textContent='→ '+q.explain;qd.appendChild(e);}
    form.appendChild(qd);
  });
  wrap.appendChild(form);
  const res=document.createElement('div');res.className='score';
  const btn=document.createElement('button');btn.className='btn';btn.textContent='Valider le quiz';
  btn.onclick=()=>{
    let score=0;
    wrap.querySelectorAll('.q').forEach((qd)=>{
      const a=+qd.dataset.a;const sel=qd.querySelector('input:checked');
      qd.querySelectorAll('.opt').forEach((opt,oi)=>{opt.classList.remove('correct','wrong');if(oi===a)opt.classList.add('correct');});
      if(sel){const v=+sel.value;if(v===a)score++;else qd.querySelectorAll('.opt')[v].classList.add('wrong');}
      const exp=qd.querySelector('.exp');if(exp)exp.style.display='block';
    });
    const total=data.questions.length;
    res.innerHTML='Score : <span class="badge '+(score/total>=0.7?'ok':'ko')+'">'+score+'/'+total+'</span> '+(score/total>=0.7?'- Reussi !':'- Seuil 70% non atteint, revoyez le module.');
    prog.quiz[qk]={score,total};if(score/total>=0.7)prog.done[curId()]=true;save();renderNav();
  };
  wrap.appendChild(btn);wrap.appendChild(res);
  return wrap;
}
function curId(){return location.hash.slice(1)||ORDER[0];}
window.addEventListener('hashchange',()=>show(curId()));
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.sidebar a.item').forEach(a=>{a.style.display=a.textContent.toLowerCase().includes(q)?'':'none';});
});
renderNav();show(curId());
</script>
