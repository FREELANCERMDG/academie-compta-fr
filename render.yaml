# Déploiement sur Render.com
# PRODUCTION : plan "starter" + disque persistant monté sur /var/data + DATA_DIR=/var/data.
# => la base data.db est conservée entre les déploiements (comptes apprenants + 2FA stables)
#    et le service ne s'endort plus.
services:
  - type: web
    name: academie-compta-fr
    runtime: docker
    region: frankfurt
    plan: starter
    healthCheckPath: /sante
    autoDeploy: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PRODUCTION
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BASE_URL
        sync: false
      # E-mail (notifications aux apprenants) — compte Brevo gratuit. Laisser vide = e-mail désactivé.
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
