# Déploiement sur Render.com
# Profil GRATUIT (mise en ligne immédiate sans carte bancaire).
# ⚠️ En gratuit : le service "s'endort" après 15 min d'inactivité ET la base data.db
#    est réinitialisée à chaque redéploiement. Pour la PRODUCTION (vrais apprenants),
#    repasser en plan "starter" + bloc "disk" + variable DATA_DIR=/data (voir guide 13).
services:
  - type: web
    name: academie-compta-fr
    runtime: docker
    region: frankfurt
    plan: free
    healthCheckPath: /sante
    autoDeploy: true
    envVars:
      - key: PRODUCTION
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BASE_URL
        sync: false
