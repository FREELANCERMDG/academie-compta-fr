# Déploiement sur Render.com
# PRODUCTION : plan "starter" + disque persistant monté sur /var/data + DATA_DIR=/var/data.
# => la base data.db est conservée entre les déploiements (comptes apprenants + 2FA stables)
#    et le service ne s'endort plus.
services:
  - type: web
    name: academie-compta-fr
    runtime: docker
    region: frankfurt
    plan: starter
    healthCheckPath: /sante
    autoDeploy: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PRODUCTION
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BASE_URL
        sync: false
      # Secret partagé avec le Worker Cloudflare (reverse-proxy) : l'app ne fait confiance
      # aux en-têtes x-orig-ip / x-orig-country que si x-proxy-auth correspond à cette valeur.
      # Doit être IDENTIQUE à la constante PROXY_SECRET du Worker delicate-waterfall-77f0.
      - key: PROXY_SECRET
        sync: false
      # E-mail (notifications aux apprenants) — compte Brevo gratuit. Laisser vide = e-mail désactivé.
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
      # Assistant IA (chatbot /api/chat) — clé API Anthropic. Vide = chatbot désactivé (renvoi WhatsApp).
      # La valeur se saisit dans le dashboard Render (sync:false). Le nom DOIT être exactement LLM_API_KEY.
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: claude-haiku-4-5
      # Google Agenda / Meet (RDV de test final automatiques) — identifiants OAuth du projet Google Cloud.
      # Valeurs à saisir dans le dashboard Render ; ensuite, connecter l'agenda depuis /admin (bouton dédié).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
