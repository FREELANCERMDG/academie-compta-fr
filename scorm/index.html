plis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dossier transmis sans valider à la place de l'EC</label></li></ul>\n<h2>A11. Clôture / bilan</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Cut-off : FNP, FAE, CCA, PCA passées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Stocks constatés (variation)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Amortissements passés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Provisions proposées (validation EC)</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA de clôture contrôlée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Rapprochements de clôture OK</label></li><li class=\"task\"><label><input type=\"checkbox\"> Emprunts justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Paie justifiée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Capitaux : résultat N-1 affecté</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471/580 = 0</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dossier bilan complet</label></li></ul>\n<h2>A12. ✅ QUALITÉ avant validation (à joindre à chaque livraison)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Rapprochement bancaire bouclé, 512 justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA contrôlée (taux, assurance/VP exclus, encaissements)</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471 et 580 soldés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Lettrage 401/411 réalisé, écarts soldés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Aucun doublon</label></li><li class=\"task\"><label><input type=\"checkbox\"> Caisse 53 ≥ 0, 455 justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> Soldes anormaux expliqués</label></li><li class=\"task\"><label><input type=\"checkbox\"> Anomalies documentées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces présentes / non-conformités signalées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Points en suspens listés pour le chef de mission</label></li></ul>\n<h2>A13. Organisation quotidienne (offshore)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> To-do priorisée du jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Échéances TVA de la semaine repérées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Blocages remontés immédiatement</label></li><li class=\"task\"><label><input type=\"checkbox\"> Reporting de fin de journée envoyé</label></li><li class=\"task\"><label><input type=\"checkbox\"> Tableau de bord mis à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Créneau de recouvrement FR respecté</label></li></ul>\n<h2>A14. Avant d'envoyer un mail</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Objet clair avec [CLIENT]</label></li><li class=\"task\"><label><input type=\"checkbox\"> Demande précise + action attendue + délai</label></li><li class=\"task\"><label><input type=\"checkbox\"> Contexte / solution fournis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces jointes nommées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pas de fautes, ton professionnel</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pas d'info confidentielle en canal non sécurisé</label></li></ul>", "a_mails": "<h1>ANNEXE B — Modèles de mails professionnels (prêts à l'emploi)</h1>\n<blockquote>Remplacer les [CROCHETS]. Objet toujours préfixé par <code>[CLIENT]</code>. Ton : vouvoiement, courtois, factuel.</blockquote>\n<hr>\n<h2>B1. Demande de pièce manquante</h2>\n<p><strong>Objet :</strong> [CLIENT] – Pièce manquante – [nature] [mois]</p>\n<blockquote>Bonjour,<br>En traitant [le rapprochement bancaire de [mois] / la saisie], j'ai relevé [opération : montant, tiers, date] sans justificatif associé.<br>Pourriez-vous me transmettre [la facture / le document] via [Dext/Pennylane/Drive] ?<br>En attente, je laisse l'opération en compte d'attente (471) avec commentaire.<br>Merci par avance. Cordialement, [Nom].</blockquote>\n<h2>B2. Relance pièces (liste)</h2>\n<p><strong>Objet :</strong> [CLIENT] – Relance – Pièces manquantes ([n] éléments)</p>\n<blockquote>Bonjour,<br>Pour boucler [la TVA de [mois] / le dossier] (échéance le [date]), il me manque :<br>1. [élément 1]<br>2. [élément 2]<br>3. [élément 3]<br>Merci de me les transmettre <strong>avant le [date]</strong> pour tenir l'échéance.<br>Cordialement, [Nom].</blockquote>\n<h2>B3. Signalement d'anomalie</h2>\n<p><strong>Objet :</strong> [CLIENT] – Anomalie – [sujet]</p>\n<blockquote>Bonjour,<br>En [révision / lettrage], j'ai constaté : [description factuelle + montant].<br>Impact : [ex. compte 455 débiteur / double paiement / TVA à régulariser].<br>Je propose [action proposée]. Souhaitez-vous que je procède ainsi ou attendez-vous une instruction ?<br>Détail en pièce jointe. Cordialement, [Nom].</blockquote>\n<h2>B4. Réponse au chef de mission (compte rendu)</h2>\n<p><strong>Objet :</strong> RE: [CLIENT] – [sujet]</p>\n<blockquote>Bonjour,<br>C'est fait. Synthèse :<br>- [point 1 : chiffre clé]<br>- [point 2]<br>- Point en suspens : [le cas échéant, + impact].<br>Dossier prêt à valider. Cordialement, [Nom].</blockquote>\n<h2>B5. Présentation d'un travail terminé</h2>\n<p><strong>Objet :</strong> [CLIENT] – Dossier [mois] TERMINÉ</p>\n<blockquote>Bonjour,<br>Le dossier de [mois] est finalisé et contrôlé :<br>- Saisie achats/ventes/banque : OK<br>- Rapprochement bancaire : OK (solde justifié)<br>- Lettrage 401/411 : OK · 471 : soldé<br>- TVA : préparée, à valider<br>Checklist qualité jointe. Dossier disponible dans [outil].<br>Cordialement, [Nom].</blockquote>\n<h2>B6. Remontée de blocage</h2>\n<p><strong>Objet :</strong> [CLIENT] – BLOCAGE – [cause]</p>\n<blockquote>Bonjour,<br>Je ne peux pas terminer [tâche] : [cause précise + depuis quand].<br>De mon côté : [ce qui a été fait en attendant].<br>Action attendue : [ce qu'il faut faire] — sans cela, [impact échéance].<br>Cordialement, [Nom].</blockquote>\n<h2>B7. Trop-payé / double paiement</h2>\n<p><strong>Objet :</strong> [CLIENT] – Anomalie – Double paiement [fournisseur] ([montant])</p>\n<blockquote>Bonjour,<br>En lettrant le compte 401 [fournisseur], j'ai constaté que la facture de [montant] a été <strong>payée deux fois</strong> (le [date1] et le [date2]). Le compte ressort <strong>débiteur de [montant]</strong>.<br>Je propose de signaler le trop-payé au [fournisseur/client] pour remboursement ou avoir. Souhaitez-vous que je le contacte ?<br>Cordialement, [Nom].</blockquote>\n<h2>B8. Question sur une imputation</h2>\n<p><strong>Objet :</strong> [CLIENT] – Question – Imputation [opération]</p>\n<blockquote>Bonjour,<br>Concernant [opération : montant, tiers, date], deux traitements possibles :<br>1. [option 1 + conséquence]<br>2. [option 2 + conséquence]<br>Quelle option retenez-vous ? Par défaut, je laisse en 471 avec commentaire.<br>Cordialement, [Nom].</blockquote>\n<h2>B9. Transmission TVA à valider</h2>\n<p><strong>Objet :</strong> [CLIENT] – TVA [mois] – à valider (échéance [date])</p>\n<blockquote>Bonjour,<br>Brouillon de la CA3 de [mois] en pièce jointe :<br>- TVA collectée : [montant]<br>- TVA déductible : [montant]<br>- <strong>TVA à payer : [montant]</strong><br>Banque rapprochée, 471 soldé. Merci de valider avant le [date] pour télétransmission.<br>Cordialement, [Nom].</blockquote>\n<h2>B10. Reporting journalier</h2>\n<p><strong>Objet :</strong> Reporting [date] – [Nom]</p>\n<blockquote>✅ Fait : [clients/tâches]<br>🔄 En cours : [client + %]<br>⛔ Bloqué : [client + cause + action demandée]<br>📅 Demain : [priorités]</blockquote>\n<h2>B11. Prospection cabinet (freelance)</h2>\n<p><strong>Objet :</strong> Production comptable externalisée – fiabiliser vos dossiers en période fiscale</p>\n<blockquote>Bonjour [Nom],<br>Je suis collaborateur comptable spécialisé en production externalisée pour cabinets français (saisie, TVA, rapprochement, lettrage, révision) sur [Pennylane/ACD/Sage].<br>Je propose une production fiable avec <strong>checklist qualité à chaque livraison</strong> et un <strong>taux de retour &lt; 5 %</strong>, dans le respect total de la confidentialité.<br>Seriez-vous disponible 15 min pour un échange, ou un dossier test ?<br>Cordialement, [Nom] – [contact].</blockquote>", "a_tab": "<h1>ANNEXE C — Tableaux de suivi &amp; modèles Excel à créer</h1>\n<blockquote>Recréer ces tableaux dans Excel / Google Sheets. Colonnes données ci-dessous. 💡 Astuce : 1 onglet par tableau, en-têtes figés, mise en forme conditionnelle sur les statuts/retards.</blockquote>\n<hr>\n<h2>C1. Suivi de dossier mensuel</h2>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Mois</th><th>Pièces reçues (O/N)</th><th>Relevés complets (O/N)</th><th>Saisie achats</th><th>Saisie ventes</th><th>Banque</th><th>Rapprochement</th><th>Lettrage</th><th>TVA préparée</th><th>TVA validée</th><th>Pièces manquantes</th><th>Anomalies</th><th>Statut</th><th>Date livraison</th></tr></thead><tbody></tbody></table></div>\n<p>Statuts : <code>À FAIRE / EN COURS / BLOQUÉ / À VALIDER / TERMINÉ</code>.<br>Mise en forme : rouge si BLOQUÉ, orange si échéance &lt; 3 jours, vert si TERMINÉ.</p>\n<hr>\n<h2>C2. Tableau de bord de production (KPI)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Échéance TVA</th><th>Pièces reçues le</th><th>Saisie</th><th>Banque</th><th>TVA</th><th>Livré le</th><th>Validé</th><th>Retour (O/N)</th><th>Anomalies</th><th>Temps passé</th></tr></thead><tbody></tbody></table></div>\n<p>KPI à calculer (synthèse en bas) :</p>\n<ul><li><strong>Dossiers traités</strong> : <code>NB.SI(Statut;\"TERMINÉ\")</code></li><li><strong>% TVA à l'heure</strong> : livraisons avant échéance / total</li><li><strong>Taux de retour</strong> : <code>NB.SI(Retour;\"O\") / total dossiers</code> → <strong>cible &lt; 5 %</strong></li></ul>\n<hr>\n<h2>C3. État de rapprochement bancaire</h2>\n<div class=\"tbl\"><table><thead><tr><th></th><th>Côté COMPTA (512)</th><th>Côté BANQUE (relevé)</th></tr></thead><tbody><tr><td>Solde de départ</td><td></td><td></td></tr><tr><td>(+) Encaissements non crédités</td><td></td><td></td></tr><tr><td>(−) Chèques émis non débités</td><td></td><td></td></tr><tr><td>(+) Opérations sur relevé non saisies</td><td></td><td></td></tr><tr><td><strong>Solde corrigé</strong></td><td><code>=</code></td><td><code>=</code></td></tr></tbody></table></div>\n<p>Contrôle (cellule) : <code>=SI(SoldeComptaCorrigé=SoldeBanqueCorrigé;\"OK\";\"ÉCART À CHERCHER\")</code>.</p>\n<hr>\n<h2>C4. Balance âgée (clients / fournisseurs)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Tiers</th><th>Total dû</th><th>0–30 j</th><th>31–60 j</th><th>61–90 j</th><th>&gt; 90 j</th><th>Statut</th></tr></thead><tbody></tbody></table></div>\n<p>Mise en forme : rouge sur la colonne &gt; 90 j ; statut <code>À RELANCER</code> si &gt; 60 j.</p>\n<hr>\n<h2>C5. Suivi des pièces manquantes</h2>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Date détection</th><th>Opération (montant/tiers/date)</th><th>Type de pièce</th><th>Demandé le</th><th>Relancé le</th><th>Reçu (O/N)</th><th>Statut</th></tr></thead><tbody></tbody></table></div>\n<hr>\n<h2>C6. Fichier des immobilisations</h2>\n<div class=\"tbl\"><table><thead><tr><th>Bien</th><th>Date mise en service</th><th>Base HT</th><th>Durée</th><th>Taux</th><th>Dotation N</th><th>Amort. cumulés</th><th>VNC</th></tr></thead><tbody></tbody></table></div>\n<p>Contrôles (bas de tableau) :</p>\n<ul><li><code>Σ Base HT</code> = soldes comptes 21/20</li><li><code>Σ Amort. cumulés</code> = soldes comptes 28</li><li><code>Σ Dotation N</code> = compte 6811</li></ul>\n<hr>\n<h2>C7. Suivi des comptes d'attente (471)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Date</th><th>Montant</th><th>Sens (D/C)</th><th>Libellé banque</th><th>Nature présumée</th><th>Action</th><th>Relancé le</th><th>Statut</th></tr></thead><tbody></tbody></table></div>\n<p>Statut : <code>EN ATTENTE / IMPUTÉ / À VALIDER</code>. Objectif : tout passer à IMPUTÉ avant clôture.</p>\n<hr>\n<h2>C8. Contrôle paie (rapprochement 4 sources)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Mois</th><th>Brut (OD)</th><th>Brut (bulletins)</th><th>Brut (DSN)</th><th>Net (OD)</th><th>Net versé (banque)</th><th>Cotisations (OD)</th><th>Cotisations (DSN)</th><th>Cotisations payées</th><th>Écart</th><th>OK ?</th></tr></thead><tbody></tbody></table></div>\n<hr>\n<h2>C9. Carnet d'erreurs personnel (progression)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Date</th><th>Dossier</th><th>Erreur</th><th>Cause</th><th>Correction</th><th>Action préventive</th></tr></thead><tbody></tbody></table></div>\n<blockquote>Outil n°1 de montée en compétence : on n'y inscrit chaque retour du cabinet qu'une seule fois.</blockquote>\n<hr>\n<h2>C10. Planning mensuel multi-clients</h2>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Régime TVA</th><th>Échéance</th><th>Date réception pièces cible</th><th>Date livraison cible</th><th>Charge estimée (h)</th><th>Semaine</th></tr></thead><tbody></tbody></table></div>\n<p>But : lisser la charge sur le mois, éviter l'embouteillage de fin de période.</p>", "a_attest": "<h1>ANNEXE D — Modèle d'attestation de fin de formation</h1>\n<blockquote>À personnaliser avec le logo et l'en-tête de <strong>MG CONSULTING IT&amp;ACT</strong>.</blockquote>\n<hr>\n<div align=\"center\">\n<p><strong>MG CONSULTING IT&amp;ACT</strong></p>\n<h1>ATTESTATION DE FIN DE FORMATION</h1>\n<p><strong>Formation complète en comptabilité française externalisée depuis Madagascar</strong></p>\n<p><em>Délivrée par MG CONSULTING IT&amp;ACT (MG Consulting IT &amp; ACT) — SARL au capital de 2 400 000 Ar — RCS Antananarivo 2024 B 00906</em></p>\n</div>\n<hr>\n<p>Je soussigné(e) <strong>M. RANDRIAMANANTSOA Heriniaina Anthony</strong>, formateur, agiss const QUIZ={"m01": {"title": "Module 1 — Environnement comptable français", "questions": [{"q": "Qui peut signer la liasse fiscale ?", "options": ["Le collaborateur", "Le chef de mission", "L'expert-comptable"], "answer": 2, "explain": "Seul l'expert-comptable engage sa responsabilité et signe."}, {"q": "La « tenue » d'un dossier désigne :", "options": ["La révision finale", "La mise à jour mensuelle", "Le dépôt au greffe"], "answer": 1, "explain": "Tenir = mettre à jour mois par mois (saisie + TVA + banque)."}, {"q": "Combien de temps conserver les pièces comptables ?", "options": ["3 ans", "5 ans", "10 ans"], "answer": 2, "explain": "Conservation 10 ans (Code de commerce)."}, {"q": "Un fichier client peut-il transiter par Gmail personnel ?", "options": ["Oui si urgent", "Non, jamais", "Oui si supprimé après"], "answer": 1, "explain": "Confidentialité / RGPD : jamais sur un support personnel."}, {"q": "Les 4 piliers qualité offshore sont :", "options": ["Vitesse, prix, volume, stock", "Rigueur, fiabilité, anticipation, traçabilité", "Saisie, TVA, banque, bilan"], "answer": 1, "explain": "Rigueur, fiabilité, anticipation, traçabilité."}]}, "m02": {"title": "Module 2 — Bases de comptabilité (PCG)", "questions": [{"q": "Quand l'argent entre en banque, le compte 512 est :", "options": ["Débité", "Crédité"], "answer": 0, "explain": "Entrée d'argent = 512 au débit."}, {"q": "La TVA collectée est enregistrée au compte :", "options": ["44566", "44571"], "answer": 1, "explain": "44571 = TVA collectée sur les ventes."}, {"q": "Une charge (classe 6) augmente au :", "options": ["Débit", "Crédit"], "answer": 0, "explain": "Les charges augmentent au débit."}, {"q": "Le compte caisse 53 peut-il être créditeur ?", "options": ["Oui", "Non"], "answer": 1, "explain": "Impossible : une caisse ne peut pas être négative."}, {"q": "Un client qui me doit de l'argent : compte 411 au :", "options": ["Débit", "Crédit"], "answer": 0, "explain": "Créance client = 411 au débit."}]}, "m03": {"title": "Module 3 — Organisation du dossier externalisé", "questions": [{"q": "Que faire d'un devis reçu en pièce ?", "options": ["Le saisir comme une facture", "Ne pas le saisir (ce n'est pas une pièce comptable)", "Le passer en 471"], "answer": 1, "explain": "Un devis n'est pas une pièce comptable."}, {"q": "Une dépense sans justificatif au rapprochement :", "options": ["On invente une imputation", "On passe en 471 + relance, sans déduire la TVA", "On l'ignore"], "answer": 1, "explain": "471 + commentaire + relance ; pas de TVA sans pièce conforme."}, {"q": "Une facture conforme doit comporter notamment :", "options": ["Le SIREN, la date, le n° de facture, la TVA détaillée", "Uniquement le montant TTC", "Uniquement le logo"], "answer": 0, "explain": "Mentions légales obligatoires."}, {"q": "Une facture au nom personnel du gérant :", "options": ["Se déduit normalement", "Se signale (charge personnelle probable), TVA non déduite", "Se passe en immobilisation"], "answer": 1, "explain": "Charge personnelle potentielle : signaler."}, {"q": "Bon format de nommage d'un fichier :", "options": ["facture1.pdf", "AAAA-MM-JJ_TYPE_TIERS_MONTANT.pdf", "scan.jpg"], "answer": 1, "explain": "Nommage normalisé = recherche instantanée."}]}, "m04": {"title": "Module 4 — Saisie comptable pratique", "questions": [{"q": "La TVA sur une assurance est :", "options": ["20 %", "Non déductible (exonérée)"], "answer": 1, "explain": "Les assurances sont exonérées de TVA."}, {"q": "Une facture d'un fournisseur en franchise en base :", "options": ["Porte une TVA à 20 %", "Ne porte pas de TVA"], "answer": 1, "explain": "Mention art. 293 B du CGI, pas de TVA."}, {"q": "Le compte 512 crédité signifie :", "options": ["Entrée d'argent", "Sortie d'argent"], "answer": 1, "explain": "512 crédité = sortie."}, {"q": "L'autoliquidation est :", "options": ["Neutre en TVA mais obligatoire sur la CA3", "Une exonération totale"], "answer": 0, "explain": "On collecte ET déduit soi-même."}, {"q": "L'achat d'un ordinateur à 1 800 € HT se saisit en :", "options": ["Charge (606)", "Immobilisation (2183)"], "answer": 1, "explain": "> 500 € HT et durable = immobilisation."}]}, "m05": {"title": "Module 5 — TVA française", "questions": [{"q": "La TVA à décaisser =", "options": ["Collectée + déductible", "Collectée − déductible"], "answer": 1, "explain": "On reverse la différence."}, {"q": "Les prestations de services sont taxables par défaut :", "options": ["Sur les débits", "Sur les encaissements"], "answer": 1, "explain": "TVA exigible à l'encaissement pour les services."}, {"q": "Seuil de franchise en base SERVICES 2026 :", "options": ["85 000 €", "37 500 €", "25 000 €"], "answer": 1, "explain": "37 500 € (tolérance 41 250 €)."}, {"q": "La déclaration du régime réel normal est la :", "options": ["CA12", "CA3"], "answer": 1, "explain": "CA3 mensuelle (ou trimestrielle)."}, {"q": "La TVA sur un véhicule de tourisme est :", "options": ["Déductible", "Non déductible"], "answer": 1, "explain": "TVA non récupérable sur les VP."}]}, "m06": {"title": "Module 6 — Rapprochement bancaire", "questions": [{"q": "L'objectif du rapprochement bancaire est de :", "options": ["Calculer la TVA", "Prouver que le solde 512 = relevé bancaire", "Lettrer les clients"], "answer": 1, "explain": "Justifier le solde de banque."}, {"q": "Un virement interne se passe au compte :", "options": ["471", "580", "467"], "answer": 1, "explain": "580 = virements internes, doit se solder à 0."}, {"q": "Des frais bancaires oubliés se trouvent :", "options": ["Côté compta seulement", "Côté relevé seulement"], "answer": 1, "explain": "À saisir : 627 / 512."}, {"q": "Un chèque émis non encore débité manque :", "options": ["Côté compta", "Côté banque (pas encore débité)"], "answer": 1, "explain": "La compta l'a déjà retiré, la banque pas encore."}, {"q": "Face à un écart résiduel inexpliqué, il faut :", "options": ["Le forcer à 0", "Le rechercher (montant/libellé) et corriger"], "answer": 1, "explain": "Ne jamais forcer un rapprochement."}]}, "m07": {"title": "Module 7 — Lettrage clients / fournisseurs", "questions": [{"q": "Le lettrage sert à :", "options": ["Calculer l'amortissement", "Rapprocher factures et règlements", "Établir la liasse"], "answer": 1, "explain": "On connaît ainsi le restant dû."}, {"q": "Un compte 411 créditeur signifie :", "options": ["Le client doit de l'argent", "Le client a trop payé (ou acompte)"], "answer": 1, "explain": "C'est une dette envers le client."}, {"q": "Un compte 401 débiteur signifie :", "options": ["On doit au fournisseur", "Le fournisseur nous doit (avoir/acompte/double paiement)"], "answer": 1, "explain": "À régulariser."}, {"q": "Un écart de règlement de quelques centimes se solde via :", "options": ["471", "658 / 758 (ou 627)"], "answer": 1, "explain": "Charges/produits divers, puis lettrage."}, {"q": "La balance âgée classe les créances par :", "options": ["Montant", "Ancienneté"], "answer": 1, "explain": "0-30 j, 30-60 j, etc. → relances."}]}, "m08": {"title": "Module 8 — Comptes d'attente et sensibles", "questions": [{"q": "Le compte 471 au bilan doit être :", "options": ["Débiteur", "Créditeur", "Nul"], "answer": 2, "explain": "Tout doit être imputé avant la clôture."}, {"q": "Sur chaque ligne en 471, il faut toujours :", "options": ["Un commentaire (date, nature, action)", "Rien", "Un montant arrondi"], "answer": 0, "explain": "Traçabilité indispensable."}, {"q": "Le compte 580 doit avoir un solde :", "options": ["Débiteur", "Égal à 0", "Créditeur"], "answer": 1, "explain": "Sinon un côté de virement manque."}, {"q": "Un compte 455 débiteur dans une SARL :", "options": ["Est normal", "Se signale au chef de mission (avance possiblement interdite)"], "answer": 1, "explain": "Risque d'abus de biens sociaux."}, {"q": "Une opération bancaire inconnue après recherche :", "options": ["S'invente", "Reste en 471 + relance client", "Se supprime"], "answer": 1, "explain": "Demander la nature au client."}]}, "m09": {"title": "Module 9 — Paie e  {"q": "Le solde du compte 580 attendu est :", "options": ["0", "Débiteur", "Créditeur"], "answer": 0, "explain": "Virements internes soldés."}, {"q": "Une caisse 53 créditrice est :", "options": ["Normale", "Anormale (impossible)"], "answer": 1, "explain": "À corriger."}, {"q": "Dans le cycle emprunts, le compte 164 doit égaler :", "options": ["Le capital restant dû (tableau banque)", "Les intérêts payés"], "answer": 0, "explain": "Rapprochement avec l'échéancier."}, {"q": "Une feuille de travail contient notamment :", "options": ["Solde, justification, anomalies, conclusion", "Uniquement le solde"], "answer": 0, "explain": "Preuve du travail pour le chef de mission."}]}, "m12": {"title": "Module 12 — Fiscalité des entreprises", "questions": [{"q": "Le taux normal d'IS en 2026 est :", "options": ["15 %", "25 %", "33 %"], "answer": 1, "explain": "25 % (taux réduit 15 % sous conditions)."}, {"q": "Le taux réduit d'IS 15 % s'applique sur les premiers :", "options": ["38 120 €", "42 500 €", "50 000 €"], "answer": 1, "explain": "Si CA < 10 M€ et capital détenu ≥ 75 % par des personnes physiques."}, {"q": "La déclaration de résultat à l'IS est la :", "options": ["2031", "2035", "2065"], "answer": 2, "explain": "2065 = IS ; 2031 = BIC ; 2035 = BNC."}, {"q": "Les acomptes d'IS sont dus les :", "options": ["15/01-04-07-10", "15/03-06-09-12", "15/02-05-08-11"], "answer": 1, "explain": "Quatre acomptes trimestriels."}, {"q": "La CVAE en 2026 est :", "options": ["Supprimée", "Encore due (suppression repoussée à 2030)"], "answer": 1, "explain": "Taux max 0,28 % en 2026."}]}, "m13": {"title": "Module 13 — Bilan et clôture", "questions": [{"q": "Une FNP correspond à :", "options": ["Un produit constaté d'avance", "Une charge de N facturée en N+1", "Une charge d'avance"], "answer": 1, "explain": "Facture Non Parvenue."}, {"q": "Le principe qui justifie le cut-off est :", "options": ["La prudence", "L'indépendance des exercices"], "answer": 1, "explain": "Rattacher charges/produits ], "answer": 1, "explain": "Toujours proposer une solution."}, {"q": "Le ton attendu avec un cabinet français est :", "options": ["Familier", "Vouvoiement, courtois et factuel"], "answer": 1, "explain": "Professionnalisme."}, {"q": "Quand un travail est terminé, on envoie :", "options": ["Rien", "Un résumé des contrôles faits + ce qui reste à valider"], "answer": 1, "explain": "Avec la checklist qualité."}]}, "m16": {"title": "Module 16 — Production offshore", "questions": [{"q": "Le décalage Madagascar / France est de :", "options": ["3 h de retard", "1 à 2 h d'avance (Mada UTC+3)", "Aucun"], "answer": 1, "explain": "Avantage relais possible."}, {"q": "L'indicateur qui reflète le mieux l'autonomie est :", "options": ["Le volume", "Le taux de retour (< 5 %)"], "answer": 1, "explain": "Confiance du cabinet."}, {"q": "La priorité n°1 dans les échéances est :", "options": ["Le lettrage rétroactif", "Les échéances TVA"], "answer": 1, "explain": "Non négociables."}, {"q": "Un bon reporting journalier contient :", "options": ["Fait / en cours / bloqué / prévu demain", "Uniquement le temps passé"], "answer": 0, "explain": "Clair et structuré."}, {"q": "Pourquoi ne pas livrer la TVA au dernier moment ?", "options": ["Par habitude", "Risque de retard = pénalités + perte de confiance"], "answer": 1, "explain": "Anticiper toujours."}]}, "m17": {"title": "Module 17 — Qualité et contrôle interne", "questions": [{"q": "Avant livraison, doivent être à 0 les comptes :", "options": ["401 et 411", "471 et 580", "641 et 645"], "answer": 1, "explain": "Comptes d'attente apurés."}, {"q": "Une charge au nom du dirigeant :", "options": ["Se déduit avec TVA", "Se signale, TVA non déduite"], "answer": 1, "explain": "Charge personnelle probable."}, {"q": "Déduire la TVA sur une assurance est :", "options": ["Correct", "Une erreur (assurance exonérée)"], "answer": 1, "explain": "Erreur fréquente à éviter."}, {"q": "Le carnet d'erreurs sert à :", "options": ["Punir", "Ne pas reproduire les err l", "Le chef de mission / l'expert-comptable"], "answer": 1, "explain": "Le collaborateur prépare."}]}, "m22": {"title": "Module 22 — Tiime", "questions": [{"q": "La pré-catégorisation Tiime est :", "options": ["Fiable à 100 %", "Une suggestion à contrôler"], "answer": 1, "explain": "Toujours vérifier."}, {"q": "Une dépense personnelle payée par le compte pro va en :", "options": ["Charge (classe 6)", "Compte courant d'associé (455)"], "answer": 1, "explain": "Pas en charge société."}, {"q": "Pour un prestataire de services, la TVA est exigible :", "options": ["Sur les débits", "Sur les encaissements"], "answer": 1, "explain": "Encaissements par défaut."}, {"q": "Une transaction sans justificatif :", "options": ["Se valide quand même", "Reste en attente + relance"], "answer": 1, "explain": "Pas de pièce, pas de validation."}]}, "m23": {"title": "Module 23 — Quadra (Cegid)", "questions": [{"q": "Avant de saisir dans Quadra, on vérifie :", "options": ["Dossier + exercice + période", "Rien"], "answer": 0, "explain": "Le bon contexte."}, {"q": "Un guide d'écriture sert à saisir vite mais :", "options": ["Le compte/TVA peuvent être inadaptés (à contrôler)", "Est toujours juste"], "answer": 0, "explain": "Vérifier le rendu du guide."}, {"q": "Les virements internes se soldent via :", "options": ["471", "580"], "answer": 1, "explain": "580 = 0."}, {"q": "En fin de saisie, les brouillards doivent être :", "options": ["Validés", "Laissés en attente"], "answer": 0, "explain": "Sinon écritures oubliées."}]}, "m24": {"title": "Module 24 — Isacompta (ISAGRI)", "questions": [{"q": "Isacompta est très présent dans les dossiers :", "options": ["Uniquement industriels", "Agricoles (BA) et aussi BIC/BNC/IS"], "answer": 1, "explain": "Édité par ISAGRI."}, {"q": "Pourquoi vérifier le régime fiscal avant de produire ?", "options": ["Il conditionne la liasse et certains traitements", "Sans importance"], "answer": 0, "explain": "BA ≠ BIC."}, {"q": "Avant une édition finale, on apure :", "options": ["641 et 645", "471 et 580"], "answer": 1, "explain": "Comptes d'attente à 0."}, {"q": "La liasse fiscale est validée par :", "options": ["Le collaborateur", "L'expert-comptable"], "answer": 1, "explain": "Décision fiscale réservée."}]}, "final": {"title": "Examen final (échantillon QCM)", "questions": [{"q": "La TVA à décaisser =", "options": ["Collectée + déductible", "Collectée − déductible", "Déductible − collectée"], "answer": 1, "explain": ""}, {"q": "Le compte 401 enregistre :", "options": ["Les clients", "Les fournisseurs", "La banque"], "answer": 1, "explain": ""}, {"q": "Seuil de franchise en base services 2026 :", "options": ["85 000 €", "37 500 €", "25 000 €"], "answer": 1, "explain": ""}, {"q": "La TVA sur une assurance est :", "options": ["20 %", "10 %", "Non déductible"], "answer": 2, "explain": ""}, {"q": "Le compte de virements internes est le :", "options": ["471", "580", "467"], "answer": 1, "explain": ""}, {"q": "Taux normal d'IS 2026 :", "options": ["15 %", "28 %", "25 %"], "answer": 2, "explain": ""}, {"q": "La dotation aux amortissements se passe au débit du :", "options": ["28", "6811", "215"], "answer": 1, "explain": ""}, {"q": "Le 471 au bilan doit être :", "options": ["Débiteur", "Créditeur", "Nul"], "answer": 2, "explain": ""}, {"q": "PMSS 2026 :", "options": ["3 864 €", "4 005 €", "3 666 €"], "answer": 1, "explain": ""}, {"q": "Qui signe la liasse fiscale ?", "options": ["Le collaborateur", "Le chef de mission", "L'expert-comptable"], "answer": 2, "explain": ""}]}};
const KEY="fce_progress_v1";
let prog=JSON.parse(localStorage.getItem(KEY)||'{"done":{},"quiz":{}}');
function save(){localStorage.setItem(KEY,JSON.stringify(prog));}
function titleOf(id){for(const g of NAV)for(const it of g.items)if(it.id===id)return it.title;return id;}
function quizOf(id){for(const g of NAV)for(const it of g.items)if(it.id===id)return it.quiz;return null;}
function renderNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  for(const g of NAV){
    const h=document.createElement('div');h.className='grp';h.textContent=g.group;nav.appendChild(h);
    for(const it of g.items){
      const a=document.createElement('a');a.className='item'+(prog.done[it.id]?' done':'');a.href='#'+it.id;a.dataset.id=it.id;
      a.innerHTML='<span class="dot">'+(prog.done[it.id]?'&#10003;':'')+'</span><span class="t">'+it.title+'</span>';
      nav.appendChild(a);
    }
  }
  updateProgress();
}
function updateProgress(){
  const total=ORDER.length;let d=0;for(const id of ORDER)if(prog.done[id])d++;
  const pct=Math.round(d/total*100);
  document.getElementById('progi').style.width=pct+'%';
  document.getElementById('progt').textContent=pct+'%';
}
function show(id){
  if(!CONTENT[id])id=ORDER[0];
  document.getElementById('content').innerHTML=CONTENT[id];
  document.getElementById('crumbs').textContent=titleOf(id);
  document.querySelectorAll('.sidebar a.item').forEach(a=>a.classList.toggle('active',a.dataset.id===id));
  // boutons prev/next
  const idx=ORDER.indexOf(id);
  document.getElementById('prevb').onclick=()=>{if(idx>0)location.hash=ORDER[idx-1];};
  document.getElementById('nextb').onclick=()=>{if(idx<ORDER.length-1)location.hash=ORDER[idx+1];};
  const db=document.getElementById('doneb');
  function refreshDone(){db.textContent=prog.done[id]?'✓ Termine':'Marquer comme termine';db.classList.toggle('sec',!!prog.done[id]);}
  db.onclick=()=>{prog.done[id]=!prog.done[id];save();renderNav();refreshDone();};
  refreshDone();
  // quiz
  const qk=quizOf(id);const qm=document.getElementById('quizmount');qm.innerHTML='';
  if(qk&&QUIZ[qk])qm.appendChild(buildQuiz(qk));
  window.scrollTo(0,0);
  document.querySelector('.sidebar').classList.remove('open');
}
function buildQuiz(qk){
  const data=QUIZ[qk];const wrap=document.createElement('div');wrap.className='quiz';
  const prev=prog.quiz[qk];
  let head='<h3>&#128221; Quiz - '+data.title+'</h3>';
  if(prev)head+='<p>Dernier score : <span class="badge '+(prev.score/prev.total>=0.7?'ok':'ko')+'">'+prev.score+'/'+prev.total+'</span></p>';
  wrap.innerHTML=head;
  const form=document.createElement('div');
  data.questions.forEach((q,qi)=>{
    const qd=document.createElement('div');qd.className='q';qd.dataset.a=q.answer;
    qd.innerHTML='<b>'+(qi+1)+'. '+q.q+'</b>';
    q.options.forEach((o,oi)=>{
      const lab=document.createElement('label');lab.className='opt';
      lab.innerHTML='<input type="radio" name="q'+qi+'" value="'+oi+'"> '+o;
      qd.appendChild(lab);
    });
    if(q.explain){const e=document.createElement('div');e.className='exp';e.textContent='→ '+q.explain;qd.appendChild(e);}
    form.appendChild(qd);
  });
  wrap.appendChild(form);
  const res=document.createElement('div');res.className='score';
  const btn=document.createElement('button');btn.className='btn';btn.textContent='Valider le quiz';
  btn.onclick=()=>{
    let score=0;
    wrap.querySelectorAll('.q').forEach((qd)=>{
      const a=+qd.dataset.a;const sel=qd.querySelector('input:checked');
      qd.querySelectorAll('.opt').forEach((opt,oi)=>{opt.classList.remove('correct','wrong');if(oi===a)opt.classList.add('correct');});
      if(sel){const v=+sel.value;if(v===a)score++;else qd.querySelectorAll('.opt')[v].classList.add('wrong');}
      const exp=qd.querySelector('.exp');if(exp)exp.style.display='block';
    });
    const total=data.questions.length;
    res.innerHTML='Score : <span class="badge '+(score/total>=0.7?'ok':'ko')+'">'+score+'/'+total+'</span> '+(score/total>=0.7?'- Reussi !':'- Seuil 70% non atteint, revoyez le module.');
    prog.quiz[qk]={score,total};if(score/total>=0.7)prog.done[curId()]=true;save();renderNav();
  };
  wrap.appendChild(btn);wrap.appendChild(res);
  return wrap;
}
function curId(){return location.hash.slice(1)||ORDER[0];}
window.addEventListener('hashchange',()=>show(curId()));
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.sidebar a.item').forEach(a=>{a.style.display=a.textContent.toLowerCase().includes(q)?'':'none';});
});
renderNav();show(curId());
</script>

<script>

  function findAPI(w){var n=0;while(w&&!w.API&&w.parent&&w.parent!=w&&n<12){w=w.parent;n++;}return w?w.API:null;}
  var api=findAPI(window)||(window.opener?findAPI(window.opener):null);
  if(!api){return;}
  try{api.LMSInitialize("");}catch(e){return;}
  function get(k){try{return api.LMSGetValue(k);}catch(e){return"";}}

  var st=get("cmi.core.lesson_status");
  if(!st||st==="not attempted"||st==="unknown"||st===""){set("cmi.core.lesson_status","incomplete");}
  set("cmi.core.score.min","0");set("cmi.core.score.max","100");
  function report(){
    try{
      var prog=JSON.parse(localStorage.getItem("fce_progress_v1")||'{"done":{},"quiz":{}}');
      var total=(typeof ORDER!=="undefined"&&ORDER.length)?ORDER.length:25;
      var done=0;for(var i=0;i<total;i++){if(prog.done[ORDER[i]])done++;}
      var pct=Math.round(done/total*100);
      set("cmi.core.score.raw",pct);
      var qs=Object.keys(prog.quiz||{}).map(function(k){return prog.quiz[k];});
      var sc=0,tot=0;qs.forEach(function(q){sc+=q.score;tot+=q.total;});
      var qavg=tot?sc/tot:0;
      if(pct>=100){set("cmi.core.lesson_status",qavg>=0.7?"passed":"completed");}
      else{set("cmi.core.lesson_status","incomplete");}
      api.LMSCommit("");
    }catch(e){}
  }
  report();setInterval(report,5000);
  function fin(){try{report();api.LMSFinish("");}catch(e){}}
  window.addEventListener("beforeunload",fin);
  window.addEventListener("pagehide",fin);
})();
</script>
