<script>
const CONTENT={"accueil": "<h1>Formation complète en comptabilité française externalisée depuis Madagascar</h1>\n<blockquote>Programme professionnel, progressif et opérationnel — destiné aux collaborateurs comptables basés à Madagascar travaillant pour des cabinets d'expertise comptable français.<br><strong>Version 2026</strong> — chiffres fiscaux et sociaux à jour des sources officielles (impots.gouv.fr, urssaf.fr, entreprendre.service-public.fr, anc.gouv.fr, bofip.impots.gouv.fr).</blockquote>\n<hr>\n<h2>🚀 Accès à la formation en ligne</h2>\n<p><strong>Ouvrez le fichier <a href=\"site/index.html\" target=\"_blank\" rel=\"noopener\"><code>site/index.html</code></a> par double-clic</strong> : c'est la plateforme e-learning complète (autonome, hors-ligne), avec navigation des 20 modules, <strong>19 quiz auto-corrigés (100 questions)</strong>, suivi de progression et recherche. Pour la diffuser (web, LMS, vidéos), voir <a href=\"supports/00-Guide-diffusion-en-ligne.md\" target=\"_blank\" rel=\"noopener\"><code>supports/00-Guide-diffusion-en-ligne.md</code></a>.</p>\n<h2>📑 Sommaire des livrables</h2>\n<div class=\"tbl\"><table><thead><tr><th>Dossier / fichier</th><th>Contenu</th></tr></thead><tbody><tr><td><strong><code>site/index.html</code></strong></td><td>🖥️ <strong>Plateforme e-learning interactive</strong> (quiz, progression, hors-ligne)</td></tr><tr><td><code>site/build_site.py</code> · <code>quizzes.json</code></td><td>Générateur du site + banque de quiz (éditables)</td></tr><tr><td><code>README.md</code></td><td>Présentation, objectifs, programme, planning, certification (CE FICHIER)</td></tr><tr><td><code>modules/</code></td><td>Les 20 modules de cours détaillés (théorie + procédures + cas + exercices + checklists)</td></tr><tr><td><code>cas-pratiques/</code></td><td>Les 10+ cas pratiques complets corrigés</td></tr><tr><td><code>evaluations/</code></td><td>Évaluation finale certifiante (/100, corrigée)</td></tr><tr><td><code>annexes/</code></td><td>Checklists, modèles de mails, tableaux de suivi</td></tr><tr><td><strong><code>annexes/excel/Outils-Formation.xlsx</code></strong></td><td>📊 <strong>10 tableaux Excel réels</strong> (formules, listes déroulantes)</td></tr><tr><td><code>supports/</code></td><td>Guide de diffusion, guide formateur + syllabus, scripts vidéo, cahier de l'apprenant</td></tr><tr><td><strong><code>print/Formation-complete.html</code></strong></td><td>📄 <strong>Livret unique imprimable</strong> (toute la formation → « Enregistrer en PDF »)</td></tr><tr><td><strong><code>scorm/Formation-SCORM-1.2.zip</code></strong></td><td>🎓 <strong>Paquet SCORM 1.2</strong> importable dans un LMS (Moodle…) avec remontée des notes</td></tr><tr><td><strong><code>slides/Module-XX.pptx</code></strong></td><td>🖼️ <strong>18 diaporamas PowerPoint éditables</strong> (337 slides, charte graphique) pour les visios</td></tr><tr><td><strong><code>branding.json</code></strong></td><td>🎨 <strong>Charte centralisée</strong> (nom du cabinet, couleurs, logo) — re-thématise tout le pack ; voir <code>supports/04-Personnalisation-charte.md</code></td></tr><tr><td><strong><code>site/videos.json</code></strong></td><td>🎬 <strong>Vos vidéos par module</strong> (explications en malgache, YouTube/Vimeo/MP4) ; voir <code>supports/05-Integrer-vos-videos.md</code></td></tr><tr><td><strong><code>platform/</code></strong></td><td>🔐 <strong>Plateforme en ligne</strong> : inscription + condition BAC+2, profil, <strong>2FA</strong>, choix d'offre, <strong>paiement Orange Money / carte</strong>, accès protégé, espace admin (Node natif, sécurisé OWASP) ; voir <code>platform/README-PLATEFORME.md</code></td></tr><tr><td><strong><code>Dockerfile</code> · <code>render.yaml</code> · <code>Procfile</code></strong></td><td>🚀 <strong>Mise en ligne</strong> (lien public partageable) + aperçu social Open Graph ; voir <code>supports/06-Mettre-en-ligne-et-partager.md</code></td></tr></tbody></table></div>\n<hr>\n<h2>1. Présentation générale de la formation</h2>\n<p>Cette formation transforme un comptable malgache ayant des bases en un <strong>collaborateur comptable offshore autonome</strong>, capable de produire pour un cabinet français un travail conforme aux normes, aux outils et aux échéances attendus.</p>\n<p>Elle est <strong>100 % orientée production</strong> : chaque module contient non seulement la théorie, mais surtout les <strong>procédures cabinet étape par étape</strong>, des <strong>checklists prêtes à l'emploi</strong>, des <strong>cas pratiques corrigés</strong>, des <strong>modèles de mails</strong>, et la distinction systématique entre <strong>ce que le collaborateur peut faire seul</strong> et <strong>ce qui doit être validé par le chef de mission ou l'expert-comptable</strong>.</p>\n<ul><li><strong>Durée</strong> : 8 semaines (rythme intensif possible en 4 semaines, voir planning).</li><li><strong>Volume</strong> : ~120 à 150 h de travail apprenant (cours + pratique + évaluations).</li><li><strong>Format</strong> : auto-formation guidée + cas pratiques sur outils réels + évaluations corrigées.</li><li><strong>Résultat</strong> : attestation interne de niveau (Débutant validé / Intermédiaire / Avancé-Autonome).</li></ul>\n<h3>Philosophie : la « posture offshore »</h3>\n<p>Un collaborateur à Madagascar ne « tape pas des écritures ». Il est le <strong>premier maillon qualité</strong> d'un cabinet français qu'il ne voit jamais. Ses 4 mots d'ordre :</p>\n<ol><li><strong>Rigueur</strong> — zéro à-peu-près, tout est justifié par une pièce.</li><li><strong>Fiabilité</strong> — ce qui est livré « terminé » est réellement terminé et contrôlé.</li><li><strong>Anticipation</strong> — les pièces manquantes et anomalies sont signalées avant l'échéance, pas après.</li><li><strong>Traçabilité</strong> — tout est documenté : qui a fait quoi, quand, et pourquoi (commentaires, comptes d'attente justifiés).</li></ol>\n<hr>\n<h2>2. Public cible</h2>\n<ul><li>Comptables malgaches débutants ayant des <strong>bases comptables</strong> (notion de débit/crédit).</li><li>Comptables expérimentés à Madagascar souhaitant <strong>basculer vers les normes françaises</strong>.</li><li>Assistants comptables <strong>freelance</strong> visant les cabinets français.</li><li>Équipes <strong>offshore</strong> spécialisées : saisie, révision, TVA, lettrage, rapprochement bancaire, préparation bilan.</li><li>Collaborateurs utilisant <strong>Pennylane, Tiime, ACD, Sage, Cegid, Coala, Quadra, Dext, MEG, Silae, RCA, Excel</strong>.</li></ul>\n<hr>\n<h2>3. Prérequis</h2>\n<ul><li>Comprendre le mécanisme <strong>débit / crédit</strong> (la partie double).</li><li>Savoir lire une <strong>facture</strong> (HT, TVA, TTC).</li><li>Maîtrise correcte du <strong>français écrit</strong> (communication avec le cabinet).</li><li>Bureautique de base : <strong>Excel/Google Sheets</strong>, navigation web, gestion de fichiers, PDF.</li><li>Connexion internet stable + poste de travail confidentiel (cf. Module 1 — RGPD).</li></ul>\n<blockquote>Pas de prérequis en fiscalité française : tout est repris depuis la base.</blockquote>\n<hr>\n<h2>4. Objectifs pédagogiques</h2>\n<p>À la fin de la formation, l'apprenant est capable de :</p>\n<ol><li>Situer son rôle dans la <strong>chaîne de production</strong> d'un cabinet français.</li><li>Maîtriser le <strong>Plan Comptable Général (PCG)</strong> et les comptes les plus utilisés.</li><li><strong>Saisir</strong> achats, ventes, banque, caisse et OD avec la bonne TVA.</li><li>Préparer une <strong>déclaration de TVA</strong> (CA3 / CA12) pour validation.</li><li>Réaliser un <strong>rapprochement bancaire</strong> complet et justifier le solde 512.</li><li><strong>Lettrer</strong> les comptes clients (411) et fournisseurs (401) et sortir une balance âgée.</li><li>Analyser et <strong>apurer les comptes d'attente</strong> (471) et comptes sensibles.</li><li>Comptabiliser une <strong>OD de paie</strong> et justifier les charges sociales.</li><li>Gérer les <strong>immobilisations</strong> et tableaux d'amortissement.</li><li>Mener une <strong>révision par cycle</strong> et préparer un dossier pour le chef de mission.</li><li>Comprendre la <strong>fiscalité</strong> des entreprises (IR/IS, BIC/BNC, liasse) et préparer les éléments <strong>sans se substituer à l'expert-comptable</strong>.</li><li>Participer aux <strong>travaux de clôture / bilan</strong> (cut-off, FNP, CCA, FAE, PCA).</li><li>Travailler efficacement sur les <strong>outils</strong> du cabinet.</li><li><strong>Communiquer</strong> de façon professionnelle (mails, relances, remontée d'anomalies).</li><li>Organiser une <strong>production offshore</strong> fiable (reporting, priorisation, contrôle qualité).</li></ol>\n<hr>\n<h2>5. Compétences obtenues (référentiel)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Domaine</th><th>Compétence opérationnelle</th></tr></thead><tbody><tr><td>Saisie</td><td>Saisir 100 % des pièces courantes, TVA correcte, sans doublon</td></tr><tr><td>TVA</td><td>Préparer une CA3/CA12 contrôlée, prête à valider</td></tr><tr><td>Trésorerie</td><td>Rapprochement bancaire justifié, solde 512 prouvé</td></tr><tr><td>Tiers</td><td>Lettrage complet, balance âgée, comptes 401/411 justifiés</td></tr><tr><td>Attente</td><td>471/455/467 analysés et apurés, anomalies documentées</td></tr><tr><td>Social</td><td>OD de paie comptabilisée et rapprochée (bulletins/DSN/paiements)</td></tr><tr><td>Immobilisations</td><td>Fichier immo tenu, amortissements contrôlés</td></tr><tr><td>Révision</td><td>Cycles révisés, soldes justifiés, feuilles de travail produites</td></tr><tr><td>Fiscalité</td><td>Éléments de liasse préparés pour l'expert-comptable</td></tr><tr><td>Bilan</td><td>Dossier de clôture préparé (cut-off, FNP/CCA/FAE/PCA)</td></tr><tr><td>Outils</td><td>Autonomie sur Pennylane/Tiime/Dext + 1 outil « cabinet » (ACD/Sage/Cegid…)</td></tr><tr><td>Soft skills</td><td>Mails pro, reporting, anticipation, confidentialité</td></tr></tbody></table></div>\n<hr>\n<h2>6. Programme détaillé (20 modules)</h2>\n<div class=\"tbl\"><table><thead><tr><th>#</th><th>Module</th><th>Niveau</th><th>Lien</th></tr></thead><tbody><tr><td>1</td><td>Comprendre l'environnement comptable français</td><td>Débutant</td><td><a href=\"modules/Module-01-Environnement-comptable-francais.md\" target=\"_blank\" rel=\"noopener\">modules/Module-01...</a></td></tr><tr><td>2</td><td>Bases de comptabilité française (PCG)</td><td>Débutant</td><td><a href=\"modules/Module-02-Bases-comptabilite-PCG.md\" target=\"_blank\" rel=\"noopener\">Module-02</a></td></tr><tr><td>3</td><td>Organisation d'un dossier externalisé</td><td>Débutant</td><td><a href=\"modules/Module-03-Organisation-dossier-externalise.md\" target=\"_blank\" rel=\"noopener\">Module-03</a></td></tr><tr><td>4</td><td>Saisie comptable pratique</td><td>Débutant→Inter.</td><td><a href=\"modules/Module-04-Saisie-comptable-pratique.md\" target=\"_blank\" rel=\"noopener\">Module-04</a></td></tr><tr><td>5</td><td>TVA française</td><td>Intermédiaire</td><td><a href=\"modules/Module-05-TVA-francaise.md\" target=\"_blank\" rel=\"noopener\">Module-05</a></td></tr><tr><td>6</td><td>Rapprochement bancaire</td><td>Intermédiaire</td><td><a href=\"modules/Module-06-Rapprochement-bancaire.md\" target=\"_blank\" rel=\"noopener\">Module-06</a></td></tr><tr><td>7</td><td>Lettrage clients / fournisseurs</td><td>Intermédiaire</td><td><a href=\"modules/Module-07-Lettrage-clients-fournisseurs.md\" target=\"_blank\" rel=\"noopener\">Module-07</a></td></tr><tr><td>8</td><td>Comptes d'attente et comptes sensibles</td><td>Intermédiaire</td><td><a href=\"modules/Module-08-Comptes-attente-sensibles.md\" target=\"_blank\" rel=\"noopener\">Module-08</a></td></tr><tr><td>9</td><td>Paie et écritures sociales</td><td>Intermédiaire</td><td><a href=\"modules/Module-09-Paie-ecritures-sociales.md\" target=\"_blank\" rel=\"noopener\">Module-09</a></td></tr><tr><td>10</td><td>Immobilisations et amortissements</td><td>Intermédiaire</td><td><a href=\"modules/Module-10-Immobilisations-amortissements.md\" target=\"_blank\" rel=\"noopener\">Module-10</a></td></tr><tr><td>11</td><td>Révision comptable continue</td><td>Avancé</td><td><a href=\"modules/Module-11-Revision-comptable.md\" target=\"_blank\" rel=\"noopener\">Module-11</a></td></tr><tr><td>12</td><td>Fiscalité des entreprises</td><td>Avancé</td><td><a href=\"modules/Module-12-Fiscalite-entreprises.md\" target=\"_blank\" rel=\"noopener\">Module-12</a></td></tr><tr><td>13</td><td>Bilan et clôture</td><td>Avancé</td><td><a href=\"modules/Module-13-Bilan-cloture.md\" target=\"_blank\" rel=\"noopener\">Module-13</a></td></tr><tr><td>14</td><td>Outils des cabinets français</td><td>Transversal</td><td><a href=\"modules/Module-14-Outils-cabinets.md\" target=\"_blank\" rel=\"noopener\">Module-14</a></td></tr><tr><td>15</td><td>Communication professionnelle</td><td>Transversal</td><td><a href=\"modules/Module-15-Communication-professionnelle.md\" target=\"_blank\" rel=\"noopener\">Module-15</a></td></tr><tr><td>16</td><td>Méthode de production offshore</td><td>Transversal</td><td><a href=\"modules/Module-16-Production-offshore.md\" target=\"_blank\" rel=\"noopener\">Module-16</a></td></tr><tr><td>17</td><td>Qualité, erreurs fréquentes, contrôle interne</td><td>Transversal</td><td><a href=\"modules/Module-17-Qualite-controle-interne.md\" target=\"_blank\" rel=\"noopener\">Module-17</a></td></tr><tr><td>18</td><td>Cas pratiques complets</td><td>Tous</td><td><a href=\"cas-pratiques/Cas-pratiques-corriges.md\" target=\"_blank\" rel=\"noopener\">cas-pratiques/</a></td></tr><tr><td>19</td><td>Évaluation finale</td><td>Tous</td><td><a href=\"evaluations/Evaluation-finale.md\" target=\"_blank\" rel=\"noopener\">evaluations/</a></td></tr><tr><td>20</td><td>Parcours carrière et freelancing</td><td>Tous</td><td><a href=\"modules/Module-20-Carriere-freelancing.md\" target=\"_blank\" rel=\"noopener\">Module-20</a></td></tr><tr><td>21</td><td><strong>Logiciel : Pennylane</strong></td><td>Inter.</td><td><a href=\"modules/Module-21-Logiciel-Pennylane.md\" target=\"_blank\" rel=\"noopener\">Module-21</a></td></tr><tr><td>22</td><td><strong>Logiciel : Tiime</strong></td><td>Inter.</td><td><a href=\"modules/Module-22-Logiciel-Tiime.md\" target=\"_blank\" rel=\"noopener\">Module-22</a></td></tr><tr><td>23</td><td><strong>Logiciel : Quadra (Cegid)</strong></td><td>Inter.→Av.</td><td><a href=\"modules/Module-23-Logiciel-Quadra.md\" target=\"_blank\" rel=\"noopener\">Module-23</a></td></tr><tr><td>24</td><td><strong>Logiciel : Isacompta (ISAGRI)</strong></td><td>Inter.→Av.</td><td><a href=\"modules/Module-24-Logiciel-Isacompta.md\" target=\"_blank\" rel=\"noopener\">Module-24</a></td></tr></tbody></table></div>\n<hr>\n<h2>7. Planning recommandé sur 8 semaines</h2>\n<blockquote>Rythme conseillé : ~15–18 h/semaine. Chaque semaine = cours + cas pratiques + mini-évaluation.</blockquote>\n<div class=\"tbl\"><table><thead><tr><th>Semaine</th><th>Modules</th><th>Objectif de la semaine</th><th>Livrable de contrôle</th></tr></thead><tbody><tr><td><strong>S1</strong></td><td>1, 2</td><td>Comprendre le cabinet + maîtriser le PCG</td><td>QCM PCG + 10 écritures simples</td></tr><tr><td><strong>S2</strong></td><td>3, 4 (achats/ventes)</td><td>Organiser un dossier + saisir achats/ventes</td><td>Saisie d'un lot de 20 factures</td></tr><tr><td><strong>S3</strong></td><td>4 (banque/caisse/OD), 5</td><td>Saisie banque + bases TVA</td><td>Journal de banque + brouillon CA3</td></tr><tr><td><strong>S4</strong></td><td>5 (suite), 6</td><td>TVA avancée + rapprochement bancaire</td><td>CA3 contrôlée + rapprochement complet</td></tr><tr><td><strong>S5</strong></td><td>7, 8</td><td>Lettrage + comptes d'attente</td><td>Lettrage 401/411 + apurement 471</td></tr><tr><td><strong>S6</strong></td><td>9, 10</td><td>Paie + immobilisations</td><td>OD de paie + tableau d'amortissement</td></tr><tr><td><strong>S7</strong></td><td>11, 12</td><td>Révision par cycle + fiscalité</td><td>Dossier de révision d'un cycle</td></tr><tr><td><strong>S8</strong></td><td>13, 14, 15, 16, 17</td><td>Bilan + outils + soft skills + qualité</td><td>Mini-dossier bilan + <strong>évaluation finale</strong></td></tr></tbody></table></div>\n<h3>Variante intensive 4 semaines (plein temps, ~35 h/sem)</h3>\n<ul><li><strong>S1</strong> : Modules 1→4 · <strong>S2</strong> : Modules 5→8 · <strong>S3</strong> : Modules 9→13 · <strong>S4</strong> : Modules 14→20 + évaluation finale.</li></ul>\n<hr>\n<h2>🧰 Liste des outils à maîtriser (détail au Module 14)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Catégorie</th><th>Outils</th></tr></thead><tbody><tr><td>Production comptable (full web)</td><td><strong>Pennylane</strong>, <strong>Tiime</strong></td></tr><tr><td>Production comptable (cabinet)</td><td><strong>ACD</strong>, <strong>Sage</strong>, <strong>Cegid</strong>, <strong>Coala</strong>, <strong>Quadra</strong></td></tr><tr><td>Pré-compta / collecte de pièces</td><td><strong>Dext</strong>, <strong>MEG</strong>, Pennylane (océrisation)</td></tr><tr><td>Paie</td><td><strong>Silae</strong>, RCA Paie</td></tr><tr><td>Révision / fiscalité</td><td><strong>RCA</strong> (révision, liasse), Excel</td></tr><tr><td>Bureautique &amp; GED</td><td><strong>Excel / Google Sheets</strong>, <strong>Google Drive</strong>, PDF</td></tr><tr><td>Communication &amp; suivi</td><td><strong>Teams</strong>, <strong>Slack</strong>, <strong>Trello / Notion</strong></td></tr></tbody></table></div>\n<p><strong>Priorité d'apprentissage offshore</strong> : 1) Dext/MEG (collecte) → 2) Pennylane/Tiime (saisie web) → 3) un outil cabinet (ACD ou Sage ou Cegid) → 4) Excel (révision) → 5) Silae (lecture journal de paie).</p>\n<hr>\n<h2>🎚️ Les trois niveaux de compétence</h2>\n<div class=\"tbl\"><table><thead><tr><th>Niveau</th><th>Ce que la personne sait faire</th><th>Modules clés</th><th>Supervision</th></tr></thead><tbody><tr><td><strong>Débutant validé</strong></td><td>Saisie achats/ventes/banque conforme, classement des pièces, relance pièces</td><td>1–4</td><td>Tout est revu</td></tr><tr><td><strong>Intermédiaire</strong></td><td>TVA, rapprochement, lettrage, attente, paie, immo</td><td>5–10</td><td>Contrôle par sondage</td></tr><tr><td><strong>Avancé / Autonome</strong></td><td>Révision par cycle, préparation liasse et dossier bilan</td><td>11–13</td><td>Validation finale uniquement</td></tr></tbody></table></div>\n<hr>\n<h2>🪜 Méthode de montée en compétence (devenir autonome en cabinet français)</h2>\n<ol><li><strong>Apprendre la procédure, pas seulement la théorie</strong> : chaque tâche a une checklist ; on la suit jusqu'à ce qu'elle soit automatique.</li><li><strong>Travailler sur dossier réel anonymisé</strong> dès que possible (sous supervision).</li><li><strong>Boucle de feedback</strong> : chaque livraison revue → noter les retours → corriger la checklist personnelle (« mes erreurs récurrentes »).</li><li><strong>Mesurer</strong> : suivre ses indicateurs (taux de retour, délais, anomalies) — cf. Module 16.</li><li><strong>Réduire progressivement la supervision</strong> : passer du « 100 % revu » au « revu par sondage » puis « validation finale ».</li><li><strong>Spécialiser puis élargir</strong> : maîtriser un cycle (ex. trésorerie) avant d'en ajouter un autre.</li><li><strong>Critère d'autonomie</strong> : 3 dossiers consécutifs livrés avec <strong>taux de retour &lt; 5 %</strong> sur un cycle donné.</li></ol>\n<hr>\n<h2>15. Certification interne / attestation de fin de formation</h2>\n<p>À l'issue, délivrance d'une <strong>attestation de fin de formation par MG CONSULTING IT&amp;ACT</strong> (société légalement enregistrée au Registre de Commerce et des Sociétés d'Antananarivo), selon le score à l'évaluation finale (cf. <code>evaluations/Evaluation-finale.md</code>) :</p>\n<div class=\"tbl\"><table><thead><tr><th>Score final</th><th>Niveau délivré</th><th>Signification opérationnelle</th></tr></thead><tbody><tr><td>≥ 85 %</td><td><strong>Avancé – Collaborateur autonome</strong></td><td>Peut tenir un portefeuille avec validation finale du chef de mission</td></tr><tr><td>70–84 %</td><td><strong>Intermédiaire confirmé</strong></td><td>Saisie + TVA + lettrage + rapprochement en autonomie, révision supervisée</td></tr><tr><td>55–69 %</td><td><strong>Débutant validé</strong></td><td>Saisie et organisation de dossier en autonomie, reste supervisé</td></tr><tr><td>&lt; 55 %</td><td>Non validé</td><td>Reprise des modules ciblés + nouvelle évaluation</td></tr></tbody></table></div>\n<p>Modèle d'attestation fourni en annexe (<code>annexes/</code>).</p>\n<hr>\n<h2>16. Plan de progression après la formation</h2>\n<ul><li><strong>Mois 1–3</strong> : consolidation sur dossiers réels, 1 cycle maîtrisé (trésorerie ou achats).</li><li><strong>Mois 4–6</strong> : élargissement TVA + lettrage + attente sur plusieurs dossiers ; baisse de la supervision.</li><li><strong>Mois 7–12</strong> : révision par cycle, préparation de bilans simples ; passage « Intermédiaire confirmé ».</li><li><strong>An 2</strong> : prise en charge d'un portefeuille, préparation de liasses, rôle de <strong>réviseur junior</strong>.</li><li><strong>An 3+</strong> : <strong>réviseur confirmé / chef de mission offshore</strong>, encadrement d'une équipe (cf. Module 20).</li></ul>\n<hr>\n<h2>17. Conseils pour travailler avec des cabinets français depuis Madagascar</h2>\n<ol><li><strong>Décalage horaire</strong> : Madagascar = UTC+3 (été FR UTC+2, hiver FR UTC+1), soit <strong>1 à 2 h d'avance</strong> sur la France. Avantage : livrer en fin de journée Mada = disponible le matin pour le cabinet. Caler 1 créneau de recouvrement chaque jour.</li><li><strong>Confidentialité d'abord</strong> : poste dédié, écran non visible, pas de pièces clients sur messageries perso, respect RGPD (Module 1). C'est éliminatoire pour un cabinet.</li><li><strong>Sur-communiquer les blocages</strong> : un cabinet préfère 1 mail « il me manque X » à un dossier bloqué silencieusement.</li><li><strong>Tenir les échéances fiscales</strong> : la TVA est sacrée ; anticiper, jamais livrer au dernier moment.</li><li><strong>Standardiser</strong> : nommage des fichiers, structure de dossier, modèles de mails — la régularité rassure le cabinet.</li><li><strong>Ne jamais valider à la place de l'expert-comptable</strong> : préparer, proposer, signaler — la validation fiscale/juridique reste au cabinet.</li><li><strong>Soigner le reporting</strong> : un point quotidien clair (fait / en cours / bloqué) crée la confiance et fidélise le client cabinet.</li><li><strong>Investir dans 1 outil cabinet</strong> : maîtriser ACD ou Sage ou Cegid en plus de Pennylane/Tiime augmente fortement la valeur (et le tarif).</li></ol>\n<hr>\n<p><em>Formation conçue comme un référentiel vivant : mettre à jour chaque année les taux et seuils fiscaux/sociaux depuis les sources officielles citées en tête de document.</em></p>", "m01": "<h1>MODULE 1 — Comprendre l'environnement comptable français</h1>\n<p><strong>Niveau :</strong> Débutant · <strong>Durée estimée :</strong> 6–8 h · <strong>Prérequis :</strong> aucun</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<p>À la fin du module, l'apprenant sait :</p>\n<ul><li>Décrire le rôle d'un cabinet d'expertise comptable français et la place du collaborateur.</li><li>Distinguer saisie, tenue, révision, supervision et bilan.</li><li>Décrire l'organisation d'un dossier client et le cycle d'un exercice comptable.</li><li>Citer les obligations comptables d'une entreprise française.</li><li>Appliquer les règles de confidentialité, RGPD et secret professionnel en posture offshore.</li><li>Comprendre la différence entre travail local malgache et travail externalisé pour la France.</li></ul>\n<h2>🧩 Compétences à maîtriser</h2>\n<ul><li>Se positionner dans la chaîne de production cabinet.</li><li>Adopter la « posture offshore » (rigueur, fiabilité, anticipation, traçabilité).</li><li>Sécuriser les données clients.</li></ul>\n<hr>\n<h2>1. Le cabinet d'expertise comptable français</h2>\n<p>Un cabinet français est une entreprise réglementée, inscrite à l'<strong>Ordre des experts-comptables</strong>, dirigée par un ou plusieurs <strong>experts-comptables diplômés</strong>. Sa mission : tenir/réviser la comptabilité de ses clients, produire les <strong>comptes annuels (bilan)</strong>, établir les <strong>déclarations fiscales</strong> (TVA, liasse) et conseiller le dirigeant.</p>\n<p><strong>Hiérarchie type d'un cabinet :</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Rôle</th><th>Mission principale</th><th>Niveau de validation</th></tr></thead><tbody><tr><td><strong>Expert-comptable / Associé</strong></td><td>Signe les comptes, engage sa responsabilité, conseille</td><td>Validation finale, fiscale et juridique</td></tr><tr><td><strong>Chef de mission / Réviseur</strong></td><td>Supervise les dossiers, révise, prépare le bilan</td><td>Contrôle et valide le travail des collaborateurs</td></tr><tr><td><strong>Collaborateur comptable</strong></td><td>Tient le dossier : saisie, TVA, lettrage, rapprochement</td><td>Produit, signale, propose</td></tr><tr><td><strong>Assistant / Saisie</strong></td><td>Saisie, classement, collecte de pièces</td><td>Exécute sous contrôle</td></tr></tbody></table></div>\n<blockquote>🇲🇬 <strong>Le collaborateur offshore à Madagascar</strong> occupe le plus souvent les rôles <strong>Assistant → Collaborateur → Réviseur junior</strong> selon son niveau. Il travaille <strong>pour</strong> le chef de mission français, <strong>jamais à la place</strong> de l'expert-comptable.</blockquote>\n<hr>\n<h2>2. Saisie, tenue, révision, supervision, bilan : 5 mots à ne pas confondre</h2>\n<div class=\"tbl\"><table><thead><tr><th>Terme</th><th>Définition simple</th><th>Exemple</th></tr></thead><tbody><tr><td><strong>Saisie</strong></td><td>Enregistrer les pièces en écritures comptables</td><td>Saisir une facture d'achat au 607 / 4456 / 401</td></tr><tr><td><strong>Tenue</strong></td><td>Tenir le dossier à jour mois par mois (saisie + TVA + banque)</td><td>Boucler janvier : saisie + rapprochement + CA3</td></tr><tr><td><strong>Révision</strong></td><td>Vérifier que chaque solde de compte est juste et justifié</td><td>Prouver que le 512 = relevé bancaire, que le 401 = factures dues</td></tr><tr><td><strong>Supervision</strong></td><td>Contrôle du travail par un niveau supérieur</td><td>Le chef de mission relit le dossier révisé</td></tr><tr><td><strong>Bilan / Clôture</strong></td><td>Travaux de fin d'exercice produisant les comptes annuels</td><td>FNP, CCA, amortissements, liasse fiscale</td></tr></tbody></table></div>\n<p><strong>Schéma de la chaîne :</strong><br><code>Collecte pièces → Saisie → Tenue mensuelle (TVA + banque) → Lettrage → Révision par cycle → Supervision → Bilan/Liasse → Signature expert-comptable</code></p>\n<hr>\n<h2>3. Organisation d'un dossier client</h2>\n<p>Un dossier client se compose typiquement de :</p>\n<ul><li><strong>Dossier permanent</strong> : Kbis, statuts, baux, emprunts, immobilisations, identifiants fiscaux/sociaux, régime fiscal (IR/IS), régime TVA (franchise/RSI/réel normal), liste des comptes bancaires. → Ce qui ne change pas chaque mois.</li><li><strong>Dossier annuel / de l'exercice</strong> : factures de l'année, relevés bancaires, journaux, balance, déclarations TVA, feuilles de révision, dossier de travail bilan.</li><li><strong>GED (gestion électronique des documents)</strong> : les pièces numérisées rangées par cycle et par mois.</li></ul>\n<blockquote>✅ Bonne pratique offshore : ne jamais commencer une saisie sans avoir lu le dossier permanent (régime TVA + régime fiscal). C'est ce qui détermine toutes les écritures.</blockquote>\n<hr>\n<h2>4. Le cycle d'un exercice comptable</h2>\n<p>L'exercice comptable dure en général <strong>12 mois</strong> (souvent du 1er janvier au 31 décembre, mais pas toujours).</p>\n<pre><code>Ouverture (report à-nouveau) \n   → Mois 1..12 : saisie + TVA + rapprochement + lettrage \n   → Travaux de fin d'exercice (cut-off, FNP, CCA, amortissements, provisions) \n   → Révision finale \n   → Établissement bilan + compte de résultat + liasse fiscale \n   → Dépôt liasse / déclaration IS-IR \n   → Clôture, report des soldes à l'exercice suivant</code></pre>\n<hr>\n<h2>5. Obligations comptables d'une entreprise française</h2>\n<p>Une entreprise commerciale française doit (Code de commerce + PCG) :</p>\n<ol><li><strong>Enregistrer chronologiquement</strong> tous les mouvements (livre-journal).</li><li>Tenir un <strong>grand livre</strong> et établir une <strong>balance</strong>.</li><li>Réaliser un <strong>inventaire</strong> au moins une fois par an.</li><li>Établir des <strong>comptes annuels</strong> : bilan, compte de résultat, annexe.</li><li><strong>Conserver</strong> les pièces justificatives <strong>10 ans</strong>.</li><li>Respecter le <strong>Plan Comptable Général (PCG)</strong> — règlement ANC n° 2014-03 (et mises à jour ANC).</li><li>Déposer ses comptes au <strong>greffe</strong> (pour les sociétés) et ses déclarations fiscales.</li></ol>\n<blockquote>🔎 Selon la taille et la forme (micro, réel simplifié, réel normal), les obligations sont allégées ou complètes. Le collaborateur doit toujours connaître le <strong>régime</strong> du dossier.</blockquote>\n<hr>\n<h2>6. Confidentialité, RGPD, secret professionnel et posture offshore</h2>\n<p>C'est le point le plus <strong>éliminatoire</strong> pour un cabinet : une fuite de données peut coûter le client et engager la responsabilité du cabinet.</p>\n<p><strong>Règles non négociables :</strong></p>\n<ul><li><strong>Secret professionnel</strong> : tout ce que vous voyez (CA, salaires, données dirigeants) est confidentiel. On n'en parle à personne, jamais.</li><li><strong>RGPD</strong> : données personnelles (salariés, clients) traitées uniquement pour la mission, jamais copiées sur un support perso.</li><li><strong>Poste de travail dédié</strong> : antivirus à jour, session protégée par mot de passe, écran non visible des tiers.</li><li><strong>Pas de pièces clients</strong> sur WhatsApp perso, Gmail perso, clé USB non chiffrée, ordinateur familial.</li><li><strong>Accès</strong> : on utilise uniquement les accès fournis par le cabinet ; on ne partage jamais ses identifiants.</li><li><strong>Mots de passe</strong> forts + gestionnaire de mots de passe + double authentification si proposé.</li><li>À la fin d'une mission : suppression des copies locales selon la consigne du cabinet.</li></ul>\n<h3>✅ Checklist confidentialité (poste offshore)</h3>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Poste dédié, antivirus actif, OS à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Session verrouillée dès que je m'absente</label></li><li class=\"task\"><label><input type=\"checkbox\"> Écran non visible depuis l'extérieur / collègues non habilités</label></li><li class=\"task\"><label><input type=\"checkbox\"> Aucun fichier client sur messagerie ou stockage personnel</label></li><li class=\"task\"><label><input type=\"checkbox\"> Accès via les seuls outils fournis par le cabinet</label></li><li class=\"task\"><label><input type=\"checkbox\"> Mots de passe forts + 2FA activée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Wifi sécurisé (pas de partage de connexion non protégé)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Documents papier (s'il y en a) rangés sous clé / détruits après usage</label></li></ul>\n<hr>\n<h2>7. Travail local malgache vs travail externalisé pour la France</h2>\n<div class=\"tbl\"><table><thead><tr><th>Aspect</th><th>Compta locale Madagascar</th><th>Externalisé pour la France</th></tr></thead><tbody><tr><td>Référentiel</td><td>PCG malgache / SYSCOHADA selon contexte</td><td><strong>PCG français (ANC 2014-03)</strong></td></tr><tr><td>TVA</td><td>Règles malgaches</td><td><strong>TVA française (CA3/CA12)</strong></td></tr><tr><td>Plan de comptes</td><td>Adapté local</td><td><strong>Comptes français (401, 411, 512, 445…)</strong></td></tr><tr><td>Outils</td><td>Variables</td><td><strong>Pennylane, Tiime, ACD, Sage, Cegid, Dext, Silae…</strong></td></tr><tr><td>Échéances</td><td>Locales</td><td><strong>Échéances fiscales françaises strictes (TVA, IS, liasse)</strong></td></tr><tr><td>Exigence qualité</td><td>Variable</td><td><strong>Très élevée : traçabilité, anticipation, zéro doublon</strong></td></tr><tr><td>Validation finale</td><td>Locale</td><td><strong>Chef de mission / expert-comptable français</strong></td></tr></tbody></table></div>\n<hr>\n<h2>8. La qualité attendue par un cabinet français</h2>\n<p>Quatre piliers (à mémoriser) :</p>\n<ol><li><strong>Rigueur</strong> — la bonne pièce dans le bon compte, avec la bonne TVA.</li><li><strong>Fiabilité</strong> — « terminé » signifie contrôlé : rapprochement bouclé, TVA cohérente, attente justifiée.</li><li><strong>Anticipation</strong> — pièces manquantes et anomalies signalées <strong>avant</strong> l'échéance.</li><li><strong>Traçabilité</strong> — chaque opération inhabituelle est commentée ; rien n'est laissé sans explication.</li></ol>\n<hr>\n<h2>🧪 Cas pratique 1.1 — Qui fait quoi ?</h2>\n<p>Pour chaque action, indiquez <strong>C</strong> (collaborateur offshore peut faire seul) ou <strong>V</strong> (à valider/faire par le chef de mission ou l'expert-comptable) :</p>\n<ol><li>Saisir une facture d'achat d'électricité.</li><li>Décider du régime TVA d'un nouveau client.</li><li>Préparer la déclaration de TVA du mois.</li><li>Signer et télétransmettre la liasse fiscale.</li><li>Relancer le client pour une facture manquante.</li><li>Choisir la durée d'amortissement d'un nouveau matériel.</li><li>Lettrer un compte fournisseur.</li><li>Valider un montage juridique (changement de statut).</li></ol>\n<h3>✔️ Correction 1.1</h3>\n<ol><li><strong>C</strong> · 2. <strong>V</strong> (décision de l'EC) · 3. <strong>C</strong> (préparation) puis <strong>V</strong> (validation/envoi) · 4. <strong>V</strong> (expert-comptable uniquement) · 5. <strong>C</strong> · 6. <strong>V</strong> (politique du cabinet, validée par le chef de mission) · 7. <strong>C</strong> · 8. <strong>V</strong> (expert-comptable).</li></ol>\n<blockquote>🔑 Règle d'or : le collaborateur <strong>prépare et propose</strong>, l'expert-comptable <strong>décide et signe</strong> tout ce qui est fiscal, juridique ou engage la responsabilité du cabinet.</blockquote>\n<hr>\n<h2>🧪 Cas pratique 1.2 — Incident de confidentialité</h2>\n<p>Le client envoie par erreur sur votre <strong>WhatsApp personnel</strong> un fichier de paie contenant les salaires. Que faites-vous ?</p>\n<h3>✔️ Correction 1.2</h3>\n<ol><li>Ne pas diffuser, ne pas enregistrer sur le téléphone perso.</li><li>Informer immédiatement le chef de mission (remontée d'anomalie).</li><li>Demander au client de renvoyer via le canal sécurisé du cabinet (Dext, Pennylane, Drive sécurisé).</li><li>Supprimer le fichier du WhatsApp perso après instruction.</li><li>Documenter l'incident (date, action menée).</li></ol>\n<hr>\n<h2>📝 Évaluation de fin de module 1 (QCM — 10 questions)</h2>\n<ol><li>Qui peut signer la liasse fiscale ? a) le collaborateur b) le chef de mission c) <strong>l'expert-comptable</strong></li><li>La « tenue » d'un dossier désigne : a) la révision finale b) <strong>la mise à jour mensuelle</strong> c) le dépôt au greffe</li><li>Combien de temps conserver les pièces ? a) 3 ans b) 5 ans c) <strong>10 ans</strong></li><li>Le PCG français est défini par : a) l'URSSAF b) <strong>l'ANC (règlement 2014-03)</strong> c) la CNIL</li><li>Le dossier permanent contient : a) les factures du mois b) <strong>les statuts, Kbis, baux, emprunts</strong> c) la CA3</li><li>La « révision » consiste à : a) saisir les pièces b) <strong>justifier chaque solde de compte</strong> c) relancer le client</li><li>Un fichier client peut-il transiter par Gmail perso ? a) oui si urgent b) <strong>non, jamais</strong> c) oui si supprimé après</li><li>Le collaborateur offshore peut décider seul du régime TVA d'un client : a) <strong>non</strong> b) oui c) seulement le réel normal</li><li>L'ordre logique est : a) bilan → saisie → révision b) <strong>saisie → tenue → révision → bilan</strong> c) révision → saisie → bilan</li><li>Les 4 piliers qualité sont : a) vitesse, prix, volume, stock b) <strong>rigueur, fiabilité, anticipation, traçabilité</strong> c) saisie, TVA, banque, bilan</li></ol>\n<p><strong>Barème :</strong> 1 point/question. Seuil de validation : <strong>7/10</strong>.</p>\n<p><strong>Corrigé :</strong> 1c · 2b · 3c · 4b · 5b · 6b · 7b · 8a · 9b · 10b</p>", "m02": "<h1>MODULE 2 — Bases de comptabilité française (PCG)</h1>\n<p><strong>Niveau :</strong> Débutant · <strong>Durée estimée :</strong> 10–12 h · <strong>Prérequis :</strong> Module 1</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Maîtriser le mécanisme débit / crédit (partie double).</li><li>Comprendre journal, grand livre, balance, bilan, compte de résultat.</li><li>Connaître le Plan Comptable Général et les classes 1 à 7.</li><li>Identifier et utiliser les comptes les plus fréquents en cabinet.</li><li>Passer des écritures simples et complexes.</li></ul>\n<h2>🧩 Compétences à maîtriser</h2>\n<ul><li>Imputer une opération sur le bon compte.</li><li>Vérifier l'équilibre débit = crédit.</li><li>Lire une balance et y repérer une anomalie.</li></ul>\n<hr>\n<h2>1. Le principe de la partie double : débit / crédit</h2>\n<p>Toute opération est enregistrée <strong>au minimum sur deux comptes</strong> : un au débit, un au crédit, pour un <strong>montant total égal</strong>.</p>\n<p><strong>Règle mémo :</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Type de compte</th><th>Augmente au…</th><th>Diminue au…</th></tr></thead><tbody><tr><td><strong>Actif</strong> (ce que possède l'entreprise : banque, clients, immo)</td><td>Débit</td><td>Crédit</td></tr><tr><td><strong>Passif</strong> (ce qu'elle doit : fournisseurs, emprunts, capital)</td><td>Crédit</td><td>Débit</td></tr><tr><td><strong>Charges</strong> (classe 6)</td><td>Débit</td><td>Crédit</td></tr><tr><td><strong>Produits</strong> (classe 7)</td><td>Crédit</td><td>Débit</td></tr></tbody></table></div>\n<blockquote>🧠 Astuce : <strong>« le client me doit → 411 au débit »</strong>, <strong>« je dois au fournisseur → 401 au crédit »</strong>, <strong>« l'argent entre en banque → 512 au débit »</strong>.</blockquote>\n<p><strong>Vérification permanente :</strong> dans toute écriture, <strong>Σ débits = Σ crédits</strong>.</p>\n<hr>\n<h2>2. Les documents comptables</h2>\n<div class=\"tbl\"><table><thead><tr><th>Document</th><th>À quoi ça sert</th></tr></thead><tbody><tr><td><strong>Journal</strong></td><td>Enregistre les écritures dans l'ordre chronologique (journal d'achats, ventes, banque, caisse, OD)</td></tr><tr><td><strong>Grand livre</strong></td><td>Regroupe toutes les écritures <strong>par compte</strong> (ex. tout le 401, tout le 512)</td></tr><tr><td><strong>Balance</strong></td><td>Liste tous les comptes avec <strong>débit, crédit et solde</strong> ; permet de vérifier l'équilibre</td></tr><tr><td><strong>Compte de résultat</strong></td><td>Charges (6) vs Produits (7) → <strong>bénéfice ou perte</strong> de l'exercice</td></tr><tr><td><strong>Bilan</strong></td><td>Photo du patrimoine à une date : <strong>Actif = Passif</strong></td></tr></tbody></table></div>\n<p><strong>Lien logique :</strong> <code>Écriture → Journal → Grand livre → Balance → Bilan + Compte de résultat</code></p>\n<hr>\n<h2>3. Le Plan Comptable Général : les 7 classes</h2>\n<div class=\"tbl\"><table><thead><tr><th>Classe</th><th>Nature</th><th>Où ça va</th><th>Exemples</th></tr></thead><tbody><tr><td><strong>1</strong></td><td>Capitaux</td><td>Bilan – Passif</td><td>Capital 101, Résultat 12, Emprunts 164, Report à nouveau 11</td></tr><tr><td><strong>2</strong></td><td>Immobilisations</td><td>Bilan – Actif</td><td>Matériel 215, Logiciels 205, Amortissements 28</td></tr><tr><td><strong>3</strong></td><td>Stocks</td><td>Bilan – Actif</td><td>Marchandises 37, Matières premières 31</td></tr><tr><td><strong>4</strong></td><td>Tiers</td><td>Bilan – Actif/Passif</td><td>Fournisseurs 401, Clients 411, TVA 445, Salariés 421, État</td></tr><tr><td><strong>5</strong></td><td>Financiers</td><td>Bilan – Actif/Passif</td><td>Banque 512, Caisse 53, Virements internes 580</td></tr><tr><td><strong>6</strong></td><td>Charges</td><td>Compte de résultat</td><td>Achats 60, Services 61/62, Impôts 63, Personnel 64, Financières 66</td></tr><tr><td><strong>7</strong></td><td>Produits</td><td>Compte de résultat</td><td>Ventes 70, Production, Subventions 74, Financiers 76</td></tr></tbody></table></div>\n<blockquote>Les <strong>classes 1 à 5 = comptes de bilan</strong> (permanents). Les <strong>classes 6 et 7 = comptes de gestion</strong> (soldés chaque année dans le résultat).</blockquote>\n<hr>\n<h2>4. Les comptes les plus utilisés en cabinet (à connaître par cœur)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Intitulé</th><th>Usage typique</th></tr></thead><tbody><tr><td><strong>401</strong></td><td>Fournisseurs</td><td>Dettes envers les fournisseurs (achats à crédit)</td></tr><tr><td><strong>411</strong></td><td>Clients</td><td>Créances sur les clients (ventes à crédit)</td></tr><tr><td><strong>44566</strong></td><td>TVA déductible sur ABS (biens et services)</td><td>TVA sur achats</td></tr><tr><td><strong>44562</strong></td><td>TVA déductible sur immobilisations</td><td>TVA sur achat d'immo</td></tr><tr><td><strong>44571</strong></td><td>TVA collectée</td><td>TVA sur ventes</td></tr><tr><td><strong>44551</strong></td><td>TVA à décaisser</td><td>TVA à payer à l'État</td></tr><tr><td><strong>44567</strong></td><td>Crédit de TVA à reporter</td><td>TVA déductible &gt; collectée</td></tr><tr><td><strong>445</strong></td><td>TVA (racine)</td><td>Ensemble des comptes de TVA</td></tr><tr><td><strong>512</strong></td><td>Banque</td><td>Compte courant bancaire</td></tr><tr><td><strong>53</strong></td><td>Caisse</td><td>Espèces</td></tr><tr><td><strong>580</strong></td><td>Virements internes</td><td>Transferts entre comptes financiers</td></tr><tr><td><strong>471</strong></td><td>Compte d'attente</td><td>Opération non identifiée temporairement</td></tr><tr><td><strong>455</strong></td><td>Compte courant d'associé</td><td>Apports / retraits de l'associé</td></tr><tr><td><strong>467</strong></td><td>Autres comptes débiteurs/créditeurs</td><td>Tiers divers</td></tr><tr><td><strong>606x</strong></td><td>Achats non stockés (énergie, fournitures)</td><td>Électricité 60611, fournitures 6064</td></tr><tr><td><strong>607</strong></td><td>Achats de marchandises</td><td>Négoce</td></tr><tr><td><strong>6063</strong></td><td>Petit équipement / fournitures d'entretien</td><td>Petit matériel non immobilisé</td></tr><tr><td><strong>6132/6135</strong></td><td>Locations</td><td>Loyers immobiliers / mobiliers</td></tr><tr><td><strong>616</strong></td><td>Primes d'assurance</td><td>Assurances</td></tr><tr><td><strong>6226</strong></td><td>Honoraires</td><td>Expert-comptable, avocat</td></tr><tr><td><strong>611</strong></td><td>Sous-traitance</td><td>Sous-traitance générale</td></tr><tr><td><strong>6251/6257</strong></td><td>Déplacements / réceptions</td><td>Voyages, restaurants</td></tr><tr><td><strong>6262</strong></td><td>Frais postaux et télécom</td><td>Téléphone, internet</td></tr><tr><td><strong>627</strong></td><td>Services bancaires</td><td>Frais bancaires</td></tr><tr><td><strong>6061</strong></td><td>Carburant / énergie</td><td>Carburant (ou 60622)</td></tr><tr><td><strong>641</strong></td><td>Rémunérations du personnel</td><td>Salaires bruts</td></tr><tr><td><strong>645</strong></td><td>Charges de Sécurité sociale et prévoyance</td><td>Cotisations patronales</td></tr><tr><td><strong>421</strong></td><td>Personnel – rémunérations dues</td><td>Net à payer aux salariés</td></tr><tr><td><strong>431</strong></td><td>Sécurité sociale (URSSAF)</td><td>Cotisations URSSAF à payer</td></tr><tr><td><strong>437</strong></td><td>Autres organismes sociaux</td><td>Retraite, prévoyance, mutuelle</td></tr><tr><td><strong>164</strong></td><td>Emprunts auprès des établissements de crédit</td><td>Capital restant dû</td></tr><tr><td><strong>661</strong></td><td>Charges d'intérêts</td><td>Intérêts d'emprunt</td></tr><tr><td><strong>70x</strong></td><td>Ventes</td><td>707 marchandises, 706 prestations de services, 701 produits finis</td></tr></tbody></table></div>\n<hr>\n<h2>5. Zoom sur les comptes demandés</h2>\n<ul><li><strong>401 Fournisseurs</strong> : crédité à la facture d'achat, débité au paiement.</li><li><strong>411 Clients</strong> : débité à la facture de vente, crédité à l'encaissement.</li><li><strong>512 Banque</strong> : débité quand l'argent <strong>entre</strong>, crédité quand il <strong>sort</strong>.</li><li><strong>445 TVA</strong> : collectée (44571) sur ventes, déductible (44566/44562) sur achats, à décaisser (44551) = ce qu'on paie à l'État.</li><li><strong>6 Charges</strong> : toujours au <strong>débit</strong> quand on engage la dépense.</li><li><strong>7 Produits</strong> : toujours au <strong>crédit</strong> quand on facture/encaisse une vente.</li><li><strong>2 Immobilisations</strong> : biens durables (&gt; seuil, en général <strong>500 € HT</strong>), au débit, amortis sur plusieurs années.</li><li><strong>164 Emprunts</strong> : crédité lors du déblocage, débité au remboursement du capital (les intérêts vont au 661).</li><li><strong>641 Salaires</strong> : salaire brut au débit. <strong>645 Charges sociales</strong> : part patronale au débit.</li><li><strong>471 Attente</strong> : utilisé temporairement quand on ne sait pas où classer ; <strong>doit être apuré</strong> (Module 8).</li><li><strong>455 Associés</strong> : mouvements entre la société et l'associé (apports, retraits).</li><li><strong>53 Caisse</strong> : espèces ; ne doit <strong>jamais</strong> être créditrice (solde négatif impossible).</li></ul>\n<hr>\n<h2>6. Exemples d'écritures simples</h2>\n<p><strong>Ex. A — Achat de fournitures de bureau 120 € TTC (TVA 20 %)</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>6064</td><td>Fournitures administratives</td><td>100,00</td><td></td></tr><tr><td>44566</td><td>TVA déductible</td><td>20,00</td><td></td></tr><tr><td>401</td><td>Fournisseur</td><td></td><td>120,00</td></tr></tbody></table></div>\n<p><strong>Ex. B — Vente de prestation 1 200 € TTC (TVA 20 %)</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>411</td><td>Client</td><td>1 200,00</td><td></td></tr><tr><td>706</td><td>Prestations de services</td><td></td><td>1 000,00</td></tr><tr><td>44571</td><td>TVA collectée</td><td></td><td>200,00</td></tr></tbody></table></div>\n<p><strong>Ex. C — Encaissement du client par virement</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>512</td><td>Banque</td><td>1 200,00</td><td></td></tr><tr><td>411</td><td>Client</td><td></td><td>1 200,00</td></tr></tbody></table></div>\n<p><strong>Ex. D — Paiement du fournisseur</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>401</td><td>Fournisseur</td><td>120,00</td><td></td></tr><tr><td>512</td><td>Banque</td><td></td><td>120,00</td></tr></tbody></table></div>\n<hr>\n<h2>7. Exemples d'écritures complexes</h2>\n<p><strong>Ex. E — Achat d'un ordinateur 1 800 € HT + TVA 20 % (immobilisation)</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>2183</td><td>Matériel de bureau et informatique</td><td>1 800,00</td><td></td></tr><tr><td>44562</td><td>TVA déductible sur immobilisations</td><td>360,00</td><td></td></tr><tr><td>404</td><td>Fournisseur d'immobilisations</td><td></td><td>2 160,00</td></tr></tbody></table></div>\n<p><strong>Ex. F — Échéance d'emprunt : 1 000 € dont 850 capital + 150 intérêts</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>164</td><td>Emprunt (capital remboursé)</td><td>850,00</td><td></td></tr><tr><td>661</td><td>Charges d'intérêts</td><td>150,00</td><td></td></tr><tr><td>512</td><td>Banque</td><td></td><td>1 000,00</td></tr></tbody></table></div>\n<p><strong>Ex. G — OD de paie simplifiée (brut 2 000, charges patronales 800, net 1 560)</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>641</td><td>Salaires bruts</td><td>2 000,00</td><td></td></tr><tr><td>645</td><td>Charges patronales</td><td>800,00</td><td></td></tr><tr><td>421</td><td>Net à payer au salarié</td><td></td><td>1 560,00</td></tr><tr><td>431</td><td>URSSAF</td><td></td><td>900,00</td></tr><tr><td>437</td><td>Autres organismes (retraite/prévoyance/mutuelle)</td><td></td><td>340,00</td></tr></tbody></table></div>\n<p><em>(Détail complet en Module 9. Vérifier : 2 800 D = 2 800 C.)</em></p>\n<hr>\n<h2>🧪 Cas pratique 2.1 — Passer 5 écritures</h2>\n<p>Passez les écritures suivantes (TVA 20 % sauf indication) :</p>\n<ol><li>Facture d'achat marchandises 600 € HT.</li><li>Facture de vente marchandises 2 500 € HT.</li><li>Frais bancaires 15 € (sans TVA déductible récupérable → en réalité TVA sur frais bancaires : voir ci-dessous).</li><li>Loyer du local 800 € HT.</li><li>Encaissement d'un client 3 000 € TTC.</li></ol>\n<h3>✔️ Correction 2.1</h3>\n<ol><li>607 = 600 D · 44566 = 120 D · 401 = 720 C</li><li>411 = 3 000 D · 707 = 2 500 C · 44571 = 500 C</li><li>627 = 15 D · 512 = 15 C <em>(souvent sans TVA ; si TVA sur commissions : 627 12,50 / 44566 2,50 / 512 15)</em></li><li>6132 = 800 D · 44566 = 160 D · 401 (ou 512 si payé) = 960 C</li><li>512 = 3 000 D · 411 = 3 000 C</li></ol>\n<hr>\n<h2>🧪 Cas pratique 2.2 — Lire une balance</h2>\n<p>Extrait de balance :</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Solde débiteur</th><th>Solde créditeur</th></tr></thead><tbody><tr><td>512 Banque</td><td></td><td>1 250</td></tr><tr><td>53 Caisse</td><td></td><td>80</td></tr><tr><td>471 Attente</td><td>4 300</td><td></td></tr></tbody></table></div>\n<p><strong>Question :</strong> repérez les 2 anomalies.</p>\n<h3>✔️ Correction 2.2</h3>\n<ul><li><strong>512 créditeur</strong> = découvert : possible, mais à vérifier (souvent une erreur de saisie ou un rapprochement non fait). À justifier.</li><li><strong>53 Caisse créditrice</strong> = <strong>impossible</strong> : une caisse ne peut pas être négative → erreur de saisie (dépense en espèces non couverte) à corriger.</li><li><strong>471 = 4 300 D non nul</strong> = compte d'attente à <strong>apurer</strong> avant tout bilan (Module 8).</li></ul>\n<hr>\n<h2>📝 Évaluation de fin de module 2</h2>\n<p><strong>Partie A — QCM (5 pts)</strong></p>\n<ol><li>Quand l'argent entre en banque, le 512 est : a) <strong>débité</strong> b) crédité</li><li>La TVA collectée est en compte : a) 44566 b) <strong>44571</strong></li><li>Une charge (classe 6) augmente au : a) <strong>débit</strong> b) crédit</li><li>La caisse 53 peut-elle être créditrice ? a) oui b) <strong>non</strong></li><li>Le client qui me doit de l'argent : 411 au : a) <strong>débit</strong> b) crédit</li></ol>\n<p><strong>Partie B — 5 écritures à passer (10 pts)</strong> — voir cas 2.1 (mêmes types).</p>\n<p><strong>Partie C — Question ouverte (5 pts) :</strong> Expliquez en 3 lignes pourquoi un solde 471 doit être nul au bilan.</p>\n<p><strong>Seuil de validation : 14/20.</strong></p>\n<p><strong>Corrigé A :</strong> 1a · 2b · 3a · 4b · 5a.<br><strong>Corrigé C :</strong> le 471 est un compte d'attente temporaire ; un solde non nul signifie qu'il reste des opérations non analysées/non imputées, donc des comptes faux → il doit être apuré et ramené à 0 avant la clôture.</p>", "m03": "<h1>MODULE 3 — Organisation d'un dossier comptable externalisé</h1>\n<p><strong>Niveau :</strong> Débutant · <strong>Durée estimée :</strong> 6–8 h · <strong>Prérequis :</strong> Modules 1–2</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Organiser la réception, le classement et le nommage des pièces.</li><li>Gérer les pièces manquantes et non conformes.</li><li>Utiliser les outils de collecte (Dext, Pennylane, Tiime, MEG, Drive).</li><li>Contrôler doublons et factures non conformes.</li><li>Communiquer et suivre les demandes avec le cabinet français.</li></ul>\n<h2>🧩 Compétences à maîtriser</h2>\n<ul><li>Tenir un dossier propre et traçable.</li><li>Relancer efficacement les pièces manquantes.</li><li>Tenir un tableau de suivi de dossier.</li></ul>\n<hr>\n<h2>1. La réception des pièces</h2>\n<p>Les pièces arrivent par : <strong>Dext / MEG</strong> (photo, mail dédié), <strong>Pennylane / Tiime</strong> (upload, connexion bancaire), <strong>Google Drive / Teams</strong> (dépôt de fichiers), <strong>mail du cabinet</strong>.</p>\n<p><strong>Première règle :</strong> une pièce = une <strong>image lisible, complète, non rognée</strong>. On refuse une photo floue, coupée ou en double.</p>\n<hr>\n<h2>2. Classement et nommage des fichiers</h2>\n<h3>Structure de dossier recommandée (GED)</h3>\n<pre><code>CLIENT_X/\n  01_PERMANENT/        (Kbis, statuts, bail, emprunts, immo)\n  02_BANQUE/           (relevés par mois : 2026-01_releve.pdf)\n  03_ACHATS/           (factures fournisseurs par mois)\n  04_VENTES/           (factures clients par mois)\n  05_PAIE/             (bulletins, journaux de paie, DSN)\n  06_TVA/              (déclarations CA3/CA12)\n  07_OD_DIVERS/\n  08_A_TRAITER/        (pièces non encore identifiées)</code></pre>\n<h3>Convention de nommage (à imposer)</h3>\n<p><code>AAAA-MM-JJ_TYPE_TIERS_MONTANT.pdf</code></p>\n<ul><li>Exemple : <code>2026-03-12_ACH_ORANGE_59,90.pdf</code></li><li>Types : ACH (achat), VTE (vente), BQ (banque), OD, IMMO, PAIE.</li></ul>\n<blockquote>✅ Un nommage régulier = recherche instantanée + zéro perte de pièce. C'est un marqueur de professionnalisme offshore.</blockquote>\n<hr>\n<h2>3. Gestion des pièces manquantes</h2>\n<ol><li>Identifier le manque (souvent au rapprochement bancaire : un débit sans facture).</li><li>Le <strong>lister</strong> dans le tableau de suivi.</li><li><strong>Relancer</strong> (le client ou le cabinet selon l'organisation) — modèle de mail en annexe.</li><li>En attendant : passer l'opération en <strong>471</strong> ou laisser le règlement non lettré, <strong>avec commentaire</strong>.</li><li>Ne jamais « inventer » une imputation : une dépense sans justificatif n'est pas déductible (TVA + charge).</li></ol>\n<hr>\n<h2>4. Contrôle des doublons</h2>\n<p>Causes fréquentes : pièce importée 2 fois dans Dext <strong>et</strong> saisie manuellement, ou facture + relevé bancaire comptabilisés séparément.</p>\n<p><strong>Méthode anti-doublon :</strong></p>\n<ul><li>Trier le journal d'achats par <strong>fournisseur + montant + date</strong>.</li><li>Vérifier les <strong>n° de facture</strong> identiques.</li><li>Dans Pennylane/Dext, surveiller l'alerte « doublon potentiel ».</li><li>Contrôle : un même montant, même tiers, même jour → vérifier.</li></ul>\n<hr>\n<h2>5. Factures non conformes (ne pas saisir telles quelles)</h2>\n<p>Une facture française doit comporter : identité et <strong>SIREN</strong> du fournisseur, date, <strong>n° de facture</strong>, détail HT, <strong>taux et montant de TVA</strong>, <strong>n° de TVA intracommunautaire</strong> (si applicable), mentions légales.</p>\n<p><strong>Cas non conformes courants :</strong></p>\n<ul><li>Ticket de caisse sans TVA détaillée → TVA non récupérable (saisir en TTC, signaler).</li><li>« Facture » au nom du dirigeant et non de la société → charge personnelle potentielle (signaler, ne pas déduire la TVA).</li><li>Bon de commande / devis pris pour une facture → refuser.</li><li>Facture en devise → convertir + justifier le taux.</li></ul>\n<hr>\n<h2>6. Tickets, notes de frais, relevés bancaires</h2>\n<ul><li><strong>Tickets restaurant / carburant</strong> : justificatif obligatoire ; TVA récupérable selon nature (cf. Module 5).</li><li><strong>Notes de frais</strong> : rapprocher de la pièce ; salarié remboursé via 425 ou compte associé.</li><li><strong>Relevés bancaires</strong> : base du rapprochement ; vérifier que <strong>tous les mois</strong> sont présents et complets (pas de page manquante).</li></ul>\n<hr>\n<h2>7. Outils de collecte (vue rapide — détail Module 14)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Outil</th><th>Rôle dans la collecte</th></tr></thead><tbody><tr><td><strong>Dext</strong></td><td>Photo/scan + océrisation des factures, export vers l'outil compta</td></tr><tr><td><strong>MEG</strong></td><td>Collecte + pré-saisie, GED collaborative</td></tr><tr><td><strong>Pennylane</strong></td><td>Connexion bancaire + import factures + saisie web</td></tr><tr><td><strong>Tiime</strong></td><td>Idem, orienté TPE/indépendants</td></tr><tr><td><strong>Google Drive</strong></td><td>Dépôt brut de pièces (à ranger ensuite)</td></tr></tbody></table></div>\n<hr>\n<h2>8. Communication et suivi avec le cabinet français</h2>\n<ul><li>Un <strong>point quotidien</strong> : ce qui est fait, en cours, bloqué.</li><li>Toute pièce manquante / anomalie → <strong>tracée</strong> (pas de mémoire orale).</li><li>Les questions sont <strong>regroupées</strong> (1 mail clair vaut mieux que 10 messages).</li></ul>\n<hr>\n<h2>✅ Checklist « ouverture / tenue de dossier mensuel »</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Tous les relevés bancaires du mois reçus et complets</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces d'achats et de ventes du mois reçues</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces rangées et nommées selon la convention</label></li><li class=\"task\"><label><input type=\"checkbox\"> Doublons contrôlés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Factures non conformes identifiées et signalées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Liste des pièces manquantes établie et relancée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Tableau de suivi de dossier mis à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Régime TVA et régime fiscal du dossier vérifiés (dossier permanent)</label></li></ul>\n<hr>\n<h2>📊 Tableau de suivi de dossier (modèle Excel à créer)</h2>\n<p>Colonnes recommandées :</p>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Mois</th><th>Pièces reçues (O/N)</th><th>Relevés complets (O/N)</th><th>Saisie achats</th><th>Saisie ventes</th><th>Banque saisie</th><th>Rapprochement</th><th>Lettrage</th><th>TVA préparée</th><th>TVA validée</th><th>Pièces manquantes</th><th>Anomalies</th><th>Statut</th><th>Date livraison</th></tr></thead><tbody></tbody></table></div>\n<p>Statuts : <code>À FAIRE / EN COURS / BLOQUÉ / À VALIDER / TERMINÉ</code>.</p>\n<hr>\n<h2>🧪 Cas pratique 3.1 — Tri de pièces</h2>\n<p>On reçoit en vrac : (a) un devis, (b) une facture Orange 59,90 €, (c) une photo floue d'un ticket carburant, (d) deux fois la même facture EDF, (e) une facture au nom personnel du gérant.<br>Que faire de chacune ?</p>\n<h3>✔️ Correction 3.1</h3>\n<ul><li>(a) Devis → <strong>ne pas saisir</strong>, ce n'est pas une pièce comptable. Classer ou écarter.</li><li>(b) Facture Orange → saisir (6262 + TVA + 401), nommer <code>2026-..._ACH_ORANGE_59,90</code>.</li><li>(c) Ticket flou → <strong>redemander une photo nette</strong> (relance), en attente.</li><li>(d) Doublon EDF → <strong>n'en garder qu'une</strong>, supprimer l'autre, vérifier qu'elle n'est pas saisie 2 fois.</li><li>(e) Facture au nom du gérant → <strong>signaler</strong> : possible charge personnelle ; ne pas récupérer la TVA sans validation du chef de mission.</li></ul>\n<hr>\n<h2>📝 Évaluation de fin de module 3</h2>\n<ol><li>Citez 4 mentions obligatoires d'une facture conforme.</li><li>Donnez la règle de nommage d'un fichier et un exemple.</li><li>Que faire d'une dépense sans justificatif au rapprochement ?</li><li>Citez 3 causes de doublon.</li><li>Quelles colonnes minimales pour un tableau de suivi de dossier ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé synthétique :</strong> 1) SIREN, date, n° facture, TVA détaillée (+ mentions légales). 2) <code>AAAA-MM-JJ_TYPE_TIERS_MONTANT.pdf</code>, ex. <code>2026-03-12_ACH_ORANGE_59,90.pdf</code>. 3) la passer en 471 ou laisser non lettrée <strong>avec commentaire</strong> + relancer la pièce ; ne pas déduire la TVA. 4) import + saisie manuelle, facture + relevé, double import Dext. 5) client, mois, statut saisie/banque/rapprochement/TVA, pièces manquantes, anomalies, statut, date livraison.</p>", "m04": "<h1>MODULE 4 — Saisie comptable pratique</h1>\n<p><strong>Niveau :</strong> Débutant → Intermédiaire · <strong>Durée estimée :</strong> 14–16 h · <strong>Prérequis :</strong> Modules 2–3</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Saisir achats, ventes, banque, caisse et OD.</li><li>Appliquer la bonne TVA (avec, sans, autoliquidation, intracommunautaire, import/export).</li><li>Imputer correctement les charges courantes (loyer, télécom, carburant, honoraires…).</li><li>Traiter les cas particuliers fréquents en cabinet.</li></ul>\n<h2>🧩 Compétences à maîtriser</h2>\n<ul><li>Trouver le bon compte de charge et le bon taux de TVA.</li><li>Saisir un journal de banque équilibré.</li><li>Reconnaître les opérations à autoliquider.</li></ul>\n<hr>\n<h2>1. Les journaux de saisie</h2>\n<div class=\"tbl\"><table><thead><tr><th>Journal</th><th>Code usuel</th><th>Contenu</th></tr></thead><tbody><tr><td>Achats</td><td>AC / HA</td><td>Factures fournisseurs</td></tr><tr><td>Ventes</td><td>VT</td><td>Factures clients</td></tr><tr><td>Banque</td><td>BQ</td><td>Mouvements bancaires</td></tr><tr><td>Caisse</td><td>CA</td><td>Espèces</td></tr><tr><td>Opérations diverses</td><td>OD</td><td>Paie, TVA, dotations, régularisations</td></tr></tbody></table></div>\n<hr>\n<h2>2. Saisie des ACHATS</h2>\n<p><strong>Schéma général :</strong> <code>6xx (HT) + 44566 (TVA) au débit / 401 au crédit</code></p>\n<p><strong>Ex. 1 — Achat marchandises 1 000 € HT, TVA 20 %</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>607 Achats de marchandises</td><td>1 000</td><td></td></tr><tr><td>44566 TVA déductible</td><td>200</td><td></td></tr><tr><td>401 Fournisseur</td><td></td><td>1 200</td></tr></tbody></table></div>\n<p><strong>Ex. 2 — Facture sans TVA (fournisseur en franchise en base)</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>606x ou 611 (selon nature)</td><td>300</td><td></td></tr><tr><td>401 Fournisseur</td><td></td><td>300</td></tr></tbody></table></div>\n<blockquote>Mention sur la facture : « TVA non applicable, art. 293 B du CGI ». <strong>Pas de TVA déductible.</strong></blockquote>\n<hr>\n<h2>3. Saisie des VENTES</h2>\n<p><strong>Schéma général :</strong> <code>411 (TTC) au débit / 70x (HT) + 44571 (TVA) au crédit</code></p>\n<p><strong>Ex. 3 — Vente prestation 2 000 € HT, TVA 20 %</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>411 Client</td><td>2 400</td><td></td></tr><tr><td>706 Prestations de services</td><td></td><td>2 000</td></tr><tr><td>44571 TVA collectée</td><td></td><td>400</td></tr></tbody></table></div>\n<hr>\n<h2>4. Saisie de la BANQUE</h2>\n<p>Règle : <strong>512 débité = entrée d'argent</strong>, <strong>512 crédité = sortie</strong>.</p>\n<p><strong>Ex. 4 — Paiement fournisseur 1 200 €</strong> : 401 D 1 200 / 512 C 1 200<br><strong>Ex. 5 — Encaissement client 2 400 €</strong> : 512 D 2 400 / 411 C 2 400<br><strong>Ex. 6 — Frais bancaires 18 €</strong> : 627 D 18 / 512 C 18<br><strong>Ex. 7 — Virement du compte courant vers le livret (compte interne)</strong> : 580 puis contrepassation (cf. virements internes Module 6).</p>\n<hr>\n<h2>5. Saisie de la CAISSE</h2>\n<ul><li>Journal CA : entrées (ventes espèces) au débit du 53, sorties (achats espèces) au crédit.</li><li><strong>Contrôle clé :</strong> le solde 53 ne peut <strong>jamais être créditeur</strong>. Si négatif → erreur (souvent un apport en espèces non saisi ou une dépense en double).</li></ul>\n<hr>\n<h2>6. Saisie des OD (opérations diverses)</h2>\n<p>Servent aux écritures qui ne passent pas par achats/ventes/banque : <strong>paie, TVA, dotations aux amortissements, régularisations, à-nouveaux, reclassements</strong>.</p>\n<hr>\n<h2>7. La TVA selon les cas (synthèse — détail Module 5)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Situation</th><th>Traitement</th></tr></thead><tbody><tr><td><strong>Facture avec TVA</strong> (FR)</td><td>TVA déductible (44566) ou collectée (44571) selon achat/vente</td></tr><tr><td><strong>Facture sans TVA</strong></td><td>Fournisseur en franchise / opération exonérée → pas de TVA</td></tr><tr><td><strong>Autoliquidation</strong> (sous-traitance BTP, certains achats)</td><td>Pas de TVA sur la facture ; l'entreprise <strong>collecte ET déduit</strong> elle-même</td></tr><tr><td><strong>Intracommunautaire (achat de biens UE)</strong></td><td>Autoliquidation : 4452 TVA due intracom + 44566 déductible</td></tr><tr><td><strong>Importation (hors UE)</strong></td><td>TVA à l'import autoliquidée sur la CA3 depuis 2022</td></tr><tr><td><strong>Exportation / livraison intracom</strong></td><td>Exonérée de TVA (mentions + justificatifs obligatoires)</td></tr></tbody></table></div>\n<p><strong>Ex. 8 — Autoliquidation sous-traitance BTP 5 000 € HT</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>611 Sous-traitance</td><td>5 000</td><td></td></tr><tr><td>401 Fournisseur</td><td></td><td>5 000</td></tr><tr><td>445662 TVA déductible autoliquidée</td><td>1 000</td><td></td></tr><tr><td>4452 TVA due intracom./autoliq.</td><td></td><td>1 000</td></tr></tbody></table></div>\n<blockquote>La facture du sous-traitant porte la mention « Autoliquidation ». Neutre en trésorerie de TVA mais <strong>obligatoire</strong> sur la CA3.</blockquote>\n<p><strong>Ex. 9 — Achat intracommunautaire de biens 3 000 € (fournisseur allemand)</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>607 Achats</td><td>3 000</td><td></td></tr><tr><td>445662 TVA déductible intracom.</td><td>600</td><td></td></tr><tr><td>4452 TVA due intracommunautaire</td><td></td><td>600</td></tr></tbody></table></div>\n<hr>\n<h2>8. Imputation des charges courantes (mémo cabinet)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Dépense</th><th>Compte</th><th>TVA</th></tr></thead><tbody><tr><td>Loyer local professionnel</td><td>6132</td><td>20 % (si bail soumis) — sinon exonéré</td></tr><tr><td>Location matériel/véhicule</td><td>6135</td><td>20 %</td></tr><tr><td>Assurances</td><td>616</td><td><strong>Pas de TVA</strong> (exonérée)</td></tr><tr><td>Téléphone / Internet</td><td>6262</td><td>20 %</td></tr><tr><td>Carburant essence/gazole</td><td>60622 (ou 6061)</td><td>TVA : voir Module 5 (gazole 80 %, essence alignée)</td></tr><tr><td>Restaurant / repas d'affaires</td><td>6257</td><td>20 % récupérable si justifié pro</td></tr><tr><td>Déplacements (train, avion, péage, hôtel)</td><td>6251</td><td>train/avion exonérés ; hôtel 10 % ; péage 20 %</td></tr><tr><td>Honoraires (EC, avocat)</td><td>6226</td><td>20 %</td></tr><tr><td>Sous-traitance</td><td>611</td><td>20 % (ou autoliquidation BTP)</td></tr><tr><td>Abonnements / logiciels SaaS</td><td>6262 ou 6063</td><td>20 % (vérifier si fournisseur UE → autoliq.)</td></tr><tr><td>Électricité / gaz</td><td>60612</td><td>20 % (+ accises)</td></tr><tr><td>Petit équipement (&lt; 500 € HT)</td><td>6063 / 6068</td><td>20 %</td></tr><tr><td>Fournitures de bureau</td><td>6064</td><td>20 %</td></tr><tr><td>Frais postaux</td><td>6261</td><td>timbres exonérés ; affranchissement pro variable</td></tr><tr><td>Frais bancaires</td><td>627</td><td>souvent sans TVA ; commissions parfois avec TVA</td></tr><tr><td>Cotisations / adhésions</td><td>6281</td><td>selon nature</td></tr><tr><td>Publicité</td><td>6231</td><td>20 %</td></tr><tr><td>Entretien et réparations</td><td>615</td><td>20 %</td></tr></tbody></table></div>\n<blockquote>⚠️ <strong>Véhicules de tourisme (VP)</strong> : TVA sur l'achat et l'entretien <strong>non déductible</strong> ; carburant partiellement déductible. Détail Module 5 et Module 10.</blockquote>\n<hr>\n<h2>9. Cas particuliers fréquents en cabinet</h2>\n<ul><li><strong>Avoir fournisseur</strong> : écriture inverse de l'achat (401 D / 6xx C + TVA C).</li><li><strong>Acompte versé</strong> : 4091 (fournisseur débiteur) avant la facture définitive.</li><li><strong>Facture à cheval sur 2 exercices</strong> : rattachement (CCA/FNP, Module 13).</li><li><strong>Paiement CB différé</strong> : débit bancaire postérieur (rapprochement, Module 6).</li><li><strong>Note de frais salarié</strong> : charges par nature + 425/455 selon remboursement.</li><li><strong>Prélèvement sans facture</strong> (abonnement) : passer en 471 ou en charge avec relance pièce.</li></ul>\n<hr>\n<h2>✅ Checklist de saisie (par pièce)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Pièce conforme et lisible</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon <strong>journal</strong> (AC/VT/BQ/CA/OD)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon <strong>tiers</strong> (401/411, le bon)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon <strong>compte de charge/produit</strong></label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon <strong>taux de TVA</strong> et <strong>bon compte de TVA</strong></label></li><li class=\"task\"><label><input type=\"checkbox\"> Montant HT + TVA = TTC (recalcul)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Date et n° de pièce corrects</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pas de doublon</label></li><li class=\"task\"><label><input type=\"checkbox\"> Commentaire si opération inhabituelle</label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 4.1 — Lot de 8 saisies</h2>\n<p>Saisir (TVA 20 % sauf mention) :</p>\n<ol><li>Facture EDF électricité 240 € TTC.</li><li>Facture assurance local 600 €.</li><li>Facture client prestation 4 800 € TTC.</li><li>Carburant gazole 60 € TTC (TVA déductible 80 %).</li><li>Honoraires avocat 1 200 € HT.</li><li>Sous-traitance BTP 2 000 € HT (autoliquidation).</li><li>Achat fournitures Amazon UE (vendeur établi en UE) 100 € (intracom. biens).</li><li>Frais bancaires 12 € (sans TVA).</li></ol>\n<h3>✔️ Correction 4.1</h3>\n<ol><li>60612 = 200 / 44566 = 40 / 401 = 240</li><li>616 = 600 / 401 = 600 <em>(pas de TVA sur assurance)</em></li><li>411 = 4 800 / 706 = 4 000 / 44571 = 800</li><li>60622 = 50 + (TVA non déductible 20 %×0,20×... ) → pratique : 60622 = 50 ; TVA totale = 10, déductible 8 (44566), non déductible 2 (en 60622). Donc <strong>60622 = 52 / 44566 = 8 / 401 = 60</strong></li><li>6226 = 1 200 / 44566 = 240 / 401 = 1 440</li><li>611 = 2 000 / 401 = 2 000 ; 445662 = 400 / 4452 = 400</li><li>6064 (ou 607) = 100 / 445662 = 20 / 4452 = 20 ; 401 = 100</li><li>627 = 12 / 512 = 12</li></ol>\n<hr>\n<h2>📝 Évaluation de fin de module 4</h2>\n<p><strong>A — 6 écritures à passer</strong> (mélange achats/ventes/banque, dont 1 autoliquidation et 1 intracom).<br><strong>B — QCM (4 pts) :</strong></p>\n<ol><li>La TVA sur assurance est : a) 20 % b) <strong>non déductible (exonéré)</strong></li><li>Une facture en franchise en base : a) TVA 20 % b) <strong>pas de TVA</strong></li><li>Le 512 crédité signifie : a) entrée d'argent b) <strong>sortie d'argent</strong></li><li>L'autoliquidation est : a) neutre en TVA mais obligatoire sur la CA3 b) une exonération</li></ol>\n<p><strong>Seuil : 14/20.</strong><br><strong>Corrigé B :</strong> 1b · 2b · 3b · 4a.</p>", "m21": "<h1>MODULE 21 — Logiciel : Pennylane (production &amp; pré-compta)</h1>\n<p><strong>Niveau :</strong> Intermédiaire · <strong>Durée estimée :</strong> 6–8 h (pratique) · <strong>Prérequis :</strong> Modules 4–7<br><strong>Type :</strong> Formation logiciel — plateforme très utilisée par les cabinets français modernes.</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Maîtriser le workflow de production Pennylane côté collaborateur.</li><li>Rapprocher transactions bancaires ↔ factures, catégoriser, lettrer, préparer la TVA.</li><li>Gérer les justificatifs et les pièces manquantes dans Pennylane.</li></ul>\n<h2>🧩 Compétences à maîtriser</h2>\n<ul><li>Traiter une « to-do » bancaire de A à Z.</li><li>Catégoriser sans erreur et joindre la pièce systématiquement.</li></ul>\n<hr>\n<h2>1. À quoi sert Pennylane</h2>\n<p>Plateforme <strong>tout-en-un en ligne</strong> (cloud) : connexion bancaire automatique, collecte et <strong>océrisation des factures</strong>, saisie/catégorisation, <strong>rapprochement</strong>, lettrage, <strong>TVA</strong>, reporting et facturation. Le cabinet pilote la production ; le client dépose ses pièces et consulte ses tableaux de bord.</p>\n<p><strong>Deux espaces :</strong></p>\n<ul><li><strong>Espace cabinet</strong> (production) : où travaille le collaborateur.</li><li><strong>Espace client</strong> : dépôt de pièces, connexion bancaire, validation.</li></ul>\n<hr>\n<h2>2. Avant de saisir : vérifier le paramétrage du dossier</h2>\n<ul><li>Le <strong>régime TVA</strong> (franchise / réel simplifié / réel normal, débits ou encaissements) est correct.</li><li>Les <strong>comptes bancaires</strong> sont bien connectés et synchronisés (pas d'interruption).</li><li>Le <strong>plan comptable</strong> du dossier et les <strong>règles d'automatisation</strong> existantes.</li><li>Les <strong>journaux</strong> (achats, ventes, banque, OD).</li></ul>\n<blockquote>🇲🇬 Posture offshore : on ne modifie pas le paramétrage du dossier sans accord du chef de mission.</blockquote>\n<hr>\n<h2>3. Le workflow de production (étape par étape)</h2>\n<ol><li><strong>Collecte</strong> : les factures arrivent (upload client, mail dédié, océrisation). Vérifier l'OCR (montant, TVA, date, fournisseur).</li><li><strong>Banque</strong> : les transactions descendent automatiquement. Traiter la <strong>« to-do »</strong> transaction par transaction.</li><li><strong>Rapprochement</strong> : pour chaque transaction, <strong>associer la facture/justificatif</strong> correspondant.</li><li><strong>Catégorisation</strong> : si pas de facture, affecter le <strong>bon compte</strong> (charge/produit) avec la <strong>bonne TVA</strong>.</li><li><strong>Lettrage</strong> : les paiements se lettrent avec les factures clients/fournisseurs.</li><li><strong>Pièces manquantes</strong> : marquer/relancer ; en attente → laisser non rapproché <strong>avec note</strong>.</li><li><strong>TVA</strong> : contrôler puis générer le brouillon de déclaration → <strong>validation chef de mission</strong>.</li></ol>\n<hr>\n<h2>4. Catégorisation et TVA</h2>\n<ul><li>Toujours vérifier le <strong>taux et le compte de TVA</strong> proposés (ne pas faire confiance aveuglément à l'automatisation).</li><li>TVA sur <strong>assurance</strong> = exonérée ; <strong>VP</strong> = non déductible ; <strong>carburant</strong> = règle spécifique (Module 5).</li><li>Les <strong>règles automatiques</strong> (catégorisation récurrente) : utiles mais <strong>à contrôler</strong>, surtout les premières fois.</li></ul>\n<h2>5. Justificatifs &amp; GED</h2>\n<ul><li><strong>Chaque écriture doit avoir sa pièce</strong> jointe (c'est la force de Pennylane).</li><li>Ne jamais valider une transaction « par dépense » sans justificatif → utiliser une note + relance.</li><li>Surveiller l'alerte <strong>doublon</strong> (facture importée 2 fois).</li></ul>\n<h2>6. Erreurs fréquentes</h2>\n<ul><li>Valider une transaction sans pièce.</li><li>Catégorisation automatique acceptée sans contrôle (mauvais compte).</li><li>Doublon import + saisie.</li><li>Oublier la TVA sur <strong>encaissements</strong> (prestations de services).</li><li>Connexion bancaire expirée → transactions manquantes (à signaler).</li></ul>\n<h2>7. Bonnes pratiques offshore</h2>\n<ul><li>Traiter la <strong>to-do bancaire chronologiquement</strong>, ne rien laisser « gris ».</li><li>Joindre la pièce <strong>avant</strong> de valider.</li><li>Documenter chaque transaction inhabituelle (note interne).</li><li>Préparer la TVA quelques jours <strong>avant</strong> l'échéance ; ne jamais la valider/télétransmettre seul.</li></ul>\n<hr>\n<h2>✅ Checklist Pennylane (clôture mensuelle d'un dossier)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Connexion bancaire active, toutes les transactions descendues</label></li><li class=\"task\"><label><input type=\"checkbox\"> To-do bancaire à zéro (tout rapproché ou justifié)</label></li><li class=\"task\"><label><input type=\"checkbox\"> OCR des factures contrôlé</label></li><li class=\"task\"><label><input type=\"checkbox\"> Catégorisations vérifiées (compte + TVA)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Justificatifs joints partout</label></li><li class=\"task\"><label><input type=\"checkbox\"> Doublons contrôlés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Lettrage 401/411 fait</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces manquantes relancées + notées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Brouillon TVA contrôlé → transmis pour validation</label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 21.1 — Traiter une to-do bancaire</h2>\n<p>
