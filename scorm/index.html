ng> (Bénéfices agricoles)</td><td>Agriculture</td><td>Micro-BA, réel</td></tr></tbody></table></div>\n<hr>\n<h2>3. Les régimes d'imposition du bénéfice (seuils 2026)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Régime</th><th>Seuils de CA (2026)</th><th>Abattement / obligations</th></tr></thead><tbody><tr><td><strong>Micro-BIC vente</strong></td><td>≤ <strong>203 100 €</strong></td><td>Abattement <strong>71 %</strong> ; pas de bilan</td></tr><tr><td><strong>Micro-BIC services</strong></td><td>≤ <strong>83 600 €</strong></td><td>Abattement <strong>50 %</strong></td></tr><tr><td><strong>Micro-BNC</strong></td><td>≤ <strong>83 600 €</strong></td><td>Abattement <strong>34 %</strong> (déclaration 2042-C-PRO)</td></tr><tr><td><strong>Réel simplifié (BIC)</strong></td><td>jusqu'aux seuils du réel normal</td><td>Liasse 2033 (tableaux simplifiés)</td></tr><tr><td><strong>Réel normal (BIC)</strong></td><td>au-delà / sur option</td><td>Liasse 2050 et suivants</td></tr><tr><td><strong>Déclaration contrôlée (BNC)</strong></td><td>sur option / au-delà du micro</td><td><strong>2035</strong></td></tr></tbody></table></div>\n<hr>\n<h2>4. L'impôt sur les sociétés (IS) — taux 2026</h2>\n<ul><li><strong>Taux normal : 25 %</strong>.</li><li><strong>Taux réduit : 15 %</strong> sur les <strong>premiers 42 500 € de bénéfice</strong>, pour les PME dont :</li><li>le <strong>CA HT &lt; 10 M€</strong>,</li><li>le <strong>capital entièrement libéré</strong>,</li><li><strong>détenu à ≥ 75 % par des personnes physiques</strong> (ou sociétés répondant elles-mêmes aux conditions).</li><li>Au-delà de 42 500 € : taux normal de 25 %.</li></ul>\n<p><strong>Ex. — Bénéfice 60 000 € (PME éligible) :</strong></p>\n<ul><li>42 500 × 15 % = 6 375 €</li><li>(60 000 − 42 500) × 25 % = 17 500 × 25 % = 4 375 €</li><li><strong>IS = 10 750 €</strong></li></ul>\n<h3>Acomptes et solde IS</h3>\n<ul><li><strong>4 acomptes</strong> : <strong>15 mars, 15 juin, 15 septembre, 15 décembre</strong> (formulaire 2571).</li><li><strong>Solde</strong> : le <strong>15 mai</strong> N pour un exercice clos le 31/12/N-1 (sinon le 15 du 4e mois suivant la clôture) — formulaire 2572.</li></ul>\n<hr>\n<h2>5. La liasse fiscale</h2>\n<p>La <strong>liasse fiscale</strong> = ensemble des tableaux (bilan, compte de résultat, annexes fiscales) transmis à l'administration avec la déclaration de résultat. Selon le régime : <strong>2031/2033</strong> (BIC RSI), <strong>2050-2059</strong> (BIC réel normal), <strong>2035</strong> (BNC), <strong>2065</strong> (IS).</p>\n<ul><li><strong>Date limite de dépôt</strong> : généralement <strong>début mai</strong> (2e jour ouvré suivant le 1er mai) pour un exercice clos au 31/12, avec la <strong>télétransmission EDI-TDFC</strong> (délai supplémentaire de 15 jours en pratique).</li></ul>\n<blockquote>Rôle du collaborateur : <strong>préparer les tableaux, justifier les comptes, rassembler les éléments</strong> ; l'expert-comptable <strong>finalise et télétransmet</strong>.</blockquote>\n<hr>\n<h2>6. Autres impôts et taxes</h2>\n<h3>CFE — Cotisation foncière des entreprises</h3>\n<p>Due par toute entreprise (sauf 1re année / exonérations) ; basée sur la valeur locative des locaux. <strong>Échéance : 15 décembre</strong> (acompte en juin si CFE N-1 ≥ 3 000 €).</p>\n<h3>CVAE — Cotisation sur la valeur ajoutée des entreprises (2026)</h3>\n<ul><li>Due si <strong>CA &gt; 500 000 €</strong>.</li><li><strong>Suppression progressive maintenue jusqu'en 2030</strong> (report).</li><li><strong>Taux maximal : 0,28 % pour 2026</strong> (et 2027), puis 0,19 % en 2028, 0,09 % en 2029, suppression en 2030.</li></ul>\n<h3>Taxe sur les salaires</h3>\n<p>Due par les employeurs <strong>non assujettis à la TVA</strong> (ou assujettis à moins de 90 %) : associations, certaines activités exonérées, secteur médical/financier… Barème progressif par tranches sur les rémunérations. → Vérifier l'assujettissement du dossier.</p>\n<h3>Taxes sur l'affectation des véhicules (ex-TVS)</h3>\n<p>Pour les sociétés utilisant des véhicules de tourisme : <strong>taxe annuelle sur les émissions de CO₂</strong> + <strong>taxe sur les polluants atmosphériques</strong> (ancien système malus/ancienneté). Déclarées annuellement.</p>\n<hr>\n<h2>7. Échéances fiscales importantes (mémo)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Échéance</th><th>Quand</th></tr></thead><tbody><tr><td>TVA CA3 (réel normal)</td><td>Mensuelle (selon planning, souvent autour du 15-24)</td></tr><tr><td>Acomptes TVA RSI</td><td>Juillet et décembre</td></tr><tr><td>CA12 (RSI)</td><td>2e jour ouvré après le 1er mai</td></tr><tr><td>Acomptes IS</td><td>15/03, 15/06, 15/09, 15/12</td></tr><tr><td>Solde IS</td><td>15/05 (clôture 31/12)</td></tr><tr><td>Liasse fiscale</td><td>Début mai (clôture 31/12)</td></tr><tr><td>CFE</td><td>15 décembre</td></tr><tr><td>CVAE (si due)</td><td>Déclaration et solde en mai ; acompte(s) en cours d'année</td></tr></tbody></table></div>\n<hr>\n<h2>✅ Checklist « préparation des éléments fiscaux » (offshore)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Régime fiscal du dossier identifié (IR/IS, BIC/BNC, micro/réel)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes révisés et justifiés (Module 11)</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA de l'exercice bouclée et cohérente</label></li><li class=\"task\"><label><input type=\"checkbox\"> Immobilisations et amortissements à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Provisions / dépréciations recensées (à valider)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes courants d'associés justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Éléments de réintégration/déduction signalés (amendes, TVS, etc.) <strong>pour décision EC</strong></label></li><li class=\"task\"><label><input type=\"checkbox\"> Tableaux de liasse pré-remplis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dossier transmis au chef de mission <strong>sans valider fiscalement à sa place</strong></label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 12.1 — Calcul d'IS</h2>\n<p>Une SAS (PME éligible au taux réduit) réalise un bénéfice fiscal de <strong>90 000 €</strong>. Calculez l'IS.</p>\n<h3>✔️ Correction 12.1</h3>\n<ul><li>42 500 × 15 % = 6 375 €</li><li>(90 000 − 42 500) × 25 % = 47 500 × 25 % = 11 875 €</li><li><strong>IS = 18 250 €</strong></li></ul>\n<hr>\n<h2>🧪 Cas pratique 12.2 — Régime applicable</h2>\n<p>Un consultant indépendant réalise 70 000 € de recettes (prestations intellectuelles). Quel régime fiscal possible ?</p>\n<h3>✔️ Correction 12.2</h3>\n<p>Activité <strong>BNC</strong>. 70 000 € &lt; <strong>83 600 €</strong> → éligible au <strong>micro-BNC</strong> (abattement 34 %) ou option pour la <strong>déclaration contrôlée (2035)</strong> si charges réelles élevées. <strong>Le choix se décide avec l'expert-comptable</strong> (le collaborateur ne tranche pas seul).</p>\n<hr>\n<h2>📝 Évaluation de fin de module 12</h2>\n<ol><li>Différence IR / IS ?</li><li>Déclarations : 2031, 2035, 2065 correspondent à quoi ?</li><li>Taux d'IS 2026 (normal et réduit + condition) ?</li><li>Dates des acomptes IS ?</li><li>La CVAE est-elle encore due en 2026 ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) IR = bénéfice imposé chez l'exploitant ; IS = la société paie l'impôt. 2) 2031 = BIC, 2035 = BNC, 2065 = IS. 3) 25 % normal ; <strong>15 % sur les 42 500 premiers €</strong> si CA &lt; 10 M€, capital libéré détenu ≥ 75 % par des personnes physiques. 4) 15/03, 15/06, 15/09, 15/12. 5) <strong>oui</strong>, suppression repoussée à 2030 (taux max 0,28 % en 2026).</p>\n<hr>\n<h3>📌 Sources officielles 2026</h3>\n<ul><li>IS, taux et acomptes — <a href=\"https://www.impots.gouv.fr/professionnel/imposition-des-resultats\" target=\"_blank\" rel=\"noopener\">impots.gouv.fr</a></li><li>Régimes micro / réel — <a href=\"https://www.economie.gouv.fr/entreprises/gerer-sa-micro-entreprise/micro-entreprise-regime-reel-et-regime-de-la-declaration-controlee-les-3-regimes-dimposition-des-entreprises\" target=\"_blank\" rel=\"noopener\">economie.gouv.fr</a></li><li>CVAE / CFE — <a href=\"https://bofip.impots.gouv.fr/bofip/839-PGP.html/identifiant=BOI-CVAE-LIQ-10-20251119\" target=\"_blank\" rel=\"noopener\">bofip.impots.gouv.fr</a></li><li>Loi de finances 2026 — <a href=\"https://www.economie.gouv.fr/entreprises/gerer-sa-fiscalite-et-ses-impots/loi-de-finances-2026-ce-qui-change-pour-les-entreprises\" target=\"_blank\" rel=\"noopener\">economie.gouv.fr</a></li></ul>", "m13": "<h1>MODULE 13 — Bilan et clôture</h1>\n<p><strong>Niveau :</strong> Avancé · <strong>Durée estimée :</strong> 12 h · <strong>Prérequis :</strong> Modules 10, 11, 12</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Réaliser les travaux de clôture : FNP, CCA, FAE, PCA, stocks, amortissements, provisions, cut-off.</li><li>Justifier tous les comptes et contrôler les cycles clés.</li><li>Préparer le dossier de bilan pour le réviseur / chef de mission.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Appliquer le principe de cut-off.</li><li>Passer les écritures d'inventaire courantes.</li></ul>\n<hr>\n<h2>1. Les travaux de clôture : objectif</h2>\n<p>À la fin de l'exercice, on ajuste la comptabilité pour qu'elle reflète la <strong>réalité économique</strong> de l'exercice (et non la seule date des factures/paiements). C'est le principe d'<strong>indépendance des exercices</strong> et de <strong>cut-off</strong>.</p>\n<hr>\n<h2>2. Le cut-off (séparation des exercices)</h2>\n<p>Chaque charge/produit doit être rattaché à <strong>l'exercice qui le concerne</strong>, quelle que soit la date de facturation/paiement.</p>\n<div class=\"tbl\"><table><thead><tr><th>Situation</th><th>Écriture de régularisation</th></tr></thead><tbody><tr><td><strong>Charge de N, facture reçue en N+1</strong></td><td><strong>FNP</strong> – Facture Non Parvenue</td></tr><tr><td><strong>Produit de N, facture émise en N+1</strong></td><td><strong>FAE</strong> – Facture À Établir</td></tr><tr><td><strong>Charge payée en N concernant N+1</strong></td><td><strong>CCA</strong> – Charge Constatée d'Avance</td></tr><tr><td><strong>Produit encaissé en N concernant N+1</strong></td><td><strong>PCA</strong> – Produit Constaté d'Avance</td></tr></tbody></table></div>\n<hr>\n<h2>3. Les écritures d'inventaire</h2>\n<h3>FNP — Facture non parvenue (charge de N non encore facturée)</h3>\n<p><strong>Ex.</strong> Marchandises reçues en décembre, facture 1 000 € HT attendue.</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>607 Achats</td><td>1 000</td><td></td></tr><tr><td>44586 TVA sur FNP</td><td>200</td><td></td></tr><tr><td>408 Fournisseurs – factures non parvenues</td><td></td><td>1 200</td></tr></tbody></table></div>\n<p><em>(Contrepassée à l'ouverture de N+1.)</em></p>\n<h3>FAE — Facture à établir (produit de N non encore facturé)</h3>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>418 Clients – factures à établir</td><td>1 200</td><td></td></tr><tr><td>70x Ventes</td><td></td><td>1 000</td></tr><tr><td>44587 TVA sur FAE</td><td></td><td>200</td></tr></tbody></table></div>\n<h3>CCA — Charge constatée d'avance</h3>\n<p><strong>Ex.</strong> Assurance 1 200 € payée en N pour la période janv–déc N+1.</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>486 Charges constatées d'avance</td><td>1 200</td><td></td></tr><tr><td>616 Assurances</td><td></td><td>1 200</td></tr></tbody></table></div>\n<h3>PCA — Produit constaté d'avance</h3>\n<p><strong>Ex.</strong> Abonnement encaissé en N pour des prestations N+1.</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>70x Ventes</td><td>montant</td><td></td></tr><tr><td>487 Produits constatés d'avance</td><td></td><td>montant</td></tr></tbody></table></div>\n<hr>\n<h2>4. Stocks</h2>\n<p>À l'inventaire, on constate la <strong>variation de stock</strong> :</p>\n<ul><li>Stock initial : 6037 D / 37 C (annulation du stock d'ouverture).</li><li>Stock final : 37 D / 6037 C (constatation du stock de clôture).</li><li>(Pour matières premières : comptes 31 / 6031.)</li></ul>\n<hr>\n<h2>5. Amortissements et provisions</h2>\n<ul><li><strong>Amortissements</strong> : dotation de l'exercice (6811 / 28x) — cf. Module 10.</li><li><strong>Dépréciations</strong> : stocks (39), créances douteuses (491), titres… (681x / 49x) — <strong>sur validation EC</strong>.</li><li><strong>Provisions pour risques et charges</strong> (15x / 681x) : litiges, garanties… — <strong>décision EC</strong>.</li></ul>\n<hr>\n<h2>6. Contrôles de clôture (par cycle)</h2>\n<ul><li><strong>TVA</strong> : comptes 445x cohérents avec les déclarations ; TVA sur FNP/FAE (44586/44587) bien passée.</li><li><strong>Banque</strong> : rapprochements faits, 512 justifié.</li><li><strong>Emprunts</strong> : 164 = capital restant dû (tableau bancaire) ; intérêts courus (1688) si besoin.</li><li><strong>Paie</strong> : 421/431/437 soldés ou justifiés ; congés payés à provisionner (428/438) selon politique.</li><li><strong>Capitaux propres</strong> : résultat N-1 affecté (PV d'AG), 455 justifié.</li><li><strong>Comptes d'attente</strong> : 471/580 = 0.</li></ul>\n<hr>\n<h2>7. Préparation du dossier bilan</h2>\n<p>Documents à réunir :</p>\n<ul><li>Balance définitive + grand livre.</li><li>Feuilles de travail par cycle (Module 11).</li><li>Rapprochements bancaires de clôture.</li><li>Fichier des immobilisations + dotations.</li><li>Détail des FNP/FAE/CCA/PCA + justificatifs.</li><li>Tableau des emprunts (capital restant dû).</li><li>Détail des provisions/dépréciations proposées.</li><li>Liste des questions/éléments à valider par l'EC.</li></ul>\n<h2>8. Documents à demander au client (clôture)</h2>\n<ul><li>Inventaire physique des <strong>stocks</strong> au dernier jour.</li><li>Relevés bancaires de <strong>décembre</strong> + relevé au 31/12.</li><li>Factures de fin d'année non encore transmises.</li><li><strong>Échéanciers d'emprunts</strong>, contrats de crédit-bail.</li><li>Justificatifs des <strong>provisions</strong> (litiges en cours).</li><li>Relevés fournisseurs / clients pour justifier 401/411.</li><li>Détail des <strong>en-cours</strong> (FAE) et acomptes.</li></ul>\n<hr>\n<h2>✅ Checklist de clôture / bilan</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Cut-off réalisé : FNP, FAE, CCA, PCA passées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Stocks constatés (variation)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Amortissements de l'exercice passés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Provisions/dépréciations proposées (validation EC)</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA de clôture contrôlée (FNP/FAE incluses)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Rapprochements bancaires de clôture OK</label></li><li class=\"task\"><label><input type=\"checkbox\"> Emprunts justifiés (164 = capital restant dû)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Paie justifiée (421/431/437)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Capitaux propres : résultat N-1 affecté</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471/580 = 0</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dossier bilan complet pour le chef de mission</label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 13.1 — Cut-off</h2>\n<p>Au 31/12/N :</p>\n<ol><li>Facture d'électricité de décembre reçue le 10/01/N+1 : 300 € HT.</li><li>Assurance 2 400 € payée le 01/10/N pour 12 mois (oct N → sept N+1).</li><li>Prestation réalisée en décembre N, facturée en janvier : 5 000 € HT.</li></ol>\n<p><strong>Travail :</strong> passer les écritures de régularisation.</p>\n<h3>✔️ Correction 13.1</h3>\n<ol><li><strong>FNP</strong> : 60612 D 300 / 44586 D 60 / 408 C 360</li><li><strong>CCA</strong> : la part N+1 = 9 mois (janv→sept) sur 12 = 2 400 × 9/12 = 1 800 → 486 D 1 800 / 616 C 1 800</li><li><strong>FAE</strong> : 418 D 6 000 / 706 C 5 000 / 44587 C 1 000</li></ol>\n<hr>\n<h2>🧪 Cas pratique 13.2 — Variation de stock</h2>\n<p>Stock initial 12 000 €, stock final 15 000 € (marchandises). Passez les écritures et indiquez l'effet sur le résultat.</p>\n<h3>✔️ Correction 13.2</h3>\n<ul><li>Annulation stock initial : 6037 D 12 000 / 37 C 12 000</li><li>Constatation stock final : 37 D 15 000 / 6037 C 15 000</li><li><strong>Variation = +3 000 €</strong> (stock en hausse) → <strong>diminue les charges</strong> (compte 6037 créditeur net de 3 000) → <strong>augmente le résultat</strong> de 3 000 €.</li></ul>\n<hr>\n<h2>📝 Évaluation de fin de module 13</h2>\n<ol><li>Que signifient FNP, FAE, CCA, PCA ?</li><li>Quel principe justifie le cut-off ?</li><li>Écriture d'une CCA ?</li><li>Quels comptes pour la variation de stock marchandises ?</li><li>Citez 4 documents à demander au client pour la clôture.</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) Facture Non Parvenue / Facture À Établir / Charge Constatée d'Avance / Produit Constaté d'Avance. 2) indépendance des exercices. 3) 486 D / 6xx C. 4) 37 et 6037. 5) inventaire stocks, relevés bancaires 12/N, échéanciers d'emprunts, justificatifs de provisions (+ relevés fournisseurs/clients).</p>", "m14": "<h1>MODULE 14 — Outils utilisés par les cabinets français</h1>\n<p><strong>Niveau :</strong> Transversal · <strong>Durée estimée :</strong> 10–14 h (pratique sur outils) · <strong>Prérequis :</strong> Modules 3–7</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Connaître le rôle de chaque outil et ce qu'un collaborateur offshore doit savoir y faire.</li><li>Éviter les erreurs fréquentes propres à chaque logiciel.</li><li>Appliquer les bonnes pratiques.</li></ul>\n<blockquote>Pour chaque outil : <strong>rôle · à maîtriser · erreurs fréquentes · bonnes pratiques · cas pratique</strong>.</blockquote>\n<hr>\n<h2>1. Pennylane</h2>\n<ul><li><strong>Rôle :</strong> plateforme tout-en-un (connexion bancaire, collecte de factures, saisie/lettrage, TVA, reporting client). Très répandu en cabinet moderne.</li><li><strong>À maîtriser :</strong> rapprochement des transactions bancaires aux factures, catégorisation, lettrage, gestion des justificatifs, préparation TVA, recherche de pièces.</li><li><strong>Erreurs fréquentes :</strong> valider une transaction sans pièce, mauvais compte de catégorisation, doublon (import + saisie), oublier la TVA sur encaissements.</li><li><strong>Bonnes pratiques :</strong> traiter par « to-do » bancaire, joindre systématiquement la pièce, utiliser les règles d'automatisation avec prudence.</li><li><strong>Cas pratique :</strong> rapprocher 20 transactions d'un relevé à leurs factures + signaler les pièces manquantes.</li></ul>\n<h2>2. Tiime</h2>\n<ul><li><strong>Rôle :</strong> outil orienté TPE/indépendants (facturation, banque, pré-compta, note de frais).</li><li><strong>À maîtriser :</strong> validation des écritures pré-catégorisées, association justificatifs, export vers l'outil de production du cabinet.</li><li><strong>Erreurs fréquentes :</strong> se fier à la catégorisation automatique sans contrôle.</li><li><strong>Bonnes pratiques :</strong> contrôler chaque imputation proposée ; vérifier la TVA.</li><li><strong>Cas pratique :</strong> corriger 10 écritures mal catégorisées automatiquement.</li></ul>\n<h2>3. ACD (AGIRIS / iSuite Expert)</h2>\n<ul><li><strong>Rôle :</strong> logiciel de production cabinet (compta, révision, liasse, paie). Très utilisé en France.</li><li><strong>À maîtriser :</strong> saisie par journaux, lettrage, éditions (grand livre, balance), modules de révision et liasse.</li><li><strong>Erreurs fréquentes :</strong> mauvais journal/période, oubli de validation des brouillards.</li><li><strong>Bonnes pratiques :</strong> travailler par cycle, utiliser les feuilles de révision intégrées.</li><li><strong>Cas pratique :</strong> saisir un journal d'achats + éditer la balance.</li></ul>\n<h2>4. Sage (Sage Compta / Sage Génération Experts)</h2>\n<ul><li><strong>Rôle :</strong> suite comptable historique (compta, gestion commerciale, paie).</li><li><strong>À maîtriser :</strong> plan comptable, saisie, lettrage, états, import d'écritures.</li><li><strong>Erreurs fréquentes :</strong> confusion entre sociétés/dossiers, exercices mal paramétrés.</li><li><strong>Bonnes pratiques :</strong> vérifier le dossier et l'exercice ouverts avant toute saisie.</li><li><strong>Cas pratique :</strong> saisir 5 factures + lettrer un compte fournisseur.</li></ul>\n<h2>5. Cegid (Cegid Loop / Cegid Expert)</h2>\n<ul><li><strong>Rôle :</strong> plateforme cabinet (cloud), saisie, révision, collaboration client.</li><li><strong>À maîtriser :</strong> saisie guidée, rapprochement bancaire, révision, GED intégrée.</li><li><strong>Erreurs fréquentes :</strong> doublons d'import bancaire, mauvaise affectation analytique.</li><li><strong>Bonnes pratiques :</strong> suivre le workflow de validation, contrôler les imports.</li><li><strong>Cas pratique :</strong> rapprochement bancaire d'un mois.</li></ul>\n<h2>6. Coala</h2>\n<ul><li><strong>Rôle :</strong> logiciel de production cabinet (compta, immobilisations, états financiers).</li><li><strong>À maîtriser :</strong> saisie, révision, module immobilisations.</li><li><strong>Erreurs fréquentes :</strong> fichier immo non rapproché de la compta.</li><li><strong>Bonnes pratiques :</strong> contrôler 21/28 vs tableau immo.</li></ul>\n<h2>7. Quadra (Cegid Quadra / QuadraCompta)</h2>\n<ul><li><strong>Rôle :</strong> production comptable cabinet, très répandu.</li><li><strong>À maîtriser :</strong> saisie rapide par guides d'écriture, lettrage, éditions, OD.</li><li><strong>Erreurs fréquentes :</strong> guides d'écriture mal choisis (mauvaise TVA pré-paramétrée).</li><li><strong>Bonnes pratiques :</strong> vérifier le résultat des guides automatiques.</li><li><strong>Cas pratique :</strong> créer un guide d'écriture d'achat avec TVA 20 %.</li></ul>\n<h2>8. Dext (ex-Receipt Bank)</h2>\n<ul><li><strong>Rôle :</strong> collecte et <strong>océrisation</strong> des factures/tickets, export vers l'outil compta.</li><li><strong>À maîtriser :</strong> vérifier les données OCR (montant, TVA, date, fournisseur), publier vers la compta, détecter doublons.</li><li><strong>Erreurs fréquentes :</strong> publier une donnée OCR fausse sans contrôle, doublons.</li><li><strong>Bonnes pratiques :</strong> <strong>toujours</strong> contrôler l'OCR avant publication.</li><li><strong>Cas pratique :</strong> traiter 15 pièces Dext et corriger les OCR erronés.</li></ul>\n<h2>9. MEG (My Expert Group)</h2>\n<ul><li><strong>Rôle :</strong> collecte de pièces + GED + pré-saisie collaborative client/cabinet.</li><li><strong>À maîtriser :</strong> classement des pièces, suivi des demandes, échanges client.</li><li><strong>Erreurs fréquentes :</strong> pièces non classées, demandes non suivies.</li><li><strong>Bonnes pratiques :</strong> tenir le suivi des pièces manquantes à jour.</li></ul>\n<h2>10. Silae</h2>\n<ul><li><strong>Rôle :</strong> logiciel de <strong>paie</strong> leader en cabinet (bulletins, DSN).</li><li><strong>À maîtriser (côté comptable) :</strong> <strong>lire le journal de paie</strong>, récupérer l'OD de paie, rapprocher avec la compta et la DSN.</li><li><strong>Erreurs fréquentes :</strong> comptabiliser des montants ne correspondant pas au journal de paie.</li><li><strong>Bonnes pratiques :</strong> rapprocher OD = bulletins = DSN = paiements (Module 9).</li><li><strong>Cas pratique :</strong> comptabiliser une OD à partir d'un journal de paie Silae.</li></ul>\n<h2>11. RCA</h2>\n<ul><li><strong>Rôle :</strong> suite cabinet (révision, production de la liasse, prévisionnel, paie selon modules).</li><li><strong>À maîtriser :</strong> <strong>module révision</strong> (justification des comptes), génération de la <strong>liasse fiscale</strong>.</li><li><strong>Erreurs fréquentes :</strong> valider une révision sans justifier les soldes.</li><li><strong>Bonnes pratiques :</strong> rattacher une justification à chaque compte révisé.</li></ul>\n<h2>12. Excel / Google Sheets</h2>\n<ul><li><strong>Rôle :</strong> outil universel de contrôle (rapprochements, balance âgée, tableaux de suivi, immo).</li><li><strong>À maîtriser :</strong> formules <code>SOMME</code>, <code>RECHERCHEV</code>/<code>RECHERCHEX</code>, <code>SI</code>, <strong>tableaux croisés dynamiques</strong>, filtres, mise en forme conditionnelle.</li><li><strong>Erreurs fréquentes :</strong> formules cassées, totaux faux, écrasement de données.</li><li><strong>Bonnes pratiques :</strong> figer les en-têtes, contrôler les totaux, ne jamais écraser une source.</li><li><strong>Cas pratique :</strong> construire un état de rapprochement et une balance âgée.</li></ul>\n<h2>13. Google Drive</h2>\n<ul><li><strong>Rôle :</strong> stockage/partage de pièces (GED simple).</li><li><strong>À maîtriser :</strong> arborescence, droits d'accès, nommage.</li><li><strong>Bonnes pratiques :</strong> respecter la structure de dossiers + confidentialité (Module 1).</li></ul>\n<h2>14. Teams / Slack</h2>\n<ul><li><strong>Rôle :</strong> communication avec le cabinet (messages, appels, partage).</li><li><strong>Bonnes pratiques :</strong> canaux dédiés par client, messages clairs, <strong>pas de pièces confidentielles</strong> dans des canaux non sécurisés.</li></ul>\n<h2>15. Trello / Notion</h2>\n<ul><li><strong>Rôle :</strong> suivi des tâches et des dossiers (kanban, bases de données).</li><li><strong>Bonnes pratiques :</strong> colonnes <code>À faire / En cours / À valider / Terminé</code>, une carte par dossier/échéance.</li></ul>\n<hr>\n<h2>🧭 Plan d'apprentissage des outils (offshore)</h2>\n<ol><li><strong>Dext / MEG</strong> (collecte + OCR) → 2. <strong>Pennylane / Tiime</strong> (saisie web) → 3. <strong>un outil cabinet</strong> (ACD ou Sage ou Cegid/Quadra) → 4. <strong>Excel</strong> (contrôle) → 5. <strong>Silae</strong> (lecture paie) → 6. <strong>RCA</strong> (révision/liasse).</li></ol>\n<h2>✅ Checklist « prise en main d'un nouvel outil »</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Je sais ouvrir le bon dossier/exercice</label></li><li class=\"task\"><label><input type=\"checkbox\"> Je sais saisir dans le bon journal</label></li><li class=\"task\"><label><input type=\"checkbox\"> Je sais joindre une pièce à une écriture</label></li><li class=\"task\"><label><input type=\"checkbox\"> Je sais lettrer</label></li><li class=\"task\"><label><input type=\"checkbox\"> Je sais faire un rapprochement bancaire</label></li><li class=\"task\"><label><input type=\"checkbox\"> Je sais éditer grand livre / balance</label></li><li class=\"task\"><label><input type=\"checkbox\"> Je sais détecter les doublons</label></li><li class=\"task\"><label><input type=\"checkbox\"> Je connais les exports vers la production cabinet</label></li></ul>\n<hr>\n<h2>📝 Évaluation de fin de module 14</h2>\n<ol><li>Quel outil sert à l'OCR des factures ?</li><li>Quel logiciel de paie est leader en cabinet ?</li><li>Que doit-on toujours faire avant de publier une pièce Dext ?</li><li>Quel est le bon ordre d'apprentissage des outils ?</li><li>Citez 3 fonctions Excel utiles au comptable.</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) Dext (ou MEG/Pennylane). 2) Silae. 3) contrôler l'OCR (montant, TVA, date, fournisseur). 4) collecte → saisie web → outil cabinet → Excel → paie → révision. 5) RECHERCHEX, SI, tableaux croisés dynamiques (SOMME, filtres…).</p>", "m15": "<h1>MODULE 15 — Communication professionnelle avec un cabinet français</h1>\n<p><strong>Niveau :</strong> Transversal · <strong>Durée estimée :</strong> 5–6 h · <strong>Prérequis :</strong> aucun</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Rédiger des mails clairs et professionnels.</li><li>Demander une pièce, signaler une anomalie, faire une relance, répondre au chef de mission, présenter un travail terminé, remonter un blocage.</li><li>Adopter le ton attendu.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Écrire un mail structuré et actionnable.</li><li>Communiquer de façon traçable.</li></ul>\n<hr>\n<h2>1. Les règles d'un bon mail professionnel</h2>\n<ol><li><strong>Objet clair</strong> : <code>[CLIENT X] – TVA mars 2026 – à valider</code>.</li><li><strong>Une idée = un mail</strong> (ou des points numérotés).</li><li><strong>Aller à l'essentiel</strong> : contexte → demande → action attendue → délai.</li><li><strong>Ton courtois et précis</strong> : pas de familiarité, pas de jargon inutile, pas de fautes.</li><li><strong>Pièces jointes nommées</strong> correctement.</li><li><strong>Toujours proposer une solution</strong>, pas seulement un problème.</li><li><strong>Traçabilité</strong> : un écrit vaut mieux qu'un message oral.</li></ol>\n<hr>\n<h2>2. Le ton professionnel attendu</h2>\n<ul><li>Vouvoiement, formules de politesse (« Bonjour », « Cordialement »).</li><li>Phrases courtes, factuelles.</li><li>Pas d'excès d'excuses ni d'imprécision (« je crois que… »). Dire ce qui est <strong>fait</strong>, <strong>en cours</strong>, <strong>bloqué</strong>.</li><li>En cas de doute : poser <strong>une question précise</strong> avec les options.</li></ul>\n<hr>\n<h2>3. Modèles de mails (voir aussi <code>annexes/Modeles-mails.md</code>)</h2>\n<h3>A. Demande de pièce manquante</h3>\n<blockquote><strong>Objet :</strong> [CLIENT MARTIN] – Pièce manquante – Facture mars<br><br>Bonjour,<br>En rapprochant la banque de mars, j'ai relevé un prélèvement de <strong>120 € (ORANGE, le 12/03)</strong> sans facture associée.<br>Pourriez-vous me transmettre la facture correspondante via Dext ?<br>En attente, je laisse l'opération en compte d'attente (471) avec commentaire.<br>Merci, cordialement.</blockquote>\n<h3>B. Signalement d'anomalie</h3>\n<blockquote><strong>Objet :</strong> [CLIENT MARTIN] – Anomalie – Compte courant d'associé<br><br>Bonjour,<br>En révision, le compte 455 (associé) ressort <strong>débiteur de 8 000 €</strong>. Cela pourrait constituer une avance à régulariser.<br>Je vous transmets le détail des mouvements. Souhaitez-vous que je procède à un reclassement ou attendez-vous une instruction ?<br>Cordialement.</blockquote>\n<h3>C. Relance (2e demande)</h3>\n<blockquote><strong>Objet :</strong> [CLIENT MARTIN] – Relance – Pièces manquantes (3 éléments)<br><br>Bonjour,<br>Pour boucler la TVA de mars (échéance le 24/04), il me manque encore :<br>1. Facture Orange du 12/03 (120 €)<br>2. Relevé bancaire complet de mars (page 2 manquante)<br>3. Facture d'achat fournisseur DURAND (500 €)<br>Merci de me les transmettre <strong>avant le 20/04</strong> pour tenir l'échéance.<br>Cordialement.</blockquote>\n<h3>D. Réponse au chef de mission</h3>\n<blockquote><strong>Objet :</strong> RE: [CLIENT MARTIN] – TVA mars<br><br>Bonjour,<br>C'est fait : TVA de mars préparée, brouillon CA3 en pièce jointe.<br>- TVA collectée : 10 000 € · déductible : 7 200 € · <strong>à payer : 2 800 €</strong><br>- Banque rapprochée, 471 soldé.<br>- Point en suspens : 1 facture (120 €) encore en attente, sans impact sur la TVA.<br>Dossier prêt à valider. Cordialement.</blockquote>\n<h3>E. Présentation d'un travail terminé</h3>\n<blockquote><strong>Objet :</strong> [CLIENT MARTIN] – Dossier mars TERMINÉ<br><br>Bonjour,<br>Le dossier de mars est finalisé et contrôlé :<br>- Saisie achats/ventes/banque : OK<br>- Rapprochement bancaire : OK (solde justifié)<br>- Lettrage 401/411 : OK · 471 : soldé<br>- TVA : préparée, à valider<br>Checklist qualité jointe. Dossier disponible dans [outil].<br>Cordialement.</blockquote>\n<h3>F. Remontée de blocage</h3>\n<blockquote><strong>Objet :</strong> [CLIENT MARTIN] – BLOCAGE – accès bancaire expiré<br><br>Bonjour,<br>Je ne peux pas terminer le rapprochement : la <strong>connexion bancaire dans Pennylane a expiré</strong> (erreur depuis le 02/04).<br>Action de ma part : saisie achats/ventes faite en attendant.<br>Pouvez-vous demander au client de <strong>renouveler la synchronisation bancaire</strong> ? Sans cela, la TVA ne pourra pas être bouclée à temps.<br>Cordialement.</blockquote>\n<hr>\n<h2>4. Comment faire une relance client (efficace)</h2>\n<ul><li><strong>Regrouper</strong> toutes les demandes en une liste numérotée.</li><li>Indiquer <strong>l'échéance</strong> et l'impact (« pour tenir la TVA »).</li><li>Rester <strong>courtois mais ferme</strong>.</li><li><strong>Tracer</strong> : noter la date de relance dans le tableau de suivi.</li></ul>\n<hr>\n<h2>✅ Checklist « avant d'envoyer un mail »</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Objet clair avec [CLIENT]</label></li><li class=\"task\"><label><input type=\"checkbox\"> Demande précise et action attendue</label></li><li class=\"task\"><label><input type=\"checkbox\"> Délai indiqué si besoin</label></li><li class=\"task\"><label><input type=\"checkbox\"> Solution / contexte fournis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces jointes nommées et présentes</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pas de fautes, ton professionnel</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pas d'info confidentielle dans un canal non sécurisé</label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 15.1 — Rédiger un mail</h2>\n<p>Vous découvrez un <strong>doublon de facture EDF (240 €)</strong> déjà payée deux fois par le client. Rédigez le mail au chef de mission.</p>\n<h3>✔️ Correction 15.1 (exemple)</h3>\n<blockquote><strong>Objet :</strong> [CLIENT X] – Anomalie – Double paiement EDF (240 €)<br>Bonjour,<br>En lettrant le compte 401 EDF, j'ai constaté que la facture de <strong>240 €</strong> a été <strong>payée deux fois</strong> (le 05/03 et le 18/03). Le compte fournisseur est donc <strong>débiteur de 240 €</strong>.<br>Je propose de signaler le trop-payé au client pour demande de remboursement ou avoir. Souhaitez-vous que je le contacte ?<br>Détail joint. Cordialement.</blockquote>\n<hr>\n<h2>📝 Évaluation de fin de module 15</h2>\n<ol><li>Citez 4 règles d'un bon mail professionnel.</li><li>Que doit contenir un objet de mail ?</li><li>Comment structurer une relance ?</li><li>Que dire quand un travail est terminé ?</li><li>Comment remonter un blocage utilement ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) objet clair, demande précise, ton courtois, traçabilité (+ proposer une solution). 2) [CLIENT] + sujet + action (ex. « à valider »). 3) liste numérotée + échéance + impact. 4) résumé des contrôles faits + ce qui reste à valider. 5) décrire le blocage + ce qu'on a fait en attendant + l'action attendue + l'impact échéance.</p>", "m16": "<h1>MODULE 16 — Méthode de production offshore Madagascar</h1>\n<p><strong>Niveau :</strong> Transversal · <strong>Durée estimée :</strong> 5–6 h · <strong>Prérequis :</strong> Modules 1, 3, 15</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Organiser le travail entre Madagascar et la France (décalage, créneaux).</li><li>Suivre les tâches, prioriser les échéances, gérer les urgences TVA.</li><li>Gérer un portefeuille multi-clients et contrôler la qualité avant livraison.</li><li>Piloter par indicateurs.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Tenir un tableau de bord de production.</li><li>Reporter quotidiennement de façon claire.</li></ul>\n<hr>\n<h2>1. Décalage horaire Madagascar / France</h2>\n<ul><li>Madagascar = <strong>UTC+3</strong> (toute l'année).</li><li>France = <strong>UTC+1</strong> (hiver) / <strong>UTC+2</strong> (été).</li><li>Donc Madagascar a <strong>1 à 2 h d'avance</strong> sur la France.</li></ul>\n<p><strong>Exploiter l'avantage :</strong></p>\n<ul><li>Démarrer tôt → livrer en fin de matinée Mada = disponible côté France.</li><li>Garder <strong>1 créneau de recouvrement</strong> (ex. 11h–15h Mada) pour les échanges en direct.</li><li>Le décalage permet un effet « relais » : le cabinet retrouve le travail avancé le matin.</li></ul>\n<hr>\n<h2>2. Suivi quotidien des tâches</h2>\n<ul><li>Tenir une <strong>to-do priorisée</strong> chaque matin.</li><li>Mettre à jour le statut : <code>À faire / En cours / Bloqué / À valider / Terminé</code>.</li><li>Tout blocage → mail immédiat (Module 15), sans attendre.</li></ul>\n<hr>\n<h2>3. Reporting journalier (modèle)</h2>\n<p>Court, structuré, le même chaque jour :</p>\n<blockquote><strong>Reporting [date] – [collaborateur]</strong><br>✅ Fait : Client A saisie achats, Client B rapprochement mars<br>🔄 En cours : Client C TVA (80 %)<br>⛔ Bloqué : Client D (accès bancaire expiré – mail envoyé)<br>📅 Demain : Client C TVA à finaliser, Client E lettrage</blockquote>\n<hr>\n<h2>4. Priorisation des échéances</h2>\n<p>Ordre de priorité type :</p>\n<ol><li><strong>Échéances TVA</strong> (CA3) — non négociables.</li><li>Dossiers en clôture / bilan avec date limite.</li><li>Demandes urgentes du chef de mission.</li><li>Tenue mensuelle courante.</li><li>Tâches de fond (lettrage rétroactif, nettoyage 471).</li></ol>\n<hr>\n<h2>5. Gestion des urgences TVA</h2>\n<ul><li>Identifier <strong>la date d'échéance de chaque dossier</strong> en début de mois.</li><li>Boucler banque + saisie <strong>plusieurs jours avant</strong> l'échéance.</li><li>Préparer le brouillon CA3 → <strong>validation chef de mission</strong> → télétransmission.</li><li>Jamais de livraison TVA au dernier moment (risque de retard = pénalités pour le client).</li></ul>\n<hr>\n<h2>6. Gestion d'un portefeuille multi-clients</h2>\n<ul><li>Un <strong>planning mensuel</strong> par client (date de réception des pièces, date d'échéance, date de livraison cible).</li><li>Lisser la charge sur le mois (ne pas tout faire la dernière semaine).</li><li>Standardiser les procédures pour passer vite d'un dossier à l'autre.</li></ul>\n<hr>\n<h2>7. Contrôle qualité avant livraison (auto-contrôle)</h2>\n<p>Avant de dire « terminé », passer la <strong>checklist qualité</strong> (Module 17) :<br>banque rapprochée, TVA cohérente, 471 soldé, lettrage fait, doublons vérifiés, anomalies commentées.</p>\n<hr>\n<h2>8. Tableau de bord de production &amp; indicateurs (KPI)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Indicateur</th><th>Définition</th><th>Cible</th></tr></thead><tbody><tr><td><strong>Dossiers traités</strong></td><td>Nb de dossiers bouclés / mois</td><td>Selon portefeuille</td></tr><tr><td><strong>Pièces saisies</strong></td><td>Volume de pièces / période</td><td>Suivi de productivité</td></tr><tr><td><strong>Anomalies</strong></td><td>Nb d'anomalies détectées / dossier</td><td>À documenter</td></tr><tr><td><strong>Délais</strong></td><td>Respect des échéances (TVA, livraison)</td><td><strong>100 % TVA à l'heure</strong></td></tr><tr><td><strong>Taux de retour</strong></td><td>% de dossiers renvoyés par le cabinet pour correction</td><td><strong>&lt; 5 %</strong> (autonomie)</td></tr></tbody></table></div>\n<blockquote>Le <strong>taux de retour</strong> est l'indicateur clé de la confiance : viser durablement &lt; 5 % sur un cycle pour gagner en autonomie.</blockquote>\n<hr>\n<h2>📊 Tableau de bord de production (modèle Excel à créer)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Client</th><th>Échéance TVA</th><th>Pièces reçues le</th><th>Saisie</th><th>Banque</th><th>TVA</th><th>Livré le</th><th>Validé</th><th>Retour (O/N)</th><th>Anomalies</th><th>Temps passé</th></tr></thead><tbody></tbody></table></div>\n<hr>\n<h2>✅ Checklist organisation quotidienne</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> To-do priorisée du jour établie</label></li><li class=\"task\"><label><input type=\"checkbox\"> Échéances TVA de la semaine repérées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Blocages remontés immédiatement</label></li><li class=\"task\"><label><input type=\"checkbox\"> Reporting de fin de journée envoyé</label></li><li class=\"task\"><label><input type=\"checkbox\"> Tableau de bord mis à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Créneau de recouvrement FR respecté</label></li></ul>\n<hr>\n<h2>🧪 Cas pratique 16.1 — Priorisation</h2>\n<p>Lundi matin, vous avez : (a) une TVA à livrer pour mercredi, (b) du lettrage rétroactif non urgent, (c) un mail du chef de mission demandant une info pour midi, (d) la saisie courante d'un dossier sans échéance proche. Dans quel ordre ?</p>\n<h3>✔️ Correction 16.1</h3>\n<ol><li><strong>(c)</strong> répondre au chef de mission (échéance midi, rapide).</li><li><strong>(a)</strong> avancer/boucler la TVA pour mercredi (échéance critique).</li><li><strong>(d)</strong> saisie courante.</li><li><strong>(b)</strong> lettrage rétroactif (tâche de fond).</li></ol>\n<hr>\n<h2>📝 Évaluation de fin de module 16</h2>\n<ol><li>Quel est le décalage Madagascar/France ?</li><li>Quel indicateur reflète le mieux l'autonomie ?</li><li>Quelle est la priorité n°1 dans les échéances ?</li><li>Que contient un bon reporting journalier ?</li><li>Pourquoi ne jamais livrer la TVA au dernier moment ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) Mada UTC+3, soit 1–2 h d'avance sur la France. 2) le <strong>taux de retour</strong> (&lt; 5 %). 3) les <strong>échéances TVA</strong>. 4) fait / en cours / bloqué / prévu demain. 5) risque de retard = pénalités pour le client + perte de confiance.</p>", "m17": "<h1>MODULE 17 — Qualité, erreurs fréquentes et contrôle interne</h1>\n<p><strong>Niveau :</strong> Transversal · <strong>Durée estimée :</strong> 5–6 h · <strong>Prérequis :</strong> Modules 4 à 13</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Connaître les erreurs les plus fréquentes et savoir les éviter.</li><li>Appliquer une méthode de contrôle qualité avant validation.</li></ul>\n<h2>🧩 Compétences</h2>\n<ul><li>Auto-contrôler un dossier avant livraison.</li><li>Réduire son taux de retour.</li></ul>\n<hr>\n<h2>1. Les erreurs fréquentes (et comment les éviter)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Erreur</th><th>Cause typique</th><th>Prévention</th></tr></thead><tbody><tr><td><strong>Erreur de TVA</strong></td><td>Mauvais taux, TVA sur assurance/VP, encaissements oubliés</td><td>Contrôle TVA systématique (Module 5)</td></tr><tr><td><strong>Mauvais compte comptable</strong></td><td>Imputation par habitude, OCR non vérifié</td><td>Vérifier la nature réelle de la dépense</td></tr><tr><td><strong>Doublons</strong></td><td>Import + saisie manuelle</td><td>Tri par tiers/montant/n° facture</td></tr><tr><td><strong>Absence de justificatif</strong></td><td>Pièce manquante saisie quand même</td><td>471 + relance, jamais d'invention</td></tr><tr><td><strong>Mauvais lettrage</strong></td><td>Lettrage auto sur écart</td><td>Lettrage manuel des écarts</td></tr><tr><td><strong>Solde bancaire non rapproché</strong></td><td>Rapprochement bâclé</td><td>Égalité 512 = relevé prouvée</td></tr><tr><td><strong>471 non apuré</strong></td><td>Opérations laissées en attente</td><td>Apurement avant livraison</td></tr><tr><td><strong>Charges personnelles en société</strong></td><td>Facture au nom du dirigeant</td><td>Signaler, ne pas déduire la TVA</td></tr><tr><td><strong>Mauvaise affectation client/fournisseur</strong></td><td>Tiers homonymes</td><td>Vérifier le bon compte tiers</td></tr><tr><td><strong>Confusion TTC / HT / TVA</strong></td><td>Calcul à l'envers</td><td>Recalculer HT + TVA = TTC</td></tr><tr><td><strong>Erreurs de paie</strong></td><td>OD ≠ journal de paie</td><td>Rapprocher OD = bulletins = DSN = paiements</td></tr><tr><td><strong>Anomalie sans commentaire</strong></td><td>Manque de traçabilité</td><td>Commenter chaque opération inhabituelle</td></tr></tbody></table></div>\n<hr>\n<h2>2. Le principe du contrôle interne offshore</h2>\n<ul><li><strong>Auto-contrôle</strong> : le collaborateur contrôle son propre travail (checklist qualité).</li><li><strong>Contrôle croisé</strong> : si possible, un second regard sur les dossiers sensibles.</li><li><strong>Supervision</strong> : le chef de mission valide selon le niveau d'autonomie.</li><li><strong>Documentation</strong> : chaque contrôle laisse une trace (feuille de travail, checklist cochée).</li></ul>\n<hr>\n<h2>3. La méthode de contrôle qualité (avant de dire « terminé »)</h2>\n<p>Procédure en 8 points :</p>\n<ol><li><strong>Banque rapprochée</strong> : 512 = relevé (justifié).</li><li><strong>TVA cohérente</strong> : collectée/déductible recalculées, pas d'erreur de taux.</li><li><strong>471 / 580 = 0</strong> : comptes d'attente apurés.</li><li><strong>Lettrage fait</strong> : 401/411 lettrés, écarts soldés.</li><li><strong>Doublons vérifiés</strong> : aucun.</li><li><strong>Comptes anormaux contrôlés</strong> : 53 ≥ 0, 455 justifié, pas de sens anormal injustifié.</li><li><strong>Anomalies commentées</strong> : tout point en suspens documenté.</li><li><strong>Pièces</strong> : justificatifs présents, factures non conformes signalées.</li></ol>\n<hr>\n<h2>✅ Checklist qualité avant validation (à joindre à chaque livraison)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Rapprochement bancaire bouclé et solde 512 justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA contrôlée (taux, assurance/VP exclus, encaissements)</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471 et 580 soldés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Lettrage 401/411 réalisé, écarts soldés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Aucun doublon</label></li><li class=\"task\"><label><input type=\"checkbox\"> Caisse 53 ≥ 0, 455 justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> Soldes au sens anormal expliqués</label></li><li class=\"task\"><label><input type=\"checkbox\"> Anomalies documentées (commentaires)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces présentes / non conformités signalées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Points en suspens listés pour le chef de mission</label></li></ul>\n<hr>\n<h2>4. Tenir son « carnet d'erreurs »</h2>\n<p>Chaque retour du cabinet = une ligne dans un fichier personnel :</p>\n<div class=\"tbl\"><table><thead><tr><th>Date</th><th>Dossier</th><th>Erreur</th><th>Cause</th><th>Correction</th><th>Action préventive</th></tr></thead><tbody></tbody></table></div>\n<blockquote>C'est l'outil n°1 de progression : on ne refait pas deux fois la même erreur.</blockquote>\n<hr>\n<h2>🧪 Cas pratique 17.1 — Trouver les erreurs</h2>\n<p>Sur un dossier livré, on observe : 471 = 1 500 D ; TVA déduite sur une facture d'assurance ; compte 53 = −30 ; une facture EDF saisie deux fois ; un 411 créditeur de 200 € non commenté. Listez les corrections.</p>\n<h3>✔️ Correction 17.1</h3>\n<ol><li><strong>471 = 1 500</strong> → apurer (imputer / relancer) avant livraison.</li><li><strong>TVA sur assurance</strong> → annuler la TVA déduite (assurance exonérée).</li><li><strong>53 = −30</strong> → corriger (caisse négative impossible).</li><li><strong>Doublon EDF</strong> → supprimer une écriture.</li><li><strong>411 créditeur 200</strong> → analyser (trop-payé) et <strong>commenter</strong> / reclasser.</li></ol>\n<p><strong>Conclusion :</strong> dossier <strong>non conforme</strong> pour livraison tant que ces points ne sont pas réglés.</p>\n<hr>\n<h2>📝 Évaluation de fin de module 17</h2>\n<ol><li>Citez 5 erreurs fréquentes.</li><li>Quels comptes doivent être à 0 avant livraison ?</li><li>Que faire d'une charge au nom du dirigeant ?</li><li>Décrivez la méthode de contrôle qualité en 8 points.</li><li>À quoi sert le carnet d'erreurs ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé synthétique :</strong> 1) TVA, mauvais compte, doublon, 471 non apuré, mauvais lettrage… 2) <strong>471 et 580</strong>. 3) signaler, ne pas déduire la TVA (charge personnelle probable). 4) banque, TVA, attente, lettrage, doublons, comptes anormaux, anomalies commentées, pièces. 5) ne pas reproduire les erreurs → progresser et baisser le taux de retour.</p>", "m20": "<h1>MODULE 20 — Parcours carrière et freelancing</h1>\n<p><strong>Niveau :</strong> Tous · <strong>Durée estimée :</strong> 5–6 h · <strong>Prérequis :</strong> avoir suivi la formation</p>\n<hr>\n<h2>🎯 Objectifs pédagogiques</h2>\n<ul><li>Savoir se positionner comme assistant comptable freelance pour cabinets français.</li><li>Construire une offre, un portfolio, prospecter, fixer ses tarifs.</li><li>Garantir la qualité et évoluer vers réviseur / chef de mission offshore.</li></ul>\n<hr>\n<h2>1. Devenir assistant comptable freelance pour cabinets français</h2>\n<p><strong>Modèle :</strong> le cabinet français externalise une partie de sa production (saisie, TVA, lettrage, rapprochement, révision) à un collaborateur ou une équipe à Madagascar.</p>\n<p><strong>Étapes :</strong></p>\n<ol><li>Maîtriser les compétences cœur (Modules 4–11) + un outil cabinet.</li><li>Se déclarer (statut local malgache adapté à la prestation de services à l'export).</li><li>Sécuriser son poste (confidentialité — argument commercial fort).</li><li>Construire une offre claire et un portfolio.</li><li>Prospecter les cabinets.</li><li>Délivrer une qualité régulière → fidéliser.</li></ol>\n<hr>\n<h2>2. Les compétences à vendre (par niveau)</h2>\n<div class=\"tbl\"><table><thead><tr><th>Niveau</th><th>Prestations vendables</th></tr></thead><tbody><tr><td><strong>Débutant</strong></td><td>Saisie achats/ventes/banque, classement/nommage, relance pièces</td></tr><tr><td><strong>Intermédiaire</strong></td><td>TVA (CA3/CA12), rapprochement bancaire, lettrage, comptes d'attente, OD de paie, immobilisations</td></tr><tr><td><strong>Avancé</strong></td><td>Révision par cycle, préparation de bilan/liasse, supervision d'équipe</td></tr></tbody></table></div>\n<p><strong>Différenciateurs :</strong> maîtrise de Pennylane <strong>+</strong> un outil cabinet (ACD/Sage/Cegid), rigueur, anticipation, confidentialité, reporting clair, bon français écrit.</p>\n<hr>\n<h2>3. Tarifs indicatifs (à adapter au marché et au niveau)</h2>\n<blockquote>Repères pour de la production offshore Madagascar → cabinets FR. À ajuster selon l'expérience, le volume et la complexité. Ces fourchettes ne sont <strong>pas</strong> des barèmes officiels.</blockquote>\n<div class=\"tbl\"><table><thead><tr><th>Modèle de facturation</th><th>Fourchette indicative</th></tr></thead><tbody><tr><td><strong>Taux horaire</strong></td><td>~ 8–18 €/h selon niveau (débutant → avancé)</td></tr><tr><td><strong>Au dossier (tenue mensuelle TPE simple)</strong></td><td>~ 40–120 €/mois/dossier selon volume</td></tr><tr><td><strong>Forfait temps plein dédié</strong> (1 ETP)</td><td>négocié au mois</td></tr><tr><td><strong>À la pièce saisie</strong></td><td>au volume, pour de gros flux</td></tr></tbody></table></div>\n<p><strong>Conseils tarifs :</strong> commencer raisonnable pour bâtir des références, <strong>augmenter avec la preuve de qualité</strong> (taux de retour bas), facturer la valeur (révision, autonomie) plus cher que la saisie.</p>\n<hr>\n<h2>4. Créer son portfolio</h2>\n<ul><li><strong>Cas anonymisés</strong> : « rapprochement bancaire d'un dossier de X écritures », « préparation CA3 », « apurement 471 ».</li><li><strong>Captures (anonymisées)</strong> de tableaux de suivi, balances âgées, états de rapprochement.</li><li><strong>Checklists</strong> et procédures maîtrisées (preuve de méthode).</li><li><strong>Témoignages</strong> de cabinets clients.</li><li><strong>CV orienté compétences</strong> (outils + cycles maîtrisés + KPI : taux de retour, délais).</li></ul>\n<blockquote>⚠️ <strong>Jamais de données client réelles</strong> dans un portfolio (RGPD/secret professionnel). Tout est anonymisé/fictif.</blockquote>\n<hr>\n<h2>5. Présenter ses services (pitch)</h2>\n<blockquote>« J'aide les cabinets d'expertise comptable français à fiabiliser et accélérer leur production : saisie, TVA, rapprochement, lettrage et révision, sur Pennylane/ACD/Sage, avec une checklist qualité à chaque livraison et un taux de retour inférieur à 5 %. Données traitées en confidentialité totale. »</blockquote>\n<hr>\n<h2>6. Prospecter les cabinets français</h2>\n<ul><li><strong>Cibler</strong> : petits/moyens cabinets en croissance, surchargés en période fiscale.</li><li><strong>Canaux</strong> : LinkedIn (messages personnalisés), plateformes freelance, recommandations, salons/forums comptables en ligne.</li><li><strong>Approche</strong> : message court → problème (surcharge) → solution (production fiable offshore) → preuve (méthode, KPI) → proposition d'essai.</li><li><strong>Période clé</strong> : avant les pics (TVA, campagne bilan/liasse de janvier à mai).</li></ul>\n<hr>\n<h2>7. Éviter les erreurs professionnelles</h2>\n<ul><li>Promettre des délais intenables.</li><li>Travailler sans confidentialité (rédhibitoire).</li><li>Valider à la place de l'expert-comptable.</li><li>Livrer sans checklist qualité.</li><li>Ne pas tracer / ne pas reporter.</li><li>Négliger le français écrit.</li></ul>\n<hr>\n<h2>8. Monter une équipe comptable offshore</h2>\n<ul><li><strong>Recruter</strong> sur les compétences cœur + tester (cas pratiques de cette formation).</li><li><strong>Standardiser</strong> : procédures, checklists, nommage, modèles de mails communs.</li><li><strong>Superviser</strong> : un réviseur senior contrôle les juniors (contrôle croisé).</li><li><strong>Mesurer</strong> : KPI par collaborateur (taux de retour, délais, volume).</li><li><strong>Former en continu</strong> : carnet d'erreurs partagé, points hebdo.</li></ul>\n<hr>\n<h2>9. Garantir la qualité (à l'échelle)</h2>\n<ul><li>Checklist qualité <strong>obligatoire</strong> à chaque livraison.</li><li>Double contrôle des dossiers sensibles / nouveaux clients.</li><li>Revue mensuelle des KPI.</li><li>Plan de montée en compétence individualisé.</li></ul>\n<hr>\n<h2>10. Évoluer vers réviseur comptable</h2>\n<p>Parcours type :<br><code>Assistant saisie → Collaborateur (tenue + TVA + lettrage) → Collaborateur confirmé (révision par cycle) → Réviseur (dossier complet + liasse) → Chef de mission offshore (supervision d'équipe)</code></p>\n<p><strong>Critères de passage :</strong> maîtrise des cycles, taux de retour durablement bas, capacité à justifier tous les soldes et à préparer un bilan.</p>\n<hr>\n<h2>✅ Checklist « se lancer en freelance »</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Compétences cœur maîtrisées (Modules 4–11)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Au moins 1 outil cabinet maîtrisé + Pennylane</label></li><li class=\"task\"><label><input type=\"checkbox\"> Poste sécurisé (confidentialité documentée)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Offre + tarifs définis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Portfolio anonymisé prêt</label></li><li class=\"task\"><label><input type=\"checkbox\"> Profil LinkedIn / pitch prêts</label></li><li class=\"task\"><label><input type=\"checkbox\"> Modèles de mails et checklists qualité en place</label></li><li class=\"task\"><label><input type=\"checkbox\"> Statut/déclaration en règle localement</label></li></ul>\n<hr>\n<h2>📝 Évaluation de fin de module 20</h2>\n<ol><li>Quels sont les 3 différenciateurs clés d'un collaborateur offshore ?</li><li>Pourquoi ne jamais mettre de données client réelles dans un portfolio ?</li><li>Quel KPI prouve le mieux la qualité auprès d'un cabinet ?</li><li>Quelle est la progression de carrière type ?</li><li>Que ne faut-il jamais faire à la place de l'expert-comptable ?</li></ol>\n<p><strong>Seuil : 7/10.</strong><br><strong>Corrigé :</strong> 1) maîtrise multi-outils, rigueur/qualité (taux de retour bas), confidentialité. 2) RGPD / secret professionnel. 3) le <strong>taux de retour</strong> (&lt; 5 %). 4) assistant → collaborateur → réviseur → chef de mission. 5) valider/signer les déclarations fiscales et décisions juridiques.</p>", "cas": "<h1>MODULE 18 — Cas pratiques complets corrigés</h1>\n<blockquote>10 cas progressifs reproduisant des situations réelles de cabinet. Faire chaque cas <strong>d'abord seul</strong>, puis comparer au corrigé. TVA 20 % sauf mention.</blockquote>\n<hr>\n<h2>CAS 1 — Saisie d'une facture d'achat avec TVA</h2>\n<p><strong>Énoncé :</strong> Facture fournisseur DURAND : marchandises 2 400 € TTC (TVA 20 %), reçue et non payée.</p>\n<p><strong>✔️ Corrigé :</strong> HT = 2 400 / 1,20 = 2 000 ; TVA = 400.</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>607 Achats de marchandises</td><td>2 000</td><td></td></tr><tr><td>44566 TVA déductible</td><td>400</td><td></td></tr><tr><td>401 DURAND</td><td></td><td>2 400</td></tr></tbody></table></div>\n<hr>\n<h2>CAS 2 — Saisie d'une facture sans TVA</h2>\n<p><strong>Énoncé :</strong> Facture d'un prestataire en <strong>franchise en base</strong> (mention art. 293 B) : 500 €.</p>\n<p><strong>✔️ Corrigé :</strong> Pas de TVA déductible.</p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>611 Sous-traitance (ou compte de charge adapté)</td><td>500</td><td></td></tr><tr><td>401 Fournisseur</td><td></td><td>500</td></tr></tbody></table></div>\n<blockquote>Si la facture portait de la TVA à tort → ne pas la déduire, signaler.</blockquote>\n<hr>\n<h2>CAS 3 — Saisie banque avec affectation des opérations</h2>\n<p><strong>Énoncé :</strong> Relevé du mois : (a) virement reçu client MARTIN 3 600 € ; (b) prélèvement Orange 90 € (facture présente) ; (c) frais bancaires 22 € ; (d) virement reçu non identifié 800 €.</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<ul><li>(a) 512 D 3 600 / 411 MARTIN C 3 600 (+ lettrer)</li><li>(b) 6262 D 75 / 44566 D 15 / 512 C 90</li><li>(c) 627 D 22 / 512 C 22</li><li>(d) 512 D 800 / <strong>471 C 800</strong> + commentaire + relance (nature inconnue)</li></ul>\n<hr>\n<h2>CAS 4 — Rapprochement bancaire complet</h2>\n<p><strong>Énoncé :</strong> Solde comptable 512 = 6 000 D. Solde relevé = 6 350.<br>Éléments : frais bancaires 50 € non saisis ; chèque émis 500 € non débité ; encaissement client 900 € non encore crédité par la banque.</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<ol><li>Saisir les frais : 627 D 50 / 512 C 50 → solde comptable corrigé = <strong>5 950</strong>.</li><li>État de rapprochement (partir du relevé pour retrouver la compta) :</li></ol>\n<ul><li>Relevé 6 350</li><li><strong>+ chèque émis non débité 500</strong> (compta l'a déjà retiré) → 6 850</li><li><strong>− encaissement non crédité 900</strong> (compta l'a déjà ajouté) → <strong>5 950</strong></li></ul>\n<ol><li><strong>5 950 (banque corrigé) = 5 950 (compta corrigé)</strong> ✔️ rapprochement équilibré.</li></ol>\n<hr>\n<h2>CAS 5 — Lettrage fournisseur avec avoir</h2>\n<p><strong>Énoncé :</strong> Compte 401 LEROY : F1 1 500 (C), F2 600 (C), Avoir 100 (D), règlement 2 000 (D).</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<ul><li>Total dû = 1 500 + 600 − 100 = 2 000.</li><li>Règlement 2 000 → solde tout.</li><li><strong>Lettre A</strong> : F1 + F2 + Avoir + règlement → D = 100 + 2 000 = 2 100 ; C = 1 500 + 600 = 2 100 ✔️.</li><li><strong>Solde 401 = 0</strong>, entièrement lettré.</li></ul>\n<hr>\n<h2>CAS 6 — Préparation TVA mensuelle (réel normal, débits)</h2>\n<p><strong>Énoncé :</strong> Mois : ventes 80 000 € HT ; achats marchandises 45 000 € HT ; frais généraux 6 000 € HT ; immo 3 000 € HT ; crédit TVA antérieur 500 €.</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<ul><li>Collectée : 80 000 × 20 % = 16 000</li><li>Déductible ABS : (45 000 + 6 000) × 20 % = 10 200</li><li>Déductible immo : 3 000 × 20 % = 600</li><li>Crédit antérieur : 500</li><li><strong>TVA à payer = 16 000 − 10 200 − 600 − 500 = 4 700 €</strong></li></ul>\n<p>Écriture (OD) : 44571 D 16 000 / 44566 C 10 200 / 44562 C 600 / 44567 C 500 / 44551 C 4 700.</p>\n<hr>\n<h2>CAS 7 — Apurement du compte 471</h2>\n<p><strong>Énoncé :</strong> 471 : (a) D 300 « PRLV GAN » (assurance, facture trouvée) ; (b) C 1 200 « VIR REÇU » client connu DUBOIS ; (c) D 150 « FRAIS » inconnu.</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<ul><li>(a) 616 D 300 / 471 C 300 (assurance, sans TVA)</li><li>(b) 471 D 1 200 / 411 DUBOIS C 1 200 + lettrer</li><li>(c) <strong>rester en 471</strong> (150) + commentaire + relance.</li><li>471 résiduel = 150 → transmis au chef de mission.</li></ul>\n<hr>\n<h2>CAS 8 — OD de paie</h2>\n<p><strong>Énoncé :</strong> Journal de paie : brut 8 000 ; cotisations salariales 1 800 ; patronales 3 400 ; net 6 200 ; URSSAF 3 800 ; retraite/prév./mutuelle 1 400.</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<div class=\"tbl\"><table><thead><tr><th>Compte</th><th>Débit</th><th>Crédit</th></tr></thead><tbody><tr><td>641 Salaires bruts</td><td>8 000</td><td></td></tr><tr><td>645 Charges patronales</td><td>3 400</td><td></td></tr><tr><td>421 Net à payer</td><td></td><td>6 200</td></tr><tr><td>431 URSSAF</td><td></td><td>3 800</td></tr><tr><td>437 Autres organismes</td><td></td><td>1 400</td></tr></tbody></table></div>\n<p>Contrôle : D 11 400 = C 11 400 ✔️ ; cotisations 1 800 + 3 400 = 5 200 = 3 800 + 1 400 ✔️.<br>Paiements : 421 D 6 200 / 512 C 6 200 ; 431 D 3 800 + 437 D 1 400 / 512 C 5 200.</p>\n<hr>\n<h2>CAS 9 — Immobilisation avec amortissement</h2>\n<p><strong>Énoncé :</strong> Achat machine le <strong>01/07/2026</strong> : 6 000 € HT, TVA 20 %, durée 5 ans, clôture 31/12/2026.</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<ul><li>Achat : 2154 D 6 000 / 44562 D 1 200 / 404 C 7 200</li><li>Dotation annuelle pleine : 6 000 / 5 = 1 200 €/an</li><li>Prorata 2026 (6 mois) : 1 200 × 6/12 = <strong>600 €</strong></li><li>Dotation 31/12/2026 : 6811 D 600 / 28154 C 600</li><li>VNC au 31/12/2026 = 6 000 − 600 = <strong>5 400 €</strong></li></ul>\n<hr>\n<h2>CAS 10 — Préparation d'un dossier bilan simple</h2>\n<p><strong>Énoncé :</strong> Au 31/12/2026, à régulariser : (a) facture EDF de décembre non reçue, 500 € HT ; (b) assurance 1 200 € payée le 01/07/2026 pour 12 mois ; (c) prestation de décembre facturée en janvier, 4 000 € HT ; (d) dotation amortissement annuelle 600 € (cas 9) ; (e) 471 = 0, banque rapprochée.</p>\n<p><strong>✔️ Corrigé :</strong></p>\n<ul><li>(a) <strong>FNP</strong> : 60612 D 500 / 44586 D 100 / 408 C 600</li><li>(b) <strong>CCA</strong> : part 2027 = 6 mois = 1 200 × 6/12 = 600 → 486 D 600 / 616 C 600</li><li>(c) <strong>FAE</strong> : 418 D 4 800 / 706 C 4 000 / 44587 C 800</li><li>(d) Amortissement : 6811 D 600 / 28154 C 600</li><li>(e) Contrôles finaux : 471 = 0 ✔️, 512 justifié ✔️, lettrage fait, comptes anormaux vérifiés.</li></ul>\n<p><strong>Dossier bilan à transmettre :</strong> balance révisée + feuilles de travail + rapprochements + fichier immo + détail FNP/FAE/CCA + points en suspens → <strong>validation chef de mission / expert-comptable</strong>.</p>\n<hr>\n<h2>🎓 Bonus — Cas transversal « dossier mensuel complet »</h2>\n<p><strong>Énoncé :</strong> Boucler le mois de mars d'un dossier TPE (services, réel normal, à l'encaissement). Pièces : 15 factures d'achats, 8 factures de ventes, relevé bancaire, 1 prélèvement sans facture.</p>\n<p><strong>Démarche attendue (procédure cabinet) :</strong></p>\n<ol><li>Vérifier régime (services, encaissements) dans le dossier permanent.</li><li>Saisir achats (bon compte + TVA), ventes.</li><li>Saisir/rapprocher la banque ; prélèvement sans facture → 471 + relance.</li><li>Lettrer 401/411.</li><li>Apurer 471 (ce qui peut l'être).</li><li>Préparer la <strong>CA3</strong> sur les <strong>encaissements</strong> (TVA collectée = factures payées).</li><li>Passer la checklist qualité (Module 17).</li><li>Livrer avec mail « dossier terminé » + brouillon CA3 à valider (Module 15).</li></ol>", "eval": "<h1>MODULE 19 — Évaluation finale certifiante</h1>\n<p><strong>Durée conseillée :</strong> 3 h · <strong>Total : 100 points</strong> · <strong>Niveau opérationnel requis : voir grille en fin de document.</strong></p>\n<blockquote>À réaliser sans aide. Chaque partie reproduit une tâche réelle de cabinet.</blockquote>\n<hr>\n<h2>PARTIE 1 — QCM (20 points · 1 pt/question)</h2>\n<ol><li>La TVA à décaisser = a) collectée + déductible b) <strong>collectée − déductible</strong> c) déductible − collectée</li><li>Le compte 401 enregistre : a) les clients b) <strong>les fournisseurs</strong> c) la banque</li><li>Une caisse 53 peut-elle être créditrice ? a) oui b) <strong>non</strong></li><li>Le seuil de franchise en base <strong>services</strong> 2026 : a) 85 000 € b) <strong>37 500 €</strong> c) 25 000 €</li><li>La TVA sur une assurance est : a) 20 % b) 10 % c) <strong>non déductible</strong></li><li>Les prestations de services sont taxables par défaut : a) sur les débits b) <strong>sur les encaissements</strong></li><li>Le compte de virements internes est le : a) 471 b) <strong>580</strong> c) 467</li><li>Taux normal d'IS 2026 : a) 15 % b) 28 % c) <strong>25 %</strong></li><li>Le taux réduit d'IS de 15 % s'applique sur les premiers : a) 38 120 € b) <strong>42 500 €</strong> c) 50 000 €</li><li>La dotation aux amortissements se passe au débit du : a) 28 b) <strong>6811</strong> c) 215</li><li>Une FNP concerne : a) un produit d'avance b) <strong>une charge de N facturée en N+1</strong> c) une charge d'avance</li><li>Le 471 au bilan doit être : a) débiteur b) créditeur c) <strong>nul</strong></li><li>Le lettrage sert à : a) calculer la TVA b) <strong>rapprocher factures et règlements</strong> c) amortir</li><li>Acomptes IS : a) 15/01-04-07-10 b) <strong>15/03-06-09-12</strong> c) 15/02-05-08-11</li><li>Un 411 créditeur signifie : a) le client doit b) <strong>le client a trop payé</strong> c) erreur impossible</li><li>PMSS 2026 : a) 3 864 € b) <strong>4 005 €</strong> c) 3 666 €</li><li>La TVA sur achat de véhicule de tourisme : a) déductible b) <strong>non déductible</strong></li><li>La CA12 concerne le régime : a) réel normal b) <strong>réel simplifié</strong></li><li>L'autoliquidation est : a) une exonération b) <strong>neutre mais à déclarer (collecte + déduction)</strong></li><li>Qui signe la liasse fiscale ? a) le collaborateur b) le chef de mission c) <strong>l'expert-comptable</strong></li></ol>\n<hr>\n<h2>PARTIE 2 — Écritures comptables (20 points · 4 pts/écriture)</h2>\n<p>Passez les écritures (TVA 20 % sauf mention) :</p>\n<ol><li>Facture d'achat marchandises 3 600 € TTC.</li><li>Facture de vente prestation 6 000 € HT.</li><li>Achat d'un ordinateur (immo) 1 500 € HT.</li><li>Échéance d'emprunt 1 200 € (capital 1 000, intérêts 200).</li><li>Frais bancaires 35 € (sans TVA).</li></ol>\n<hr>\n<h2>PARTIE 3 — Préparation TVA (15 points)</h2>\n<p>Mois (réel normal, débits) : ventes 120 000 € HT ; achats 70 000 € HT ; frais généraux 8 000 € HT ; immo 5 000 € HT ; crédit TVA antérieur 1 000 €.<br><strong>a)</strong> Calculez la TVA à payer. <strong>b)</strong> Passez l'écriture de la déclaration.</p>\n<hr>\n<h2>PARTIE 4 — Rapprochement bancaire (15 points)</h2>\n<p>Solde comptable 512 = 9 000 D. Solde relevé = 9 280.<br>Éléments : frais bancaires 80 € non saisis ; chèque émis 600 € non débité ; encaissement client 400 € non encore crédité.<br><strong>a)</strong> Saisissez ce qui manque. <strong>b)</strong> Dressez l'état de rapprochement et concluez.</p>\n<hr>\n<h2>PARTIE 5 — Lettrage (10 points)</h2>\n<p>Compte 401 BERNARD : F1 2 000 (C), F2 900 (C), Avoir 200 (D), règlement 2 700 (D).<br><strong>a)</strong> Lettrez. <strong>b)</strong> Indiquez le solde restant.</p>\n<hr>\n<h2>PARTIE 6 — Analyse d'anomalies (10 points)</h2>\n<p>Sur un dossier livré, vous observez : 471 = 2 100 D ; TVA déduite sur une facture d'assurance ; 53 = −60 ; 455 débiteur de 5 000 € (SARL) ; un 411 créditeur de 350 € non commenté.<br>Listez chaque anomalie et l'action corrective.</p>\n<hr>\n<h2>PARTIE 7 — Mini-dossier bilan (10 points)</h2>\n<p>Au 31/12/2026 : (a) facture EDF de décembre non reçue 400 € HT ; (b) assurance 1 800 € payée le 01/10/2026 pour 12 mois ; (c) prestation de décembre facturée en janvier 3 000 € HT.<br>Passez les écritures de cut-off.</p>\n<hr>\n<hr>\n<h1>✔️ CORRECTION DÉTAILLÉE</h1>\n<h2>Partie 1 — QCM</h2>\n<p>1b · 2b · 3b · 4b · 5c · 6b · 7b · 8c · 9b · 10b · 11b · 12c · 13b · 14b · 15b · 16b · 17b · 18b · 19b · 20c.</p>\n<h2>Partie 2 — Écritures</h2>\n<ol><li>607 D 3 000 / 44566 D 600 / 401 C 3 600</li><li>411 D 7 200 / 706 C 6 000 / 44571 C 1 200</li><li>2183 D 1 500 / 44562 D 300 / 404 C 1 800</li><li>164 D 1 000 / 661 D 200 / 512 C 1 200</li><li>627 D 35 / 512 C 35</li></ol>\n<h2>Partie 3 — TVA</h2>\n<ul><li>Collectée : 120 000 × 20 % = 24 000</li><li>Déductible ABS : (70 000 + 8 000) × 20 % = 15 600</li><li>Déductible immo : 5 000 × 20 % = 1 000</li><li>Crédit antérieur : 1 000</li><li><strong>TVA à payer = 24 000 − 15 600 − 1 000 − 1 000 = 6 400 €</strong></li><li>Écriture : 44571 D 24 000 / 44566 C 15 600 / 44562 C 1 000 / 44567 C 1 000 / 44551 C 6 400</li></ul>\n<h2>Partie 4 — Rapprochement</h2>\n<p>a) Frais : 627 D 80 / 512 C 80 → solde comptable corrigé = <strong>8 920</strong>.<br>b) Relevé 9 280 <strong>+ chèque non débité 600</strong> = 9 880 <strong>− encaissement non crédité 400</strong> = <strong>9 480</strong>…<br>→ Comparaison : 8 920 (compta) ≠ 9 480 → <strong>écart de 560 à rechercher</strong> ⇒ <em>(volontairement piégé)</em>. Si l'énoncé est « propre » : avec relevé 9 280, chèque 600 (+), encaissement 400 (−) → 9 480 ; le solde comptable corrigé devrait être 9 480. <strong>La bonne réponse pédagogique : ne jamais forcer ; chercher et corriger l'écart résiduel.</strong><br><em>(Barème : points accordés pour la saisie des frais + la méthode d'état de rapprochement + la mention « rechercher l'écart, ne pas forcer ».)</em></p>\n<h2>Partie 5 — Lettrage</h2>\n<ul><li>Dû net = 2 000 + 900 − 200 = 2 700 ; règlement 2 700 → tout soldé.</li><li>Lettre A : D = 200 + 2 700 = 2 900 ; C = 2 000 + 900 = 2 900 ✔️.</li><li><strong>Solde 401 = 0</strong>.</li></ul>\n<h2>Partie 6 — Anomalies</h2>\n<ol><li><strong>471 = 2 100</strong> → apurer (imputer/relancer) avant validation.</li><li><strong>TVA sur assurance</strong> → annuler (exonéré).</li><li><strong>53 = −60</strong> → corriger (caisse négative impossible).</li><li><strong>455 débiteur 5 000 (SARL)</strong> → <strong>signaler au chef de mission</strong> (avance interdite possible), documenter.</li><li><strong>411 créditeur 350</strong> → analyser (trop-payé) + commenter / reclasser.</li></ol>\n<h2>Partie 7 — Cut-off</h2>\n<ul><li>(a) FNP : 60612 D 400 / 44586 D 80 / 408 C 480</li><li>(b) CCA : part 2027 = 9 mois = 1 800 × 9/12 = <strong>1 350</strong> → 486 D 1 350 / 616 C 1 350</li><li>(c) FAE : 418 D 3 600 / 706 C 3 000 / 44587 C 600</li></ul>\n<hr>\n<h1>🏅 Barème et niveau délivré</h1>\n<div class=\"tbl\"><table><thead><tr><th>Score /100</th><th>Niveau délivré</th><th>Opérationnel pour</th></tr></thead><tbody><tr><td><strong>85–100</strong></td><td><strong>Avancé – Collaborateur autonome</strong></td><td>Tenir un portefeuille, préparer bilans/liasses (validation finale EC)</td></tr><tr><td><strong>70–84</strong></td><td><strong>Intermédiaire confirmé</strong></td><td>Saisie + TVA + lettrage + rapprochement en autonomie, révision supervisée</td></tr><tr><td><strong>55–69</strong></td><td><strong>Débutant validé</strong></td><td>Saisie et organisation de dossier en autonomie, reste supervisé</td></tr><tr><td><strong>&lt; 55</strong></td><td><strong>Non validé</strong></td><td>Reprise des modules faibles + nouvelle évaluation</td></tr></tbody></table></div>\n<p><strong>Niveau attendu pour être opérationnel en cabinet français : ≥ 70/100</strong>, avec obligatoirement :</p>\n<ul><li>Partie 2 (écritures) ≥ 16/20,</li><li>Partie 3 (TVA) ≥ 11/15,</li><li>Partie 6 (anomalies) ≥ 7/10 (la détection d'anomalies et la posture « signaler à l'EC » sont éliminatoires si non acquises).</li></ul>", "a_check": "<h1>ANNEXE A — Checklists opérationnelles (regroupées)</h1>\n<blockquote>À imprimer / copier dans l'outil de suivi. Cocher avant chaque livraison.</blockquote>\n<hr>\n<h2>A1. Confidentialité (poste offshore)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Poste dédié, antivirus actif, OS à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Session verrouillée en cas d'absence</label></li><li class=\"task\"><label><input type=\"checkbox\"> Écran non visible des tiers</label></li><li class=\"task\"><label><input type=\"checkbox\"> Aucun fichier client sur messagerie/stockage personnel</label></li><li class=\"task\"><label><input type=\"checkbox\"> Accès via les seuls outils du cabinet</label></li><li class=\"task\"><label><input type=\"checkbox\"> Mots de passe forts + 2FA</label></li><li class=\"task\"><label><input type=\"checkbox\"> Wifi sécurisé</label></li></ul>\n<h2>A2. Ouverture / tenue de dossier mensuel</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Relevés bancaires complets reçus</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces achats/ventes du mois reçues</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces nommées selon la convention</label></li><li class=\"task\"><label><input type=\"checkbox\"> Doublons contrôlés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Factures non conformes signalées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces manquantes listées et relancées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Régime TVA + régime fiscal vérifiés (dossier permanent)</label></li></ul>\n<h2>A3. Saisie (par pièce)</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Pièce conforme et lisible</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon journal (AC/VT/BQ/CA/OD)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon tiers (401/411)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon compte de charge/produit</label></li><li class=\"task\"><label><input type=\"checkbox\"> Bon taux + bon compte de TVA</label></li><li class=\"task\"><label><input type=\"checkbox\"> HT + TVA = TTC (recalcul)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pas de doublon</label></li><li class=\"task\"><label><input type=\"checkbox\"> Commentaire si opération inhabituelle</label></li></ul>\n<h2>A4. Rapprochement bancaire</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Relevé complet, solde initial = solde final M-1</label></li><li class=\"task\"><label><input type=\"checkbox\"> Toutes les lignes pointées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Frais/agios saisis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Prélèvements/virements saisis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Doublons supprimés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Virements internes via 580 (= 0)</label></li><li class=\"task\"><label><input type=\"checkbox\"> État de rapprochement équilibré (écart 0 ou justifié)</label></li></ul>\n<h2>A5. Lettrage</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Lettrage automatique lancé</label></li><li class=\"task\"><label><input type=\"checkbox\"> Règlements partiels suivis</label></li><li class=\"task\"><label><input type=\"checkbox\"> Avoirs lettrés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Écarts soldés (658/758/627)</label></li><li class=\"task\"><label><input type=\"checkbox\"> 411 créditeurs / 401 débiteurs analysés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Créances anciennes signalées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Balance âgée éditée</label></li><li class=\"task\"><label><input type=\"checkbox\"> 401/411 justifiés</label></li></ul>\n<h2>A6. Apurement du 471</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Grand livre 471 édité</label></li><li class=\"task\"><label><input type=\"checkbox\"> Chaque ligne commentée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Pièces recherchées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Imputations possibles passées</label></li><li class=\"task\"><label><input type=\"checkbox\"> Relances envoyées pour le reste</label></li><li class=\"task\"><label><input type=\"checkbox\"> 580 = 0, 455 justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471 ramené à 0 (ou restes transmis)</label></li></ul>\n<h2>A7. OD de paie</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Journal de paie reçu</label></li><li class=\"task\"><label><input type=\"checkbox\"> OD équilibrée (641+645 = 421+431+437)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Net (421) = virements salaires</label></li><li class=\"task\"><label><input type=\"checkbox\"> Cotisations = DSN = prélèvements</label></li><li class=\"task\"><label><input type=\"checkbox\"> 421/431/437 soldés après paiement</label></li><li class=\"task\"><label><input type=\"checkbox\"> Écarts justifiés</label></li></ul>\n<h2>A8. Immobilisations</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Distinction charge/immo (seuil 500 € HT)</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA correcte (non déductible sur VP)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Date de mise en service identifiée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Durée conforme à la politique cabinet</label></li><li class=\"task\"><label><input type=\"checkbox\"> Prorata temporis 1re année</label></li><li class=\"task\"><label><input type=\"checkbox\"> Dotation passée (6811/28x)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Fichier immo = compta (21/20/28)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Cessions traitées (775/675)</label></li></ul>\n<h2>A9. Révision par cycle</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Trésorerie : rapprochements OK, 580 = 0, caisse ≥ 0</label></li><li class=\"task\"><label><input type=\"checkbox\"> Fournisseurs : 401 lettré/justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> Clients : 411 lettré/justifié</label></li><li class=\"task\"><label><input type=\"checkbox\"> Personnel : OD = bulletins = DSN = paiements</label></li><li class=\"task\"><label><input type=\"checkbox\"> Fiscal : comptes TVA cohérents</label></li><li class=\"task\"><label><input type=\"checkbox\"> Immobilisations : fichier = compta</label></li><li class=\"task\"><label><input type=\"checkbox\"> Emprunts : 164 = capital restant dû</label></li><li class=\"task\"><label><input type=\"checkbox\"> Capitaux : 455 justifié, résultat N-1 affecté</label></li><li class=\"task\"><label><input type=\"checkbox\"> 471/467 soldés ou justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Feuilles de travail rédigées</label></li></ul>\n<h2>A10. Préparation des éléments fiscaux</h2>\n<ul><li class=\"task\"><label><input type=\"checkbox\"> Régime fiscal identifié (IR/IS, BIC/BNC, micro/réel)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes révisés et justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> TVA de l'exercice bouclée</label></li><li class=\"task\"><label><input type=\"checkbox\"> Immobilisations à jour</label></li><li class=\"task\"><label><input type=\"checkbox\"> Provisions/dépréciations recensées (validation EC)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Comptes courants d'associés justifiés</label></li><li class=\"task\"><label><input type=\"checkbox\"> Réintégrations/déductions signalées (pour décision EC)</label></li><li class=\"task\"><label><input type=\"checkbox\"> Tableaux de liasse pré-rem
